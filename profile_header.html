<div class="profile-header" style="padding: 20px; color: white;">
    <div style="display: flex; align-items: center; gap: 20px;">
        <div style="width: 90px; height: 90px; border-radius: 50%; padding: 3px; background: linear-gradient(45deg, #FF7A1A, #feb47b);">
            <img id="p-img" src="https://via.placeholder.com/150" style="width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 2px solid black;">
        </div>
        <div style="flex: 1;">
            <div style="display: flex; align-items: center; gap: 8px;">
                <h2 id="p-username" style="margin: 0; font-size: 20px;">...</h2>
                <div id="badge-container"></div> </div>
            <p id="p-bio" style="font-size: 14px; color: #bbb; margin-top: 5px;"></p>
        </div>
    </div>
    <div id="p-actions" style="display: flex; gap: 10px; margin-top: 20px;"></div>
</div>

<script type="module">
    import { auth, db } from './firebase-config.js';
    import { doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    window.loadHeader = (uid, currentUid) => {
        onSnapshot(doc(db, "users", uid), (snap) => {
            if (snap.exists()) {
                const data = snap.data();
                document.getElementById('p-username').innerText = data.username || "Utilisateur";
                document.getElementById('p-bio').innerText = data.bio || "Aucune bio.";
                if (data.avatarUrl) document.getElementById('p-img').src = data.avatarUrl;

                const actions = document.getElementById('p-actions');
                if (uid === currentUid) {
                    actions.innerHTML = `<button onclick="openEditModal()" style="flex:1; padding:10px; background:#262626; color:white; border-radius:8px; border:none; font-weight:bold;">Modifier le profil</button>`;
                } else {
                    actions.innerHTML = `<button style="flex:1; padding:10px; background:#FF7A1A; color:white; border-radius:8px; border:none; font-weight:bold;">Suivre</button>`;
                }
            }
        });
    };
</script>
