<div class="profile-header-container" style="padding: 20px; color: white;">
    <div style="display: flex; align-items: center; gap: 20px;">
        <div style="width: 85px; height: 85px; border-radius: 50%; padding: 2px; background: linear-gradient(45deg, #FF7A1A, #feb47b);">
            <img id="p-img" src="https://via.placeholder.com/150" 
                 style="width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 2px solid black;">
        </div>

        <div style="flex: 1;">
            <div style="display: flex; align-items: center; gap: 5px;">
                <h2 id="p-username" style="margin: 0; font-size: 18px;">Chargement...</h2>
                <span id="p-badge" style="display: none; color: #0095f6;"><i class="fas fa-check-circle"></i></span>
            </div>
            <p id="p-bio" style="font-size: 13px; color: #ccc; margin: 8px 0; line-height: 1.4;"></p>
        </div>
    </div>

    <div id="p-actions" style="display: flex; gap: 10px; margin-top: 15px;">
        </div>
</div>

<script type="module">
    import { auth, db } from './firebase-config.js';
    import { doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // Cette fonction sera appelée par le fichier parent
    window.loadHeader = (uid, currentUid) => {
        onSnapshot(doc(db, "users", uid), (snap) => {
            if (snap.exists()) {
                const data = snap.data();
                document.getElementById('p-username').innerText = data.username || "Anonyme";
                document.getElementById('p-bio').innerText = data.bio || "Pas de bio disponible.";
                if (data.avatarUrl) document.getElementById('p-img').src = data.avatarUrl;
                if (data.isVerified) document.getElementById('p-badge').style.display = "inline";

                // Gestion des boutons
                const actions = document.getElementById('p-actions');
                if (uid === currentUid) {
                    actions.innerHTML = `<button onclick="openEditModal()" style="flex:1; padding:10px; border-radius:8px; border:none; background:#262626; color:white; font-weight:bold;">Modifier le profil</button>`;
                } else {
                    actions.innerHTML = `
                        <button id="btn-follow" style="flex:1; padding:10px; border-radius:8px; border:none; background:#FF7A1A; color:white; font-weight:bold;">Suivre</button>
                        <button onclick="openMessageModal()" style="flex:1; padding:10px; border-radius:8px; border:none; background:#262626; color:white; font-weight:bold;">Message</button>
                    `;
                }
            }
        });
    };
</script>
