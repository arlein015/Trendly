<style>
    .btn-floy-main {
        flex: 1;
        height: 35px;
        border: none;
        border-radius: 8px;
        font-weight: 600;
        font-size: 14px;
        cursor: pointer;
        transition: opacity 0.2s;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
    }
    /* Bouton Modifier (Gris foncé/Noir style Insta) */
    .btn-edit { background: #efefef; color: black; } /* Pour le mode clair, ou #262626 pour le mode sombre */
    
    /* Bouton Message (Orange Floy) */
    .btn-message { background: #FF7A1A; color: white; }

    .profile-stats-row {
        display: flex;
        gap: 20px;
        margin: 15px 0;
    }
    .stat-item { font-size: 14px; color: white; }
    .stat-item b { display: inline-block; margin-right: 4px; }
</style>

<div style="padding: 20px 15px; color: white; background: #000;">
    <div style="display: flex; align-items: center; gap: 25px;">
        <div style="position: relative;">
            <img id="header-avatar" src="https://via.placeholder.com/150" 
                 style="width: 85px; height: 85px; border-radius: 50%; object-fit: cover; border: 1px solid #262626;">
            <div style="position: absolute; bottom: 0; right: 0; background: #0095f6; color: white; border-radius: 50%; width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; border: 2px solid black; font-size: 12px;">
                <i class="fas fa-plus"></i>
            </div>
        </div>
        
        <div style="flex: 1;">
            <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 10px;">
                <h2 id="header-name" style="margin:0; font-size: 20px; font-weight: 400;">...</h2>
                <i class="fas fa-cog" style="font-size: 18px; cursor: pointer;"></i>
            </div>
            <div id="badge-container"></div>
        </div>
    </div>

    <div style="margin-top: 15px;">
        <span id="header-fullname" style="font-weight: 600; font-size: 14px; display: block;">...</span>
        <p id="header-bio" style="margin: 2px 0; font-size: 14px; font-weight: 400; line-height: 1.4;"></p>
    </div>

    <div class="profile-stats-row">
        <div class="stat-item"><b id="count-posts">0</b> publications</div>
        <div class="stat-item"><b id="count-followers">0</b> followers</div>
        <div class="stat-item"><b id="count-following">0</b> suivi(e)s</div>
    </div>

    <div id="header-btn-zone" style="display: flex; gap: 8px; margin-top: 15px;">
        <button onclick="openEditModal()" class="btn-floy-main btn-edit">
            Modifier le profil
        </button>
        
        <button onclick="location.href='messages.html'" class="btn-floy-main btn-message">
            <i class="fas fa-paper-plane"></i> Messages
        </button>
    </div>
</div>

<script type="module">
    import { db } from './firebase-config.js';
    import { doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    window.loadHeader = (profileId, myId) => {
        onSnapshot(doc(db, "users", profileId), (snap) => {
            if (!snap.exists()) return;
            const data = snap.data();
            
            document.getElementById('header-name').innerText = data.username || "utilisateur";
            document.getElementById('header-fullname').innerText = data.fullName || data.username;
            document.getElementById('header-bio').innerText = data.bio || "";
            if(data.avatarUrl) document.getElementById('header-avatar').src = data.avatarUrl;

            // Gestion du badge Floy (Orange)
            const bCont = document.getElementById('badge-container');
            if(bCont && data.isVerified) {
                bCont.innerHTML = `<span style="color: #FF7A1A; font-size: 12px; font-weight: 600;">CERTIFIÉ FLOY</span>`;
            }
        });
    };
</script>
