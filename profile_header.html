<div style="padding: 20px; display: flex; align-items: center; gap: 15px;">
    <div style="width: 80px; height: 80px; border-radius: 50%; padding: 2px; background: linear-gradient(45deg, #FF7A1A, #feb47b);">
        <img id="header-avatar" src="https://via.placeholder.com/150" style="width:100%; height:100%; border-radius:50%; object-fit:cover; border:2px solid black;">
    </div>
    
    <div style="flex: 1;">
        <div style="display: flex; align-items: center; gap: 6px;">
            <h2 id="header-name" style="margin:0; font-size:18px;">...</h2>
            <div id="badge-container"></div>
        </div>
        <p id="header-bio" style="margin:4px 0 0 0; font-size:13px; color:#aaa;"></p>
    </div>
</div>
<div id="header-btn-zone" style="padding: 0 20px; display: flex; gap: 10px;"></div>

<script type="module">
    import { db } from './firebase-config.js';
    import { doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    window.loadHeader = (profileId, myId) => {
        onSnapshot(doc(db, "users", profileId), (snap) => {
            if (!snap.exists()) return;
            const data = snap.data();
            
            // Textes
            document.getElementById('header-name').innerText = data.username || "Membre Floy";
            document.getElementById('header-bio').innerText = data.bio || "";
            if(data.avatarUrl) document.getElementById('header-avatar').src = data.avatarUrl;

            // Badge
            const bCont = document.getElementById('badge-container');
            if(bCont && data.isVerified) {
                bCont.innerHTML = `<i class="fas fa-check-circle" style="color:#FF7A1A; font-size:14px;"></i>`;
            }

            // Bouton
            const btnZone = document.getElementById('header-btn-zone');
            if(profileId === myId) {
                btnZone.innerHTML = `<button onclick="openEditModal()" style="flex:1; padding:8px; background:#262626; color:white; border:none; border-radius:6px; font-weight:bold;">Modifier le profil</button>`;
            } else {
                btnZone.innerHTML = `<button style="flex:1; padding:8px; background:#FF7A1A; color:white; border:none; border-radius:6px; font-weight:bold;">Suivre</button>`;
            }
        });
    };
</script>
