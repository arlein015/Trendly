<div class="profile-header" style="background: #000; color: white; padding: 20px;">
    <div class="header-top" style="display: flex; align-items: center; gap: 20px;">
        <div class="avatar-wrapper" style="position: relative;">
            <img id="h-avatar" src="https://via.placeholder.com/150" style="width: 85px; height: 85px; border-radius: 50%; object-fit: cover;">
        </div>
        <div class="user-info">
            <div style="display: flex; align-items: center; gap: 8px;">
                <h2 id="h-username" style="margin: 0;">Arlein</h2>
                <i class="fas fa-check-circle" style="color: #FF7A1A;"></i>
            </div>
            <div style="display: flex; gap: 15px; font-size: 14px; margin-top: 5px;">
                <span><b id="c-posts">0</b> publications</span>
                <span><b id="c-followers">0</b> followers</span>
            </div>
        </div>
    </div>

    <div class="bio-section" style="margin-top: 15px;">
        <p id="h-bio" style="font-size: 14px;">Zah bgs aiii</p>
    </div>

    <div class="actions" style="display: flex; gap: 10px; margin-top: 15px;">
        <button onclick="openEditModal()" style="flex: 1; background: #262626; color: white; border: none; padding: 10px; border-radius: 8px; font-weight: 600; cursor: pointer;">
            Modifier le profil
        </button>
        <button onclick="copyProfileLink()" style="flex: 1; background: #262626; color: white; border: none; padding: 10px; border-radius: 8px; font-weight: 600; cursor: pointer;">
            Partager le profil
        </button>
    </div>
</div>

<div id="modal-container"></div>

<script>
    // Charger le fichier de la modale dynamiquement
    fetch('profile_edit_modal.html')
        .then(response => response.text())
        .then(data => {
            document.getElementById('modal-container').innerHTML = data;
        });

    function openEditModal() {
        const modal = document.getElementById('edit-profile-modal');
        if (modal) modal.style.display = 'flex';
    }
</script>
