<style>
    .header-main { padding: 20px 15px; background: #000; color: white; }
    
    /* Ligne du haut : Photo à gauche, Stats à droite */
    .header-top-row { 
        display: flex; 
        align-items: center; 
        justify-content: flex-start; 
        gap: 30px; /* Espace entre photo et stats */
        margin-bottom: 15px; 
    }
    
    .profile-pic-box { position: relative; width: 85px; height: 85px; flex-shrink: 0; }
    .profile-pic-box img { 
        width: 100%; height: 100%; border-radius: 50%; 
        object-fit: cover; border: 2px solid #FF7A1A; 
    }

    .stats-right { display: flex; gap: 25px; flex-grow: 1; justify-content: flex-start; }
    .stat-item { text-align: center; cursor: pointer; }
    .stat-item b { display: block; font-size: 18px; color: white; }
    .stat-item span { font-size: 12px; color: #8e8e8e; }

    /* Zone Nom, Bio et Lien sous la photo */
    .user-details { margin-top: 5px; }
    
    .name-badge-row { display: flex; align-items: center; gap: 8px; font-weight: bold; font-size: 17px; }
    
    /* Le Badge Dentelle Bleu Officiel */
    .verification-rosette { 
        color: #0095f6; 
        display: flex; 
        align-items: center; 
        justify-content: center;
    }

    .bio-text { font-size: 14px; margin: 4px 0; color: #ffffff; }
    .user-link { color: #FF7A1A; text-decoration: none; font-size: 14px; font-weight: 500; }

    /* Barre d'action avec les couleurs demandées */
    .action-bar { display: flex; gap: 10px; margin-top: 15px; }
    
    .btn-follow { 
        background: #FF7A1A; color: white; border: none; 
        flex: 1; padding: 10px; border-radius: 8px; font-weight: bold; cursor: pointer;
    }
    
    .btn-msg { 
        background: #ffffff; color: #000000; border: none; 
        flex: 1; padding: 10px; border-radius: 8px; font-weight: bold; cursor: pointer;
    }

    .icon-btn-dark { 
        background: #262626; border: none; padding: 10px; 
        border-radius: 8px; color: white; cursor: pointer;
        display: flex; align-items: center; justify-content: center;
    }
</style>

<div class="header-main">
    <div class="header-top-row">
        <div class="profile-pic-box">
            <img id="p-img" src="https://via.placeholder.com/150">
        </div>

        <div class="stats-right">
            <div class="stat-item"><b id="s-posts">0</b><span>Pubs</span></div>
            <div class="stat-item" onclick="openFollowersModal('followers')"><b id="s-followers">0</b><span>Abonnés</span></div>
            <div class="stat-item" onclick="openFollowersModal('following')"><b id="s-following">0</b><span>Abos</span></div>
        </div>
    </div>

    <div class="user-details">
        <div class="name-badge-row">
            <span id="p-username">Arlein</span>
            
            <svg class="verification-rosette" width="20" height="20" viewBox="0 0 24 24" fill="currentColor">

            </svg>
        </div>
        <p class="bio-text" id="p-bio">Zah bgs aiii</p>
        <a href="#" class="user-link" id="p-link">floy.app/arlein</a>
    </div>

    <div class="action-bar" id="p-actions">
    <button id="follow-btn" class="btn-follow" onclick="handleFollowClick()">
        Suivre
    </button>
    
    <button class="btn-msg">Message</button>
    
    <button class="icon-btn-dark" onclick="copyProfileLink()" title="Copier le lien">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">

</div>
</div>
