<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Floy - Modifier le profil</title>
    <style>
        :root { --orange: #FF7A1A; --noir: #000; --bordure: #262626; --bleu: #0095f6; }
        body { background: var(--noir); color: white; font-family: -apple-system, sans-serif; margin: 0; padding: 0; }

        /* HEADER */
        .edit-header { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 15px; border-bottom: 1px solid var(--bordure); background: black;
        }
        .btn-cancel { color: white; text-decoration: none; font-size: 16px; }
        .btn-done { color: var(--bleu); background: none; border: none; font-weight: bold; font-size: 16px; cursor: pointer; }

        /* PHOTO EDIT */
        .photo-edit-section { display: flex; flex-direction: column; align-items: center; padding: 25px 0; }
        .current-pic { width: 90px; height: 90px; border-radius: 50%; object-fit: cover; margin-bottom: 10px; border: 1px solid var(--bordure); }
        .change-photo-btn { color: var(--bleu); font-weight: bold; font-size: 14px; cursor: pointer; }

        /* FORMULAIRE */
        .edit-form { padding: 0 15px; }
        .input-group { border-bottom: 1px solid var(--bordure); padding: 12px 0; display: flex; align-items: center; }
        .label { width: 100px; font-size: 15px; color: #efefef; }
        .field { flex: 1; background: none; border: none; color: white; font-size: 16px; outline: none; }
        .bio-field { height: 60px; resize: none; padding-top: 5px; }

        /* LOADER */
        #loader { display: none; color: var(--orange); font-size: 12px; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="edit-header">
        <a href="profil.html" class="btn-cancel">Annuler</a>
        <div style="font-weight: bold;">Modifier le profil</div>
        <button class="btn-done" id="save-btn">Terminé</button>
    </div>

    <div class="photo-edit-section">
        <img id="preview-pic" class="current-pic" src="https://via.placeholder.com/100">
        <div class="change-photo-btn" onclick="document.getElementById('file-input').click()">Changer la photo de profil</div>
        <input type="file" id="file-input" style="display:none" accept="image/*">
        <div id="loader">Téléchargement de l'image...</div>
    </div>

    <div class="edit-form">
        <div class="input-group">
            <div class="label">Nom</div>
            <input type="text" id="edit-name" class="field" placeholder="Ton nom complet">
        </div>
        <div class="input-group">
            <div class="label">Bio</div>
            <textarea id="edit-bio" class="field bio-field" placeholder="Parle-nous de toi..."></textarea>
        </div>
        <div class="input-group">
            <div class="label">Lien Web</div>
            <input type="text" id="edit-web" class="field" placeholder="https://tonsite.com">
        </div>
    </div>

    <script type="module">
        import { db } from './firebase-config.js';
        import { doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // CONFIGURATION (Utilise tes identifiants Cloudinary)
        const CLOUD_URL = "https://api.cloudinary.com/v1_1/ds79k3f9g/image/upload";
        const PRESET = "floy_preset";
        const MY_ID = "User_Floy_Account"; // À remplacer par auth.currentUser.uid plus tard

        const fileInput = document.getElementById('file-input');
        const previewPic = document.getElementById('preview-pic');
        const saveBtn = document.getElementById('save-btn');
        const loader = document.getElementById('loader');

        let newAvatarUrl = "";

        // 1. Charger les données actuelles
        async function loadCurrentData() {
            const snap = await getDoc(doc(db, "users", MY_ID));
            if (snap.exists()) {
                const u = snap.data();
                document.getElementById('edit-name').value = u.username || "";
                document.getElementById('edit-bio').value = u.bio || "";
                document.getElementById('edit-web').value = u.webLink || "";
                previewPic.src = u.avatarUrl || "https://via.placeholder.com/100";
                newAvatarUrl = u.avatarUrl;
            }
        }
        loadCurrentData();

        // 2. Changer la photo (Cloudinary)
        fileInput.onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            // Prévisualisation immédiate
            previewPic.src = URL.createObjectURL(file);
            loader.style.display = "block";
            saveBtn.disabled = true;

            const formData = new FormData();
            formData.append('file', file);
            formData.append('upload_preset', PRESET);

            try {
                const res = await fetch(CLOUD_URL, { method: 'POST', body: formData });
                const data = await res.json();
                newAvatarUrl = data.secure_url;
                loader.innerText = "Image prête !";
            } catch (err) {
                alert("Erreur upload photo");
            } finally {
                saveBtn.disabled = false;
            }
        };

        // 3. Sauvegarder les modifications
        saveBtn.onclick = async () => {
            saveBtn.innerText = "Enregistrement...";
            saveBtn.disabled = true;

            try {
                await updateDoc(doc(db, "users", MY_ID), {
                    username: document.getElementById('edit-name').value,
                    bio: document.getElementById('edit-bio').value,
                    webLink: document.getElementById('edit-web').value,
                    avatarUrl: newAvatarUrl
                });

                window.location.href = "profil.html";
            } catch (err) {
                console.error(err);
                alert("Erreur lors de la mise à jour");
                saveBtn.disabled = false;
                saveBtn.innerText = "Terminé";
            }
        };
    </script>
</body>
</html>
