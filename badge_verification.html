<style>
    .badge-floy {
        display: inline-flex; width: 16px; height: 16px;
        background: linear-gradient(45deg, #FF7A1A, #FFD700);
        border-radius: 50%; color: white; font-size: 10px;
        align-items: center; justify-content: center;
        animation: shine 3s infinite;
    }
    @keyframes shine { 0% { opacity: 0.8; } 50% { opacity: 1; transform: scale(1.1); } 100% { opacity: 0.8; } }
</style>

<div id="v-badge" style="display:none;" class="badge-floy"><i class="fas fa-check"></i></div>

<script type="module">
    import { db } from './firebase-config.js';
    import { doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    window.loadBadge = (uid) => {
        onSnapshot(doc(db, "users", uid), (snap) => {
            if (snap.exists() && snap.data().isVerified) {
                document.getElementById('badge-container').innerHTML = document.getElementById('v-badge').outerHTML;
                document.querySelector('#badge-container .badge-floy').style.display = 'inline-flex';
            }
        });
    };
</script>
