<style>
    .badge-modern {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 16px;
        height: 16px;
        background: linear-gradient(45deg, #FF7A1A, #FFD700); /* Dégradé Orange vers Or */
        border-radius: 50%;
        margin-left: 4px;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 8px rgba(255, 122, 26, 0.4);
    }

    /* L'encoche blanche au centre */
    .badge-modern i {
        color: white;
        font-size: 10px;
        z-index: 2;
    }

    /* Animation de brillance qui passe sur le badge */
    .badge-modern::after {
        content: "";
        position: absolute;
        top: -50%;
        left: -150%;
        width: 100%;
        height: 200%;
        background: rgba(255, 255, 255, 0.4);
        transform: rotate(45deg);
        animation: shine 3s infinite;
    }

    @keyframes shine {
        0% { left: -150%; }
        20% { left: 150%; }
        100% { left: 150%; }
    }
</style>

<span id="verified-badge-container" style="display: none; vertical-align: middle;">
    <div class="badge-modern">
        <i class="fas fa-check"></i>
    </div>
</span>

<script type="module">
    import { db } from './firebase-config.js';
    import { doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    window.loadBadge = (uid) => {
        const container = document.getElementById('verified-badge-container');
        
        onSnapshot(doc(db, "users", uid), (snap) => {
            if (snap.exists() && snap.data().isVerified) {
                container.style.display = 'inline-flex';
            } else {
                container.style.display = 'none';
            }
        });
    };
</script>
