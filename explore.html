<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Floy - Explorer</title>
    <style>
        body { background: #000; color: white; font-family: sans-serif; margin: 0; }
        .search-bar { background: #111; border: 1px solid #222; padding: 12px; margin: 15px; border-radius: 10px; color: #555; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; }
        .grid-item { aspect-ratio: 1/1; background: #111; }
    </style>
</head>
<body>
    <div class="search-bar">🔍 Rechercher sur Floy...</div>
    <div class="grid">
        <div class="grid-item" style="background-image:url('https://picsum.photos/200?random=1'); background-size:cover;"></div>
        <div class="grid-item" style="background-image:url('https://picsum.photos/200?random=2'); background-size:cover;"></div>
        <div class="grid-item" style="background-image:url('https://picsum.photos/200?random=3'); background-size:cover;"></div>
        <div class="grid-item" style="background-image:url('https://picsum.photos/200?random=4'); background-size:cover;"></div>
        <div class="grid-item" style="background-image:url('https://picsum.photos/200?random=5'); background-size:cover;"></div>
        <div class="grid-item" style="background-image:url('https://picsum.photos/200?random=6'); background-size:cover;"></div>
    </div>

    <script src="navbar.js"></script>
</body>
</html>
