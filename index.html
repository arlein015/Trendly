<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Floy - Feed</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --orange: #FF7A1A; --noir: #000; --gris: #121212; --bordure: #222; }
        body { background: var(--noir); color: white; font-family: -apple-system, sans-serif; margin: 0; padding-bottom: 70px; }

        /* HEADER */
        .top-nav { position: fixed; top: 0; width: 100%; height: 60px; background: rgba(0,0,0,0.9); display: flex; align-items: center; justify-content: space-between; padding: 0 15px; border-bottom: 1px solid var(--bordure); z-index: 1000; box-sizing: border-box; }
        .logo { font-size: 24px; font-weight: bold; color: var(--orange); }
        .search-bar { background: #1a1a1a; border-radius: 10px; padding: 8px 15px; width: 45%; display: flex; align-items: center; gap: 10px; }
        .search-bar input { background: none; border: none; color: white; width: 100%; outline: none; font-size: 14px; }

        /* POSTS */
        .post { margin-bottom: 20px; border-bottom: 1px solid #111; }
        .post-header { display: flex; align-items: center; padding: 12px; gap: 10px; }
        .post-avatar { width: 34px; height: 34px; border-radius: 50%; object-fit: cover; }
        .post-img { width: 100%; display: block; }
        .post-actions { display: flex; gap: 15px; padding: 12px; }
        .post-actions svg { width: 24px; height: 24px; fill: white; cursor: pointer; }
        .liked { fill: #ff3040 !important; }

        /* MODDERN BOTTOM NAV SVG */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 65px; background: var(--noir); display: flex; justify-content: space-around; align-items: center; border-top: 1px solid var(--bordure); z-index: 2000; padding-bottom: env(safe-area-inset-bottom); }
        .nav-item { cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .nav-item svg { width: 26px; height: 26px; fill: #888; transition: 0.3s; }
        .nav-item.active svg { fill: white; }
        .plus-btn svg { fill: var(--orange) !important; width: 32px; height: 32px; }
    </style>
</head>
<body>

    <nav class="top-nav">
        <div class="logo">Floy</div>
        <div class="search-bar">
            <i class="fas fa-search" style="color:#555"></i>
            <input type="text" placeholder="Rechercher...">
        </div>
        <i class="far fa-heart" style="font-size: 20px;"></i>
    </nav>

    <div id="main-feed" style="margin-top: 65px;">
        </div>

    <nav class="bottom-nav">
        <div class="nav-item active" onclick="location.href='index.html'">
            <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
        </div>
        <div class="nav-item" onclick="location.href='explore.html'">
            <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
        </div>
        <div class="nav-item plus-btn" onclick="location.href='add-post.html'">
            <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
        </div>
        <svg viewBox="0 0 24 24">
            <path d="M12 2C6.477 2 2 6.145 2 11.25c0 2.458 1.011 4.683 2.662 6.302-.152.923-.591 2.37-1.42 3.535a.5.5 0 0 0 .591.737c1.74-.633 3.587-1.042 4.904-1.127.848.354 1.77.553 2.737.553 5.523 0 10-4.145 10-9.25S17.523 2 12 2zm0 16.5c-.864 0-1.693-.162-2.45-.457a.5.5 0 0 0-.414.032c-1.282.63-2.73 1.036-3.957 1.258.423-.84.774-1.875.92-2.825a.5.5 0 0 0-.17-.456C4.43 14.808 3.5 13.116 3.5 11.25 3.5 7.032 7.288 3.5 12 3.5s8.5 3.532 8.5 7.75-3.788 7.75-8.5 7.75z"/>
        </svg>
        </div>
        <div class="nav-item" onclick="location.href='profil.html'">
            <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
        </div>
    </nav>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { collection, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        
        onSnapshot(query(collection(db, "posts"), orderBy("createdAt", "desc")), (snap) => {
            const feed = document.getElementById('main-feed');
            feed.innerHTML = "";
            snap.forEach(doc => {
                const p = doc.data();
                feed.innerHTML += `
                    <div class="post">
                        <div class="post-header">
                            <img src="${p.userAvatar}" class="post-avatar">
                            <b>${p.username}</b>
                        </div>
                        <img src="${p.imageUrl}" class="post-img">
                        <div class="post-actions">
                            <svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                            <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                        </div>
                    </div>`;
            });
        });
    </script>
</body>
</html>
