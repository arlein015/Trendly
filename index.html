<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Floy - Flux Officiel</title>
    <style>
        :root { --orange: #FF7A1A; --noir: #000; --bordure: #262626; }
        body { background: var(--noir); color: white; font-family: -apple-system, sans-serif; margin: 0; padding-bottom: 70px; overflow-x: hidden; }

        /* HEADER */
        header { 
            padding: 15px; border-bottom: 1px solid var(--bordure); 
            position: sticky; top: 0; background: rgba(0,0,0,0.9); 
            z-index: 100; text-align: center; font-weight: bold; 
            color: var(--orange); font-size: 22px; letter-spacing: 1px;
        }

        /* POST STRUCTURE */
        .post { border-bottom: 1px solid var(--bordure); margin-bottom: 10px; width: 100%; }
        
        .post-header { padding: 12px 15px; display: flex; align-items: center; gap: 10px; }
        .post-avatar { width: 35px; height: 35px; border-radius: 50%; object-fit: cover; border: 1.5px solid var(--orange); }
        
        .user-info { display: flex; align-items: center; gap: 5px; cursor: pointer; }
        .u-name { font-weight: bold; font-size: 14px; }
        .verify-badge { width: 14px; height: 14px; fill: var(--orange); }

        /* COLLAGE GRID */
        .collage-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            grid-template-rows: repeat(2, 160px);
            gap: 2px;
            width: 100%;
            cursor: pointer;
        }
        .collage-item { background: #111; position: relative; overflow: hidden; }
        .collage-item img { width: 100%; height: 100%; object-fit: cover; }
        
        /* Layout : 1 grande à gauche, 4 petites à droite */
        .collage-item:nth-child(1) { grid-column: span 4; grid-row: span 2; }
        .collage-item:nth-child(n+2) { grid-column: span 2; }

        .more-overlay {
            position: absolute; inset: 0; background: rgba(0,0,0,0.7);
            display: flex; align-items: center; justify-content: center;
            font-size: 20px; font-weight: bold; color: white;
        }

        /* ACTIONS SVG MODERNES */
        .post-actions { display: flex; align-items: center; gap: 20px; padding: 12px 15px; }
        .action-btn { 
            background: none; border: none; color: white; cursor: pointer; 
            display: flex; align-items: center; gap: 6px; padding: 0; transition: transform 0.1s;
        }
        .action-btn:active { transform: scale(0.9); }
        .action-btn svg { width: 24px; height: 24px; stroke: white; fill: none; stroke-width: 2; }

        /* NAV BAR */
        .nav-bar { position: fixed; bottom: 0; width: 100%; height: 65px; background: black; border-top: 1px solid var(--bordure); display: flex; justify-content: space-around; align-items: center; z-index: 1000; }
        .nav-link { color: white; opacity: 0.6; }
        .nav-avatar { width: 26px; height: 26px; border-radius: 50%; object-fit: cover; }
    </style>
</head>
<body>

    <header>FLOY</header>
    <div id="feed"></div>

    <nav class="nav-bar">
    <a href="index.html" class="nav-link">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
            <polyline points="9 22 9 12 15 12 15 22"></polyline>
        </svg>
    </a>

    <a href="explore.html" class="nav-link">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
    </a>

    <a href="post.html" class="nav-link">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
            <line x1="12" y1="8" x2="12" y2="16"></line>
            <line x1="8" y1="12" x2="16" y2="12"></line>
        </svg>
    </a>

    <a href="messages.html" class="nav-link">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path>
        </svg>
    </a>

    <a href="profil.html" class="nav-link">
        <img id="nav-avatar" class="nav-avatar" src="https://via.placeholder.com/30" style="width: 26px; height: 26px; border-radius: 50%; object-fit: cover;">
    </a>
</nav>

    <script type="module">
        import { db } from './firebase-config.js';
        import { collection, onSnapshot, query, orderBy, limit, doc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const MY_ID = "User_Floy_Account"; // Remplace par ton ID réel

        // 1. Charger les posts avec collage
        const q = query(collection(db, "posts"), orderBy("timestamp", "desc"), limit(20));
        onSnapshot(q, (snaps) => {
            const feed = document.getElementById('feed');
            feed.innerHTML = "";
            
            snaps.forEach(doc => {
                const p = doc.data();
                const id = doc.id;
                const imgs = p.images || [];
                if(imgs.length === 0) return;

                const postDiv = document.createElement('div');
                postDiv.className = 'post';

                // Génération du badge si certifié
                const badgeHTML = p.isVerified ? `<svg class="verify-badge" viewBox="0 0 24 24"><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10 10-4.5 10-10S17.5 2 12 2zM10 17l-5-5 1.4-1.4 3.6 3.6 7.6-7.6L19 8l-9 9z"/></svg>` : "";

                // Génération du collage
                let collageHTML = `<div class="collage-grid" onclick="window.location.href='album.html?id=${id}'">`;
                const displayCount = Math.min(imgs.length, 5);
                for(let i=0; i < displayCount; i++) {
                    collageHTML += `<div class="collage-item"><img src="${imgs[i]}">`;
                    if(i === 4 && imgs.length > 5) {
                        collageHTML += `<div class="more-overlay">+${imgs.length - 5}</div>`;
                    }
                    collageHTML += `</div>`;
                }
                collageHTML += `</div>`;

                postDiv.innerHTML = `
                    <div class="post-header">
                        <img src="${p.userPhoto}" class="post-avatar">
                        <div class="user-info" onclick="window.location.href='profil.html?id=${p.userId}'">
                            <span class="u-name">${p.username}</span>
                            ${badgeHTML}
                        </div>
                    </div>
                    ${collageHTML}
                    <div class="post-actions">
                        <button class="action-btn">
                            <svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>
                            <span style="font-size:14px">${p.likesCount || 0}</span>
                        </button>
                        <button class="action-btn" onclick="window.location.href='comments.html?id=${id}'">
                            <svg viewBox="0 0 24 24"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path></svg>
                        </button>
                        <button class="action-btn" onclick="shareFloy('${id}', '${p.caption}')">
                            <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                        </button>
                    </div>
                `;
                feed.appendChild(postDiv);
            });
        });

        // 2. Fonction de partage
        window.shareFloy = (id, text) => {
            const url = window.location.origin + "/album.html?id=" + id;
            if (navigator.share) {
                navigator.share({ title: 'Floy Post', text: text, url: url });
            } else {
                navigator.clipboard.writeText(url);
                alert("Lien copié !");
            }
        };

        // 3. Photo Nav Bar
        onSnapshot(doc(db, "users", MY_ID), s => { 
            if(s.exists() && s.data().avatarUrl) document.getElementById('my-nav-pic').src = s.data().avatarUrl; 
        });
    </script>
</body>
</html>
