<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Floy - Bienvenue</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Dégradé inspiré de ton logo F.png */
            --floy-bg: linear-gradient(135deg, #ff8c00 0%, #3a01cc 100%);
            --floy-orange: #ff8c00;
        }

        body {
            margin: 0; padding: 0;
            background: var(--floy-bg) !important;
            background-attachment: fixed;
            height: 100vh;
            display: flex; align-items: center; justify-content: center;
            font-family: 'Poppins', sans-serif; color: white;
        }

        /* Boîte en verre NOIR (Dark Glass) */
        .dark-glass {
            background: rgba(0, 0, 0, 0.6); /* Mélange avec le noir */
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px 30px;
            border-radius: 40px;
            text-align: center;
            width: 85%;
            max-width: 340px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        .logo-img { width: 90px; border-radius: 22px; margin-bottom: 25px; }

        .btn-main {
            width: 100%; background: var(--floy-orange); color: white;
            border: none; padding: 18px; border-radius: 20px;
            font-weight: 700; font-size: 16px; margin-top: 25px;
            cursor: pointer; box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .btn-sub {
            width: 100%; background: rgba(255, 255, 255, 0.05); color: white;
            border: 1px solid rgba(255, 255, 255, 0.1); padding: 14px;
            border-radius: 20px; font-weight: 600; margin-top: 15px; cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="dark-glass">
        <img src="logo.png" alt="Floy" class="logo-img">
        <h1 style="margin:0; font-size: 28px;">Floy</h1>
        <p style="opacity: 0.6; font-size: 14px; margin-top: 10px;">Partagez, gagnez, profitez.</p>

        <button class="btn-main" onclick="window.location.href='feed.html'">Commencer</button>
        <button class="btn-sub" onclick="window.location.href='signup.html'">Créer un compte</button>
    </div>
</body>
</html>
