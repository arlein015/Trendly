<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Threndly - Bienvenue</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-violet: #1a0033;
            --floy-orange: #ff8c00;
        }
        body {
            margin: 0; height: 100vh;
            background: linear-gradient(180deg, var(--bg-violet) 0%, #000000 100%);
            display: flex; align-items: center; justify-content: center;
            font-family: 'Poppins', sans-serif; color: white;
        }
        .welcome-card {
            background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(20px);
            padding: 40px; border-radius: 40px; text-align: center;
            width: 85%; max-width: 350px; border: 1px solid rgba(255,255,255,0.1);
        }
        .btn-main {
            width: 100%; background: var(--floy-orange); border: none;
            padding: 18px; border-radius: 20px; color: white;
            font-weight: 700; font-size: 16px; margin-top: 25px; cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="welcome-card">
        <h1>Bienvenue sur <span style="color:var(--floy-orange)">Threndly</span></h1>
        <p style="opacity:0.7">Partagez vos moments, gagnez des récompenses</p>
        <button class="btn-main" onclick="window.location.href='feed.html'">Commencer l'aventure</button>
    </div>
</body>
</html>
