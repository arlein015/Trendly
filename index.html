<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Floy - Bienvenue</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <style>
        :root { --bg-violet: #1a0033; --floy-orange: #ff8c00; }
        body {
            margin: 0; height: 100vh;
            background: #000; /* Fond noir pur comme ton image */
            display: flex; align-items: center; justify-content: center;
            font-family: 'Poppins', sans-serif; color: white;
        }
        .welcome-card { text-align: center; width: 85%; max-width: 400px; }
        .logo-text { font-size: 14px; opacity: 0.8; margin-bottom: 40px; }
        .main-title { font-size: 32px; font-weight: 700; margin-bottom: 10px; }
        .highlight { color: var(--floy-orange); }
        .subtitle { font-size: 14px; opacity: 0.6; margin-bottom: 40px; }
        .btn-orange {
            width: 100%; background: var(--floy-orange); border: none;
            padding: 18px; border-radius: 15px; color: white;
            font-weight: 700; font-size: 16px; cursor: pointer; margin-bottom: 15px;
        }
        .btn-outline {
            width: 100%; background: transparent; border: 1px solid #333;
            padding: 18px; border-radius: 15px; color: white; font-weight: 700;
        }
    </style>
</head>
<body>
    <div class="welcome-card">
        <div class="logo-text">Floy Logo</div>
        <h1 class="main-title">Bienvenue sur <span class="highlight">Floy</span></h1>
        <p class="subtitle">Partagez vos moments, gagnez des récompenses <span style="color:#0033ff">●</span></p>
        
        <button class="btn-orange" onclick="window.location.href='feed.html'">Commencer l'aventure</button>
        <button class="btn-outline">Créer un compte</button>
    </div>
</body>
</html>
