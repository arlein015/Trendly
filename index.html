<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    
    <link rel="icon" type="image/png" href="./favicon.png">
    
    <meta http-equiv="Content-Security-Policy" content="img-src 'self' data: https:; script-src 'self' 'unsafe-inline';">
    
    <title>Floy - Feed</title>
    <style>
        :root { --orange: #FF7A1A; --noir: #000; --gris: #121212; --bordure: #262626; }
        body { background: var(--noir); color: white; font-family: -apple-system, sans-serif; margin: 0; padding-bottom: 80px; overflow-x: hidden; }
        
        /* HEADER */
        .app-header { padding: 15px 20px; display: flex; align-items: center; border-bottom: 1px solid var(--bordure); position: sticky; top: 0; background: var(--noir); z-index: 100; }
        .logo-text { color: var(--orange); font-weight: 900; font-size: 24px; letter-spacing: 1px; }

        /* FEED */
        .feed-container { max-width: 500px; margin: 0 auto; }
        .post { border-bottom: 1px solid var(--bordure); padding-bottom: 15px; margin-bottom: 10px; }
        .post-header { padding: 12px 15px; display: flex; align-items: center; gap: 10px; }
        .post-avatar { width: 38px; height: 38px; border-radius: 50%; border: 1.5px solid var(--orange); background: #333; }
        .post-media { width: 100%; aspect-ratio: 1/1; background: #1a1a1a; object-fit: cover; }

        /* ACTIONS & BOOST */
        .post-actions { padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; }
        .action-group { display: flex; gap: 20px; fill: white; }
        
        .btn-boost { 
            background: rgba(255, 122, 26, 0.15); 
            border: 1px solid var(--orange); 
            color: var(--orange); 
            padding: 6px 14px; 
            border-radius: 20px; 
            font-weight: bold; 
            font-size: 12px; 
            display: flex; 
            align-items: center; 
            gap: 5px; 
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-boost:active { transform: scale(0.9); background: var(--orange); color: white; }

        /* NAV BAS */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 65px; background: var(--noir); border-top: 1px solid var(--bordure); display: flex; justify-content: space-around; align-items: center; z-index: 200; }
        .nav-item { fill: #666; cursor: pointer; transition: 0.2s; }
        .nav-item.active { fill: var(--orange); }
    </style>
</head>
<body>

    <header class="app-header">
        <div class="logo-text">FLOY</div>
    </header>

    <div class="feed-container">
        <div class="post">
            <div class="post-header">
                <div class="post-avatar"></div>
                <span style="font-weight:bold; font-size:14px;">Arlein_Dev</span>
            </div>
            
            <img src="https://picsum.photos/600/600" class="post-media" alt="Contenu">
            
            <div class="post-actions">
                <div class="action-group">
                    <svg width="26" height="26" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                    <svg width="26" height="26" viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                </div>

                <button class="btn-boost" onclick="triggerBoost()">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
                    BOOST
                </button>
            </div>
        </div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item active" onclick="window.location.href='./index.html'">
            <svg width="28" height="28" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
        </div>
        <div class="nav-item" onclick="window.location.href='./create.html'">
            <svg width="28" height="28" viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
        </div>
        <div class="nav-item" onclick="window.location.href='./shop.html'">
            <svg width="28" height="28" viewBox="0 0 24 24"><path d="M20 7h-4V5c0-1.1-.9-2-2-2h-4c-1.1 0-2 .9-2 2v2H4c-1.1 0-2 .9-2 2v11c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V9c0-1.1-.9-2-2-2zM10 5h4v2h-4V5zm10 15H4V9h16v11z"/></svg>
        </div>
        <div class="nav-item" onclick="window.location.href='./profil.html'">
            <svg width="28" height="28" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
        </div>
    </nav>

    <script>
        function triggerBoost() {
            const val = confirm("Utiliser 50 jetons pour booster ce post ?");
            if(val) {
                alert("🚀 Post mis en avant !");
            }
        }
    </script>

</body>
</html>
