<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <link rel="icon" type="image/png" href="./favicon.png">
    <title>Floy - Feed</title>
    <style>
        :root { --orange: #FF7A1A; --noir: #000; --gris: #121212; --bordure: #262626; }
        body { background: var(--noir); color: white; font-family: -apple-system, sans-serif; margin: 0; padding-bottom: 80px; }
        
        /* FEED & POSTS */
        .app-header { padding: 15px 20px; border-bottom: 1px solid var(--bordure); background: var(--noir); position: sticky; top: 0; z-index: 100; }
        .logo-text { color: var(--orange); font-weight: 900; font-size: 24px; }
        .post { border-bottom: 1px solid var(--bordure); padding-bottom: 15px; }
        .post-actions { padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; }
        
        .btn-boost-trigger { 
            background: rgba(255, 122, 26, 0.15); border: 1px solid var(--orange); color: var(--orange); 
            padding: 6px 14px; border-radius: 20px; font-weight: bold; font-size: 12px; cursor: pointer;
            display: flex; align-items: center; gap: 5px;
        }

        /* MODULE BOOST (MODAL) */
        .boost-modal { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.9); z-index: 1000; display: none; 
            align-items: center; justify-content: center;
        }
        .boost-card { 
            background: var(--gris); width: 85%; max-width: 350px; 
            border-radius: 25px; border: 1px solid var(--bordure); 
            padding: 30px; text-align: center; animation: slideUp 0.3s ease-out;
        }
        @keyframes slideUp { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        
        .boost-icon-big { width: 60px; height: 60px; background: rgba(255,122,26,0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; fill: var(--orange); }
        .boost-card h2 { margin: 0 0 10px; font-size: 20px; }
        .boost-card p { font-size: 14px; color: #aaa; margin-bottom: 25px; line-height: 1.4; }
        
        .btn-confirm-boost { width: 100%; background: var(--orange); color: white; border: none; padding: 15px; border-radius: 15px; font-weight: bold; font-size: 16px; cursor: pointer; margin-bottom: 10px; }
        .btn-cancel { background: none; border: none; color: #666; font-size: 14px; cursor: pointer; }

        /* NAV BAS */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 65px; background: var(--noir); border-top: 1px solid var(--bordure); display: flex; justify-content: space-around; align-items: center; z-index: 200; }
        .nav-item { fill: #666; }
        .nav-item.active { fill: var(--orange); }
    </style>
</head>
<body>

    <header class="app-header">
        <div class="logo-text">FLOY</div>
    </header>

    <div class="feed-container">
        <div class="post">
            <div style="padding: 12px 15px; font-weight: bold; font-size: 14px;">Arlein_Dev</div>
            <img src="https://picsum.photos/600/600" style="width: 100%; aspect-ratio:1/1; object-fit: cover;">
            <div class="post-actions">
                <div style="display: flex; gap: 20px; fill: white;">
                    <svg width="26" height="26" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                </div>
                <button class="btn-boost-trigger" onclick="openBoostModule()">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
                    BOOST
                </button>
            </div>
        </div>
    </div>

    <div id="boostModule" class="boost-modal">
        <div class="boost-card">
            <div class="boost-icon-big">
                <svg width="32" height="32" viewBox="0 0 24 24"><path d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
            </div>
            <h2>Booster ce post ?</h2>
            <p>Propulsez votre contenu en tête du feed pendant 24h pour <b>50 Jetons</b>.</p>
            <button class="btn-confirm-boost" onclick="confirmBoost()">Confirmer le Boost</button>
            <button class="btn-cancel" onclick="closeBoostModule()">Annuler</button>
        </div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item active" onclick="window.location.href='./index.html'"><svg width="28" height="28" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg></div>
        <div class="nav-item" onclick="window.location.href='./shop.html'"><svg width="28" height="28" viewBox="0 0 24 24"><path d="M20 7h-4V5c0-1.1-.9-2-2-2h-4c-1.1 0-2 .9-2 2v2H4c-1.1 0-2 .9-2 2v11c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V9c0-1.1-.9-2-2-2zM10 5h4v2h-4V5zm10 15H4V9h16v11z"/></svg></div>
        <div class="nav-item" onclick="window.location.href='./profil.html'"><svg width="28" height="28" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg></div>
    </nav>

    <script>
        function openBoostModule() {
            document.getElementById('boostModule').style.display = 'flex';
        }
        function closeBoostModule() {
            document.getElementById('boostModule').style.display = 'none';
        }
        function confirmBoost() {
            alert("🚀 Boost activé ! Vos 50 jetons ont été déduits.");
            closeBoostModule();
        }
    </script>
</body>
</html>
