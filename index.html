<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📱</text></svg>">
    <title>Floy - Feed</title>
    <style>
        :root { --orange: #FF7A1A; --noir: #000; --gris-clair: #222; }
        body { background: var(--noir); color: white; font-family: -apple-system, sans-serif; margin: 0; padding-bottom: 90px; overflow-x: hidden; }

        /* HEADER */
        .header { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; background: rgba(0,0,0,0.95); backdrop-filter: blur(10px); z-index: 1000; border-bottom: 0.5px solid #1a1a1a; }
        .logo { color: var(--orange); font-size: 24px; font-weight: 900; letter-spacing: -1px; }

        /* POST STRUCTURE */
        .post { position: relative; margin-bottom: 20px; border-bottom: 1px solid #111; }
        .post-header { padding: 12px 15px; display: flex; align-items: center; gap: 10px; }
        .post-avatar { width: 35px; height: 35px; border-radius: 50%; background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); padding: 2px; }
        .post-avatar img { width: 100%; height: 100%; border-radius: 50%; background: black; }
        
        .post-media { position: relative; width: 100%; aspect-ratio: 4/5; background: #0a0a0a; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .post-media img { width: 100%; height: 100%; object-fit: cover; }

        /* ACTIONS LATÉRALES (Style TikTok/Reels) */
        .side-actions { position: absolute; right: 10px; bottom: 100px; display: flex; flex-direction: column; align-items: center; gap: 20px; z-index: 10; }
        .action-item { display: flex; flex-direction: column; align-items: center; gap: 5px; cursor: pointer; }
        .action-item span { font-size: 12px; font-weight: bold; }
        .svg-icon { width: 32px; height: 32px; fill: white; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5)); transition: 0.2s; }
        .action-item:active .svg-icon { transform: scale(0.8); }

        /* DISQUE TOURNANT */
        .music-disc { width: 40px; height: 40px; background: radial-gradient(circle, #444 20%, #111 100%); border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 4px solid #222; animation: rotate 4s linear infinite; }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* NAV BAR MODERNE */
        .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; height: 75px; background: rgba(5,5,5,0.98); border-top: 1px solid #1a1a1a; display: flex; justify-content: space-evenly; align-items: center; padding-bottom: env(safe-area-inset-bottom); z-index: 2000; }
        .nav-link { color: #666; text-decoration: none; display: flex; flex-direction: column; align-items: center; transition: 0.2s; }
        .nav-link.active { color: white; }
        .nav-svg { width: 26px; height: 26px; fill: currentColor; }
        .nav-plus { background: white; border-radius: 10px; padding: 5px 12px; color: black !important; }
    </style>
</head>
<body>

    <header class="header">
        <div class="logo">FLOY</div>
        <div class="header-right">
            <svg class="nav-svg" style="color:white" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" fill="currentColor"/></svg>
        </div>
    </header>

    <div class="post">
        <div class="post-header">
            <div class="post-avatar"><img src="https://ui-avatars.com/api/?name=Arlein&background=000&color=fff"></div>
            <b>Arlein_Dev</b>
        </div>
        
        <div class="post-media">
            <img src="https://picsum.photos/800/1000?random=1">
            
            <div class="side-actions">
                <div class="action-item" onclick="toggleLike(this)">
                    <svg class="svg-icon heart" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                    <span>12k</span>
                </div>
                <div class="action-item">
                    <svg class="svg-icon" viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                    <span>458</span>
                </div>
                <div class="action-item">
                    <svg class="svg-icon" viewBox="0 0 24 24"><path d="M18 8a3 3 0 0 0-3-3 3 3 0 0 0-3 3 3 3 0 0 0 3 3 3 3 0 0 0 3-3zM4 12V8a2 2 0 0 1 2-2h7l5 5v7a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2v-5z" fill="none" stroke="currentColor" stroke-width="2"/><path d="M15 13l4 4m0-4l-4 4" stroke="currentColor" stroke-width="2"/></svg>
                    <span>Partager</span>
                </div>
                <div class="music-disc">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="var(--orange)"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
                </div>
            </div>
        </div>
    </div>

    <nav class="nav-bar">
        <a href="index.html" class="nav-link active">
            <svg class="nav-svg" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
        </a>
        <a href="explorer.html" class="nav-link">
            <svg class="nav-svg" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
        </a>
        <a href="create.html" class="nav-link nav-plus">
            <svg class="nav-svg" viewBox="0 0 24 24" style="width:20px; height:20px;"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
        </a>
        <a href="messages.html" class="nav-link">
            <svg class="nav-svg" viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-1.99.9-1.99 2L2 22l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zM6 9h12v2H6V9zm8 5H6v-2h8v2zm4-7H6V5h12v2z"/></svg>
        </a>
        <a href="profil.html" class="nav-link">
            <svg class="nav-svg" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
        </a>
    </nav>

    <script>
        function toggleLike(el) {
            const heart = el.querySelector('.heart');
            if(heart.style.fill === 'red') {
                heart.style.fill = 'white';
            } else {
                heart.style.fill = 'red';
                heart.style.transform = 'scale(1.2)';
                setTimeout(() => heart.style.transform = 'scale(1)', 200);
            }
        }
    </script>
</body>
</html>
