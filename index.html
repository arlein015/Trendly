<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Floy - Home</title>
    <style>
        :root { --orange: #FF7A1A; --noir: #000; --bordure: #262626; --gris: #8e8e8e; }
        body { background: var(--noir); color: white; font-family: -apple-system, sans-serif; margin: 0; padding-bottom: 80px; }

        /* HEADER */
        .header { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 10px 15px; position: sticky; top: 0; background: black; z-index: 1000;
            border-bottom: 1px solid var(--bordure);
        }
        .logo { font-size: 24px; font-weight: bold; color: var(--orange); letter-spacing: -1px; }
        .header-icons { display: flex; gap: 18px; }

        /* SECTION STORIES */
        .stories-container {
            display: flex; gap: 12px; padding: 15px 10px;
            overflow-x: auto; border-bottom: 1px solid var(--bordure);
            scrollbar-width: none; /* Cache la scrollbar sur Firefox */
        }
        .stories-container::-webkit-scrollbar { display: none; } /* Cache sur Chrome/Safari */

        .story-item { display: flex; flex-direction: column; align-items: center; min-width: 70px; cursor: pointer; }
        .story-ring {
            width: 64px; height: 64px; border-radius: 50%;
            padding: 2px; border: 2px solid var(--orange);
            display: flex; align-items: center; justify-content: center; margin-bottom: 5px;
        }
        .story-ring img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
        .story-name { font-size: 11px; color: white; text-align: center; width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        /* POST STYLES */
        .feed { max-width: 500px; margin: 0 auto; }
        .post { border-bottom: 1px solid var(--bordure); padding-bottom: 15px; margin-bottom: 10px; }
        .post-header { display: flex; align-items: center; padding: 12px; gap: 10px; }
        .user-avatar { width: 32px; height: 32px; border-radius: 50%; border: 1px solid var(--orange); object-fit: cover; }
        .user-name { font-weight: bold; font-size: 14px; }

        .post-img-container { width: 100%; aspect-ratio: 1/1; background: #111; }
        .post-img { width: 100%; height: 100%; object-fit: cover; }

        .post-actions { display: flex; gap: 15px; padding: 12px; }
        .action-btn { background: none; border: none; color: white; cursor: pointer; padding: 0; }
        .action-btn svg { width: 26px; height: 26px; }

        .post-info { padding: 0 12px; }
        .likes-count { font-weight: bold; font-size: 14px; margin-bottom: 5px; display: block; }
        .post-caption { font-size: 14px; line-height: 1.4; }
        .post-time { color: var(--gris); font-size: 10px; margin-top: 5px; }

        /* NAV BAR BAS */
        .nav-bar { position: fixed; bottom: 0; width: 100%; height: 65px; background: black; border-top: 1px solid var(--bordure); display: flex; justify-content: space-around; align-items: center; z-index: 1000; }
        .nav-link { color: white; opacity: 0.6; text-decoration: none; }
        .nav-link.active { opacity: 1; color: var(--orange); }
    </style>
</head>
<body>

    <header class="header">
        <div class="logo">Floy</div>
        <div class="header-icons">
            <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>
            <a href="messages.html" style="color: white;"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path></svg></a>
        </div>
    </header>

    <div class="stories-container" id="stories-feed">
        <div class="story-item" onclick="window.location.href='post-story.html'">
            <div class="story-ring" style="border-style: dashed; border-color: var(--gris);">
                <img id="my-avatar-story" src="https://via.placeholder.com/60">
            </div>
            <div class="story-name">Ta story</div>
        </div>
        </div>

    <main class="feed" id="main-feed">
        </main>

    <nav class="nav-bar">
        <a href="index.html" class="nav-link active"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg></a>
        <a href="explore.html" class="nav-link"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg></a>
        <a href="post.html" class="nav-link"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="12" y1="8" x2="12" y2="16"></line><line x1="8" y1="12" x2="16" y2="12"></line></svg></a>
        <a href="messages.html" class="nav-link"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path></svg></a>
        <a href="profil.html" class="nav-link"><img id="nav-avatar" src="https://via.placeholder.com/30" style="width:26px; height:26px; border-radius:50%; object-fit:cover;"></a>
    </nav>

    <script type="module">
        import { db } from './firebase-config.js';
        import { collection, query, orderBy, onSnapshot, doc, getDoc, limit } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const MY_ID = "User_Floy_Account";
        const feedContainer = document.getElementById('main-feed');
        const storiesContainer = document.getElementById('stories-feed');

        // 1. Charger les infos de l'utilisateur (Avatar NavBar)
        onSnapshot(doc(db, "users", MY_ID), (s) => {
            if(s.exists()){
                const url = s.data().avatarUrl || "https://via.placeholder.com/30";
                document.getElementById('nav-avatar').src = url;
                document.getElementById('my-avatar-story').src = url;
            }
        });

        // 2. Charger les Stories (Simples cercles pour l'instant)
        const qStories = query(collection(db, "users"), limit(10));
        onSnapshot(qStories, (snap) => {
            // Garder seulement le premier (Ta story) et ajouter les autres
            const firstChild = storiesContainer.firstElementChild;
            storiesContainer.innerHTML = "";
            storiesContainer.appendChild(firstChild);

            snap.forEach(d => {
                if(d.id !== MY_ID) {
                    const u = d.data();
                    const item = document.createElement('div');
                    item.className = 'story-item';
                    item.innerHTML = `
                        <div class="story-ring"><img src="${u.avatarUrl || 'https://via.placeholder.com/60'}"></div>
                        <div class="story-name">${u.username}</div>
                    `;
                    storiesContainer.appendChild(item);
                }
            });
        });

        // 3. Charger le Feed de Posts
        const qPosts = query(collection(db, "posts"), orderBy("timestamp", "desc"));
        onSnapshot(qPosts, (snapshot) => {
            feedContainer.innerHTML = "";
            snapshot.forEach(async (postDoc) => {
                const post = postDoc.data();
                const userRef = doc(db, "users", post.userId);
                const userSnap = await getDoc(userRef);
                const u = userSnap.exists() ? userSnap.data() : { username: "Floyer", avatarUrl: "" };

                const art = document.createElement('article');
                art.className = 'post';
                art.innerHTML = `
                    <div class="post-header">
                        <img src="${u.avatarUrl}" class="user-avatar">
                        <span class="user-name">${u.username}</span>
                    </div>
                    <div class="post-img-container"><img src="${post.images[0]}" class="post-img"></div>
                    <div class="post-actions">
                        <button class="action-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg></button>
                        <button class="action-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path></svg></button>
                    </div>
                    <div class="post-info">
                        <span class="likes-count">${post.likesCount || 0} J'aime</span>
                        <div class="post-caption"><b>${u.username}</b> ${post.caption || ""}</div>
                    </div>
                `;
                feedContainer.appendChild(art);
            });
        });
    </script>
</body>
</html>
