<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Floy - Fil d'actualité</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --orange: #FF7A1A; --noir: #000; --gris: #121212; --bordure: #222; }
        body { background: var(--noir); color: white; font-family: -apple-system, sans-serif; margin: 0; padding-top: 60px; padding-bottom: 60px; }

        /* BARRE DE NAVIGATION HAUTE */
        .top-nav { 
            position: fixed; top: 0; width: 100%; height: 60px; background: rgba(0,0,0,0.9);
            display: flex; align-items: center; justify-content: space-between; padding: 0 15px;
            border-bottom: 1px solid var(--bordure); z-index: 1000; box-sizing: border-box;
        }
        .logo { font-size: 24px; font-weight: bold; color: var(--orange); letter-spacing: -1px; }
        .search-box { display: flex; align-items: center; background: #1a1a1a; border-radius: 8px; padding: 5px 10px; width: 40%; }
        .search-box input { background: none; border: none; color: white; margin-left: 5px; width: 100%; outline: none; }

        /* POSTES */
        .feed { max-width: 500px; margin: 0 auto; }
        .post { border-bottom: 1px solid var(--bordure); margin-bottom: 10px; padding-bottom: 10px; }
        .post-header { display: flex; align-items: center; padding: 10px; gap: 10px; }
        .post-avatar { width: 35px; height: 35px; border-radius: 50%; object-fit: cover; }
        .post-username { font-weight: bold; font-size: 14px; }
        
        .post-image { width: 100%; display: block; background: #050505; }
        
        /* INTERACTIONS (SVG/ICONES) */
        .post-actions { display: flex; gap: 18px; padding: 12px; font-size: 22px; }
        .action-btn { cursor: pointer; transition: 0.2s; }
        .action-btn:active { transform: scale(1.2); }
        .fa-heart.liked { color: #ff3040; }

        .post-info { padding: 0 12px; }
        .likes-count { font-weight: bold; font-size: 14px; margin-bottom: 5px; display: block; }
        .post-caption { font-size: 14px; line-height: 1.4; }
        .post-caption b { margin-right: 5px; }

        /* BARRE DE NAVIGATION BASSE */
        .bottom-nav {
            position: fixed; bottom: 0; width: 100%; height: 60px; background: var(--noir);
            display: flex; justify-content: space-around; align-items: center;
            border-top: 1px solid var(--bordure); z-index: 1000;
        }
        .bottom-nav i { font-size: 24px; color: white; cursor: pointer; }
        .active-nav { color: var(--orange) !important; }
    </style>
</head>
<body>

    <nav class="top-nav">
        <div class="logo">Floy</div>
        <div class="search-box">
            <i class="fas fa-search" style="color:#555; font-size: 14px;"></i>
            <input type="text" placeholder="Rechercher...">
        </div>
        <div style="font-size: 20px;"><i class="far fa-heart"></i></div>
    </nav>

    <div class="feed" id="main-feed">
        </div>

    <nav class="bottom-nav">
        <i class="fas fa-home active-nav"></i>
        <i class="fas fa-search"></i>
        <i class="fas fa-plus-square" onclick="window.location.href='add-post.html'"></i>
        <i class="fas fa-video"></i>
        <i class="fas fa-user" onclick="window.location.href='profil.html'"></i>
    </nav>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { collection, query, orderBy, onSnapshot, doc, updateDoc, arrayUnion, arrayRemove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        let currentUID = null;

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUID = user.uid;
                loadFeed();
            } else {
                window.location.href = "login.html";
            }
        });

        function loadFeed() {
            const q = query(collection(db, "posts"), orderBy("createdAt", "desc"));
            
            onSnapshot(q, (snapshot) => {
                const feed = document.getElementById('main-feed');
                feed.innerHTML = "";
                
                snapshot.forEach((postDoc) => {
                    const post = postDoc.data();
                    const postID = postDoc.id;
                    const isLiked = post.likes && post.likes.includes(currentUID);

                    const postHTML = `
                        <div class="post">
                            <div class="post-header">
                                <img src="${post.userAvatar || 'https://via.placeholder.com/50'}" class="post-avatar">
                                <span class="post-username">${post.username}</span>
                                ${post.isVerified ? '<i class="fas fa-check-circle" style="color:#FF7A1A; font-size:12px;"></i>' : ''}
                            </div>
                            
                            <img src="${post.imageUrl}" class="post-image" ondblclick="toggleLike('${postID}', ${isLiked})">
                            
                            <div class="post-actions">
                                <i class="${isLiked ? 'fas fa-heart liked' : 'far fa-heart'} action-btn" onclick="toggleLike('${postID}', ${isLiked})"></i>
                                <i class="far fa-comment action-btn" onclick="openComments('${postID}')"></i>
                                <i class="far fa-paper-plane action-btn" onclick="sharePost('${post.imageUrl}')"></i>
                            </div>
                            
                            <div class="post-info">
                                <span class="likes-count">${post.likes ? post.likes.length : 0} J'aime</span>
                                <div class="post-caption"><b>${post.username}</b> ${post.caption}</div>
                                <div style="color:#555; font-size:12px; margin-top:5px; cursor:pointer;" onclick="openComments('${postID}')">
                                    Voir les commentaires...
                                </div>
                            </div>
                        </div>
                    `;
                    feed.insertAdjacentHTML('beforeend', postHTML);
                });
            });
        }

        // FONCTION LIKE (Gère les likes en temps réel)
        window.toggleLike = async (id, alreadyLiked) => {
            const postRef = doc(db, "posts", id);
            if (alreadyLiked) {
                await updateDoc(postRef, { likes: arrayRemove(currentUID) });
            } else {
                await updateDoc(postRef, { likes: arrayUnion(currentUID) });
            }
        };

        window.sharePost = (url) => {
            navigator.share({ title: 'Floy Post', url: url });
        };

        window.openComments = (id) => {
            alert("Ouverture des commentaires pour le post : " + id);
        };
    </script>
</body>
</html>
