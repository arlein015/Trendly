<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Floy - Home</title>
    <style>
        :root { --orange: #FF7A1A; --noir: #000; --bordure: #262626; }
        body { background: var(--noir); color: white; font-family: -apple-system, sans-serif; margin: 0; padding-bottom: 80px; }
        header { height: 60px; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; border-bottom: 1px solid var(--bordure); position: sticky; top: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(15px); z-index: 1000; }
        .logo { font-size: 24px; font-weight: 900; letter-spacing: -1.5px; }
        .logo span { color: var(--orange); }
        #feed { max-width: 500px; margin: 0 auto; }
        .post { border-bottom: 1px solid var(--bordure); padding-bottom: 15px; margin-bottom: 10px; }
        .post-header { padding: 12px; display: flex; align-items: center; gap: 10px; }
        .user-img { width: 38px; height: 38px; border-radius: 50%; background: #222; }
        .username { font-weight: 800; font-size: 15px; }
        .post-content img { width: 100%; display: block; background: #111; }
        .post-footer { padding: 12px; }
        .post-actions { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
        .like-btn { background: none; border: none; cursor: pointer; padding: 0; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 70px; background: rgba(0,0,0,0.95); border-top: 1px solid var(--bordure); display: flex; justify-content: space-around; align-items: center; }
        .nav-plus { background: var(--orange); width: 45px; height: 45px; border-radius: 14px; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <header>
        <div class="logo">FL<span>OY</span></div>
        <svg width="22" height="22" stroke="white" fill="none" stroke-width="2.5" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
    </header>

    <main id="feed"></main>

    <nav class="bottom-nav">
        <a href="index.html" style="color:white;"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path></svg></a>
        <a href="post.html"><div class="nav-plus"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg></div></a>
        <a href="profil.html" style="color:#777;"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg></a>
    </nav>

    <script type="module">
        import { db } from './firebase-config.js';
        import { collection, query, orderBy, onSnapshot, doc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const feed = document.getElementById('feed');

        // Fonction pour liker
        window.likePost = async (id) => {
            const postRef = doc(db, "posts", id);
            await updateDoc(postRef, { likes: increment(1) });
        };

        const q = query(collection(db, "posts"), orderBy("createdAt", "desc"));
        onSnapshot(q, (snapshot) => {
            feed.innerHTML = "";
            snapshot.forEach((doc) => {
                const data = doc.data();
                const id = doc.id;
                feed.innerHTML += `
                    <article class="post">
                        <div class="post-header"><div class="user-img"></div><div class="username">${data.username || 'Anonyme'}</div></div>
                        <div class="post-content"><img src="${data.imageUrl}"></div>
                        <div class="post-footer">
                            <div class="post-actions">
                                <button class="like-btn" onclick="likePost('${id}')">
                                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>
                                </button>
                                <span>${data.likes || 0}</span>
                            </div>
                            <div><b>${data.username || 'Anonyme'}</b> ${data.caption || ''}</div>
                        </div>
                    </article>`;
            });
        });
    </script>
</body>
</html>
