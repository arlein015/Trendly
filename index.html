<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📱</text></svg>">
    <title>Floy - Accueil</title>
    <style>
        :root { --orange: #FF7A1A; --noir: #000; --gris: #121212; }
        body { background: var(--noir); color: white; font-family: -apple-system, sans-serif; margin: 0; padding-bottom: 90px; }
        .header { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); z-index: 100; border-bottom: 1px solid #1a1a1a; }
        .logo { color: var(--orange); font-size: 22px; font-weight: 900; }
        
        /* POST */
        .post { margin-bottom: 15px; background: #050505; }
        .post-header { padding: 12px; display: flex; align-items: center; gap: 10px; }
        .post-avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--orange); }
        .post-img { width: 100%; display: block; background: #111; }
        .post-info { padding: 12px; }
        .post-actions { display: flex; gap: 15px; margin-bottom: 8px; font-size: 20px; }

        /* NAV BAR FIXÉE */
        .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; height: 70px; background: #080808; border-top: 1px solid #1a1a1a; display: flex; justify-content: space-evenly; align-items: center; padding-bottom: env(safe-area-inset-bottom); z-index: 1000; }
        .nav-item { color: #555; text-decoration: none; display: flex; flex-direction: column; align-items: center; }
        .nav-item.active { color: var(--orange); }
    </style>
</head>
<body>

    <header class="header">
        <div class="logo">FLOY</div>
    </header>

    <div class="post">
        <div class="post-header">
            <div class="post-avatar"></div>
            <b>Arlein_Dev</b>
        </div>
        <img src="https://picsum.photos/800/800?random=1" class="post-img">
        <div class="post-info">
            <div class="post-actions"><span>❤️</span> <span>💬</span></div>
            <div class="caption"><b>Arlein_Dev</b> Bienvenue sur le nouveau Feed de Floy ! 🚀</div>
        </div>
    </div>

    <nav class="nav-bar">
        <a href="index.html" class="nav-item active"><svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path></svg></a>
        <a href="live-stream.html" class="nav-item"><svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"></rect><circle cx="12" cy="12" r="3"></circle></svg></a>
        <a href="messages.html" class="nav-item"><svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg></a>
        <a href="profil.html" class="nav-item"><svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg></a>
    </nav>

</body>
</html>
