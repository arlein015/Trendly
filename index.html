<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bienvenue sur Threndly</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --bg: #000000;
            --btn-orange: #ff8c00; /* Orange Threndly */
            --text-white: #ffffff;
            --text-gray: #666666;
        }

        body {
            background-color: var(--bg);
            color: var(--text-white);
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }

        h1 { font-size: 2.5rem; margin-bottom: 30px; }
        h1 span { color: var(--btn-orange); } /* Threndly en orange */

        .auth-buttons-container {
            width: 100%;
            max-width: 300px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* Bouton Google Blanc/Pro */
        .btn-google {
            background: white;
            color: black;
            border: none;
            padding: 14px;
            border-radius: 30px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
            transition: 0.3s;
        }

        /* Bouton Mail Orange épuré */
        .btn-mail {
            background: transparent;
            color: var(--btn-orange);
            border: 1px solid var(--btn-orange);
            padding: 14px;
            border-radius: 30px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-mail:hover { background: rgba(255, 140, 0, 0.1); }

        .footer-links { margin-top: 30px; font-size: 0.9rem; }
        .footer-links a { color: var(--btn-orange); text-decoration: none; font-weight: bold; }
        
        .divider {
            display: flex;
            align-items: center;
            color: var(--text-gray);
            margin: 10px 0;
        }
        .divider::before, .divider::after {
            content: "";
            flex: 1;
            height: 1px;
            background: #222;
            margin: 0 10px;
        }
    </style>
</head>
<body>

    <h1>Bienvenue sur <span>Threndly</span></h1>

    <div class="auth-buttons-container">
        <button class="btn-google" id="google-btn">
            <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google__G__Logo.svg" width="20" alt="Google Logo">
            Continuer avec Google
        </button>

        <div class="divider">ou</div>

        <button class="btn-mail" onclick="location.href='login.html'">
            <i class="fa-regular fa-envelope"></i>
            Utiliser mon adresse e-mail
        </button>

        <div class="footer-links">
            Vous n'avez pas de compte ? <a href="signup.html">S'inscrire</a><br><br>
            Déjà inscrit ? <a href="login.html">Se connecter</a>
        </div>
    </div>

    </body>
</html>
