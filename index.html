<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Floy - Fil d'actualité</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #000; color: white; font-family: -apple-system, sans-serif; margin: 0; padding-bottom: 70px; }
        
        /* Header */
        .top-nav { height: 60px; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; position: sticky; top: 0; background: #000; border-bottom: 1px solid #121212; z-index: 100; }
        .logo { font-size: 24px; font-weight: bold; font-style: italic; color: #FF7A1A; }

        /* Conteneur des posts */
        #feed { max-width: 500px; margin: 0 auto; }

        /* Style d'un Post */
        .post-card { border-bottom: 1px solid #121212; margin-bottom: 10px; }
        .post-header { padding: 10px; display: flex; align-items: center; gap: 10px; }
        .user-avatar { width: 32px; height: 32px; background: #333; border-radius: 50%; object-fit: cover; }
        .post-img { width: 100%; display: block; background: #050505; }
        .post-actions { padding: 10px; display: flex; gap: 15px; font-size: 22px; }
        .post-info { padding: 0 10px 15px 10px; line-height: 1.4; }

        /* Menu du bas */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 60px; background: #000; border-top: 1px solid #121212; display: flex; justify-content: space-around; align-items: center; font-size: 22px; }
        .bottom-nav i { cursor: pointer; color: white; }
    </style>
</head>
<body>

    <nav class="top-nav">
        <div class="logo">Floy</div>
        <div style="display: flex; gap: 20px; font-size: 20px;">
            <i class="far fa-heart"></i>
            <i class="fab fa-facebook-messenger"></i>
        </div>
    </nav>

    <div id="feed">
        <p style="text-align: center; color: #555; margin-top: 50px;">Chargement du fil...</p>
    </div>

    <nav class="bottom-nav">
        <i class="fas fa-home" onclick="location.href='index.html'"></i>
        <i class="fas fa-search"></i>
        <i class="far fa-plus-square" onclick="location.href='create.html'"></i>
        <i class="fas fa-video"></i>
        <i class="far fa-user-circle"></i>
    </nav>

    <script type="module">
        // Importation des outils nécessaires depuis tes sources
        import { db } from './firebase-config.js'; 
        import { collection, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const feedContainer = document.getElementById('feed');

        // Création de la requête : On trie par date de création (du plus récent au plus ancien)
        const q = query(collection(db, "posts"), orderBy("createdAt", "desc"));

        // Écoute en temps réel de la base de données
        onSnapshot(q, (snapshot) => {
            if (!feedContainer) return;
            
            feedContainer.innerHTML = ""; // On vide la zone pour rafraîchir

            if (snapshot.empty) {
                feedContainer.innerHTML = `<p style="text-align:center; color:#888; margin-top:50px;">Aucun post pour le moment.</p>`;
                return;
            }

            snapshot.forEach((doc) => {
                const post = doc.data();
                
                // Génération du code HTML pour chaque photo
                const postElement = `
                    <div class="post-card">
                        <div class="post-header">
                            <div class="user-avatar"></div>
                            <b>${post.username || "Utilisateur"}</b>
                        </div>
                        
                        <img src="${post.imageUrl}" class="post-img">
                        
                        <div class="post-actions">
                            <i class="far fa-heart"></i>
                            <i class="far fa-comment"></i>
                            <i class="far fa-paper-plane"></i>
                        </div>
                        
                        <div class="post-info">
                            <b>${post.username || "Utilisateur"}</b> ${post.caption || ""}
                        </div>
                    </div>
                `;
                feedContainer.innerHTML += postElement;
            });
        }, (error) => {
            console.error("Erreur de lecture :", error);
            feedContainer.innerHTML = `<p style="color:red; text-align:center;">Erreur de chargement des posts.</p>`;
        });
    </script>
</body>
</html>
