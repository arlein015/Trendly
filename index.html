<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Floy - Bienvenue</title>
    <link rel="icon" type="image/png" href="F4">
    <style>
        :root { --fond: #000; --violet: #8A2BE2; --bleu: #00BFFF; }
        body { 
            background: var(--fond); color: white; font-family: 'Segoe UI', sans-serif; 
            margin: 0; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center;
            overflow: hidden;
        }
        .logo-container { animation: pulse 2s infinite; }
        h1 { font-size: 60px; letter-spacing: 10px; margin: 0; text-shadow: 0 0 20px var(--violet); }
        p { color: #888; font-size: 18px; margin-bottom: 50px; }
        
        .btn-main {
            background: linear-gradient(45deg, var(--violet), var(--bleu));
            color: white; text-decoration: none; padding: 18px 60px;
            border-radius: 40px; font-weight: bold; font-size: 20px;
            box-shadow: 0 0 20px rgba(138, 43, 226, 0.5);
            transition: 0.3s;
        }
        .btn-main:hover { transform: scale(1.05); box-shadow: 0 0 40px var(--violet); }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); opacity: 0.8; }
        }
    </style>
</head>
<body>
    <div class="logo-container">
        <img src="logo.png" alt="Floy" style="width: 120px; margin-bottom: 20px;">
    </div>
    <h1>FLOY</h1>
    <p>Explorez. Créez. Partagez.</p>
    
    <a href="signup.html" class="btn-main">Commencer</a>
</body>
</html>
