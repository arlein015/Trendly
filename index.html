<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Floy - Bienvenue</title>
    <link rel="icon" type="image/png" href="F4.png">
    <style>
        :root { --orange-floy: #FF7A1A; --fond: #000000; }
        body { 
            background: var(--fond); color: white; font-family: 'Inter', sans-serif; 
            margin: 0; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center;
            text-align: center;
        }
        
        .logo-main {
            width: 130px; height: 130px;
            background: url('F4.png') no-repeat center;
            background-size: contain;
            margin-bottom: 10px;
        }

        h1 { font-size: 45px; font-weight: 900; margin: 0; letter-spacing: 2px; }
        p { color: #888; margin-bottom: 50px; font-size: 16px; }

        .auth-buttons {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 80%;
            max-width: 300px;
        }

        .btn {
            padding: 16px;
            border-radius: 15px;
            font-weight: 800;
            text-decoration: none;
            font-size: 16px;
            transition: 0.3s;
            border: none;
            cursor: pointer;
        }

        .btn-signup {
            background: var(--orange-floy);
            color: black;
        }

        .btn-login {
            background: transparent;
            color: white;
            border: 1px solid #333;
        }

        .btn:hover { transform: scale(1.03); }
        
        /* Masquer le contenu pendant la vérification de connexion */
        #main-content { display: none; }
    </style>
</head>
<body>

    <div id="main-content">
        <div class="logo-main"></div>
        <h1>FLOY</h1>
        <p>L'instant en orange.</p>

        <div class="auth-buttons">
            <a href="signup.html" class="btn btn-signup">S'INSCRIRE</a>
            <a href="login.html" class="btn btn-login">SE CONNECTER</a>
        </div>
    </div>

    <script>
        // SCRIPT DE CONNEXION AUTOMATIQUE
        window.onload = function() {
            // On vérifie si "userLoggedIn" existe dans la mémoire du téléphone
            const isLoggedIn = localStorage.getItem('floy_isLoggedIn');

            if (isLoggedIn === 'true') {
                // Si l'utilisateur est déjà connecté, on l'envoie direct au Feed
                window.location.href = 'feed.html';
            } else {
                // Sinon, on affiche les boutons de bienvenue
                document.getElementById('main-content').style.display = 'flex';
                document.getElementById('main-content').style.flexDirection = 'column';
                document.getElementById('main-content').style.alignItems = 'center';
            }
        };
    </script>
</body>
</html>
