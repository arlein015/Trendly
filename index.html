<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Floy - Fil d'actualité Élite</title>
    <style>
        :root { --orange: #FF7A1A; --noir: #000; --gris: #121212; --bordure: #262626; --gris-bouton: #363636; }
        body { background: var(--noir); color: white; font-family: -apple-system, sans-serif; margin: 0; padding-bottom: 70px; }

        /* HEADER */
        header { padding: 15px; border-bottom: 1px solid var(--bordure); position: sticky; top: 0; background: black; z-index: 100; text-align: center; font-weight: bold; color: var(--orange); font-size: 22px; }

        /* DESIGN POST FLOY (STYLED) */
        .post { border-bottom: 1px solid var(--bordure); margin-bottom: 10px; }
        
        /* En-tête du Post */
        .post-header { padding: 10px; display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .post-header:active { opacity: 0.7; }
        .post-avatar { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; border: 1.5px solid var(--orange); }
        .u-name { font-weight: bold; display: flex; align-items: center; gap: 5px; color: white; }
        
        /* Badge de certification */
        .badge-orange { width: 14px; height: 14px; fill: var(--orange); display: none; }
        .is-verified .badge-orange { display: inline-block; }

        /* Image du Post (avec effet zoom) */
        .post-img { width: 100%; display: block; background: #111; cursor: pointer; transition: transform 0.2s; }
        .post-img:active { transform: scale(1.05); }

        /* Actions du Post (Likes, Comms, Partage) */
        .post-actions { padding: 12px; display: flex; align-items: center; gap: 20px; }
        .action-btn { background: none; border: none; cursor: pointer; padding: 0; display: flex; align-items: center; gap: 5px; color: white; transition: color 0.2s; }
        .action-btn:active { transform: scale(1.1); }
        
        /* Cœur Like Orange au clic */
        .like-btn.active svg { fill: var(--orange); stroke: var(--orange); }
        .like-btn svg { transition: all 0.2s; }

        /* Icônes SVG pour Comms et Partage */
        .icon-svg { width: 22px; height: 22px; stroke: white; fill: none; stroke-width: 2; transition: stroke 0.2s; }
        .icon-svg:hover, .action-btn:hover .icon-svg { stroke: var(--orange); }

        /* NAV BAR (MÊME QUE INDEX) */
        .nav-bar { position: fixed; bottom: 0; width: 100%; height: 65px; background: black; border-top: 1px solid var(--bordure); display: flex; justify-content: space-around; align-items: center; z-index: 1000; }
        .nav-link { color: white; opacity: 0.6; text-decoration: none; transition: 0.3s; }
        .nav-link.active { opacity: 1; color: var(--orange); }
        .nav-avatar { width: 28px; height: 28px; border-radius: 50%; object-fit: cover; border: 1.5px solid transparent; }
        .active .nav-avatar { border-color: var(--orange); }
    </style>
</head>
<body>

    <header>FLOY</header>
    
    <div id="feed"></div>

    <nav class="nav-bar">
        <a href="index.html" class="nav-link active">
            <svg width="26" height="26" viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
        </a>
        <a href="explore.html" class="nav-link">
            <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
        </a>
        <a href="post.html" class="nav-link">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"></svg>
        </a>
        <a href="profil.html" class="nav-link">
            <img id="my-nav-pic" class="nav-avatar" src="https://via.placeholder.com/30">
        </a>
    </nav>

    <script type="module">
        import { db } from './firebase-config.js';
        import { collection, onSnapshot, query, orderBy, limit, doc, getDoc, setDoc, deleteDoc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const MY_ID = "User_Floy_Account";
        const feed = document.getElementById('feed');

        // Charger les posts (flux styled)
        const q = query(collection(db, "posts"), limit(50)); 
        onSnapshot(q, (snaps) => {
            feed.innerHTML = "";
            
            // Tri manuel en JS pour plus de fiabilité
            const docs = [];
            snaps.forEach(d => docs.push({id: d.id, ...d.data()}));
            docs.sort((a, b) => (b.timestamp?.seconds || 0) - (a.timestamp?.seconds || 0));

            docs.forEach(p => {
                const postId = p.id;
                const userId = p.userId;
                const postDiv = document.createElement('div');
                postDiv.className = 'post';

                // Générer l'en-tête du post avec le nom et le badge (Stylé)
                postDiv.innerHTML = `
                    <div class="post-header" onclick="window.location.href='profil.html?id=${userId}'">
                        <img src="${p.userPhoto || 'https://via.placeholder.com/50'}" class="post-avatar">
                        <div class="u-name ${p.isVerified ? 'is-verified' : ''}">
                            ${p.name || p.username}
                            <svg class="badge-orange" viewBox="0 0 24 24"><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10 10-4.5 10-10S17.5 2 12 2zm-1.9 14.7L6.4 13l1.5-1.5 2.2 2.2 4.8-4.8 1.5 1.5-6.3 6.3z"/></svg>
                        </div>
                    </div>
                    <img src="${p.imageUrl}" class="post-img" alt="Post de ${p.username}">
                    <div class="post-actions">
                        <button class="action-btn like-btn" id="like-${postId}">
                            <svg class="icon-svg" viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>
                            <span id="count-${postId}">${p.likesCount || 0}</span>
                        </button>
                        <button class="action-btn">
                            <svg class="icon-svg" viewBox="0 0 24 24"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path></svg>
                        </button>
                        <button class="action-btn">
                            <svg class="icon-svg" viewBox="0 0 24 24"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"></path><polyline points="16 6 12 2 8 6"></polyline><line x1="12" y1="2" x2="12" y2="15"></line></svg>
                        </button>
                    </div>
                `;
                feed.appendChild(postDiv);

                // Gérer le clic sur le Like
                const lBtn = document.getElementById(`like-${postId}`);
                lBtn.onclick = async () => {
                    const likeRef = doc(db, "likes", `${MY_ID}_${postId}`);
                    const snap = await getDoc(likeRef);
                    if(snap.exists()){
                        await deleteDoc(likeRef);
                        await updateDoc(doc(db, "posts", postId), { likesCount: increment(-1) });
                    } else {
                        await setDoc(likeRef, { userId: MY_ID });
                        await updateDoc(doc(db, "posts", postId), { likesCount: increment(1) });
                    }
                };
            });
        });

        // Photo nav bar
        onSnapshot(doc(db, "users", MY_ID), s => { if(s.exists()) document.getElementById('my-nav-pic').src = s.data().avatarUrl; });
    </script>
</body>
</html>
