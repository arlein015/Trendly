<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Floy - Bienvenue</title>
    <link rel="icon" type="image/png" href="F4.png">
    <style>
        :root { --orange-floy: #FF7A1A; --fond: #000000; }
        body { 
            background: var(--fond); color: white; font-family: 'Inter', sans-serif; 
            margin: 0; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .logo-main {
            width: 150px; height: 150px;
            background: url('F4.png') no-repeat center;
            background-size: contain;
            animation: bounce 2s infinite ease-in-out;
        }
        h1 { font-size: 50px; font-weight: 900; margin: 10px 0; color: white; letter-spacing: 2px; }
        p { color: #888; margin-bottom: 40px; font-size: 16px; }
        
        .btn-start {
            background: var(--orange-floy);
            color: black; text-decoration: none; padding: 18px 50px;
            border-radius: 15px; font-weight: 800; font-size: 18px;
            transition: 0.3s;
        }
        .btn-start:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(255, 122, 26, 0.4); }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
    </style>
</head>
<body>
    <div class="logo-main"></div>
    <h1>FLOY</h1>
    <p>L'instant en orange.</p>
    <a href="signup.html" class="btn-start">C'EST PARTI</a>
</body>
</html>
