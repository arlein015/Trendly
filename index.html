<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Threndly - Inscription</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="signup-container">
        <div class="signup-card">
            <div class="brand-logo">T</div>
            <h1 class="brand-name">THRENDLY</h1>
            
            <form id="signupForm">
                <div class="input-row">
                    <input type="text" placeholder="Nom" required>
                    <input type="text" placeholder="Username" required>
                </div>
                <input type="text" placeholder="E-mail ou numéro" required>
                <input type="password" placeholder="Mot de passe" required>
                <input type="password" placeholder="Confirmer mot de passe" required>
                
                <button type="submit" class="btn-primary">S'inscrire</button>
            </form>

            <div class="divider">OU</div>

            <div class="social-login">
                <button class="btn-google">Continuer avec Google</button>
                <button class="btn-fb">Continuer avec Facebook</button>
            </div>

            <div class="footer-links">
                <a href="#">Mot de passe oublié ?</a>
                <p>Déjà un compte ? <a href="#" class="bold">Se connecter</a></p>
            </div>
        </div>
    </div>
</body>
</html>
