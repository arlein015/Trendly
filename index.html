<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Floy - Flux</title>
    <style>
        :root { --orange: #FF7A1A; --noir: #000; --bordure: #262626; }
        body { background: var(--noir); color: white; font-family: -apple-system, sans-serif; margin: 0; padding-bottom: 80px; }
        header { height: 60px; display: flex; align-items: center; justify-content: center; border-bottom: 1px solid var(--bordure); position: sticky; top: 0; background: black; z-index: 100; }
        .logo { font-size: 22px; font-weight: 900; letter-spacing: -1.5px; }
        .logo span { color: var(--orange); }
        #feed { max-width: 500px; margin: 0 auto; }
        .post { border-bottom: 1px solid var(--bordure); margin-bottom: 10px; padding-bottom: 10px; }
        .post-user { padding: 12px; font-weight: bold; display: flex; align-items: center; gap: 8px; }
        .post img { width: 100%; display: block; background: #111; }
        .post-caption { padding: 12px; font-size: 15px; }
        .nav-bar { position: fixed; bottom: 0; width: 100%; height: 70px; background: rgba(0,0,0,0.9); border-top: 1px solid var(--bordure); display: flex; justify-content: space-around; align-items: center; }
        .btn-plus { background: var(--orange); width: 45px; height: 45px; border-radius: 12px; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <header><div class="logo">FL<span>OY</span></div></header>

    <main id="feed"></main>

   <nav class="nav-bar">
        <a href="index.html" style="color:white;">
            <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path></svg>
        </a>

        <a href="#" style="color:#555;">
            <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
        </a>

        <a href="post.html">
            <div class="btn-plus">
                <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
            </div>
        </a>

        <a href="messages.html" style="color:#555;">
            <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path>
            </svg>
        </a>

        <a href="profil.html" style="color:#555;">
            <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
        </a>
    </nav>

    <script type="module">
        import { db } from './firebase-config.js';
        import { collection, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const feed = document.getElementById('feed');
        const q = query(collection(db, "posts"), orderBy("createdAt", "desc"));

        onSnapshot(q, (snapshot) => {
            feed.innerHTML = "";
            snapshot.forEach((doc) => {
                const data = doc.data();
                feed.innerHTML += `
                    <div class="post">
                        <div class="post-user">${data.username}</div>
                        <img src="${data.imageUrl}">
                        <div class="post-caption"><b>${data.username}</b> ${data.caption}</div>
                    </div>`;
            });
        });
    </script>
</body>
</html>
