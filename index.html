<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bienvenue sur Threndly</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="icon" type="image/png" href="F4.png">
    <style>
        :root {
            --bg: #000000;
            --orange: #ff8c00;
            --text: #ffffff;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        /* Logo Final */
        .logo-img {
            width: 120px;
            height: auto;
            margin-bottom: 20px;
        }

        h1 { font-size: 2.2rem; margin: 10px 0; font-weight: 800; }
        h1 span { color: var(--orange); }

        .subtitle { color: #888; margin-bottom: 40px; font-size: 0.95rem; }

        .auth-container {
            width: 90%;
            max-width: 320px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* Bouton Google Style Officiel */
        .btn-google {
            background: white;
            color: #000;
            border: none;
            padding: 12px;
            border-radius: 25px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            cursor: pointer;
            font-size: 15px;
            transition: 0.3s ease;
        }

        .btn-google img { width: 20px; }

        .btn-google:hover { background: #f1f1f1; transform: translateY(-2px); }

        /* Divider "ou" */
        .divider {
            display: flex;
            align-items: center;
            color: #444;
            font-size: 14px;
            margin: 10px 0;
        }
        .divider::before, .divider::after {
            content: ""; flex: 1; height: 1px; background: #222; margin: 0 15px;
        }

        /* Bouton Mail */
        .btn-mail {
            background: transparent;
            color: white;
            border: 1px solid #333;
            padding: 12px;
            border-radius: 25px;
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-mail:hover { border-color: var(--orange); color: var(--orange); }

        /* Liens Footer */
        .footer-links { margin-top: 35px; font-size: 14px; color: #aaa; }
        .footer-links a { color: var(--orange); text-decoration: none; font-weight: 700; margin-left: 5px; }

        .footer-links div { margin-top: 15px; }
    </style>
</head>
<body>

    <img src="F4/f3.png" alt="Logo Threndly" class="logo-img">
    
    <h1>Bienvenue sur <span>Threndly</span></h1>
    <p class="subtitle">Partagez vos moments, gagnez des récompenses</p>

    <div class="auth-container">
        <button class="btn-google" id="google-login">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/action/google.svg" alt="G">
            Continuer avec Google
        </button>

        <div class="divider">ou</div>

        <button class="btn-mail" onclick="window.location.href='login.html'">
            <i class="fa-regular fa-envelope"></i>
            Utiliser mon adresse e-mail
        </button>

        <div class="footer-links">
            Vous n'avez pas de compte ? <a href="signup.html">S'inscrire</a>
            <div>Déjà inscrit ? <a href="login.html">Se connecter</a></div>
        </div>
    </div>

    <script type="module">
        // Importation Firebase ici...
        // Ajoute ta logique de redirection automatique après signInWithPopup
    </script>
</body>
</html>
