<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Floy - Analytics</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { 
            --orange-floy: #FF7A1A; 
            --noir: #000; 
            --gris-card: #121212; 
            --blanc: #fff; 
        }

        body { 
            margin: 0; background: var(--noir); color: var(--blanc); 
            font-family: 'Segoe UI', sans-serif; padding-bottom: 50px;
        }

        /* --- HEADER --- */
        .header {
            display: flex; align-items: center; padding: 15px;
            border-bottom: 1px solid #222; position: sticky; top: 0;
            background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); z-index: 100;
        }
        .back-btn { font-size: 26px; cursor: pointer; color: var(--blanc); text-decoration: none; margin-right: 15px; }

        /* --- RESUMÉ STATS --- */
        .stats-overview {
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 20px 15px;
        }
        .stat-card {
            background: var(--gris-card); border: 1px solid #222;
            padding: 15px; border-radius: 15px;
        }
        .stat-label { color: #888; font-size: 12px; margin-bottom: 5px; }
        .stat-number { font-size: 20px; font-weight: bold; color: var(--orange-floy); }
        .stat-change { font-size: 11px; color: #28a745; margin-left: 5px; }

        /* --- ZONE GRAPHIQUE --- */
        .chart-container {
            padding: 15px; background: var(--gris-card);
            margin: 0 15px; border-radius: 20px; border: 1px solid #222;
        }
        .chart-title { font-size: 16px; font-weight: bold; margin-bottom: 20px; padding-left: 5px; }

        /* --- LISTE DES DERNIÈRES ACTIVITÉS --- */
        .activity-list { padding: 25px 15px; }
        .activity-item {
            display: flex; align-items: center; gap: 15px;
            padding: 12px 0; border-bottom: 1px solid #111;
        }
        .activity-img { width: 40px; height: 40px; border-radius: 50%; background: #333; }
        .activity-text { font-size: 14px; flex: 1; }
        .activity-text b { color: var(--orange-floy); }
        .activity-time { color: #555; font-size: 12px; }
    </style>
</head>
<body>

    <div class="header">
        <a href="profile.html" class="back-btn">‹</a>
        <span style="font-weight:bold">Analytics de croissance</span>
    </div>

    <div class="stats-overview">
        <div class="stat-card">
            <div class="stat-label">Total Abonnés</div>
            <div class="stat-number" id="totalFollowers">850 <span class="stat-change">+12%</span></div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Vues (7 jours)</div>
            <div class="stat-number">64.2K <span class="stat-change">+5%</span></div>
        </div>
    </div>

    <div class="chart-container">
        <div class="chart-title">Évolution des abonnés</div>
        <canvas id="growthChart"></canvas>
    </div>

    <div class="activity-list">
        <div style="font-weight:bold; margin-bottom:15px;">Activités récentes</div>
        
        <div class="activity-item">
            <div class="activity-img"><img src="https://i.pravatar.cc/40?u=1" style="width:100%; border-radius:50%"></div>
            <div class="activity-text"><b>Jordan</b> s'est abonné à votre profil.</div>
            <div class="activity-time">2m</div>
        </div>

        <div class="activity-item">
            <div class="activity-img"><img src="https://i.pravatar.cc/40?u=2" style="width:100%; border-radius:50%"></div>
            <div class="activity-text"><b>Sarah_K</b> a aimé votre dernière vidéo.</div>
            <div class="activity-time">15m</div>
        </div>

        <div class="activity-item">
            <div class="activity-img"><img src="https://i.pravatar.cc/40?u=3" style="width:100%; border-radius:50%"></div>
            <div class="activity-text"><b>Floy_User</b> a partagé votre profil.</div>
            <div class="activity-time">1h</div>
        </div>
    </div>

    <script>
        // Initialisation du graphique
        const ctx = document.getElementById('growthChart').getContext('2d');
        
        // On récupère le vrai chiffre dans le stockage pour le dernier point du graphique
        const currentFollowers = parseInt(localStorage.getItem('floy_following_count')) || 850;
        document.getElementById('totalFollowers').innerHTML = `${currentFollowers} <span class="stat-change">+12%</span>`;

        new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['Lun', 'Mar', 'Mer', 'Jeu', 'Ven', 'Sam', 'Dim'],
                datasets: [{
                    label: 'Abonnés',
                    data: [720, 745, 780, 760, 810, 835, currentFollowers],
                    borderColor: '#FF7A1A',
                    backgroundColor: 'rgba(255, 122, 26, 0.1)',
                    borderWidth: 3,
                    fill: true,
                    tension: 0.4, // Rend la ligne courbe
                    pointRadius: 0
                }]
            },
            options: {
                responsive: true,
                plugins: {
                    legend: { display: false }
                },
                scales: {
                    y: {
                        grid: { color: '#222' },
                        ticks: { color: '#555' }
                    },
                    x: {
                        grid: { display: false },
                        ticks: { color: '#555' }
                    }
                }
            }
        });
    </script>

</body>
</html>
