<div id="edit-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:2000; align-items:center; justify-content:center;">
    <div style="background:#1a1a1a; padding:20px; border-radius:15px; width:90%; max-width:400px;">
        <h3>Modifier le profil</h3>
        <input type="text" id="edit-name" placeholder="Nom" style="width:100%; padding:10px; margin:10px 0; background:#000; color:white; border:1px solid #333;">
        <textarea id="edit-bio" placeholder="Bio" style="width:100%; padding:10px; background:#000; color:white; border:1px solid #333;"></textarea>
        <div style="display:flex; gap:10px; margin-top:20px;">
            <button onclick="closeEditModal()" style="flex:1; padding:10px;">Annuler</button>
            <button id="save-btn" style="flex:1; padding:10px; background:#FF7A1A; border:none; color:white;">Sauver</button>
        </div>
    </div>
</div>

<script type="module">
    import { db, auth } from './firebase-config.js';
    import { doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    window.openEditModal = () => document.getElementById('edit-modal').style.display = 'flex';
    window.closeEditModal = () => document.getElementById('edit-modal').style.display = 'none';

    document.getElementById('save-btn').onclick = async () => {
        const user = auth.currentUser;
        await updateDoc(doc(db, "users", user.uid), {
            username: document.getElementById('edit-name').value,
            bio: document.getElementById('edit-bio').value
        });
        closeEditModal();
    };
</script>
