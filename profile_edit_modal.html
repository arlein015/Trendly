<div id="edit-modal" style="display:none; position:fixed; inset:0; background:black; z-index:5000; padding:20px;">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
        <span onclick="closeEditModal()" style="cursor:pointer;">Annuler</span>
        <b style="font-size:16px;">Modifier le profil</b>
        <span onclick="saveProfileChanges()" style="color:#FF7A1A; font-weight:bold; cursor:pointer;" id="save-btn">Terminé</span>
    </div>

    <div style="text-align:center; margin-bottom:20px;">
        <img id="edit-avatar-preview" src="" style="width:80px; height:80px; border-radius:50%; object-fit:cover; margin-bottom:10px;">
        <label for="pdp-input" style="display:block; color:#FF7A1A; font-size:14px; font-weight:600;">Changer la photo de profil</label>
        <input type="file" id="pdp-input" accept="image/*" style="display:none;" onchange="previewImage(this)">
    </div>

    <div style="display:flex; flex-direction:column; gap:20px;">
        <div style="border-bottom:1px solid #262626; padding-bottom:5px;">
            <label style="color:#888; font-size:12px;">Nom complet</label>
            <input type="text" id="edit-fullname" style="width:100%; background:none; border:none; color:white; padding:5px 0; outline:none;">
        </div>
        <div style="border-bottom:1px solid #262626; padding-bottom:5px;">
            <label style="color:#888; font-size:12px;">Bio</label>
            <textarea id="edit-bio-text" style="width:100%; background:none; border:none; color:white; padding:5px 0; outline:none; resize:none;"></textarea>
        </div>
    </div>
</div>

<script type="module">
    import { MediaHandler } from './media_handler.js';
    import { db, auth } from './firebase-config.js';
    import { doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    window.previewImage = (input) => {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => document.getElementById('edit-avatar-preview').src = e.target.result;
            reader.readAsDataURL(input.files[0]);
        }
    };

    window.saveProfileChanges = async () => {
        const btn = document.getElementById('save-btn');
        btn.innerText = "...";
        const user = auth.currentUser;
        const file = document.getElementById('pdp-input').files[0];
        
        let updates = {
            fullName: document.getElementById('edit-fullname').value,
            bio: document.getElementById('edit-bio-text').value
        };

        if(file) {
            const url = await MediaHandler.uploadProfilePicture(file);
            updates.avatarUrl = url;
        }

        await updateDoc(doc(db, "users", user.uid), updates);
        location.reload();
    };

    window.openEditModal = () => {
        document.getElementById('edit-modal').style.display = 'block';
        document.getElementById('edit-avatar-preview').src = document.getElementById('h-avatar').src;
        document.getElementById('edit-fullname').value = document.getElementById('h-fullname').innerText;
        document.getElementById('edit-bio-text').value = document.getElementById('h-bio').innerText;
    };

    window.closeEditModal = () => document.getElementById('edit-modal').style.display = 'none';
</script>
