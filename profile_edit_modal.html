<div id="edit-profile-modal" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 9999;">
    <div style="background: #262626; width: 90%; max-width: 400px; border-radius: 12px; color: white; overflow: hidden;">
        <div style="display: flex; justify-content: space-between; padding: 15px; border-bottom: 1px solid #363636; align-items: center;">
            <span onclick="closeEditModal()" style="cursor: pointer; color: #a8a8a8;">Annuler</span>
            <b style="font-size: 16px;">Modifier le profil</b>
            <span onclick="saveProfileData()" style="cursor: pointer; color: #0095f6; font-weight: 600;">Terminé</span>
        </div>

        <div style="padding: 20px;">
            <div style="text-align: center; margin-bottom: 20px;">
                <img id="preview-img" src="https://via.placeholder.com/150" style="width: 80px; height: 80px; border-radius: 50%; object-fit: cover; border: 1px solid #444;">
                <p style="color: #0095f6; font-size: 14px; margin-top: 10px; cursor: pointer;">Modifier la photo</p>
            </div>

            <label style="font-size: 12px; color: #a8a8a8;">Nom complet</label>
            <input type="text" id="inp-fullname" style="width: 100%; background: #121212; border: 1px solid #363636; border-radius: 8px; padding: 10px; color: white; margin-bottom: 15px;">

            <label style="font-size: 12px; color: #a8a8a8;">Bio</label>
            <textarea id="inp-bio" rows="3" style="width: 100%; background: #121212; border: 1px solid #363636; border-radius: 8px; padding: 10px; color: white;"></textarea>
        </div>
    </div>
</div>
