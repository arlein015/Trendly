<style>
    .modal-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.85);
        display: none; /* Caché par défaut */
        align-items: center;
        justify-content: center;
        z-index: 2000;
        backdrop-filter: blur(5px);
    }

    .modal-content {
        background: #121212;
        width: 90%;
        max-width: 400px;
        border-radius: 15px;
        padding: 20px;
        border: 1px solid #262626;
        color: white;
    }

    .modal-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
    }

    .modal-header h3 { margin: 0; font-size: 18px; }

    .edit-field {
        margin-bottom: 15px;
    }

    .edit-field label {
        display: block;
        font-size: 12px;
        color: #8e8e8e;
        margin-bottom: 5px;
    }

    .edit-field input, .edit-field textarea {
        width: 100%;
        background: #000;
        border: 1px solid #333;
        border-radius: 8px;
        padding: 10px;
        color: white;
        font-size: 14px;
        box-sizing: border-box;
    }

    .edit-field textarea {
        height: 80px;
        resize: none;
    }

    .modal-footer {
        display: flex;
        gap: 10px;
        margin-top: 20px;
    }

    .btn-save {
        background: #FF7A1A;
        color: white;
        border: none;
        padding: 12px;
        border-radius: 8px;
        font-weight: bold;
        flex: 2;
        cursor: pointer;
    }

    .btn-cancel {
        background: #262626;
        color: white;
        border: none;
        padding: 12px;
        border-radius: 8px;
        flex: 1;
        cursor: pointer;
    }
</style>

<div id="edit-profile-modal" class="modal-overlay">
    <div class="modal-content">
        <div class="modal-header">
            <h3>Modifier le profil</h3>
            <i class="fas fa-times" onclick="closeEditModal()" style="cursor:pointer; color:#8e8e8e;"></i>
        </div>

        <div class="edit-field">
            <label>Nom d'utilisateur</label>
            <input type="text" id="edit-username-input" placeholder="Ton nom Floy">
        </div>

        <div class="edit-field">
            <label>Bio</label>
            <textarea id="edit-bio-input" placeholder="Raconte ta story..."></textarea>
        </div>

        <div class="modal-footer">
            <button class="btn-cancel" onclick="closeEditModal()">Annuler</button>
            <button class="btn-save" id="save-profile-btn">Enregistrer</button>
        </div>
    </div>
</div>

<script type="module">
    import { db, auth } from './firebase-config.js';
    import { doc, updateDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // 1. Ouvrir la modal et pré-remplir les champs
    window.openEditModal = async () => {
        const user = auth.currentUser;
        if (!user) return;

        const modal = document.getElementById('edit-profile-modal');
        modal.style.display = 'flex';

        // Récupérer les données actuelles pour les afficher dans les inputs
        const userDoc = await getDoc(doc(db, "users", user.uid));
        if (userDoc.exists()) {
            const data = userDoc.data();
            document.getElementById('edit-username-input').value = data.username || "";
            document.getElementById('edit-bio-input').value = data.bio || "";
        }
    };

    // 2. Fermer la modal
    window.closeEditModal = () => {
        document.getElementById('edit-profile-modal').style.display = 'none';
    };

    // 3. Sauvegarder les modifications
    document.getElementById('save-profile-btn').onclick = async () => {
        const user = auth.currentUser;
        if (!user) return;

        const newUsername = document.getElementById('edit-username-input').value;
        const newBio = document.getElementById('edit-bio-input').value;

        try {
            const userRef = doc(db, "users", user.uid);
            await updateDoc(userRef, {
                username: newUsername,
                bio: newBio
            });

            console.log("Profil mis à jour !");
            closeEditModal();
        } catch (error) {
            console.error("Erreur de mise à jour :", error);
            alert("Erreur lors de la sauvegarde.");
        }
    };
</script>
