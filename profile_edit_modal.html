<style>
    .edit-modal-overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 9999;
    }
    .edit-box {
        background: #262626; width: 90%; max-width: 400px; border-radius: 12px;
        color: white; padding: 20px; box-sizing: border-box;
    }
    .edit-input {
        width: 100%; background: #121212; border: 1px solid #363636;
        border-radius: 8px; padding: 12px; color: white; margin-top: 10px;
    }
    .btn-save {
        width: 100%; background: #0095f6; color: white; border: none;
        padding: 12px; border-radius: 8px; margin-top: 20px; font-weight: 600; cursor: pointer;
    }
</style>

<div id="edit-modal" class="edit-modal-overlay">
    <div class="edit-box">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <b onclick="closeEditModal()" style="cursor:pointer; color:#a8a8a8;">Annuler</b>
            <b>Modifier le profil</b>
            <b onclick="saveProfile()" style="color:#0095f6; cursor:pointer;">Terminé</b>
        </div>

        <div style="text-align: center; margin: 20px 0;">
            <img id="edit-preview" src="" style="width: 80px; height: 80px; border-radius: 50%; object-fit: cover;">
            <p style="color:#0095f6; font-size: 14px; margin-top: 8px;">Modifier la photo</p>
            <input type="text" id="edit-avatar-url" class="edit-input" placeholder="URL de l'image">
        </div>

        <label style="font-size: 12px; color: #a8a8a8;">Bio</label>
        <textarea id="edit-bio-input" class="edit-input" rows="3"></textarea>
    </div>
</div>

<script type="module">
    import { db, auth } from './firebase-config.js';
    import { doc, updateDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    window.openEditModal = async () => {
        const snap = await getDoc(doc(db, "users", auth.currentUser.uid));
        if (snap.exists()) {
            document.getElementById('edit-bio-input').value = snap.data().bio || "";
            document.getElementById('edit-avatar-url').value = snap.data().avatarUrl || "";
            document.getElementById('edit-preview').src = snap.data().avatarUrl || "https://via.placeholder.com/150";
        }
        document.getElementById('edit-modal').style.display = 'flex';
    };

    window.closeEditModal = () => document.getElementById('edit-modal').style.display = 'none';

    window.saveProfile = async () => {
        await updateDoc(doc(db, "users", auth.currentUser.uid), {
            bio: document.getElementById('edit-bio-input').value,
            avatarUrl: document.getElementById('edit-avatar-url').value
        });
        closeEditModal();
    };
</script>
