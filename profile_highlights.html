<style>
    .highlights-section {
        display: flex;
        gap: 18px;
        padding: 15px;
        overflow-x: auto;
        scrollbar-width: none;
        background: #000;
    }
    .highlights-section::-webkit-scrollbar { display: none; }

    .h-item {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 6px;
        min-width: 64px;
    }
    .h-circle {
        width: 64px;
        height: 64px;
        border-radius: 50%;
        border: 1px solid #262626;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #000;
        padding: 3px;
    }
    .h-circle img {
        width: 100%;
        height: 100%;
        border-radius: 50%;
        object-fit: cover;
    }
    .h-add { background: #121212; font-size: 28px; color: #fff; cursor: pointer; }
    .h-text { font-size: 11px; color: #fff; text-align: center; }
</style>

<div class="highlights-section" id="highlights-container">
    </div>
<div style="padding: 15px; display: flex; gap: 18px; background: #000; overflow-x: auto;">
    <div style="display: flex; flex-direction: column; align-items: center; gap: 5px;">
        <div style="width: 64px; height: 64px; border-radius: 50%; border: 1px solid #363636; display: flex; align-items: center; justify-content: center; font-size: 25px; color: #363636;">
            <i class="fas fa-plus"></i>
        </div>
        <span style="font-size: 12px; color: white;">Nouveau</span>
    </div>
</div>
<script type="module">
    import { db } from './firebase-config.js';
    import { doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    window.loadHighlights = (profileId, myId) => {
        onSnapshot(doc(db, "users", profileId), (snap) => {
            const container = document.getElementById('highlights-container');
            container.innerHTML = "";
            const data = snap.data();

            // Bouton "Nouveau" (seulement pour toi)
            if (profileId === myId) {
                container.innerHTML += `
                    <div class="h-item" onclick="openCreateHighlight()">
                        <div class="h-circle h-add"><i class="fas fa-plus" style="font-weight:100; color:#555;"></i></div>
                        <span class="h-text">Nouveau</span>
                    </div>
                `;
            }

            // Liste des Highlights existants
            if (data?.highlights) {
                data.highlights.forEach(h => {
                    container.innerHTML += `
                        <div class="h-item">
                            <div class="h-circle"><img src="${h.cover}"></div>
                            <span class="h-text">${h.title}</span>
                        </div>
                    `;
                });
            }
        });
    };
</script>
