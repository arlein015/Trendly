<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Floy - Paramètres</title>
    <style>
        :root { --orange-floy: #FF7A1A; --noir: #000; --gris: #121212; }
        body { background: var(--noir); color: white; font-family: sans-serif; margin: 0; }
        .header { display: flex; align-items: center; padding: 20px; border-bottom: 1px solid #222; }
        .back-btn { font-size: 24px; cursor: pointer; margin-right: 20px; text-decoration: none; color: white; }
        .setting-item { 
            display: flex; justify-content: space-between; align-items: center;
            padding: 18px 20px; border-bottom: 1px solid #111; text-decoration: none; color: white;
        }
        .setting-item:active { background: #161616; }
        .item-info { display: flex; align-items: center; gap: 15px; }
        .chevron { color: #555; font-size: 18px; }
    </style>
</head>
<body>
    <div class="header">
        <a href="profile.html" class="back-btn">‹</a>
        <span style="font-weight:bold; text-transform: uppercase;">Paramètres</span>
    </div>

    <div class="settings-list">
        <a href="settings-language.html" class="setting-item">
            <div class="item-info"><span>🌐</span> Langue</div>
            <span class="chevron">›</span>
        </a>
        <a href="notification-settings.html" class="setting-item">
            <div class="item-info"><span>🔔</span> Notifications</div>
            <span class="chevron">›</span>
        </a>
        <a href="sound-settings.html" class="setting-item">
            <div class="item-info"><span>🎵</span> Sons et Musique</div>
            <span class="chevron">›</span>
        </a>
        <a href="system-settings.html" class="setting-item">
            <div class="item-info"><span>📱</span> Système & Affichage</div>
            <span class="chevron">›</span>
        </a>
        <a href="cookie-settings.html" class="setting-item">
            <div class="item-info"><span>🍪</span> Cookies & Confidentialité</div>
            <span class="chevron">›</span>
        </a>
    </div>
</body>
</html>
