<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Floy - Profil</title>
    <style>
        :root { --orange: #FF7A1A; --noir: #000; --gris: #121212; --nav-h: 75px; }
        body { background: var(--noir); color: white; font-family: -apple-system, sans-serif; margin: 0; padding-bottom: 110px; }

        /* HEADER AVEC PARTAGE */
        .top-nav { display: flex; justify-content: flex-end; padding: 20px; gap: 20px; }
        .icon-btn { background: none; border: none; color: white; cursor: pointer; padding: 5px; }

        /* PROFIL HEADER */
        .profile-header { text-align: center; padding-top: 10px; }
        .profile-pic-container { position: relative; width: 110px; height: 110px; margin: 0 auto 15px; }
        .profile-pic { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 3px solid var(--orange); }
        
        .user-info h2 { margin: 5px 0; font-size: 22px; display: flex; align-items: center; justify-content: center; gap: 6px; }
        .badge-orange { color: var(--orange); }
        .bio { color: #888; font-size: 14px; margin-bottom: 25px; padding: 0 40px; }

        /* STATS */
        .stats-bar { display: flex; justify-content: space-around; padding: 20px 0; border-top: 1px solid #1a1a1a; border-bottom: 1px solid #1a1a1a; margin-bottom: 20px; }
        .stat-item { text-align: center; }
        .stat-num { display: block; font-size: 18px; font-weight: bold; }
        .stat-label { font-size: 12px; color: #666; }

        /* ACTIONS */
        .profile-actions { display: flex; flex-direction: column; gap: 10px; padding: 0 20px; }
        .row-actions { display: flex; gap: 10px; }
        
        .btn { flex: 1; padding: 12px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; text-decoration: none; text-align: center; font-size: 14px; transition: 0.2s; }
        .btn-follow { background: var(--orange); color: black; }
        .btn-msg { background: #222; color: white; }
        .btn-edit { background: #1a1a1a; color: #888; border: 1px solid #333; font-size: 12px; }

        /* NAV BAR */
        .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; height: var(--nav-h); background: rgba(5,5,5,0.98); backdrop-filter: blur(15px); border-top: 1px solid #1a1a1a; display: flex; justify-content: space-evenly; align-items: center; padding-bottom: env(safe-area-inset-bottom); z-index: 1000; }
        .nav-item { color: #666; text-decoration: none; display: flex; flex-direction: column; align-items: center; gap: 4px; flex: 1; }
        .nav-item.active { color: var(--orange); }
        .nav-item svg { width: 24px; height: 24px; }
        .nav-text { font-size: 10px; }
    </style>
</head>
<body>

    <div class="top-nav">
        <button class="icon-btn" onclick="shareProfile()">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"></path><polyline points="16 6 12 2 8 6"></polyline><line x1="12" y1="2" x2="12" y2="15"></line></svg>
        </button>
        <button class="icon-btn">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
        </button>
    </div>

    <div class="profile-header">
        <div class="profile-pic-container">
            <img id="myAvatar" src="ma_photo.jpg" class="profile-pic" onerror="this.src='https://ui-avatars.com/api/?name=User&background=FF7A1A&color=000'">
        </div>
        <div class="user-info">
            <h2>
                <span id="displayUsername">Utilisateur</span>
                <span class="badge-orange">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10 10-4.5 10-10S17.5 2 12 2zm-1.9 14.7l-3.3-3.3 1.4-1.4 1.9 1.9 5.3-5.3 1.4 1.4-6.7 6.7z"/></svg>
                </span>
            </h2>
            <div class="bio" id="displayBio">Chargement...</div>
        </div>
    </div>

    <div class="stats-bar">
        <div class="stat-item"><span class="stat-num">12</span><span class="stat-label">Posts</span></div>
        <div class="stat-item"><span class="stat-num" id="followersCount">1.2k</span><span class="stat-label">Abonnés</span></div>
        <div class="stat-item"><span class="stat-num">450</span><span class="stat-label">Abonnements</span></div>
    </div>

    <div class="profile-actions">
        <div class="row-actions">
            <button class="btn btn-follow" id="followBtn" onclick="toggleFollow()">Suivre</button>
            <button class="btn btn-msg" onclick="goToChat()">Message</button>
        </div>
        <button class="btn btn-edit" onclick="editProfile()">Modifier le profil</button>
    </div>

    <nav class="nav-bar">
        <a href="index.html" class="nav-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
            <span class="nav-text">Accueil</span>
        </a>
        <a href="explorer.html" class="nav-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
            <span class="nav-text">Explorer</span>
        </a>
        <a href="story-creator.html" class="nav-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="12" y1="8" x2="12" y2="16"></line><line x1="8" y1="12" x2="16" y2="12"></line></svg>
            <span class="nav-text">Créer</span>
        </a>
        <a href="messages.html" class="nav-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
            <span class="nav-text">Messages</span>
        </a>
        <a href="profil.html" class="nav-item active">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
            <span class="nav-text">Profil</span>
        </a>
    </nav>

    <script>
        function loadProfile() {
            const name = localStorage.getItem('user_name') || "Floy User";
            const bio = localStorage.getItem('user_bio') || "Bienvenue sur Floy !";
            const avatar = localStorage.getItem('user_story_img');
            
            document.getElementById('displayUsername').textContent = name;
            document.getElementById('displayBio').textContent = bio;
            if(avatar) document.getElementById('myAvatar').src = avatar;
        }

        // --- FONCTION CRITIQUE : AJOUTER À LA LISTE DE MESSAGES ---
        function goToChat() {
            const name = document.getElementById('displayUsername').textContent;
            const avatar = document.getElementById('myAvatar').src;
            const userId = "user_" + name.replace(/\s/g, '_').toLowerCase();

            // On récupère la liste des contacts existants
            let contacts = JSON.parse(localStorage.getItem('floy_contacts') || "[]");
            
            // On vérifie si l'utilisateur existe déjà
            const exists = contacts.find(c => c.id === userId);
            
            if (!exists) {
                // On l'ajoute !
                contacts.push({ id: userId, name: name, img: avatar });
                localStorage.setItem('floy_contacts', JSON.stringify(contacts));
            }

            // Direction le chat
            window.location.href = `chat.html?id=${userId}`;
        }

        function toggleFollow() {
            const btn = document.getElementById('followBtn');
            if (btn.textContent === "Suivre") {
                btn.textContent = "Abonné";
                btn.style.background = "#1a1a1a";
                btn.style.color = "white";
            } else {
                btn.textContent = "Suivre";
                btn.style.background = "var(--orange)";
                btn.style.color = "black";
            }
        }

        function shareProfile() {
            alert("Lien du profil copié !");
        }

        function editProfile() {
            const n = prompt("Nom :", document.getElementById('displayUsername').textContent);
            if(n) {
                localStorage.setItem('user_name', n);
                loadProfile();
            }
        }

        window.onload = loadProfile;
    </script>
</body>
</html>
