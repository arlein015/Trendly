<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Floy - Profil Officiel</title>
    <style>
        :root { 
            --orange-floy: #FF7A1A; 
            --noir: #000; 
            --gris: #121212; 
            --blanc: #fff; 
        }
        
        body, html { margin: 0; padding: 0; background: var(--noir); color: var(--blanc); font-family: 'Segoe UI', sans-serif; overflow-x: hidden; }

        /* --- BARRE DU HAUT --- */
        .top-bar { position: absolute; top: 15px; right: 15px; z-index: 10; cursor: pointer; }

        /* --- HEADER PROFIL --- */
        .profile-header { padding: 40px 20px 20px; text-align: center; }
        .profile-pic-container { position: relative; width: 100px; height: 100px; margin: 0 auto 12px; cursor: pointer; }
        .profile-pic { width: 100%; height: 100%; border-radius: 50%; border: 2px solid var(--orange-floy); object-fit: cover; }
        .verified-badge { position: absolute; bottom: 5px; right: 5px; width: 22px; height: 22px; }

        .display-name { font-size: 22px; font-weight: bold; margin-bottom: 2px; }
        .user-handle { font-size: 16px; color: #888; display: flex; align-items: center; justify-content: center; gap: 5px; }
        .user-link { color: var(--orange-floy); text-decoration: none; font-size: 14px; font-weight: 500; margin-top: 8px; display: block; }

        .stats-row { display: flex; justify-content: center; gap: 25px; margin: 20px 0; }
        .stat-item { text-align: center; }
        .stat-val { font-weight: bold; font-size: 18px; display: block; }
        .stat-lab { color: #888; font-size: 12px; }

        /* --- BOUTONS ACTIONS --- */
        .btn-main { width: 90%; background: var(--orange-floy); border: none; color: #000; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; margin-bottom: 10px; }
        .btn-row { display: flex; gap: 10px; width: 90%; margin: 0 auto; }
        .btn-sec { flex: 1; background: var(--gris); border: 1px solid #333; color: #fff; padding: 10px; border-radius: 8px; font-weight: 600; cursor: pointer; }

        /* --- MODALS (Modification & Stats) --- */
        .modal { position: fixed; top: 100%; left: 0; width: 100%; height: 100%; background: var(--noir); z-index: 500; transition: 0.4s cubic-bezier(0.17, 0.84, 0.44, 1); padding: 20px; box-sizing: border-box; }
        .modal.open { top: 0; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 1px solid #222; padding-bottom: 15px; }
        
        #fileInput { display: none; }
        .input-group { margin-bottom: 20px; border-bottom: 1px solid #222; padding-bottom: 10px; }
        .input-group label { display: block; color: #555; font-size: 12px; margin-bottom: 5px; }
        .input-group input { background: transparent; border: none; color: white; width: 100%; font-size: 16px; outline: none; }

        .stat-card { background: var(--gris); padding: 20px; border-radius: 15px; margin-bottom: 15px; border-left: 4px solid var(--orange-floy); }

        /* --- GRILLE --- */
        .tabs-profile { display: flex; border-top: 1px solid #1a1a1a; margin-top: 20px; }
        .tab-p { flex: 1; text-align: center; padding: 15px; cursor: pointer; fill: #666; }
        .tab-p.active { border-bottom: 2px solid var(--orange-floy); fill: white; }

        /* --- NAV BAR --- */
        .nav-bar { position: fixed; bottom: 0; width: 100%; height: 70px; background: #000; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #1a1a1a; z-index: 100; }
        .nav-icon { width: 28px; height: 28px; fill: #666; cursor: pointer; }
        .nav-icon.active { fill: white; }
        .btn-plus-large { background: var(--orange-floy); width: 65px; height: 42px; border-radius: 12px; display: flex; align-items: center; justify-content: center; color: black; font-weight: bold; font-size: 28px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="top-bar" onclick="alert('Lien de profil copié !')">
        <svg width="24" height="24" fill="white" viewBox="0 0 24 24"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92s2.92-1.31 2.92-2.92-1.31-2.92-2.92-2.92z"/></svg>
    </div>

    <div class="profile-header">
        <div class="profile-pic-container" onclick="openModal('editModal')">
            <img src="https://i.pravatar.cc/150?u=Arlein" class="profile-pic" id="profImg">
            <svg class="verified-badge" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" fill="#FF7A1A"/><path d="M17 9L11 15L7 11" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
        </div>

        <div class="display-name" id="profName">Arlein</div>
        <div class="user-handle" id="profUser">@arlein_off</div>
        <a href="#" class="user-link" id="profLinkDisplay" target="_blank"></a>

        <div class="stats-row">
            <div class="stat-item"><span class="stat-val">124</span><span class="stat-lab">Abonnements</span></div>
            <div class="stat-item"><span class="stat-val">850K</span><span class="stat-lab">Abonnés</span></div>
            <div class="stat-item"><span class="stat-val">12M</span><span class="stat-lab">J'aime</span></div>
        </div>

        <button class="btn-main" onclick="this.innerText='Abonné'; this.style.background='#333'; this.style.color='#fff'">Suivre</button>
        <div class="btn-row">
            <button class="btn-sec" onclick="openModal('editModal')">Modifier</button>
            <button class="btn-sec" onclick="openModal('statsModal')">Tableau de bord</button>
        </div>
    </div>

    <div class="tabs-profile">
        <div class="tab-p active"><svg width="24" height="24" viewBox="0 0 24 24"><path d="M3 11h8V3H3v8zm2-6h4v4H5V5zm8-2v8h8V3h-8zm6 6h-4V5h4v4zM3 21h8v-8H3v8zm2-6h4v4H5v-4zm8 6h8v-8h-8v8zm2-6h4v4h-4v-4z"/></svg></div>
        <div class="tab-p"><svg width="24" height="24" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg></div>
    </div>
    <div style="background:#111; height:200px; display:flex; align-items:center; justify-content:center; color:#444;">Aucune vidéo pour le moment</div>

    <div class="modal" id="editModal">
        <div class="modal-header">
            <span onclick="closeModal('editModal')" style="cursor:pointer">Annuler</span>
            <span style="font-weight:bold">Modifier le profil</span>
            <span style="color:var(--orange-floy); font-weight:bold; cursor:pointer" onclick="saveProfile()">Enregistrer</span>
        </div>
        
        <div style="text-align:center; margin-bottom:30px;">
            <input type="file" id="fileInput" accept="image/*" onchange="previewImage(this)">
            <div onclick="document.getElementById('fileInput').click()" style="cursor:pointer">
                <img src="https://i.pravatar.cc/150?u=Arlein" id="editPreview" style="width:90px; height:90px; border-radius:50%; border:2px solid var(--orange-floy); object-fit: cover;">
                <p style="color:var(--orange-floy); font-size:14px; margin-top:10px;">Changer la photo</p>
            </div>
        </div>

        <div class="input-group"><label>Nom</label><input type="text" id="inName" value="Arlein"></div>
        <div class="input-group"><label>Nom d'utilisateur</label><input type="text" id="inUser" value="@arlein_off"></div>
        <div class="input-group"><label>Lien / Website</label><input type="text" id="inLink" placeholder="google.com"></div>
    </div>

    <div class="modal" id="statsModal">
        <div class="modal-header">
            <span onclick="closeModal('statsModal')" style="cursor:pointer">Fermer</span>
            <span style="font-weight:bold">Analyse Floy</span>
            <span style="opacity:0">.</span>
        </div>
        <div class="stat-card"><h3>Vues des vidéos</h3><p style="font-size:26px; color:var(--orange-floy); margin:0;">1,245,600</p></div>
        <div class="stat-card"><h3>Nouveaux abonnés</h3><p style="font-size:26px; margin:0;">+12,400</p></div>
        <div class="stat-card"><h3>Partages</h3><p style="font-size:26px; margin:0;">5,800</p></div>
    </div>

    <nav class="nav-bar">
        <svg class="nav-icon" onclick="window.location.href='feed.html'" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
        <svg class="nav-icon" onclick="window.location.href='explore.html'" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
        <div class="btn-plus-large" onclick="window.location.href='upload.html'">+</div>
        <svg class="nav-icon" onclick="window.location.href='messages.html'" viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 14H4V8l8 5 8-5v10zm-8-7L4 6h16l-8 5z"/></svg>
        <svg class="nav-icon active" onclick="window.location.href='profile.html'" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/></svg>
    </nav>

    <script>
        function openModal(id) { document.getElementById(id).classList.add('open'); }
        function closeModal(id) { document.getElementById(id).classList.remove('open'); }

        // Prévisualiser l'image de la galerie
        function previewImage(input) {
            if (input.files && input.files[0]) {
                var reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('editPreview').src = e.target.result;
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        // Sauvegarder les changements
        function saveProfile() {
            document.getElementById('profName').innerText = document.getElementById('inName').value;
            document.getElementById('profUser').innerText = document.getElementById('inUser').value;
            
            const linkVal = document.getElementById('inLink').value;
            const linkDisplay = document.getElementById('profLinkDisplay');
            if(linkVal) {
                linkDisplay.innerText = linkVal.replace('https://', '').replace('http://', '');
                linkDisplay.href = linkVal.startsWith('http') ? linkVal : 'https://' + linkVal;
            } else {
                linkDisplay.innerText = "";
            }

            document.getElementById('profImg').src = document.getElementById('editPreview').src;
            closeModal('editModal');
        }
    </script>
</body>
</html>
