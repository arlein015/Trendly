<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🟠</text></svg>">
    <title>Mon Profil - Floy</title>
    <style>
        :root { --orange: #FF7A1A; --noir: #000; --gris: #121212; }
        body { background: var(--noir); color: white; font-family: -apple-system, sans-serif; margin: 0; padding-bottom: 100px; }

        /* HEADER */
        .top-bar { display: flex; justify-content: flex-end; padding: 20px; gap: 20px; }
        .icon { cursor: pointer; color: white; }

        /* PROFIL INFO */
        .profile-header { text-align: center; padding: 20px 0; }
        .avatar-main { width: 100px; height: 100px; border-radius: 50%; border: 3px solid var(--orange); padding: 3px; object-fit: cover; }
        .username { font-size: 24px; margin: 10px 0; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .bio { color: #888; font-size: 14px; padding: 0 40px; margin-bottom: 30px; }

        /* STATS */
        .stats { display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #1a1a1a; border-bottom: 1px solid #1a1a1a; }
        .stat-box { text-align: center; }
        .stat-val { display: block; font-weight: bold; font-size: 18px; }
        .stat-label { font-size: 12px; color: #666; }

        /* BOUTON MESSAGE */
        .action-area { padding: 25px 20px; }
        .btn-msg { background: #1a1a1a; color: white; border: 1px solid #333; padding: 12px; width: 100%; border-radius: 10px; font-weight: bold; text-decoration: none; display: block; text-align: center; }

        /* BARRE DE NAVIGATION (FIXÉE) */
        .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; height: 75px; background: #050505; border-top: 1px solid #1a1a1a; display: flex; justify-content: space-evenly; align-items: center; padding-bottom: env(safe-area-inset-bottom); z-index: 1000; }
        .nav-link { color: #555; text-decoration: none; display: flex; flex-direction: column; align-items: center; }
        .nav-link.active { color: var(--orange); }
    </style>
</head>
<body>

    <div class="top-bar">
        <svg onclick="alert('Lien copié !')" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"></path><polyline points="16 6 12 2 8 6"></polyline><line x1="12" y1="2" x2="12" y2="15"></line></svg>
    </div>

    <div class="profile-header">
        <img src="https://ui-avatars.com/api/?name=Arlein&background=FF7A1A&color=000" class="avatar-main">
        <h2 class="username">
            Arlein_Dev 
            <svg width="20" height="20" viewBox="0 0 24 24" fill="var(--orange)"><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10 10-4.5 10-10S17.5 2 12 2zm-1.9 14.7l-3.3-3.3 1.4-1.4 1.9 1.9 5.3-5.3 1.4 1.4-6.7 6.7z"/></svg>
        </h2>
        <div class="bio">Créateur de Floy App | Passionné de Python et Web Design 🚀</div>
    </div>

    <div class="stats">
        <div class="stat-box"><span class="stat-val">42</span><span class="stat-label">Posts</span></div>
        <div class="stat-box"><span class="stat-val">1.2k</span><span class="stat-label">Abonnés</span></div>
        <div class="stat-box"><span class="stat-val">350</span><span class="stat-label">Suivis</span></div>
    </div>

    <div class="action-area">
        <a href="messages.html" class="btn-msg">Envoyer un message</a>
    </div>

    <nav class="nav-bar">
        <a href="index.html" class="nav-link">
            <svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path></svg>
        </a>
        <a href="live-stream.html" class="nav-link">
            <svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"></rect><circle cx="12" cy="12" r="3"></circle></svg>
        </a>
        <a href="messages.html" class="nav-link">
            <svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
        </a>
        <a href="profil.html" class="nav-link active">
            <svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
        </a>
    </nav>

</body>
</html>
