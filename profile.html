<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Floy - Profil Officiel</title>
    <style>
        :root { 
            --orange-floy: #FF7A1A; 
            --noir: #000; 
            --gris: #121212; 
            --blanc: #fff; 
        }
        
        body, html { 
            margin: 0; padding: 0; 
            background: var(--noir); color: var(--blanc); 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            overflow-x: hidden; 
        }

        /* --- BARRE DU HAUT --- */
        .top-bar { 
            display: flex; justify-content: flex-end; align-items: center;
            padding: 15px 20px; gap: 20px; position: sticky; top: 0; background: var(--noir); z-index: 100;
        }
        .icon-btn { cursor: pointer; fill: white; transition: 0.2s; }
        .share-icon { transform: scaleX(-1); }

        /* --- HEADER PROFIL --- */
        .profile-header { padding: 10px 20px; text-align: center; }
        .profile-pic-container { position: relative; width: 95px; height: 95px; margin: 0 auto 12px; }
        .profile-pic { width: 100%; height: 100%; border-radius: 50%; border: 2px solid var(--orange-floy); object-fit: cover; }
        
        .name-container { display: flex; align-items: center; justify-content: center; gap: 6px; margin-bottom: 2px; }
        .display-name { font-size: 20px; font-weight: bold; }
        .verified-badge { width: 18px; height: 18px; fill: var(--orange-floy); }

        .user-handle { font-size: 14px; color: #888; margin-bottom: 15px; }

        /* --- STATS --- */
        .stats-row { display: flex; justify-content: center; gap: 25px; margin-bottom: 20px; }
        .stat-item { text-align: center; cursor: pointer; text-decoration: none; color: inherit; }
        .stat-val { font-weight: bold; font-size: 18px; display: block; }
        .stat-lab { color: #888; font-size: 12px; }

        /* --- BOUTONS --- */
        .btn-row { display: flex; gap: 10px; width: 95%; margin: 0 auto 20px; }
        .btn-sec { flex: 1; background: var(--gris); border: 1px solid #333; color: #fff; padding: 10px; border-radius: 10px; font-weight: 600; cursor: pointer; font-size: 13px; transition: 0.2s; }
        .btn-sec:active { background: #222; }

        /* --- ONGLETS --- */
        .tabs-selector { display: flex; border-top: 1px solid #222; }
        .tab-btn { flex: 1; padding: 12px; text-align: center; cursor: pointer; opacity: 0.4; border-bottom: 2px solid transparent; }
        .tab-btn.active { opacity: 1; border-bottom: 2px solid var(--blanc); }
        .tab-btn svg { width: 22px; height: 22px; fill: white; }

        /* --- GRILLE VIDÉO --- */
        .video-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; padding-bottom: 100px; }
        .video-item { aspect-ratio: 3/4; background: #1a1a1a; position: relative; overflow: hidden; }
        .video-item img { width: 100%; height: 100%; object-fit: cover; }
        .v-views { position: absolute; bottom: 5px; left: 5px; font-size: 10px; font-weight: bold; text-shadow: 0 1px 3px rgba(0,0,0,0.8); }

        /* --- BARRE DE NAVIGATION BASSE --- */
        .nav-bar { position: fixed; bottom: 0; width: 100%; height: 65px; background: #000; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #1a1a1a; z-index: 1000; }
        .nav-item { text-decoration: none; display: flex; align-items: center; justify-content: center; flex: 1; height: 100%; }
        .nav-icon { width: 26px; height: 26px; fill: #555; }
        .nav-icon.active { fill: white; }
        .nav-plus { background: var(--orange-floy); width: 45px; height: 30px; border-radius: 8px; display: flex; align-items: center; justify-content: center; color: black; font-weight: bold; font-size: 24px; }

        /* --- MENU LATÉRAL (SIDE MENU) --- */
        .menu-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; z-index: 2999; backdrop-filter: blur(4px); }
        .side-menu { position: fixed; top: 0; right: -280px; width: 280px; height: 100%; background: #0D0D0D; border-left: 1px solid #222; z-index: 3000; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .side-menu.active { right: 0; }
        .menu-item { display: flex; align-items: center; gap: 15px; padding: 18px 25px; color: white; text-decoration: none; border-bottom: 1px solid #161616; transition: 0.2s; }
        .menu-item:active { background: #1a1a1a; }

        /* --- POPUP PARTAGE --- */
        .share-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; z-index: 4000; backdrop-filter: blur(5px); }
        .share-popup { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.8); width: 270px; background: #111; border: 1px solid #333; border-radius: 25px; padding: 25px; text-align: center; z-index: 4001; opacity: 0; visibility: hidden; transition: 0.3s; }
        .share-popup.active { opacity: 1; visibility: visible; transform: translate(-50%, -50%) scale(1); }
        .qr-box { background: white; padding: 10px; border-radius: 15px; display: inline-block; margin: 15px 0; }
        .btn-copy { background: var(--orange-floy); color: black; border: none; width: 100%; padding: 12px; border-radius: 12px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body onload="initProfile()">

    <div class="top-bar">
        <svg class="icon-btn share-icon" onclick="openSharePopup()" width="24" height="24" viewBox="0 0 24 24"><path d="M12.5 4v3.5C7.3 8.3 4 12.3 4 17.5c2.4-3.4 5.6-5.1 8.5-5.1V16L20 10l-7.5-6z"/></svg>
        <svg class="icon-btn" onclick="toggleFloyMenu()" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </div>

    <div class="profile-header">
        <div class="profile-pic-container">
            <img src="https://i.pravatar.cc/150?u=Arlein" class="profile-pic">
        </div>
        <div class="name-container">
            <span class="display-name">Arlein</span>
            <svg class="verified-badge" viewBox="0 0 24 24"><path d="M23,12L20.56,9.22L20.9,5.54L17.29,4.72L15.4,1.54L12,3L8.6,1.54L6.71,4.72L3.1,5.53L3.44,9.21L1,12L3.44,14.78L3.1,18.47L6.71,19.29L8.6,22.47L12,21L15.4,22.46L17.29,19.28L20.9,18.46L20.56,14.78L23,12M10,17L6,13L7.41,11.59L10,14.17L16.59,7.58L18,9L10,17Z"/></svg>
        </div>
        <div class="user-handle">@arlein_off</div>

        <div class="stats-row">
            <a href="following.html" class="stat-item">
                <span class="stat-val counter" id="following-val" data-target="124">0</span>
                <span class="stat-lab">Abonnements</span>
            </a>
            <div class="stat-item">
                <span class="stat-val counter" data-target="850">0</span>
                <span class="stat-lab">Abonnés</span>
            </div>
            <div class="stat-item">
                <span class="stat-val counter" data-target="12">0</span>
                <span class="stat-lab">J'aime (M)</span>
            </div>
        </div>

        <div class="btn-row">
            <button class="btn-sec" onclick="window.location.href='edit-profile.html'">Modifier le profil</button>
            <button class="btn-sec" onclick="window.location.href='follower-growth.html'">Analytics</button>
        </div>
    </div>

    <div class="tabs-selector">
        <div class="tab-btn active" onclick="switchTab('posts', this)"><svg viewBox="0 0 24 24"><path d="M3 3h7v7H3V3zm11 0h7v7h-7V3zm-11 11h7v7H3v-7zm11 0h7v7h-7v-7z"/></svg></div>
        <div class="tab-btn" onclick="switchTab('likes', this)"><svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg></div>
    </div>

    <div class="video-grid" id="mainGrid">
        <div class="video-item"><img src="https://picsum.photos/seed/v1/300/400"><div class="v-views">▶ 12.5K</div></div>
        <div class="video-item"><img src="https://picsum.photos/seed/v2/300/400"><div class="v-views">▶ 8.2K</div></div>
        <div class="video-item"><img src="https://picsum.photos/seed/v3/300/400"><div class="v-views">▶ 45K</div></div>
    </div>

    <nav class="nav-bar">
        <a href="index.html" class="nav-item"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg></a>
        <a href="explore.html" class="nav-item"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg></a>
        <a href="upload.html" class="nav-item"><div class="nav-plus">+</div></a>
        <a href="messages.html" class="nav-item"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 14H4V8l8 5 8-5v10z"/></svg></a>
        <a href="profile.html" class="nav-item"><svg class="nav-icon active" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/></svg></a>
    </nav>

    <div id="menuOverlay" class="menu-overlay" onclick="toggleFloyMenu()"></div>
    <div id="sideMenu" class="side-menu">
        <div style="padding: 25px; font-weight: bold; border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items:center;">
            PARAMÈTRES <span onclick="toggleFloyMenu()" style="cursor:pointer; font-size:24px;">✕</span>
        </div>
        <a href="wallet.html" class="menu-item"><span>💳</span> Portefeuille</a>
        <a href="privacy.html" class="menu-item"><span>🔒</span> Confidentialité</a>
        <a href="security.html" class="menu-item"><span>🛡️</span> Sécurité</a>
        <a href="login.html" class="menu-item" style="color:#ff4444; border-top: 1px solid #222;"><span>🚪</span> Déconnexion</a>
    </div>

    <div id="shareOverlay" class="share-overlay" onclick="closeSharePopup()"></div>
    <div id="sharePopup" class="share-popup">
        <div style="color:white; font-weight:bold; margin-bottom:10px;">Partager mon profil</div>
        <div class="qr-box">
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://floy.app/arlein_off" style="width:150px;">
        </div>
        <button class="btn-copy" onclick="copyLink()">🔗 Copier le lien</button>
    </div>

    <script>
        function initProfile() {
            // Charge le compteur d'abonnements réel
            const savedCount = localStorage.getItem('floy_following_count') || "124";
            document.getElementById('following-val').setAttribute('data-target', savedCount);
            animateCounters();
        }

        function animateCounters() {
            document.querySelectorAll('.counter').forEach(c => {
                const target = +c.getAttribute('data-target');
                let cur = 0;
                const update = () => {
                    const speed = Math.ceil(target / 30);
                    if(cur < target) {
                        cur += speed;
                        c.innerText = cur > target ? target : cur;
                        setTimeout(update, 30);
                    } else { c.innerText = target; }
                };
                update();
            });
        }

        function toggleFloyMenu() {
            const menu = document.getElementById('sideMenu');
            const overlay = document.getElementById('menuOverlay');
            menu.classList.toggle('active');
            overlay.style.display = menu.classList.contains('active') ? "block" : "none";
        }

        function openSharePopup() {
            document.getElementById('shareOverlay').style.display = 'block';
            setTimeout(() => document.getElementById('sharePopup').classList.add('active'), 10);
        }

        function closeSharePopup() {
            document.getElementById('sharePopup').classList.remove('active');
            setTimeout(() => document.getElementById('shareOverlay').style.display = 'none', 300);
        }

        function copyLink() {
            navigator.clipboard.writeText("https://floy.app/arlein_off").then(() => {
                const btn = document.querySelector('.btn-copy');
                btn.innerText = "✅ Copié !";
                setTimeout(() => { btn.innerText = "🔗 Copier le lien"; closeSharePopup(); }, 1200);
            });
        }

        function switchTab(t, el) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            // Logique de changement de contenu de la grille si nécessaire
        }
    </script>
</body>
</html>
