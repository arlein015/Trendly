<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Floy - Profil Personnel</title>
    <style>
        :root { --orange: #FF7A1A; --noir: #000; --gris: #121212; --bordure: #262626; }
        body { background: var(--noir); color: white; font-family: -apple-system, BlinkMacSystemFont, sans-serif; margin: 0; padding-bottom: 80px; }

        /* HEADER */
        header { padding: 15px; border-bottom: 1px solid var(--bordure); display: flex; justify-content: center; align-items: center; position: sticky; top: 0; background: black; z-index: 100; }
        .username-top { font-weight: bold; font-size: 17px; }

        /* ZONE PROFIL */
        .profile-container { padding: 20px 15px; }
        .stats-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
        .profile-pic-circle { width: 80px; height: 80px; background: linear-gradient(45deg, #1a1a1a, var(--orange)); border-radius: 50%; padding: 2px; }
        .pic-inner { width: 100%; height: 100%; background: black; border-radius: 50%; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        
        .stats { display: flex; gap: 20px; text-align: center; flex-grow: 1; justify-content: center; }
        .stat-val { display: block; font-weight: bold; font-size: 18px; }
        .stat-label { font-size: 13px; color: #a8a8a8; }

        .bio-section { font-size: 14px; margin-bottom: 20px; }
        .btn-edit { width: 100%; background: #363636; border: none; color: white; padding: 10px; border-radius: 10px; font-weight: 600; cursor: pointer; }

        /* GRILLE DE PHOTOS */
        .tabs { display: flex; border-top: 1px solid var(--bordure); }
        .tab-icon { flex: 1; padding: 15px; text-align: center; color: #a8a8a8; cursor: pointer; border-bottom: 1px solid transparent; }
        .tab-icon.active { color: white; border-bottom: 1px solid white; }

        .photo-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; }
        .grid-img-container { aspect-ratio: 1/1; background: #111; overflow: hidden; }
        .grid-img-container img { width: 100%; height: 100%; object-fit: cover; }

        /* NAV BAR */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 65px; background: black; border-top: 1px solid var(--bordure); display: flex; justify-content: space-around; align-items: center; }
        .nav-item { color: white; opacity: 0.5; }
        .nav-item.active { opacity: 1; color: var(--orange); }
    </style>
</head>
<body>

    <header>
        <span class="username-top">User_Floy</span>
    </header>

    <div class="profile-container">
        <div class="stats-row">
            <div class="profile-pic-circle">
                <div class="pic-inner">
                    <svg width="45" height="45" viewBox="0 0 24 24" fill="#222"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
                </div>
            </div>
            <div class="stats">
                <div><span class="stat-val" id="total-posts">0</span><span class="stat-label">posts</span></div>
                <div><span class="stat-val">0</span><span class="stat-label">abonnés</span></div>
                <div><span class="stat-val">0</span><span class="stat-label">suivis</span></div>
            </div>
        </div>

        <div class="bio-section">
            <div style="font-weight: bold;">Floy Developer</div>
            <div style="color: #ccc;">Code, Design & Coffee ☕</div>
        </div>

        <button class="btn-edit">Modifier le profil</button>
    </div>

    <div class="tabs">
        <div class="tab-icon active">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
        </div>
    </div>

    <div class="photo-grid" id="profile-gallery">
        </div>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item"><svg width="26" height="26" viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg></a>
        <a href="post.html" class="nav-item"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg></a>
        <a href="profil.html" class="nav-item active"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg></a>
    </nav>

    <script type="module">
        import { db } from './firebase-config.js';
        import { collection, query, where, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const gallery = document.getElementById('profile-gallery');
        const totalPosts = document.getElementById('total-posts');

        // Récupérer uniquement les posts de l'utilisateur actuel
        const q = query(collection(db, "posts"), where("username", "==", "User_Floy"));

        onSnapshot(q, (snapshot) => {
            gallery.innerHTML = "";
            totalPosts.innerText = snapshot.size;

            snapshot.forEach((doc) => {
                const data = doc.data();
                const div = document.createElement('div');
                div.className = 'grid-img-container';
                div.innerHTML = `<img src="${data.imageUrl}" alt="post">`;
                gallery.appendChild(div);
            });
        }, (error) => {
            console.error("Erreur Firebase:", error);
        });
    </script>
</body>
</html>
