<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Profil - Floy</title>
    <style>
        :root { --orange: #FF7A1A; --noir: #000; --nav-h: 75px; }
        body { background: var(--noir); color: white; font-family: -apple-system, sans-serif; margin: 0; padding-bottom: 110px; }
        .top-nav { display: flex; justify-content: flex-end; padding: 20px; gap: 20px; }
        .icon-btn { background: none; border: none; color: white; cursor: pointer; }
        .profile-header { text-align: center; }
        .profile-pic-container { position: relative; width: 110px; height: 110px; margin: 0 auto 15px; }
        .profile-pic { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 3px solid var(--orange); }
        .user-info h2 { margin: 5px 0; font-size: 22px; display: flex; align-items: center; justify-content: center; gap: 6px; }
        .badge-orange { color: var(--orange); display: flex; align-items: center; }
        .stats-bar { display: flex; justify-content: space-around; padding: 20px 0; border-top: 1px solid #1a1a1a; border-bottom: 1px solid #1a1a1a; margin-bottom: 20px; }
        .stat-num { display: block; font-size: 18px; font-weight: bold; }
        .stat-label { font-size: 12px; color: #666; }
        .profile-actions { display: flex; flex-direction: column; gap: 10px; padding: 0 20px; }
        .row-actions { display: flex; gap: 10px; }
        .btn { flex: 1; padding: 12px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; text-align: center; text-decoration: none; font-size: 14px; }
        .btn-follow { background: var(--orange); color: black; }
        .btn-msg { background: #222; color: white; }
        .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; height: var(--nav-h); background: rgba(5,5,5,0.98); backdrop-filter: blur(15px); border-top: 1px solid #1a1a1a; display: flex; justify-content: space-evenly; align-items: center; padding-bottom: env(safe-area-inset-bottom); }
        .nav-item { color: #666; text-decoration: none; display: flex; flex-direction: column; align-items: center; flex: 1; }
        .nav-item.active { color: var(--orange); }
        .nav-item svg { width: 24px; height: 24px; }
    </style>
</head>
<body>
    <div class="top-nav">
        <button class="icon-btn" onclick="alert('Lien copié !')">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"></path><polyline points="16 6 12 2 8 6"></polyline><line x1="12" y1="2" x2="12" y2="15"></line></svg>
        </button>
        <button class="icon-btn"><svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg></button>
    </div>
    <div class="profile-header">
        <div class="profile-pic-container"><img id="myAvatar" src="ma_photo.jpg" class="profile-pic" onerror="this.src='https://ui-avatars.com/api/?name=User&background=FF7A1A&color=000'"></div>
        <div class="user-info">
            <h2><span id="displayUsername">Utilisateur</span><span class="badge-orange"><svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10 10-4.5 10-10S17.5 2 12 2zm-1.9 14.7l-3.3-3.3 1.4-1.4 1.9 1.9 5.3-5.3 1.4 1.4-6.7 6.7z"/></svg></span></h2>
            <div class="bio">Bienvenue sur mon profil !</div>
        </div>
    </div>
    <div class="stats-bar">
        <div class="stat-item"><span class="stat-num">12</span><span class="stat-label">Posts</span></div>
        <div class="stat-item"><span class="stat-num">1.2k</span><span class="stat-label">Abonnés</span></div>
        <div class="stat-item"><span class="stat-num">450</span><span class="stat-label">Abonnements</span></div>
    </div>
    <div class="profile-actions">
        <div class="row-actions">
            <button class="btn btn-follow" id="followBtn" onclick="toggleFollow()">Suivre</button>
            <button class="btn btn-msg" onclick="goToChat()">Message</button>
        </div>
    </div>
    <nav class="nav-bar">
        <a href="index.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path></svg></a>
        <a href="explorer.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle></svg></a>
        <a href="story-creator.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"></rect><line x1="12" y1="8" x2="12" y2="16"></line><line x1="8" y1="12" x2="16" y2="12"></line></svg></a>
        <a href="messages.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg></a>
        <a href="profil.html" class="nav-item active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg></a>
    </nav>
    <script>
        function goToChat() {
            const name = document.getElementById('displayUsername').textContent;
            const img = document.getElementById('myAvatar').src;
            const id = "c_" + name.toLowerCase().replace(/\s/g, '');
            let contacts = JSON.parse(localStorage.getItem('floy_contacts') || "[]");
            if (!contacts.find(c => c.id === id)) {
                contacts.push({ id, name, img });
                localStorage.setItem('floy_contacts', JSON.stringify(contacts));
            }
            window.location.href = "chat.html?id=" + id;
        }
        function toggleFollow() {
            const btn = document.getElementById('followBtn');
            btn.textContent = (btn.textContent === "Suivre") ? "Abonné" : "Suivre";
            btn.style.background = (btn.textContent === "Abonné") ? "#1a1a1a" : "var(--orange)";
            btn.style.color = (btn.textContent === "Abonné") ? "white" : "black";
        }
    </script>
</body>
</html>
