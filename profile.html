<!DOCTYPE html>
<html lang="fr">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Profil - Floy</title>
</head>
<body class="profile-page">
    <header class="profile-header">
        <a href="feed.html" class="back-btn">←</a>
        <span class="profile-username">Mon Profil</span>
        <button class="settings-icon">⚙️</button>
    </header>

    <section class="profile-info">
        <div class="profile-avatar"></div>
        <h2 class="user-handle">@createur_floy</h2>
        <div class="stats-row">
            <div class="stat"><strong>128</strong><span>Abonnés</span></div>
            <div class="stat"><strong>256</strong><span>Abonnements</span></div>
            <div class="stat"><strong>1.2k</strong><span>Likes</span></div>
        </div>
        <button class="edit-profile-btn">Modifier le profil</button>
    </section>

    <nav class="profile-tabs">
        <button class="active">Vidéos</button>
        <button>❤️</button>
    </nav>
    <div class="video-grid">
        <div class="video-item"></div>
        <div class="video-item"></div>
        <div class="video-item"></div>
        <div class="video-item"></div>
        <div class="video-item"></div>
        <div class="video-item"></div>
    </div>

    <footer class="bottom-nav">
        <a href="feed.html">🏠</a>
        <a href="upload.html" class="upload-center">+</a>
        <a href="message.html">💬</a>
        <a href="profile.html" class="active-tab">👤</a>
    </footer>
</body>
</html>
