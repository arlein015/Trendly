<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Floy - Profil Officiel</title>
    <style>
        :root { 
            --orange-floy: #FF7A1A; 
            --noir: #000; 
            --gris-sombre: #121212;
            --blanc: #fff;
        }
        
        body, html { margin: 0; padding: 0; background: var(--noir); color: var(--blanc); font-family: 'Segoe UI', sans-serif; }

        /* --- HEADER PROFIL --- */
        .profile-header { padding: 50px 20px 20px; text-align: center; }
        
        .profile-pic-container { position: relative; width: 100px; height: 100px; margin: 0 auto 15px; }
        .profile-pic { width: 100%; height: 100%; border-radius: 50%; border: 2px solid var(--orange-floy); object-fit: cover; padding: 3px; }
        
        /* Badge sur la photo (Style Instagram/TikTok) */
        .verified-badge-photo { 
            position: absolute; bottom: 5px; right: 5px; width: 22px; height: 22px; 
            background: var(--noir); border-radius: 50%; padding: 2px;
        }

        .user-handle { font-size: 20px; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 5px; }

        /* Stats */
        .stats-container { display: flex; justify-content: center; gap: 30px; margin: 20px 0; }
        .stat-item { text-align: center; cursor: pointer; }
        .stat-value { font-weight: bold; font-size: 18px; display: block; }
        .stat-label { color: #888; font-size: 13px; }

        /* Boutons d'action */
        .profile-actions { display: flex; justify-content: center; gap: 8px; margin-bottom: 25px; }
        .btn-profile { 
            background: var(--gris-sombre); border: 1px solid #333; color: white; 
            padding: 8px 25px; border-radius: 6px; font-weight: 600; cursor: pointer; transition: 0.2s;
        }
        .btn-profile:hover { background: #1a1a1a; border-color: var(--orange-floy); }

        /* --- SYSTÈME D'ONGLETS --- */
        .tabs-profile { display: flex; border-top: 1px solid #1a1a1a; position: sticky; top: 0; background: var(--noir); z-index: 10; }
        .tab-p { flex: 1; text-align: center; padding: 15px; cursor: pointer; transition: 0.3s; }
        .tab-p svg { fill: #666; width: 24px; height: 24px; }
        .tab-p.active { border-bottom: 2px solid var(--orange-floy); }
        .tab-p.active svg { fill: var(--blanc); }

        /* --- GRILLE DE VIDÉOS --- */
        .video-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; padding: 2px; }
        .grid-item { position: relative; aspect-ratio: 3/4; background: #111; overflow: hidden; cursor: pointer; }
        .grid-item img { width: 100%; height: 100%; object-fit: cover; transition: 0.3s; }
        .grid-item:hover img { transform: scale(1.05); opacity: 0.7; }
        .view-count { position: absolute; bottom: 8px; left: 8px; font-size: 11px; font-weight: bold; display: flex; align-items: center; gap: 4px; text-shadow: 0 0 4px rgba(0,0,0,0.8); }

        /* --- NAV BAR FIXE --- */
        .nav-bar { position: fixed; bottom: 0; width: 100%; height: 70px; background: var(--noir); display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #1a1a1a; z-index: 100; }
        .nav-icon { width: 28px; height: 28px; fill: #666; cursor: pointer; }
        .nav-icon.active { fill: var(--blanc); }
        .btn-add { background: var(--orange-floy); width: 45px; height: 32px; border-radius: 10px; display: flex; align-items: center; justify-content: center; color: black; font-weight: bold; font-size: 22px; }
    </style>
</head>
<body>

    <div class="profile-header">
        <div class="profile-pic-container">
            <img src="https://i.pravatar.cc/150?u=Arlein" class="profile-pic">
            <svg class="verified-badge-photo" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" fill="#FF7A1A"/><path d="M17 9L11 15L7 11" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
        </div>

        <div class="user-handle">
            @Arlein 
            <svg width="20" height="20" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" fill="#FF7A1A"/><path d="M17 9L11 15L7 11" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
        </div>
        
        <p style="font-size: 14px; color: #888; margin: 10px 40px;">Fondateur de **Floy**. Building the future. 🚀</p>

        <div class="stats-container">
            <div class="stat-item"><span class="stat-value">124</span><span class="stat-label">Abonnements</span></div>
            <div class="stat-item"><span class="stat-value">850K</span><span class="stat-label">Abonnés</span></div>
            <div class="stat-item"><span class="stat-value">12.5M</span><span class="stat-label">J'aime</span></div>
        </div>

        <div class="profile-actions">
            <button class="btn-profile">Modifier</button>
            <button class="btn-profile">Partager</button>
            <button class="btn-profile" style="padding: 8px 12px;">👤+</button>
        </div>
    </div>

    <div class="tabs-profile">
        <div class="tab-p active">
            <svg viewBox="0 0 24 24"><path d="M3 11h8V3H3v8zm2-6h4v4H5V5zm8-2v8h8V3h-8zm6 6h-4V5h4v4zM3 21h8v-8H3v8zm2-6h4v4H5v-4zm8 6h8v-8h-8v8zm2-6h4v4h-4v-4z"/></svg>
        </div>
        <div class="tab-p">
            <svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
        </div>
        <div class="tab-p">
            <svg viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg>
        </div>
    </div>

    <div class="video-grid">
        <div class="grid-item">
            <img src="https://picsum.photos/300/400?random=1">
            <div class="view-count">▶ 1.2M</div>
        </div>
        <div class="grid-item">
            <img src="https://picsum.photos/300/400?random=2">
            <div class="view-count">▶ 450K</div>
        </div>
        <div class="grid-item">
            <img src="https://picsum.photos/300/400?random=3">
            <div class="view-count">▶ 3.1M</div>
        </div>
        <div class="grid-item">
            <img src="https://picsum.photos/300/400?random=4">
            <div class="view-count">▶ 89K</div>
        </div>
    </div>

    <div style="height: 80px;"></div>

    <nav class="nav-bar">
        <svg class="nav-icon" onclick="window.location.href='feed.html'" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
        <svg class="nav-icon" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
        <div class="btn-add">+</div>
        <svg class="nav-icon" viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 14H4V8l8 5 8-5v10zm-8-7L4 6h16l-8 5z"/></svg>
        <svg class="nav-icon active" onclick="window.location.href='profile.html'" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/></svg>
    </nav>

</body>
</html>
