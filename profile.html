<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Floy - Profil Configuré</title>
    <style>
        :root { 
            --orange-floy: #FF7A1A; 
            --noir: #000; 
            --gris-sombre: #121212;
            --blanc: #fff;
        }
        
        body, html { margin: 0; padding: 0; background: var(--noir); color: var(--blanc); font-family: 'Segoe UI', sans-serif; overflow-x: hidden; }

        /* --- TOP BAR (Partager à gauche) --- */
        .top-bar { position: absolute; top: 15px; left: 15px; z-index: 10; cursor: pointer; }
        .svg-small { width: 22px; height: 22px; fill: var(--blanc); }

        /* --- HEADER PROFIL --- */
        .profile-header { padding: 40px 20px 20px; text-align: center; }
        
        .profile-pic-container { position: relative; width: 90px; height: 90px; margin: 0 auto 12px; }
        .profile-pic { width: 100%; height: 100%; border-radius: 50%; border: 2px solid var(--orange-floy); object-fit: cover; padding: 2px; }
        .verified-badge-photo { position: absolute; bottom: 2px; right: 2px; width: 20px; height: 20px; }

        .user-handle { font-size: 19px; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 5px; }

        /* Stats */
        .stats-container { display: flex; justify-content: center; gap: 25px; margin: 15px 0; }
        .stat-item { text-align: center; }
        .stat-value { font-weight: bold; font-size: 17px; display: block; }
        .stat-label { color: #888; font-size: 12px; }

        /* --- BOUTONS D'ACTION (Réorganisés) --- */
        .profile-actions { display: flex; flex-direction: column; gap: 10px; align-items: center; margin-bottom: 20px; }
        .row-actions { display: flex; gap: 8px; width: 90%; justify-content: center; }
        
        .btn-floy { 
            flex: 1; background: var(--gris-sombre); border: 1px solid #333; color: white; 
            padding: 10px; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 14px;
        }
        .btn-follow-main { 
            width: 90%; background: var(--orange-floy); border: none; color: black; 
            padding: 10px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 15px;
        }

        /* --- MODAL MODIFIER (La page qui sort) --- */
        .modal-edit {
            position: fixed; top: 100%; left: 0; width: 100%; height: 100%; 
            background: var(--noir); z-index: 200; transition: 0.4s ease; padding: 20px; box-sizing: border-box;
        }
        .modal-edit.open { top: 0; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }

        /* --- GRILLE & NAV (Reste inchangé pour la cohérence) --- */
        .tabs-profile { display: flex; border-top: 1px solid #1a1a1a; }
        .tab-p { flex: 1; text-align: center; padding: 15px; cursor: pointer; fill: #666; }
        .tab-p.active { border-bottom: 2px solid var(--orange-floy); fill: white; }
        .video-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; }
        .grid-item { aspect-ratio: 3/4; background: #111; }
        
        .nav-bar { position: fixed; bottom: 0; width: 100%; height: 70px; background: #000; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #1a1a1a; }
    </style>
</head>
<body>

    <div class="top-bar" onclick="alert('Lien de profil copié !')">
        <svg class="svg-small" viewBox="0 0 24 24"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92s2.92-1.31 2.92-2.92-1.31-2.92-2.92-2.92z"/></svg>
    </div>

    <div class="profile-header">
        <div class="profile-pic-container">
            <img src="https://i.pravatar.cc/150?u=Arlein" class="profile-pic">
            <svg class="verified-badge-photo" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" fill="#FF7A1A"/><path d="M17 9L11 15L7 11" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
        </div>

        <div class="user-handle">
            @Arlein 
            <svg width="18" height="18" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" fill="#FF7A1A"/><path d="M17 9L11 15L7 11" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
        </div>

        <div class="stats-container">
            <div class="stat-item"><span class="stat-value">124</span><span class="stat-label">Abonnements</span></div>
            <div class="stat-item"><span class="stat-value">850K</span><span class="stat-label">Abonnés</span></div>
            <div class="stat-item"><span class="stat-value">12.5M</span><span class="stat-label">J'aime</span></div>
        </div>

        <div class="profile-actions">
            <button class="btn-follow-main" id="mainFollow" onclick="this.innerText='Abonné'; this.style.background='#333'; this.style.color='white'">Suivre</button>
            
            <div class="row-actions">
                <button class="btn-floy" onclick="toggleModal()">Modifier</button>
                <button class="btn-floy" onclick="alert('Ouverture du Tableau de bord...')">Tableau de bord</button>
            </div>
        </div>
    </div>

    <div class="tabs-profile">
        <div class="tab-p active"><svg width="24" height="24" viewBox="0 0 24 24"><path d="M3 11h8V3H3v8zm2-6h4v4H5V5zm8-2v8h8V3h-8zm6 6h-4V5h4v4zM3 21h8v-8H3v8zm2-6h4v4H5v-4zm8 6h8v-8h-8v8zm2-6h4v4h-4v-4z"/></svg></div>
        <div class="tab-p"><svg width="24" height="24" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg></div>
    </div>
    <div class="video-grid">
        <div class="grid-item"></div><div class="grid-item"></div><div class="grid-item"></div>
    </div>

    <div class="modal-edit" id="editModal">
        <div class="modal-header">
            <span onclick="toggleModal()" style="cursor:pointer">Annuler</span>
            <span style="font-weight:bold">Modifier le profil</span>
            <span onclick="toggleModal()" style="color:var(--orange-floy); font-weight:bold; cursor:pointer">Enregistrer</span>
        </div>
        <div style="text-align:center; margin-top:20px;">
            <div style="position:relative; display:inline-block">
                <img src="https://i.pravatar.cc/150?u=Arlein" style="width:80px; border-radius:50%; opacity:0.6;">
                <span style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); font-size:12px;">📷</span>
            </div>
            <p style="font-size:13px; color:var(--orange-floy)">Modifier la photo</p>
        </div>
        <div style="margin-top:30px;">
            <div style="border-bottom:1px solid #222; padding:15px 0; display:flex; justify-content:space-between;">
                <span>Nom</span> <span style="color:#888">Arlein</span>
            </div>
            <div style="border-bottom:1px solid #222; padding:15px 0; display:flex; justify-content:space-between;">
                <span>Nom d'utilisateur</span> <span style="color:#888">@arlein_off</span>
            </div>
            <div style="border-bottom:1px solid #222; padding:15px 0; display:flex; justify-content:space-between;">
                <span>Bio</span> <span style="color:#888">Ajouter une bio...</span>
            </div>
        </div>
    </div>

    <nav class="nav-bar">
        <svg class="nav-icon" onclick="window.location.href='feed.html'" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
        <svg class="nav-icon" onclick="window.location.href='explore.html'" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
        <div style="background:var(--orange-floy); width:45px; height:32px; border-radius:10px; display:flex; align-items:center; justify-content:center; color:black; font-weight:bold; cursor:pointer;" onclick="window.location.href='upload.html'">+</div>
        <svg class="nav-icon" onclick="window.location.href='messages.html'" viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 14H4V8l8 5 8-5v10zm-8-7L4 6h16l-8 5z"/></svg>
        <svg class="nav-icon active" onclick="window.location.href='profile.html'" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/></svg>
    </nav>

    <script>
        function toggleModal() {
            document.getElementById('editModal').classList.toggle('open');
        }
    </script>
</body>
</html>
