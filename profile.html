<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Floy - Profil Master</title>
    <style>
        :root { --orange-floy: #FF7A1A; --noir: #000; --gris: #121212; --blanc: #fff; }
        body, html { margin: 0; padding: 0; background: var(--noir); color: var(--blanc); font-family: 'Segoe UI', sans-serif; overflow-x: hidden; }

        /* --- TOP BAR --- */
        .top-bar { position: absolute; top: 15px; right: 15px; z-index: 10; cursor: pointer; }

        /* --- HEADER --- */
        .profile-header { padding: 40px 20px 20px; text-align: center; }
        .profile-pic-container { position: relative; width: 100px; height: 100px; margin: 0 auto 12px; cursor: pointer; }
        .profile-pic { width: 100%; height: 100%; border-radius: 50%; border: 2px solid var(--orange-floy); object-fit: cover; }
        .verified-badge { position: absolute; bottom: 5px; right: 5px; width: 22px; height: 22px; }

        .display-name { font-size: 22px; font-weight: bold; margin-bottom: 2px; }
        .user-handle { font-size: 16px; color: #888; display: flex; align-items: center; justify-content: center; gap: 5px; margin-bottom: 15px; }

        .stats-row { display: flex; justify-content: center; gap: 25px; margin-bottom: 20px; }
        .stat-item { text-align: center; }
        .stat-val { font-weight: bold; font-size: 18px; display: block; }
        .stat-lab { color: #888; font-size: 12px; }

        /* --- BOUTONS --- */
        .btn-main { width: 90%; background: var(--orange-floy); border: none; color: #000; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; margin-bottom: 10px; }
        .btn-row { display: flex; gap: 10px; width: 90%; margin: 0 auto; }
        .btn-sec { flex: 1; background: var(--gris); border: 1px solid #333; color: #fff; padding: 10px; border-radius: 8px; font-weight: 600; cursor: pointer; }

        /* --- MODALS (Pages Coulissantes) --- */
        .modal { position: fixed; top: 100%; left: 0; width: 100%; height: 100%; background: var(--noir); z-index: 500; transition: 0.4s cubic-bezier(0.17, 0.84, 0.44, 1); padding: 20px; box-sizing: border-box; }
        .modal.open { top: 0; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 1px solid #222; padding-bottom: 15px; }
        
        .input-group { margin-bottom: 20px; border-bottom: 1px solid #222; padding-bottom: 10px; }
        .input-group label { display: block; color: #555; font-size: 12px; margin-bottom: 5px; }
        .input-group input { background: transparent; border: none; color: white; width: 100%; font-size: 16px; outline: none; }

        /* --- TABLEAU DE BORD STATS --- */
        .stat-card { background: var(--gris); padding: 20px; border-radius: 15px; margin-bottom: 15px; border-left: 4px solid var(--orange-floy); }

        /* --- NAV BAR --- */
        .nav-bar { position: fixed; bottom: 0; width: 100%; height: 70px; background: #000; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #1a1a1a; }
        .btn-plus-large { background: var(--orange-floy); width: 60px; height: 40px; border-radius: 12px; display: flex; align-items: center; justify-content: center; color: black; font-weight: bold; font-size: 26px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="top-bar" onclick="alert('Lien copié !')">
        <svg width="24" height="24" fill="white" viewBox="0 0 24 24"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92s2.92-1.31 2.92-2.92-1.31-2.92-2.92-2.92z"/></svg>
    </div>

    <div class="profile-header">
        <div class="profile-pic-container" onclick="openModal('editModal')">
            <img src="https://i.pravatar.cc/150?u=Arlein" class="profile-pic" id="profileImg">
            <svg class="verified-badge" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" fill="#FF7A1A"/><path d="M17 9L11 15L7 11" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
        </div>

        <div class="display-name" id="profName">Arlein</div>
        <div class="user-handle">
            <span id="profUser">@arlein_off</span>
            <svg width="16" height="16" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" fill="#FF7A1A"/><path d="M17 9L11 15L7 11" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
        </div>

        <div class="stats-row">
            <div class="stat-item"><span class="stat-val">124</span><span class="stat-lab">Abonnements</span></div>
            <div class="stat-item"><span class="stat-val">850K</span><span class="stat-lab">Abonnés</span></div>
            <div class="stat-item"><span class="stat-val">12M</span><span class="stat-lab">J'aime</span></div>
        </div>

        <button class="btn-main" onclick="this.innerText='Abonné'">Suivre</button>
        <div class="btn-row">
            <button class="btn-sec" onclick="openModal('editModal')">Modifier</button>
            <button class="btn-sec" onclick="openModal('statsModal')">Tableau de bord</button>
        </div>
    </div>

    <div class="modal" id="editModal">
        <div class="modal-header">
            <span onclick="closeModal('editModal')">Annuler</span>
            <span style="font-weight:bold">Modifier le profil</span>
            <span style="color:var(--orange-floy); font-weight:bold" onclick="saveProfile()">Enregistrer</span>
        </div>
        <div style="text-align:center; margin-bottom:30px;">
            <img src="https://i.pravatar.cc/150?u=Arlein" id="editPreview" style="width:80px; height:80px; border-radius:50%; border:2px solid var(--orange-floy);">
            <p style="color:var(--orange-floy); font-size:14px; cursor:pointer">Changer la photo</p>
        </div>
        <div class="input-group"><label>Nom</label><input type="text" id="inName" value="Arlein"></div>
        <div class="input-group"><label>Nom d'utilisateur</label><input type="text" id="inUser" value="@arlein_off"></div>
        <div class="input-group"><label>Lien / Website</label><input type="text" id="inLink" placeholder="https://floy.app/arlein"></div>
    </div>

    <div class="modal" id="statsModal">
        <div class="modal-header">
            <span onclick="closeModal('statsModal')">Fermer</span>
            <span style="font-weight:bold">Statistiques Floy</span>
            <span style="opacity:0">.</span>
        </div>
        <div class="stat-card"><h3>Vues totales</h3><p style="font-size:24px; color:var(--orange-floy)">1,245,600</p></div>
        <div class="stat-card"><h3>Nouveaux abonnés</h3><p style="font-size:24px;">+12,400 <small style="color:green; font-size:12px;">(7 jours)</small></p></div>
        <div class="stat-card"><h3>Engagement</h3><p style="font-size:24px;">8.5%</p></div>
    </div>

    <nav class="nav-bar">
        <svg width="28" height="28" fill="#666" onclick="window.location.href='feed.html'"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
        <svg width="28" height="28" fill="#666"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
        <div class="btn-plus-large" onclick="window.location.href='upload.html'">+</div>
        <svg width="28" height="28" fill="#666"><path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 14H4V8l8 5 8-5v10zm-8-7L4 6h16l-8 5z"/></svg>
        <svg width="28" height="28" fill="white" onclick="window.location.href='profile.html'"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/></svg>
    </nav>

    <script>
        function openModal(id) { document.getElementById(id).classList.add('open'); }
        function closeModal(id) { document.getElementById(id).classList.remove('open'); }

        function saveProfile() {
            document.getElementById('profName').innerText = document.getElementById('inName').value;
            document.getElementById('profUser').innerText = document.getElementById('inUser').value;
            closeModal('editModal');
            alert('Profil mis à jour !');
        }
    </script>
</body>
</html>
