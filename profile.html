<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Floy - Profil</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            margin: 0;
            background: linear-gradient(135deg, #ff8c00 0%, #3a01cc 100%) !important;
            background-attachment: fixed;
            font-family: 'Poppins', sans-serif; color: white;
            padding-bottom: 80px;
        }

        /* En-tête mélange noir */
        .header {
            padding: 20px; background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(15px); display: flex; justify-content: space-between;
        }

        /* Cartes de stats sombres */
        .stat-card-dark {
            background: rgba(0, 0, 0, 0.5); /* Noir dominant */
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 15px; border-radius: 20px; text-align: center; flex: 1;
        }

        .btn-wallet {
            background: #ff8c00; color: white; border: none;
            padding: 14px 30px; border-radius: 15px; font-weight: 700;
            margin: 20px auto; display: flex; align-items: center; gap: 10px;
        }

        /* Grille de vidéos sombre */
        .video-grid {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 3px;
            background: rgba(0, 0, 0, 0.3); padding: 3px;
        }
        .video-item { aspect-ratio: 9/13; background: rgba(0, 0, 0, 0.2); }

        /* Navigation basse noire */
        .nav-dark {
            position: fixed; bottom: 0; width: 100%; height: 70px;
            background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(20px);
            display: flex; justify-content: space-around; align-items: center;
        }
    </style>
</head>
<body>
    <div class="header">
        <i class="fas fa-bars"></i>
        <span style="font-weight: 700;">@bouta</span>
        <i class="fas fa-cog" onclick="window.location.href='settings.html'"></i>
    </div>

    <div style="text-align: center; padding: 30px;">
        <img src="logo.png" style="width: 100px; height: 100px; border-radius: 50%; border: 3px solid rgba(255,255,255,0.1);">
        <h2 style="margin: 15px 0 5px;">Bouta <i class="fas fa-check-circle" style="color: #00e5ff;"></i></h2>
        
        <div style="display: flex; gap: 10px; margin-top: 25px;">
            <div class="stat-card-dark"><strong>45k</strong><br><small>Abonnés</small></div>
            <div class="stat-card-dark"><strong>1.2M</strong><br><small>Likes</small></div>
        </div>

        <button class="btn-wallet" onclick="window.location.href='wallet.html'">
            <i class="fas fa-wallet"></i> Mon Portefeuille
        </button>
    </div>

    <div class="video-grid">
        <div class="video-item"></div>
        <div class="video-item"></div>
        <div class="video-item"></div>
    </div>

    <nav class="nav-dark">
        <i class="fas fa-home" style="opacity: 0.5;"></i>
        <i class="fas fa-search" style="opacity: 0.5;"></i>
        <i class="fas fa-plus-square" style="font-size: 24px;"></i>
        <i class="fas fa-heart" style="opacity: 0.5;"></i>
        <i class="fas fa-user"></i>
    </nav>
</body>
</html>
