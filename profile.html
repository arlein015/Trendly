<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Floy - Profil</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="icon" type="image/png" href="logo.png">

    <style>
        :root {
            --floy-gradient: linear-gradient(135deg, #3a55d1 0%, #a456f0 100%);
            --floy-orange: #ff5e3a;
            --floy-cyan: #00e5ff;
        }

        body { 
            margin: 0; background: var(--floy-gradient); background-attachment: fixed;
            color: white; font-family: 'Poppins', sans-serif; padding-bottom: 80px;
        }

        .header {
            padding: 20px; display: flex; justify-content: space-between; align-items: center;
            background: rgba(0,0,0,0.1); backdrop-filter: blur(10px);
        }

        .profile-top { text-align: center; padding: 30px 20px; }
        
        .avatar {
            width: 100px; height: 100px; border-radius: 50%;
            border: 3px solid white; margin-bottom: 15px;
            box-shadow: 0 0 15px rgba(255,255,255,0.2);
        }

        .username { font-size: 20px; font-weight: 700; display: flex; align-items: center; justify-content: center; }
        .badge-verified { color: var(--floy-cyan); margin-left: 6px; font-size: 16px; }

        /* Grille de stats brillante */
        .stats-grid {
            display: flex; justify-content: center; gap: 20px; margin: 25px 0;
        }
        .stat-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 15px; border-radius: 15px; min-width: 80px;
        }

        .btn-wallet {
            background: var(--floy-orange); color: white; border: none;
            padding: 12px 25px; border-radius: 12px; font-weight: 700;
            cursor: pointer; display: flex; align-items: center; gap: 8px; margin: 0 auto;
        }

        .video-grid {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; margin-top: 30px;
        }
        .video-item { aspect-ratio: 9/12; background: rgba(0,0,0,0.2); border: 0.5px solid rgba(255,255,255,0.05); }

        .bottom-nav { 
            position: fixed; bottom: 0; width: 100%; height: 70px; 
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            display: flex; justify-content: space-around; align-items: center;
        }
        .nav-icon { color: rgba(255,255,255,0.4); font-size: 22px; }
        .nav-icon.active { color: white; }
    </style>
</head>
<body>

    <div class="header">
        <i class="fas fa-chart-bar" onclick="window.location.href='analytics.html'"></i>
        <span style="font-weight: 700;">Profil</span>
        <i class="fas fa-cog" onclick="window.location.href='settings.html'"></i>
    </div>

    <div class="profile-top">
        <img src="logo.png" class="avatar">
        <div class="username">@bouta <i class="fas fa-check-circle badge-verified"></i></div>
        
        <div class="stats-grid">
            <div class="stat-card"><strong>12</strong><br><small>Posts</small></div>
            <div class="stat-card"><strong>45k</strong><br><small>Abonnés</small></div>
            <div class="stat-card"><strong>2.4M</strong><br><small>Likes</small></div>
        </div>

        <button class="btn-wallet" onclick="window.location.href='wallet.html'">
            <i class="fas fa-wallet"></i> Portefeuille
        </button>
    </div>

    <div class="video-grid">
        <div class="video-item"></div>
        <div class="video-item"></div>
        <div class="video-item"></div>
        <div class="video-item"></div>
        <div class="video-item"></div>
        <div class="video-item"></div>
    </div>

    <nav class="bottom-nav">
        <i class="fas fa-home nav-icon" onclick="window.location.href='feed.html'"></i>
        <i class="fas fa-search nav-icon" onclick="window.location.href='explore.html'"></i>
        <i class="fas fa-plus-square nav-icon" onclick="window.location.href='upload.html'"></i>
        <i class="fas fa-bell nav-icon" onclick="window.location.href='norifications.html'"></i>
        <i class="fas fa-user nav-icon active"></i>
    </nav>

</body>
</html>
