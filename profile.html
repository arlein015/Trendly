<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Floy - Profil Officiel</title>
    <style>
        :root { --orange-floy: #FF7A1A; --noir: #000; --gris: #121212; }
        body { background: var(--noir); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 100px; }

        /* BARRE DE MENU HAUTE */
        .nav-top {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 20px; position: sticky; top: 0; background: var(--noir); z-index: 100;
        }
        .nav-right-icons { display: flex; gap: 18px; align-items: center; }

        /* BADGE VERIFIE */
        .badge-v { width: 16px; height: 16px; fill: #0095f6; margin-left: 5px; vertical-align: middle; }

        /* HEADER PROFIL */
        .profile-header { text-align: center; padding: 10px 0; }
        .avatar { width: 90px; height: 90px; border-radius: 50%; border: 2px solid var(--orange-floy); padding: 3px; }

        /* COMPTEURS */
        .stats-bar { display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #1a1a1a; border-bottom: 1px solid #1a1a1a; }
        .stat-item { text-align: center; flex: 1; }
        .stat-num { font-weight: 800; font-size: 17px; display: block; }
        .stat-label { font-size: 10px; color: #555; text-transform: uppercase; }

        /* BOUTONS */
        .btn-container { display: flex; gap: 8px; padding: 15px 20px; }
        .btn-edit { flex: 1; background: #1a1a1a; color: white; border: 1px solid #333; padding: 10px; border-radius: 8px; font-weight: bold; font-size: 12px; cursor: pointer; }
        .btn-main { flex: 2; background: var(--orange-floy); color: black; border: none; padding: 10px; border-radius: 8px; font-weight: bold; font-size: 12px; cursor: pointer; }

        /* GRILLE PHOTOS */
        .photo-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; margin-top: 10px; }
        .photo-item { aspect-ratio: 1/1; background-color: #111; background-size: cover; background-position: center; }

        /* MODAL PARTAGE */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; align-items: center; justify-content: center; }
        .modal-content { background: #121212; width: 80%; padding: 25px; border-radius: 20px; text-align: center; border: 1px solid #222; }
    </style>
</head>
<body>

    <div class="nav-top">
        <div style="font-weight: 800; font-size: 16px;">floy.app</div>
        <div class="nav-right-icons">
            <svg onclick="openShare()" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="cursor:pointer;"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"></path><polyline points="16 6 12 2 8 6"></polyline><line x1="12" y1="2" x2="12" y2="15"></line></svg>
            <svg width="24" height="24" viewBox="0 0 24 24" fill="white" style="cursor:pointer;"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
        </div>
    </div>

    <div class="profile-header">
        <img src="https://via.placeholder.com/150" class="avatar">
        <div style="font-weight: 800; font-size: 19px; margin-top: 10px;">
            <span id="p-name">Chargement...</span>
            <svg class="badge-v" viewBox="0 0 24 24"><path d="M23,12L20.56,9.22L20.9,5.54L17.29,4.72L15.4,1.54L12,3L8.6,1.54L6.71,4.72L3.1,5.53L3.44,9.21L1,12L3.44,14.78L3.1,18.47L6.71,19.29L8.6,22.47L12,21L15.4,22.46L17.29,19.28L20.9,18.46L20.56,14.78L23,12M10,17L6,13L7.41,11.59L10,14.17L16.59,7.58L18,9L10,17Z"/></svg>
        </div>
        <div id="p-bio" style="font-size: 13px; color: #888; margin-top: 5px;">Bio en attente...</div>
    </div>

    <div class="stats-bar">
        <div class="stat-item"><span class="stat-num" id="s-followers">0</span><span class="stat-label">Abonnés</span></div>
        <div class="stat-item"><span class="stat-num" id="s-following">0</span><span class="stat-label">Suivis</span></div>
        <div class="stat-item"><span class="stat-num" id="s-likes">0</span><span class="stat-label">J'aime</span></div>
    </div>

    <div class="btn-container">
        <button class="btn-edit" onclick="window.location.href='settings.html'">MODIFIER</button>
        <button class="btn-main" id="btn-f" onclick="doFollow()">S'ABONNER</button>
        <button class="btn-edit" onclick="window.location.href='withdraw-funds.html'" style="flex:0;">💰</button>
    </div>

    <div class="photo-grid">
        <div class="photo-item" style="background-image:url('https://picsum.photos/300?sig=10')"></div>
        <div class="photo-item" style="background-image:url('https://picsum.photos/300?sig=11')"></div>
        <div class="photo-item" style="background-image:url('https://picsum.photos/300?sig=12')"></div>
    </div>

    <div id="shareModal" class="modal">
        <div class="modal-content">
            <h2 style="margin:0;">Partager</h2>
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=floy" style="margin:15px; border-radius:10px;">
            <button onclick="closeShare()" style="background:none; border:none; color:white; font-weight:bold; cursor:pointer; width:100%;">FERMER</button>
        </div>
    </div>

    <script src="navbar.js"></script>

    <script>
        // Logique de chargement des données
        window.onload = function() {
            if(!localStorage.getItem('f_name')) {
                localStorage.setItem('f_name', 'Utilisateur Floy');
                localStorage.setItem('f_bio', 'Passionné de Python 🐍');
                localStorage.setItem('f_followers', '0');
            }
            loadData();
        };

        function loadData() {
            document.getElementById('p-name').innerText = localStorage.getItem('f_name');
            document.getElementById('p-bio').innerText = localStorage.getItem('f_bio');
            document.getElementById('s-followers').innerText = localStorage.getItem('f_followers');
            document.getElementById('s-following').innerText = localStorage.getItem('f_following') || "0";
            document.getElementById('s-likes').innerText = localStorage.getItem('f_likes') || "0";
        }

        function doFollow() {
            let count = parseInt(localStorage.getItem('f_followers'));
            count++;
            localStorage.setItem('f_followers', count);
            loadData();
        }

        function openShare() { document.getElementById('shareModal').style.display = 'flex'; }
        function closeShare() { document.getElementById('shareModal').style.display = 'none'; }
    </script>
</body>
</html>
