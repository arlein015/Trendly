<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Floy - Nouvelle publication</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --orange: #FF7A1A; --bleu-insta: #0095f6; --noir: #000; --gris-fonce: #121212; }
        body { background: var(--noir); color: white; font-family: -apple-system, sans-serif; margin: 0; padding-top: 60px; overflow: hidden; height: 100vh; }

        /* HEADER */
        .header { position: fixed; top: 0; width: 100%; height: 60px; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; background: var(--noir); z-index: 1000; box-sizing: border-box; }
        .btn-next { color: var(--bleu-insta); font-weight: bold; background: none; border: none; font-size: 16px; cursor: pointer; display: none; }
        .btn-share { color: var(--bleu-insta); font-weight: bold; background: none; border: none; font-size: 16px; cursor: pointer; display: none; }

        /* ZONE D'AFFICHAGE PRINCIPALE */
        #gallery-view { display: flex; flex-direction: column; height: calc(100vh - 130px); }
        
        /* Grande Preview en haut */
        .main-preview { width: 100%; aspect-ratio: 1/1; background: #050505; display: flex; align-items: center; justify-content: center; overflow: hidden; border-bottom: 1px solid #222; }
        #preview-img { width: 100%; height: 100%; object-fit: cover; display: none; }

        /* Grille type Galerie */
        .gallery-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 2px; padding: 2px; overflow-y: auto; flex-grow: 1; background: #000; }
        .grid-item { aspect-ratio: 1/1; background: var(--gris-fonce); display: flex; align-items: center; justify-content: center; cursor: pointer; position: relative; }
        .grid-item i { font-size: 24px; color: #444; }

        /* PAGE DE CONFIGURATION (LÉGENDE) - CACHÉE PAR DÉFAUT */
        #config-view { display: none; padding: 20px; }
        .config-header { display: flex; gap: 15px; align-items: flex-start; }
        .mini-preview { width: 80px; height: 80px; border-radius: 8px; object-fit: cover; }
        textarea { flex-grow: 1; background: transparent; border: none; color: white; font-family: inherit; font-size: 16px; outline: none; resize: none; padding-top: 5px; }

        /* MENU BAS BRILLANT */
        .creation-nav { position: fixed; bottom: 0; width: 100%; height: 70px; background: rgba(10,10,10,0.95); display: flex; justify-content: center; align-items: center; gap: 30px; border-top: 1px solid #222; }
        .nav-item { font-size: 12px; font-weight: bold; color: #555; text-transform: uppercase; cursor: pointer; transition: 0.3s; opacity: 0.5; }
        .nav-item.active { color: #ffffff; opacity: 1; text-shadow: 0 0 10px white; }

        .loader { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 5000; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div class="loader" id="loader"><div class="spinner"></div><p>Partage en cours...</p></div>

    <div class="header" id="header-main">
        <i class="fas fa-times" onclick="location.href='index.html'" style="font-size: 22px;"></i>
        <b id="header-title">Nouvelle publication</b>
        <button class="btn-next" id="btn-next" onclick="window.showConfig()">Suivant</button>
        <button class="btn-share" id="btn-share" onclick="window.uploadFinal()">Partager</button>
    </div>

    <div id="gallery-view">
        <div class="main-preview" onclick="document.getElementById('file-input').click()">
            <div id="empty-msg"><i class="fas fa-camera" style="font-size: 30px; color: #333;"></i></div>
            <img id="preview-img">
        </div>
        
        <div style="padding: 12px; font-weight: bold; font-size: 15px; background: #000; display:flex; justify-content:space-between;">
            <span>Récent <i class="fas fa-chevron-down" style="font-size: 12px; margin-left: 5px;"></i></span>
            <span style="color: var(--bleu-insta); font-size: 13px;">SÉLECTIONNER <i class="far fa-copy"></i></span>
        </div>

        <div class="gallery-grid">
            <div class="grid-item" onclick="document.getElementById('file-input').click()"><i class="fas fa-plus"></i></div>
            <div class="grid-item"></div><div class="grid-item"></div><div class="grid-item"></div>
            <div class="grid-item"></div><div class="grid-item"></div><div class="grid-item"></div>
            <div class="grid-item"></div><div class="grid-item"></div><div class="grid-item"></div>
        </div>
    </div>

    <div id="config-view">
        <div class="config-header">
            <img id="mini-preview-img" class="mini-preview">
            <textarea id="caption" placeholder="Écrire une légende..."></textarea>
        </div>
        <hr style="border: 0; border-top: 1px solid #222; margin: 20px 0;">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <span>Identifier des personnes</span>
            <i class="fas fa-chevron-right" style="color:#555"></i>
        </div>
    </div>

    <input type="file" id="file-input" accept="image/*" style="display:none" onchange="window.handleFile()">

    <nav class="creation-nav" id="bottom-nav">
        <div class="nav-item active">PUBLIER</div>
        <div class="nav-item" onclick="location.href='story-creator.html'">STORY</div>
        <div class="nav-item" onclick="location.href='reel-creator.html'">REEL</div>
        <div class="nav-item">EN DIRECT</div>
    </nav>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { collection, addDoc, serverTimestamp, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        let selectedFile = null;

        // 1. Gérer la sélection du fichier
        window.handleFile = () => {
            const file = document.getElementById('file-input').files[0];
            if(file) {
                selectedFile = file;
                const url = URL.createObjectURL(file);
                document.getElementById('preview-img').src = url;
                document.getElementById('preview-img').style.display = 'block';
                document.getElementById('empty-msg').style.display = 'none';
                document.getElementById('btn-next').style.display = 'block'; // Affiche "Suivant"
            }
        };

        // 2. Passer à la page de configuration (Suivant)
        window.showConfig = () => {
            document.getElementById('gallery-view').style.display = 'none';
            document.getElementById('bottom-nav').style.display = 'none';
            document.getElementById('config-view').style.display = 'block';
            
            document.getElementById('btn-next').style.display = 'none';
            document.getElementById('btn-share').style.display = 'block'; // Affiche "Partager"
            document.getElementById('header-title').innerText = "Nouvelle publication";
            
            // Met l'image dans la petite preview à côté du texte
            document.getElementById('mini-preview-img').src = URL.createObjectURL(selectedFile);
        };

        // 3. Upload final vers Cloudinary et Firebase
        window.uploadFinal = async () => {
            document.getElementById('loader').style.display = 'flex';
            
            try {
                // Ici tu ajoutes ton code Cloudinary comme vu précédemment
                // ...
                alert("Post prêt à être envoyé !");
                location.href = 'index.html';
            } catch (e) {
                document.getElementById('loader').style.display = 'none';
            }
        };
    </script>
</body>
</html>
