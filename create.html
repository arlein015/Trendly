<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Floy - Création de Contenu</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --orange: #FF7A1A; --noir: #000; --gris: #121212; --bordure: #222; }
        body { background: var(--noir); color: white; font-family: -apple-system, sans-serif; margin: 0; padding-bottom: 90px; }

        /* HEADER NAV (Barre du haut) */
        .header-creation { position: fixed; top: 0; width: 100%; height: 60px; background: var(--noir); display: flex; align-items: center; justify-content: space-between; padding: 0 15px; z-index: 1000; box-sizing: border-box; }
        .btn-prev { color: white; cursor: pointer; border: none; background: none; font-size: 16px; }
        .btn-prev:disabled { color: #555; }
        .btn-valider { color: var(--orange); font-weight: bold; cursor: pointer; border: none; background: none; font-size: 16px; font-family: inherit; }

        /* GRILLE DE SÉLECTION (Le Detail) */
        .selection-grid { margin-top: 65px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; padding: 1px; }
        .grid-item { aspect-ratio: 1/1; background: #080808; display: flex; align-items: center; justify-content: center; position: relative; cursor: pointer; border-radius: 4px; overflow: hidden;}
        #preview-img { width: 100%; height: 100%; object-fit: cover; display: none; }
        .upload-icon { text-align: center; color: #555; font-size: 14px;}
        .upload-icon i { font-size: 32px; margin-bottom: 10px;}

        /* ZONE D'UPLOAD CACHÉE */
        .upload-area { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; opacity: 0; }

        /* CAPTION & DÉTAILS */
        .details-box { display: none; padding: 20px; }
        textarea { width: 100%; background: #0a0a0a; border: none; color: white; font-size: 16px; resize: none; outline: none; padding: 15px; border-radius: 12px; border: 1px solid var(--bordure); font-family: inherit; margin-bottom: 15px; }

        /* MENU SÉLECTEUR BAS (Publier, Story, Reel, Direct) */
        .creation-nav { position: fixed; bottom: 0; width: 100%; height: 80px; background: rgba(0,0,0,0.9); display: flex; justify-content: space-around; align-items: center; padding-bottom: env(safe-area-inset-bottom); border-top: 1px solid var(--bordure); }
        .nav-create-item { font-size: 14px; font-weight: bold; color: #555; cursor: pointer; text-transform: uppercase; transition: 0.2s; letter-spacing: 0.5px; }
        .nav-create-item.active { color: white; }

        /* LOADER */
        .loader { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; flex-direction: column; align-items: center; justify-content: center; }
        .spinner { width: 30px; height: 30px; border: 3px solid #f3f3f3; border-top: 3px solid var(--orange); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="loader" id="loader">
        <div class="spinner"></div>
        <p style="margin-top: 15px; font-size: 14px;">Envoi vers Floy...</p>
    </div>

    <div class="header-creation">
        <i class="fas fa-times" onclick="location.href='index.html'" style="font-size: 18px; cursor: pointer; color: white;"></i>
        <b style="color:white">Nouveau contenu</b>
        <button class="btn-prev" id="btn-back" onclick="window.creationPrev()" style="display:none">Précédent</button>
        <button class="btn-valider" id="btn-action" onclick="window.creationAction()">Suivant</button>
    </div>

    <div class="creation-step" id="step-select">
        <div class="selection-grid">
            <div class="grid-item" id="upload-box" onclick="document.getElementById('file-input').click()">
                <div class="upload-icon" id="placeholder">
                    <i class="fas fa-camera"></i>
                    <p style="margin-top:5px; margin-bottom: 0px">Ouvrir</p>
                </div>
                <img id="preview-img">
            </div>
            
            <div class="grid-item"></div>
            <div class="grid-item"></div>
            <div class="grid-item"></div>
            <div class="grid-item"></div>
            <div class="grid-item"></div>
        </div>
        
        <p style="text-align:center; color:#555; font-size:14px; margin-top:30px;">Aucune photo récente...</p>
        <input type="file" id="file-input" accept="image/*" style="display: none;" onchange="window.previewFile()">
    </div>

    <div class="creation-step" id="step-details" style="display:none">
        <div class="details-box" id="details-view" style="display: block;">
            <textarea id="caption" rows="5" placeholder="Écris une légende ou ajoute un lieu..."></textarea>
        </div>
    </div>

    <nav class="creation-nav">
        <div class="nav-create-item active" onclick="window.selectType('post')">Publier</div>
        <div class="nav-create-item" onclick="window.selectType('story')">Story</div>
        <div class="nav-create-item" onclick="window.selectType('reel')">Reel</div>
        <div class="nav-create-item" onclick="window.selectType('live')">En Direct</div>
    </nav>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { collection, addDoc, serverTimestamp, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        let currentUser = null;
        let selectedFile = null;
        let creationMode = 'select'; // select ou details
        let contentType = 'post';

        // 🛡️ VERIFICATION CONNEXION
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const userDoc = await getDoc(doc(db, "users", user.uid));
                currentUser = { uid: user.uid, ...userDoc.data() };
            } else { location.href = "login.html"; }
        });

        // 🖼️ PRÉVISUALISATION DE LA PHOTO
        window.previewFile = () => {
            const file = document.getElementById('file-input').files[0];
            if (file) {
                selectedFile = file;
                const reader = new FileReader();
                reader.onload = (e) => {
                    document.getElementById('preview-img').src = e.target.result;
                    document.getElementById('preview-img').style.display = 'block';
                    document.getElementById('placeholder').style.display = 'none';
                    // Activer le bouton "Suivant"
                    document.getElementById('btn-action').disabled = false;
                    document.getElementById('btn-action').style.color = "var(--orange)";
                };
                reader.readAsDataURL(file);
            }
        };

        // 🔄 GESTION DU BOUTON SUIVANT/PARTAGER
        window.creationAction = () => {
            if (creationMode === 'select' && selectedFile) {
                // Passage à l'étape des détails
                creationMode = 'details';
                document.getElementById('step-select').style.display = 'none';
                document.getElementById('step-details').style.display = 'block';
                document.getElementById('btn-back').style.display = 'inline-block';
                document.getElementById('btn-action').innerText = "Partager";
            } else if (creationMode === 'details') {
                // Lancer la publication
                if(contentType === 'post') { window.uploadPost(); }
                else { alert("Lancement : " + contentType); window.location.href='index.html'; }
            }
        };

        // 🔙 BOUTON PRÉCÉDENT
        window.creationPrev = () => {
            creationMode = 'select';
            document.getElementById('step-select').style.display = 'block';
            document.getElementById('step-details').style.display = 'none';
            document.getElementById('btn-back').style.display = 'none';
            document.getElementById('btn-action').innerText = "Suivant";
        };

        // 🏷️ SÉLECTEUR DE TYPE (Publier, Story, Reel, Live)
        window.selectType = (type) => {
            contentType = type;
            document.querySelectorAll('.nav-create-item').forEach(el => el.classList.remove('active'));
            document.querySelector(`.nav-create-item[onclick="window.selectType('${type}')"]`).classList.add('active');
            
            // Masquer le bouton de validation pour STORY/REEL/LIVE (pour le test)
            if (type !== 'post') { document.getElementById('btn-action').innerText = "Lancer"; }
            else { document.getElementById('btn-action').innerText = creationMode === 'details' ? "Partager" : "Suivant"; }
        };

        // ☁️ UPLOAD VERS CLOUDINARY & FIREBASE (IDENTIQUE À L'ÉDITION PRÉCÉDENTE)
        window.uploadPost = async () => {
            if (!selectedFile || !currentUser) return;
            document.getElementById('loader').style.display = 'flex';
            try {
                // 1. Cloudinary
                const formData = new FormData();
                formData.append('file', selectedFile);
                formData.append('upload_preset', 'YOUR_UNSIGNED_PRESET'); 
                const cloudRes = await fetch('https://api.cloudinary.com/v1_1/YOUR_CLOUD_NAME/image/upload', { method: 'POST', body: formData });
                const cloudData = await cloudRes.json();

                // 2. Firestore
                await addDoc(collection(db, "posts"), {
                    userId: currentUser.uid,
                    username: currentUser.username,
                    userAvatar: currentUser.avatarUrl || "",
                    isVerified: currentUser.isVerified || false,
                    imageUrl: cloudData.secure_url,
                    caption: document.getElementById('caption').value,
                    likes: [],
                    createdAt: serverTimestamp()
                });
                window.location.href = "index.html";
            } catch (error) {
                alert("Erreur de publication.");
                document.getElementById('loader').style.display = 'none';
            }
        };
    </script>
</body>
</html>
