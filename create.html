<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Floy - Créer un Post</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --orange: #FF7A1A; --noir: #000; --bordure: #222; }
        body { background: var(--noir); color: white; font-family: -apple-system, sans-serif; margin: 0; padding-bottom: 80px; overflow: hidden; height: 100vh; }

        /* HEADER */
        .header { height: 60px; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; border-bottom: 1px solid var(--bordure); }
        .btn-post { color: var(--orange); font-weight: bold; background: none; border: none; font-size: 16px; cursor: pointer; display: none; }

        /* PREVIEW */
        .main-container { height: calc(100vh - 140px); overflow-y: auto; padding: 20px; }
        .upload-zone { width: 100%; aspect-ratio: 1/1; background: #0a0a0a; border: 1px solid var(--bordure); border-radius: 12px; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }
        #preview-img { width: 100%; height: 100%; object-fit: cover; display: none; }
        .caption-area { margin-top: 20px; width: 100%; display: none; }
        textarea { width: 100%; background: #111; border: 1px solid var(--bordure); color: white; padding: 15px; border-radius: 12px; resize: none; font-family: inherit; box-sizing: border-box;}

        /* BOTTOM NAV AVEC BRILLANCE */
        .creation-nav { position: fixed; bottom: 0; width: 100%; height: 70px; background: #050505; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid var(--bordure); }
        .nav-create-item { font-size: 12px; font-weight: bold; color: #555; text-transform: uppercase; cursor: pointer; transition: 0.3s; opacity: 0.5; }
        .nav-create-item.active { color: #ffffff; opacity: 1; text-shadow: 0 0 8px rgba(255,255,255,0.6); }
        .nav-create-item.active::after { content:''; position:absolute; bottom:-10px; left:50%; transform:translateX(-50%); width:4px; height:4px; background:var(--orange); border-radius:50%; }

        .loader { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div class="loader" id="loader"><div class="spinner"></div><p>Publication...</p></div>

    <div class="header">
        <i class="fas fa-times" onclick="location.href='index.html'"></i>
        <b>Nouvelle Publication</b>
        <button class="btn-post" id="btn-share" onclick="window.uploadPost()">Partager</button>
    </div>

    <div class="main-container">
        <div class="upload-zone" onclick="document.getElementById('file-post').click()">
            <div id="placeholder"><i class="fas fa-image" style="font-size:40px; color:var(--orange)"></i><p>Choisir une photo</p></div>
            <img id="preview-img">
        </div>
        <div class="caption-area" id="caption-box">
            <textarea id="caption" rows="4" placeholder="Écris une légende..."></textarea>
        </div>
    </div>

    <input type="file" id="file-post" accept="image/*" style="display:none" onchange="window.previewPost()">

    <nav class="creation-nav">
        <div class="nav-create-item active">Publier</div>
        <div class="nav-create-item" onclick="location.href='story-creator.html'">Story</div>
        <div class="nav-create-item" onclick="location.href='reel-creator.html'">Reel</div>
    </nav>

    <script type="module">
    import { auth, db } from './firebase-config.js';
    import { collection, addDoc, serverTimestamp, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // 🔥 CONFIGURATION CLOUDINARY (Indispensable)
    const CLOUD_NAME = "TON_CLOUD_NAME"; // Remplace par ton Cloud Name
    const UPLOAD_PRESET = "floy_unsigned"; // Remplace par ton Preset non signé

    let selectedFile = null;
    let userData = null;

    // Récupérer les infos de l'utilisateur connecté (pour le badge orange)
    auth.onAuthStateChanged(async (user) => {
        if (user) {
            const snap = await getDoc(doc(db, "users", user.uid));
            userData = snap.data();
        } else { location.href = 'login.html'; }
    });

    window.previewPost = () => {
        const file = document.getElementById('file-post').files[0];
        if(file) {
            selectedFile = file;
            document.getElementById('preview-img').src = URL.createObjectURL(file);
            document.getElementById('preview-img').style.display = 'block';
            document.getElementById('placeholder').style.display = 'none';
            document.getElementById('btn-share').style.display = 'block'; // Affiche "Partager"
            document.getElementById('caption-box').style.display = 'block'; // Affiche la légende
        }
    };

    window.uploadPost = async () => {
        if (!selectedFile || !userData) {
            alert("Erreur : Image non sélectionnée ou utilisateur non chargé.");
            return;
        }

        document.getElementById('loader').style.display = 'flex';

        try {
            // 1. ENVOI DE L'IMAGE À CLOUDINARY
            const formData = new FormData();
            formData.append('file', selectedFile);
            formData.append('upload_preset', UPLOAD_PRESET);

            const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, {
                method: 'POST',
                body: formData
            });
            const cloudData = await res.json();

            if (!cloudData.secure_url) throw new Error("Échec de l'upload Cloudinary");

            // 2. ENVOI DES DONNÉES À FIREBASE
            await addDoc(collection(db, "posts"), {
                userId: auth.currentUser.uid,
                username: userData.username,
                userAvatar: userData.avatarUrl || "",
                isVerified: userData.isVerified || false, // Ton badge Arlein orange
                imageUrl: cloudData.secure_url, // L'URL de l'image stockée
                caption: document.getElementById('caption').value,
                likes: [],
                createdAt: serverTimestamp()
            });

            // Redirection vers l'accueil pour voir le post
            location.href = 'index.html';

        } catch (error) {
            console.error(error);
            alert("Erreur lors du lancement : " + error.message);
            document.getElementById('loader').style.display = 'none';
        }
    };
</script>
    </script>
</body>
</html>
