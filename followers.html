<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Floy - Relations</title>
    <style>
        :root { --orange: #FF7A1A; --noir: #000; --gris: #121212; --blanc: #fff; }
        body { margin: 0; background: var(--noir); color: var(--blanc); font-family: 'Segoe UI', sans-serif; }

        /* HEADER FIXE */
        .header { position: fixed; top: 0; width: 100%; background: var(--noir); z-index: 100; border-bottom: 1px solid #222; }
        .top-row { display: flex; align-items: center; padding: 15px; }
        .back-btn { font-size: 24px; cursor: pointer; margin-right: 20px; }
        .username-title { font-weight: bold; font-size: 18px; flex-grow: 1; text-align: center; margin-right: 44px; }

        /* ONGLETS */
        .tabs { display: flex; justify-content: space-around; }
        .tab { padding: 12px 0; width: 50%; text-align: center; color: #888; font-weight: 600; cursor: pointer; border-bottom: 2px solid transparent; }
        .tab.active { color: var(--blanc); border-bottom: 2px solid var(--orange); }

        /* RECHERCHE */
        .search-bar { padding: 10px 15px; background: var(--noir); margin-top: 100px; }
        .search-input { width: 100%; background: #1a1a1a; border: none; padding: 10px; border-radius: 8px; color: white; outline: none; box-sizing: border-box; }

        /* LISTE DES UTILISATEURS */
        .user-list { padding: 10px 15px; margin-bottom: 80px; }
        .user-item { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
        .user-info { display: flex; align-items: center; gap: 12px; }
        .user-img { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; }
        .user-names { display: flex; flex-direction: column; }
        .u-name { font-weight: bold; font-size: 15px; }
        .u-handle { color: #888; font-size: 13px; }

        /* BOUTON SUIVRE */
        .btn-follow { background: var(--orange); color: black; border: none; padding: 6px 16px; border-radius: 6px; font-weight: bold; cursor: pointer; min-width: 100px; }
        .btn-following { background: #333; color: white; }

        /* NAV BAR (Copiée de ton profil) */
        .nav-bar { position: fixed; bottom: 0; width: 100%; height: 70px; background: #000; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #1a1a1a; }
        .nav-icon { width: 28px; height: 28px; fill: #666; }
    </style>
</head>
<body>

    <div class="header">
        <div class="top-row">
            <span class="back-btn" onclick="window.location.href='profile.html'">‹</span>
            <div class="username-title">Arlein</div>
        </div>
        <div class="tabs">
            <div class="tab active" onclick="switchTab('abonnements', this)">Abonnements</div>
            <div class="tab" onclick="switchTab('abonnes', this)">Abonnés</div>
        </div>
    </div>

    <div class="search-bar">
        <input type="text" class="search-input" placeholder="Rechercher...">
    </div>

    <div class="user-list" id="listContent">
        </div>

    <nav class="nav-bar">
        <svg class="nav-icon" onclick="window.location.href='feed.html'" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
        <svg class="nav-icon" onclick="window.location.href='explore.html'" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
        <div style="background:var(--orange); width:50px; height:35px; border-radius:10px; display:flex; align-items:center; justify-content:center; color:black; font-weight:bold;">+</div>
        <svg class="nav-icon" onclick="window.location.href='messages.html'" viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 14H4V8l8 5 8-5v10zm-8-7L4 6h16l-8 5z"/></svg>
        <svg class="nav-icon" onclick="window.location.href='profile.html'" viewBox="0 0 24 24" style="fill:white"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/></svg>
    </nav>

    <script>
        const abonnements = [
            { name: 'Huarache', handle: '@huarache_dev', img: 'https://i.pravatar.cc/150?u=1' },
            { name: 'TikTok France', handle: '@tiktokfr', img: 'https://i.pravatar.cc/150?u=2' },
            { name: 'Floy Official', handle: '@floy_app', img: 'https://i.pravatar.cc/150?u=3' }
        ];

        const abonnes = [
            { name: 'Jean Tech', handle: '@jean_tech', img: 'https://i.pravatar.cc/150?u=5' },
            { name: 'Marie Code', handle: '@marie_c', img: 'https://i.pravatar.cc/150?u=6' }
        ];

        function renderUsers(list) {
            const container = document.getElementById('listContent');
            container.innerHTML = '';
            list.forEach(user => {
                container.innerHTML += `
                    <div class="user-item">
                        <div class="user-info">
                            <img src="${user.img}" class="user-img">
                            <div class="user-names">
                                <span class="u-name">${user.name}</span>
                                <span class="u-handle">${user.handle}</span>
                            </div>
                        </div>
                        <button class="btn-follow" onclick="toggleFollow(this)">Suivre</button>
                    </div>
                `;
            });
        }

        function switchTab(type, el) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            renderUsers(type === 'abonnements' ? abonnements : abonnes);
        }

        function toggleFollow(btn) {
            if(btn.innerText === "Suivre") {
                btn.innerText = "Abonné";
                btn.classList.add('btn-following');
            } else {
                btn.innerText = "Suivre";
                btn.classList.remove('btn-following');
            }
        }

        // Charger par défaut les abonnements
        renderUsers(abonnements);
    </script>
</body>
</html>
