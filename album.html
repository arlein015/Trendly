<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Floy - Album Complet</title>
    <style>
        :root { --orange: #FF7A1A; --noir: #000; --bordure: #262626; }
        body { background: var(--noir); color: white; font-family: -apple-system, sans-serif; margin: 0; padding-bottom: 20px; }
        
        /* HEADER FIXE */
        header { 
            padding: 15px; border-bottom: 1px solid var(--bordure); 
            display: flex; align-items: center; gap: 15px;
            position: sticky; top: 0; background: rgba(0,0,0,0.9); z-index: 100; 
            backdrop-filter: blur(10px);
        }
        .back-btn { cursor: pointer; color: white; text-decoration: none; display: flex; align-items: center; }
        .header-title { font-weight: bold; font-size: 18px; }

        /* GRILLE D'ALBUM */
        .album-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr); /* 3 colonnes comme Instagram */
            gap: 2px;
            padding: 2px;
        }
        .album-item { 
            aspect-ratio: 1/1; 
            background: #111; 
            overflow: hidden; 
            cursor: pointer;
        }
        .album-item img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            transition: opacity 0.3s;
        }
        .album-item:active img { opacity: 0.7; }

        /* LÉGENDE EN BAS */
        .album-info { padding: 15px; border-top: 1px solid var(--bordure); margin-top: 10px; }
        .album-caption { font-size: 15px; line-height: 1.4; color: #efefef; }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="back-btn">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <line x1="19" y1="12" x2="5" y2="12"></line>
                <polyline points="12 19 5 12 12 5"></polyline>
            </svg>
        </a>
        <div class="header-title">Album</div>
    </header>

    <div class="album-grid" id="album-grid">
        </div>

    <div class="album-info">
        <p id="album-caption" class="album-caption"></p>
    </div>

    <script type="module">
        import { db } from './firebase-config.js';
        import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // 1. Récupérer l'ID du post dans l'URL (?id=...)
        const params = new URLSearchParams(window.location.search);
        const postId = params.get('id');

        if (!postId) {
            window.location.href = "index.html";
        } else {
            loadAlbum();
        }

        async function loadAlbum() {
            try {
                const docRef = doc(db, "posts", postId);
                const snap = await getDoc(docRef);

                if (snap.exists()) {
                    const data = snap.data();
                    const images = data.images || []; // Récupère le tableau d'images
                    const grid = document.getElementById('album-grid');
                    const captionBox = document.getElementById('album-caption');

                    // Afficher la légende
                    captionBox.innerText = data.caption || "";

                    // Générer la grille de toutes les photos
                    grid.innerHTML = "";
                    images.forEach(url => {
                        const div = document.createElement('div');
                        div.className = 'album-item';
                        div.innerHTML = `<img src="${url}" loading="lazy">`;
                        
                        // Optionnel : Agrandir l'image au clic
                        div.onclick = () => window.open(url, '_blank');
                        
                        grid.appendChild(div);
                    });
                } else {
                    console.error("Post introuvable");
                    window.location.href = "index.html";
                }
            } catch (error) {
                console.error("Erreur lors du chargement :", error);
            }
        }
    </script>
</body>
</html>
