<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Floy - Créer une Story</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --orange: #FF7A1A; --noir: #000; }
        body { background: var(--noir); color: white; font-family: -apple-system, sans-serif; margin: 0; overflow: hidden; height: 100vh; }
        
        .story-ui { position: absolute; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: space-between; z-index: 10; padding: 20px; box-sizing: border-box; background: linear-gradient(to bottom, rgba(0,0,0,0.4), transparent 20%, transparent 80%, rgba(0,0,0,0.4)); }
        #preview-container { width: 100vw; height: 100vh; position: absolute; top:0; left:0; background: #111; display: flex; align-items: center; justify-content: center; }
        #preview-img, #preview-vid { width: 100%; height: 100%; object-fit: cover; display: none; }

        .btn-send { background: white; color: black; border: none; padding: 12px 25px; border-radius: 30px; font-weight: bold; cursor: pointer; align-self: flex-end; display: none; }
        .loader { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 100; flex-direction: column; align-items: center; justify-content: center; }
        .spinner { width: 30px; height: 30px; border: 3px solid #333; border-top: 3px solid var(--orange); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="loader" id="loader"><div class="spinner"></div><p>Envoi de la Story...</p></div>

    <div class="story-ui">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <i class="fas fa-times" onclick="history.back()" style="font-size:24px;"></i>
            <i class="fas fa-bolt"></i>
        </div>
        
        <div id="upload-prompt" style="text-align:center;" onclick="document.getElementById('file-in').click()">
            <i class="fas fa-camera" style="font-size:50px; color:var(--orange);"></i>
            <p>Appuie pour ajouter une Story</p>
        </div>

        <button class="btn-send" id="btn-send" onclick="window.uploadStory()">Partager <i class="fas fa-paper-plane"></i></button>
    </div>

    <div id="preview-container">
        <img id="preview-img">
        <video id="preview-vid" autoplay loop muted playsinline></video>
    </div>

    <input type="file" id="file-in" accept="image/*,video/*" style="display:none;" onchange="window.handlePreview()">

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { collection, addDoc, serverTimestamp, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        let selectedFile = null;
        let userData = null;

        auth.onAuthStateChanged(async (user) => {
            if (user) {
                const snap = await getDoc(doc(db, "users", user.uid));
                userData = snap.data();
            } else { location.href = 'login.html'; }
        });

        window.handlePreview = () => {
            const file = document.getElementById('file-in').files[0];
            if (file) {
                selectedFile = file;
                const url = URL.createObjectURL(file);
                document.getElementById('upload-prompt').style.display = 'none';
                document.getElementById('btn-send').style.display = 'block';
                
                if (file.type.startsWith('image/')) {
                    document.getElementById('preview-img').src = url;
                    document.getElementById('preview-img').style.display = 'block';
                } else {
                    document.getElementById('preview-vid').src = url;
                    document.getElementById('preview-vid').style.display = 'block';
                }
            }
        };

        window.uploadStory = async () => {
            document.getElementById('loader').style.display = 'flex';
            const formData = new FormData();
            formData.append('file', selectedFile);
            formData.append('upload_preset', 'TON_PRESET'); // À REMPLACER

            const res = await fetch('https://api.cloudinary.com/v1_1/TON_CLOUD_NAME/auto/upload', { method: 'POST', body: formData });
            const data = await res.json();

            await addDoc(collection(db, "stories"), {
                userId: auth.currentUser.uid,
                username: userData.username,
                userAvatar: userData.avatarUrl || "",
                mediaUrl: data.secure_url,
                type: selectedFile.type.startsWith('image/') ? 'image' : 'video',
                createdAt: serverTimestamp(),
                expiresAt: Date.now() + (24 * 60 * 60 * 1000) // Expire dans 24h
            });
            location.href = 'index.html';
        };
    </script>
</body>
</html>
