<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Créer une Story</title>
    <style>
        body { background: #000; color: white; font-family: -apple-system, sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; justify-content: center; align-items: center; }
        .preview-container { width: 90%; height: 70%; border: 2px dashed #333; border-radius: 20px; display: flex; justify-content: center; align-items: center; overflow: hidden; position: relative; }
        #previewImg { width: 100%; height: 100%; object-fit: cover; display: none; }
        .btn-select { background: #FF7A1A; color: black; padding: 15px 30px; border-radius: 30px; font-weight: bold; border: none; margin-top: 20px; cursor: pointer; }
        .btn-send { background: white; color: black; padding: 15px 50px; border-radius: 30px; font-weight: bold; border: none; margin-top: 20px; display: none; }
        .close { position: absolute; top: 40px; left: 20px; font-size: 30px; color: white; text-decoration: none; }
    </style>
</head>
<body>

    <a href="messages.html" class="close">✕</a>

    <div class="preview-container" id="dropZone">
        <span id="placeholderText">Aperçu de ta story</span>
        <img id="previewImg" src="">
    </div>

    <input type="file" id="fileIn" hidden accept="image/*" onchange="preview(this)">
    
    <button class="btn-select" onclick="document.getElementById('fileIn').click()">Choisir une photo</button>
    <button id="sendBtn" class="btn-send" onclick="publish()">Publier la story</button>

    <script>
        function preview(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    document.getElementById('previewImg').src = e.target.result;
                    document.getElementById('previewImg').style.display = 'block';
                    document.getElementById('placeholderText').style.display = 'none';
                    document.getElementById('sendBtn').style.display = 'block';
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function publish() {
            const imgData = document.getElementById('previewImg').src;
            localStorage.setItem('user_story_img', imgData);
            localStorage.setItem('user_story_active', 'true');
            alert("Story publiée !");
            window.location.href = "messages.html";
        }
    </script>
</body>
</html>
