<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Threndly - Modifier</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .edit-container { padding: 20px; }
        .preview-box { width: 100%; height: 200px; background: #111; border-radius: 15px; margin-bottom: 20px; overflow: hidden; }
        .field { margin-bottom: 20px; }
        .field label { display: block; color: #555; font-size: 12px; margin-bottom: 8px; }
        .field input, .field textarea { width: 100%; background: #0a0a0a; border: 1px solid #222; padding: 12px; color: white; border-radius: 10px; box-sizing: border-box; }
        .save-btn { width: 100%; background: var(--threndly-violet); color: white; border: none; padding: 15px; border-radius: 12px; font-weight: 700; cursor: pointer; }
    </style>
</head>
<body>
    <div class="edit-container">
        <h3 style="text-align: center;">Modifier la vidéo</h3>
        <div class="preview-box"><img src="https://via.placeholder.com/400x200" style="width:100%; height:100%; object-fit:cover;"></div>
        <div class="field">
            <label>Légende</label>
            <textarea rows="4">Super moment avec l'équipe ! #Threndly #Vibes</textarea>
        </div>
        <div class="field">
            <label>Qui peut voir ?</label>
            <input type="text" value="Tout le monde">
        </div>
        <button class="save-btn" onclick="alert('Modifications enregistrées !')">Mettre à jour</button>
    </div>
</body>
</html>
