<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Floy - Modifier Profil</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --floy-orange: #ff8c00; --bg-black: #000; }
        body { margin: 0; background: var(--bg-black); color: white; font-family: 'Poppins', sans-serif; }
        
        .header { padding: 20px; display: flex; justify-content: space-between; border-bottom: 0.5px solid #222; }
        .save-txt { color: var(--floy-orange); font-weight: 700; cursor: pointer; }

        .edit-body { padding: 20px; text-align: center; }
        
        .change-photo { margin-bottom: 30px; }
        .avatar-edit { width: 90px; height: 90px; border-radius: 50%; border: 2px solid var(--floy-orange); margin-bottom: 10px; }
        .change-txt { color: var(--floy-orange); font-size: 13px; font-weight: 600; display: block; }

        .input-group { text-align: left; margin-bottom: 20px; }
        .input-group label { display: block; font-size: 12px; color: #555; margin-bottom: 8px; margin-left: 5px; }
        .input-group input, .input-group textarea {
            width: 100%; background: rgba(255,255,255,0.05); border: 1px solid #222;
            padding: 15px; border-radius: 12px; color: white; outline: none; box-sizing: border-box;
            font-family: inherit;
        }
        .input-group input:focus { border-color: var(--floy-orange); }
    </style>
</head>
<body>
    <div class="header">
        <i class="fas fa-times" onclick="window.history.back()"></i>
        <span style="font-weight: 700;">Modifier le profil</span>
        <span class="save-txt" onclick="saveProfile()">Enregistrer</span>
    </div>

    <div class="edit-body">
        <div class="change-photo" onclick="document.getElementById('fileInp').click()">
            <img src="logo.png" class="avatar-edit">
            <span class="change-txt">Modifier la photo</span>
            <input type="file" id="fileInp" hidden>
        </div>

        <div class="input-group">
            <label>Nom affiché</label>
            <input type="text" id="displayName" value="Floy Creator">
        </div>

        <div class="input-group">
            <label>Nom d'utilisateur (Username)</label>
            <input type="text" id="username" value="createur_floy">
        </div>

        <div class="input-group">
            <label>Bio</label>
            <textarea id="bio" rows="3">Bienvenue sur mon profil Floy officiel ! 🚀</textarea>
        </div>

        <div class="input-group">
            <label>Lien (Site web / Réseaux)</label>
            <input type="url" id="userLink" placeholder="https://votre-lien.com">
        </div>
    </div>

    <script>
        function saveProfile() {
            alert("Profil Floy mis à jour avec succès !");
            window.location.href = 'profile.html';
        }
    </script>
</body>
</html>
