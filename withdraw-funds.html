<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Floy - Retrait de fonds</title>
    <style>
        :root { 
            --orange-floy: #FF7A1A; 
            --binance-yellow: #F3BA2F; 
            --noir: #000; 
            --gris: #121212; 
            --blanc: #fff; 
        }
        
        body { 
            background: var(--noir); color: var(--blanc); 
            font-family: 'Segoe UI', Roboto, sans-serif; margin: 0; padding-bottom: 50px;
            overflow-x: hidden;
        }

        /* Header */
        .header { 
            display: flex; align-items: center; padding: 20px; 
            border-bottom: 1px solid #222; position: sticky; top: 0; background: var(--noir); z-index: 100;
        }
        .back-btn { font-size: 24px; cursor: pointer; text-decoration: none; color: white; margin-right: 20px; }

        /* Carte de Solde */
        .balance-card {
            background: linear-gradient(135deg, #1a1a1a 0%, #000 100%);
            margin: 20px; padding: 25px; border-radius: 20px; border: 1px solid #333; text-align: center;
        }
        .balance-amount { font-size: 36px; font-weight: bold; margin: 5px 0; color: var(--orange-floy); }

        /* Graphique SVG */
        .chart-container {
            margin: 0 20px 20px; padding: 15px; background: #0a0a0a; border-radius: 15px; border: 1px solid #222;
        }
        .chart-svg { width: 100%; height: 80px; }
        
        /* Binance Liaison */
        .binance-card {
            margin: 0 20px 20px; padding: 15px; border-radius: 15px;
            background: rgba(243, 186, 47, 0.07); border: 1px solid rgba(243, 186, 47, 0.3);
            display: flex; align-items: center; justify-content: space-between;
        }
        .binance-logo-group { display: flex; align-items: center; gap: 10px; font-weight: 800; color: var(--binance-yellow); font-size: 14px; }

        /* Grille Actions */
        .action-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 0 20px; }
        .btn-action { 
            background: var(--gris); border: 1px solid #222; padding: 15px; 
            border-radius: 12px; cursor: pointer; text-align: center;
        }
        .btn-action svg { width: 22px; height: 22px; fill: white; margin-bottom: 6px; }
        .btn-action span { display: block; font-size: 10px; font-weight: bold; }

        /* Convertisseur */
        .converter-box { margin: 20px; padding: 15px; background: #0a0a0a; border-radius: 15px; border: 1px solid #222; }
        .input-group { display: flex; align-items: center; background: #000; padding: 10px; border-radius: 8px; border: 1px solid #333; }
        .input-group input { background: transparent; border: none; color: white; font-size: 18px; width: 100%; outline: none; }

        /* Modal (Tiroir) */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); display: none; align-items: flex-end; z-index: 1000;
        }
        .modal-content {
            background: #0f0f0f; width: 100%; padding: 25px;
            border-radius: 25px 25px 0 0; border-top: 1px solid #333;
            animation: slideUp 0.3s ease-out;
        }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .method-selector {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px; border: 1px solid #222; border-radius: 12px; margin-top: 10px; cursor: pointer;
        }
        .method-selector.active { border-color: var(--orange-floy); background: rgba(255,122,26,0.05); }
        .confirm-btn {
            width: 100%; background: var(--orange-floy); color: black; border: none;
            padding: 18px; border-radius: 15px; font-weight: 800; margin-top: 25px; cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="header">
        <a href="settings.html" class="back-btn">‹</a>
        <span style="font-weight:bold; letter-spacing: 1px;">RETRAIT DE FONDS</span>
    </div>

    <div class="balance-card">
        <div style="color:#666; font-size:11px; font-weight:bold;">SOLDE ACTUEL</div>
        <div class="balance-amount">2,450.00 ◈</div>
    </div>

    <div class="chart-container">
        <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
            <span style="font-size:10px; font-weight:bold; color:#444;">ANALYTIQUE GAINS</span>
            <span style="font-size:10px; color:var(--orange-floy);">+12.5%</span>
        </div>
        <svg class="chart-svg" viewBox="0 0 400 100">
            <path d="M0,80 Q50,70 100,40 T200,60 T300,20 T400,50" fill="none" stroke="var(--orange-floy)" stroke-width="3" stroke-linecap="round"/>
            <circle cx="300" cy="20" r="4" fill="var(--orange-floy)"/>
        </svg>
    </div>

    <div class="binance-card">
        <div class="binance-logo-group">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
                <path d="M12 0L8.12 3.88L12 7.76L15.88 3.88L12 0Z"/><path d="M24 12L20.12 8.12L16.24 12L20.12 15.88L24 12Z"/><path d="M12 24L15.88 20.12L12 16.24L8.12 20.12L12 24Z"/><path d="M0 12L3.88 15.88L7.76 12L3.88 8.12L0 12Z"/><path d="M12 11.23L12.77 12L12 12.77L11.23 12L12 11.23Z"/><path d="M8.53 12L12 8.53L15.47 12L12 15.47L8.53 12Z"/>
            </svg>
            BINANCE
        </div>
        <button id="bConnect" onclick="linkBinance()" style="background:var(--binance-yellow); border:none; padding:6px 12px; border-radius:6px; font-size:10px; font-weight:bold; cursor:pointer;">CONNECTER</button>
    </div>

    <div class="action-grid">
        <div class="btn-action">
            <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
            <span>DÉPÔT</span>
        </div>
        <div class="btn-action" onclick="openWithdrawModal()" style="border-color: var(--orange-floy);">
            <svg viewBox="0 0 24 24" style="fill:var(--orange-floy)"><path d="M5 13h14v-2H5v2zM19 13l-4 4 1.41 1.41L21.82 13l-5.41-5.41L15 9l4 4z"/></svg>
            <span>RETRAIT</span>
        </div>
        <div class="btn-action">
            <svg viewBox="0 0 24 24"><path d="M13 3h-2v10h2V3zm4.83 2.17l-1.42 1.42C17.99 7.86 19 9.81 19 12c0 3.87-3.13 7-7 7s-7-3.13-7-7c0-2.19 1.01-4.14 2.58-5.42L6.17 5.17C4.23 6.82 3 9.26 3 12c0 4.97 4.03 9 9 9s9-4.03 9-9c0-2.74-1.23-5.18-3.17-6.83z"/></svg>
            <span>LOGOUT</span>
        </div>
    </div>

    <div class="converter-box">
        <label style="font-size: 10px; color:#555; display:block; margin-bottom:8px; font-weight:bold;">CONVERTIR MES GAINS</label>
        <div class="input-group">
            <input type="number" id="tokenInput" placeholder="0" oninput="updateConv()">
            <span style="color:var(--orange-floy); font-weight:bold;">◈</span>
        </div>
        <div style="display: flex; justify-content: space-between; margin-top: 10px; font-size: 12px;">
            <span>Valeur: <b id="eurVal">0.00</b> €</span>
            <span style="color: var(--binance-yellow);">Binance: <b id="usdtVal">0.00</b> USDT</span>
        </div>
    </div>

    <div id="withdrawModal" class="modal-overlay">
        <div class="modal-content">
            <div style="width:40px; height:4px; background:#333; margin:0 auto 20px; border-radius:2px;"></div>
            <h2 style="font-size:18px; text-align:center;">CONFIRMER LE RETRAIT</h2>
            
            <div style="background:#000; padding:15px; border-radius:12px; margin:20px 0; border:1px solid #222;">
                <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                    <span style="color:#666;">Montant</span>
                    <span id="mAmount" style="font-weight:bold; color:var(--orange-floy);">0 ◈</span>
                </div>
                <div style="display:flex; justify-content:space-between;">
                    <span style="color:#666;">Réception</span>
                    <span id="mValue" style="font-weight:bold; color:#44ff44;">0.00 €</span>
                </div>
            </div>

            <div class="method-selector active">
                <span>Binance USDT (Instantané)</span>
                <div style="width:18px; height:18px; border-radius:50%; background:var(--orange-floy); box-shadow: inset 0 0 0 3px #000;"></div>
            </div>

            <button class="confirm-btn" onclick="confirmFinal()">LANCER LE TRANSFERT</button>
            <button onclick="closeWithdrawModal()" style="width:100%; background:none; border:none; color:#555; padding:15px; font-weight:bold; cursor:pointer;">ANNULER</button>
        </div>
    </div>

    <script>
        function updateConv() {
            const v = document.getElementById('tokenInput').value;
            document.getElementById('eurVal').innerText = (v * 0.01).toFixed(2);
            document.getElementById('usdtVal').innerText = (v * 0.0108).toFixed(3);
        }

        function openWithdrawModal() {
            const v = document.getElementById('tokenInput').value;
            if(!v || v <= 0) return alert("Entrez un montant valide");
            document.getElementById('mAmount').innerText = v + " ◈";
            document.getElementById('mValue').innerText = (v * 0.01).toFixed(2) + " €";
            document.getElementById('withdrawModal').style.display = 'flex';
        }

        function closeWithdrawModal() { document.getElementById('withdrawModal').style.display = 'none'; }

        function linkBinance() {
            const b = document.getElementById('bConnect');
            b.innerText = "LIAISON...";
            setTimeout(() => { 
                b.innerText = "CONNECTÉ ✅"; 
                b.style.background = "#222"; 
                b.style.color = "var(--binance-yellow)";
            }, 1200);
        }

        function confirmFinal() {
            alert("Transfert réussi ! Vos fonds seront sur votre compte Binance d'ici quelques minutes.");
            closeWithdrawModal();
        }
    </script>
</body>
</html>
