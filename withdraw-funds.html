<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Floy - Wallet Principal</title>
    <style>
        :root { 
            --orange-floy: #FF7A1A; 
            --binance-yellow: #F3BA2F; 
            --noir: #000; 
            --gris: #121212; 
        }
        body { background: var(--noir); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 50px; }
        
        .header { display: flex; align-items: center; padding: 20px; border-bottom: 1px solid #222; }
        .back-btn { font-size: 28px; cursor: pointer; margin-right: 20px; }

        .balance-card {
            background: linear-gradient(135deg, #1a1a1a, #000);
            margin: 20px; padding: 25px; border-radius: 20px; border: 1px solid #333; text-align: center;
        }
        .balance-amount { font-size: 36px; font-weight: bold; color: var(--orange-floy); margin: 5px 0; }

        /* Grille Actions */
        .action-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 0 20px; }
        .btn-action { 
            background: var(--gris); border: 1px solid #222; padding: 15px; 
            border-radius: 12px; cursor: pointer; text-align: center; transition: 0.2s;
        }
        .btn-action:active { transform: scale(0.95); }
        .btn-action svg { width: 22px; height: 22px; fill: white; margin-bottom: 6px; }
        .btn-action span { display: block; font-size: 10px; font-weight: bold; }

        /* Graphique simple */
        .chart-box { margin: 20px; padding: 15px; background: #0a0a0a; border-radius: 15px; border: 1px solid #222; }
    </style>
</head>
<body>

    <div class="header">
        <div class="back-btn" onclick="window.location.href='profile.html'">‹</div>
        <span style="font-weight:bold;">PORTEFEUILLE FLOY</span>
    </div>

    <div class="balance-card">
        <div style="font-size:11px; color:#666;">SOLDE TOTAL</div>
        <div class="balance-amount">2,450.00 ◈</div>
    </div>

    <div class="action-grid">
        <div class="btn-action" onclick="window.location.href='deposit-funds.html'">
            <svg viewBox="0 0 24 24"><path d="M11 9V5H13V9H16L12 13L8 9H11ZM5 18V16H19V18H5Z"/></svg>
            <span>DÉPÔT</span>
        </div>

        <div class="btn-action" onclick="window.location.href='withdraw-to-binance.html'" style="border-color: var(--orange-floy);">
            <svg viewBox="0 0 24 24" style="fill:var(--orange-floy)"><path d="M13 15V19H11V15H8L12 11L16 15H13ZM19 6V8H5V6H19Z"/></svg>
            <span>RETIRER</span>
        </div>

        <div class="btn-action" onclick="window.location.href='settings.html'">
            <svg viewBox="0 0 24 24"><path d="M12 15.5c-1.93 0-3.5-1.57-3.5-3.5s1.57-3.5 3.5-3.5 3.5 1.57 3.5 3.5-1.57 3.5-3.5 3.5zm7-2h-2.1c-.13.63-.34 1.22-.61 1.77l1.49 1.49-1.41 1.41-1.49-1.49c-.55.27-1.14.48-1.77.61V21h-2v-2.1c-.63-.13-1.22-.34-1.77-.61l-1.49 1.49-1.41-1.41 1.49-1.49c-.27-.55-.48-1.14-.61-1.77H5v-2h2.1c.13-.63.34-1.22.61-1.77l-1.49-1.49 1.41-1.41 1.49 1.49c.55-.27 1.14-.48 1.77-.61V3h2v2.1c.63.13 1.22.34 1.77.61l1.49-1.49 1.41 1.41-1.49 1.49c.27.55.48 1.14.61 1.77H19v2z"/></svg>
            <span>CONFIG</span>
        </div>
    </div>

    <div class="chart-box">
        <div style="font-size:10px; color:#555; margin-bottom:10px;">REVENUS 7 DERNIERS JOURS</div>
        <svg viewBox="0 0 400 100" style="width:100%; height:80px;">
            <path d="M0,80 Q50,70 100,40 T200,60 T300,20 T400,50" fill="none" stroke="var(--orange-floy)" stroke-width="3" stroke-linecap="round"/>
        </svg>
    </div>

</body>
</html>
