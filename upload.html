<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FLOY - Publier une vidéo</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="dark-theme">
    <div class="upload-container">
        <div class="header-back">
            <a href="feed.html"><i class="fas fa-chevron-left"></i></a>
            <span>Nouvelle publication</span>
        </div>

        <div class="upload-box" id="dropZone">
            <input type="file" id="videoInput" accept="video/*" hidden>
            <div class="upload-placeholder" onclick="document.getElementById('videoInput').click()">
                <i class="fas fa-cloud-upload-alt"></i>
                <p>Sélectionner une vidéo à publier</p>
                <span>MP4 ou WebM (Max 50Mo)</span>
            </div>
            <video id="videoPreview" controls hidden></video>
        </div>

        <div class="upload-details">
            <textarea placeholder="Décrivez votre vidéo... #floy #viral" id="videoDesc"></textarea>
            
            <div class="setting-item">
                <span><i class="fas fa-eye"></i> Qui peut voir cette vidéo ?</span>
                <select>
                    <option>Tout le monde</option>
                    <option>Amis uniquement</option>
                    <option>Privé</option>
                </select>
            </div>
        </div>

        <button class="btn-publish" id="publishBtn">Publier</button>
    </div>

    <nav class="bottom-nav">
        <a href="feed.html"><i class="fas fa-home"></i></a>
        <a href="explore.html"><i class="fas fa-search"></i></a>
        <a href="upload.html" class="upload-icon-active"><i class="fas fa-plus"></i></a>
        <a href="message.html"><i class="fas fa-envelope"></i></a>
        <a href="profile.html"><i class="fas fa-user"></i></a>
    </nav>
</body>
</html>
