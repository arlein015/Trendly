<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Threndly - Publier</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --bg-violet: #1a0033; /* Violet de tes captures d'écran */
            --floy-orange: #ff8c00; /* Orange vif pour l'action principale */
            --floy-cyan: #00e5ff; /* Cyan pour la certification */
            --glass-dark: rgba(0, 0, 0, 0.6);
        }

        body {
            margin: 0;
            background: linear-gradient(180deg, var(--bg-violet) 0%, #000000 100%);
            background-attachment: fixed;
            font-family: 'Poppins', sans-serif;
            color: white;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Header sombre */
        .header {
            padding: 50px 20px 15px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(20px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* Zone de sélection vidéo */
        .upload-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 30px;
            text-align: center;
        }

        .upload-box {
            width: 100%;
            max-width: 300px;
            aspect-ratio: 9/12;
            background: var(--glass-dark);
            border: 2px dashed rgba(255, 255, 255, 0.2);
            border-radius: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.3s;
        }

        .upload-box:active {
            transform: scale(0.95);
            border-color: var(--floy-orange);
        }

        .upload-icon {
            font-size: 50px;
            color: var(--floy-orange);
            margin-bottom: 15px;
        }

        /* Champs d'information */
        .form-section {
            padding: 20px;
            background: rgba(0, 0, 0, 0.8);
            border-radius: 30px 30px 0 0;
            backdrop-filter: blur(20px);
        }

        .input-caption {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 15px;
            color: white;
            font-family: inherit;
            resize: none;
            outline: none;
            box-sizing: border-box;
            margin-bottom: 15px;
        }

        .btn-publish {
            width: 100%;
            background: var(--floy-orange);
            color: white;
            border: none;
            padding: 18px;
            border-radius: 15px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(255, 140, 0, 0.2);
        }

        /* Navigation basse (Noire comme l'image) */
        .nav-bar {
            height: 75px;
            background: #000;
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .nav-item { color: white; font-size: 22px; opacity: 0.5; }
        .nav-item.active { opacity: 1; }
    </style>
</head>
<body>

    <div class="header">
        <i class="fas fa-times" onclick="window.history.back()"></i>
        <span style="font-weight: 700;">Nouvelle Publication</span>
        <span style="color: var(--floy-cyan); font-weight: 600; font-size: 14px;">Brouillons</span>
    </div>

    <div class="upload-area">
        <div class="upload-box" onclick="document.getElementById('file-input').click()">
            <i class="fas fa-cloud-upload-alt upload-icon"></i>
            <span style="font-weight: 600;">Sélectionner une vidéo</span>
            <span style="font-size: 12px; opacity: 0.5; margin-top: 5px;">Format MP4 conseillé</span>
            <input type="file" id="file-input" style="display: none;" accept="video/*">
        </div>
    </div>

    <div class="form-section">
        <textarea class="input-caption" rows="3" placeholder="Ajoutez une légende... #Style #Mode"></textarea>
        
        <div style="display: flex; justify-content: space-between; padding: 10px 0 20px; font-size: 14px;">
            <span><i class="fas fa-map-marker-alt"></i> Ajouter un lieu</span>
            <i class="fas fa-chevron-right" style="opacity: 0.5;"></i>
        </div>

        <button class="btn-publish" onclick="alert('Vidéo en cours de publication...')">Publier la vidéo</button>
    </div>

    <nav class="nav-bar">
        <i class="fas fa-home nav-item" onclick="window.location.href='feed.html'"></i>
        <i class="fas fa-compass nav-item"></i>
        <div style="background: linear-gradient(to right, #00e5ff, #a456f0); padding: 5px 15px; border-radius: 10px;"><i class="fas fa-plus" style="color: black;"></i></div>
        <i class="fas fa-envelope nav-item" onclick="window.location.href='messages.html'"></i>
        <i class="fas fa-user nav-item" onclick="window.location.href='profile.html'"></i>
    </nav>

</body>
</html>
