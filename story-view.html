<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Floy - Regarder</title>
    <style>
        body { background: black; margin: 0; height: 100vh; overflow: hidden; font-family: sans-serif; }
        .story-wrapper { position: relative; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
        
        .progress-bar { position: absolute; top: 15px; left: 10px; right: 10px; height: 2px; background: rgba(255,255,255,0.3); z-index: 20; }
        .progress-fill { height: 100%; background: white; width: 0%; transition: width 5s linear; }

        .user-info { position: absolute; top: 30px; left: 15px; display: flex; align-items: center; gap: 10px; z-index: 20; }
        .user-info img { width: 35px; height: 35px; border-radius: 50%; border: 1px solid white; }
        
        #story-img { width: 100%; height: 100%; object-fit: cover; }
        .close-story { position: absolute; top: 30px; right: 20px; color: white; font-size: 30px; text-decoration: none; z-index: 20; }
    </style>
</head>
<body>

    <div class="story-wrapper">
        <div class="progress-bar"><div class="progress-fill" id="fill"></div></div>
        
        <a href="index.html" class="close-story">✕</a>

        <div class="user-info">
            <img id="story-avatar" src="">
            <span id="story-username" style="font-weight: bold; color: white; text-shadow: 1px 1px 2px black;"></span>
        </div>

        <img id="story-img" src="">
    </div>

    <script type="module">
        import { db } from './firebase-config.js';
        import { doc, getDoc, collection, query, where, orderBy, limit, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Récupérer l'ID utilisateur via l'URL (ex: story-view.html?u=ID_USER)
        const params = new URLSearchParams(window.location.search);
        const userId = params.get('u');

        async function loadStory() {
            // 1. Chercher la story la plus récente de cet utilisateur
            const q = query(collection(db, "stories"), where("userId", "==", userId), orderBy("timestamp", "desc"), limit(1));
            
            onSnapshot(q, async (snap) => {
                if(!snap.empty) {
                    const story = snap.docs[0].data();
                    document.getElementById('story-img').src = story.imageUrl;

                    // 2. Charger les infos de l'auteur
                    const uSnap = await getDoc(doc(db, "users", userId));
                    if(uSnap.exists()){
                        document.getElementById('story-username').innerText = uSnap.data().username;
                        document.getElementById('story-avatar').src = uSnap.data().avatarUrl;
                    }

                    // 3. Animation barre de progression
                    setTimeout(() => { document.getElementById('fill').style.width = "100%"; }, 100);
                    
                    // 4. Fermer après 5 secondes
                    setTimeout(() => { window.location.href = "index.html"; }, 5100);
                }
            });
        }
        loadStory();
    </script>
</body>
</html>
