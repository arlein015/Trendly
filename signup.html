<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Floy - Inscription</title>
    <style>
        body {
            margin: 0; height: 100vh;
            background: linear-gradient(135deg, #ff8c00 0%, #3a01cc 100%) !important;
            font-family: 'Poppins', sans-serif; color: white;
            display: flex; align-items: center; justify-content: center;
        }

        .signup-card {
            background: rgba(0, 0, 0, 0.7); /* Mélange noir intense */
            backdrop-filter: blur(25px); padding: 40px 30px;
            border-radius: 40px; width: 85%; max-width: 360px;
            border: 1px solid rgba(255, 255, 255, 0.1); text-align: center;
        }

        .input-box {
            width: 100%; background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1); padding: 15px;
            border-radius: 15px; color: white; margin-bottom: 15px;
            box-sizing: border-box; outline: none;
        }

        .input-box:focus { border-color: #ff8c00; }

        .btn-reg {
            width: 100%; background: #ff8c00; color: white;
            border: none; padding: 16px; border-radius: 15px;
            font-weight: 700; cursor: pointer; margin-top: 10px;
        }
    .auth-container {
        height: 100vh; display: flex; flex-direction: column;
        align-items: center; justify-content: center; padding: 20px;
    }
    .input-field {
        width: 100%; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1);
        padding: 18px; border-radius: 15px; color: white; margin-bottom: 15px;
    }
    .btn-orange {
        width: 100%; background: var(--floy-orange); border: none;
        padding: 18px; border-radius: 15px; color: white; font-weight: 700;
    }
    </style>
</head>
<body>
    <div class="signup-card">
        <h2 style="margin-bottom: 30px;">Créer un compte</h2>
        <input type="text" class="input-box" placeholder="Nom d'utilisateur">
        <input type="email" class="input-box" placeholder="Email">
        <input type="password" class="input-box" placeholder="Mot de passe">
        <input type="password" class="input-box" placeholder="Confirmer mot de passe">
     <div class="auth-container">
    <h1 style="margin-bottom: 30px;">Bienvenue sur <span style="color: var(--floy-orange);">Floy</span></h1>
    <input type="email" class="input-field" placeholder="Email">
    <input type="password" class="input-field" placeholder="Mot de passe">
    <button class="btn-orange">Créer un compte</button>
</div>
        
        <button class="btn-reg" onclick="window.location.href='verify.html'">Continuer</button>
        
        <p style="font-size: 12px; margin-top: 20px; opacity: 0.6;">
            Déjà un compte ? <span style="color: #ff8c00; cursor: pointer;" onclick="window.location.href='index.html'">Se connecter</span>
        </p>
    </div>
</body>
</html>
