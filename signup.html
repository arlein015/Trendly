<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Threndly - Inscription</title>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --blue: #2D9CDB; --grad: linear-gradient(135deg, #2D9CDB, #BB6BD9); }
        body { margin: 0; background: #000; color: white; font-family: -apple-system, sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .card { width: 90%; max-width: 380px; text-align: center; padding: 40px 20px; border: 1px solid #1a1a1a; border-radius: 30px; }
        .logo { font-size: 2.5rem; font-weight: 900; background: var(--grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 30px; }
        .input-box { width: 100%; padding: 16px; background: #0a0a0a; border: 1px solid #222; border-radius: 14px; color: white; margin-bottom: 15px; outline: none; font-size: 1rem; }
        .input-box:focus { border-color: var(--blue); }
        .btn-main { width: 100%; padding: 18px; background: var(--blue); border: none; color: white; font-weight: bold; border-radius: 14px; cursor: pointer; font-size: 1rem; transition: 0.3s; }
        .btn-main:active { transform: scale(0.97); opacity: 0.8; }
        #loader { display: none; margin-top: 15px; color: #555; font-size: 0.8rem; }
    </style>
</head>
<body>

    <div class="card">
        <div class="logo">THRENDLY</div>
        
        <input type="text" id="reg-user" class="input-box" placeholder="Votre pseudo (ex: @marc)">
        <input type="email" id="reg-mail" class="input-box" placeholder="Votre e-mail">

        <button class="btn-main" id="btn-submit" onclick="lancerInscription()">
            Recevoir mon code e-mail
        </button>
        
        <div id="loader"><i class="fas fa-spinner fa-spin"></i> Envoi de l'intelligence Threndly...</div>
    </div>

    <script src="config.js"></script>
    <script src="script.js"></script>
</body>
</html>
