<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Floy - Connexion</title>
    <style>
        :root { --orange: #FF7A1A; --noir: #000; }
        body { background: var(--noir); color: white; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .auth-card { width: 90%; max-width: 400px; padding: 25px; text-align: center; background: #111; border-radius: 20px; border: 1px solid #222; }
        input { width: 100%; padding: 14px; margin: 10px 0; border-radius: 12px; border: 1px solid #333; background: #000; color: white; box-sizing: border-box; font-size: 16px; }
        .btn-login { width: 100%; padding: 14px; background: var(--orange); border: none; border-radius: 12px; color: white; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 10px; }
        .link { color: #888; font-size: 14px; margin-top: 20px; display: block; text-decoration: none; }
        .link b { color: var(--orange); }
    </style>
</head>
<body>
    <div class="auth-card">
        <h1 style="color:var(--orange); font-size: 32px; margin-bottom: 5px;">Floy</h1>
        <p style="color:#666; margin-bottom: 25px;">Content de te revoir !</p>
        
        <input type="email" id="log-email" placeholder="Email">
        <input type="password" id="log-password" placeholder="Mot de passe">
        
        <button class="btn-login" id="btn-signin">Se connecter</button>
        
        <a href="register.html" class="link">Pas encore de compte ? <b>S'inscrire</b></a>
    </div>

    <script type="module">
        import { auth } from './firebase-config.js';
        import { signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        document.getElementById('btn-signin').onclick = async () => {
            const email = document.getElementById('log-email').value;
            const password = document.getElementById('log-password').value;

            try {
                await signInWithEmailAndPassword(auth, email, password);
                // Une fois connecté, on va vers le profil ou l'index
                window.location.href = "index.html";
            } catch (error) {
                alert("Erreur : Email ou mot de passe incorrect.");
            }
        };
    </script>
</body>
</html>
