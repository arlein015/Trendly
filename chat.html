<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Privé</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { margin: 0; height: 100vh; background: #1a0033; display: flex; flex-direction: column; font-family: 'Poppins', sans-serif; color: white; }
        .chat-header { padding: 45px 20px 15px; background: rgba(0,0,0,0.7); display: flex; align-items: center; gap: 15px; }
        .msg-left { align-self: flex-start; background: rgba(0,0,0,0.5); padding: 12px; border-radius: 20px 20px 20px 5px; margin: 10px; max-width: 70%; }
        .msg-right { align-self: flex-end; background: linear-gradient(135deg, #a456f0, #3a55d1); padding: 12px; border-radius: 20px 20px 5px 20px; margin: 10px; max-width: 70%; }
        .input-area { padding: 20px; background: #000; display: flex; gap: 10px; align-items: center; }
        .input-box { flex: 1; background: rgba(255,255,255,0.1); border: none; padding: 12px; border-radius: 25px; color: white; }
    </style>
</head>
<body>
    <div class="chat-header"><i class="fas fa-arrow-left" onclick="window.history.back()"></i> <span>@bouta</span></div>
    <div style="flex:1; display:flex; flex-direction:column; overflow-y:auto">
        <div class="msg-left">C'est privé ?</div>
        <div class="msg-right">Oui, chiffrement total ici. 🔒</div>
    </div>
    <div class="input-area">
        <input type="text" class="input-box" placeholder="Message privé...">
        <i class="fas fa-paper-plane" style="color:#00e5ff"></i>
    </div>
</body>
</html>
