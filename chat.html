<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta http-equiv="Content-Security-Policy" content="default-src * 'unsafe-inline' 'unsafe-eval' data: blob:; img-src * data: blob:; media-src * data: blob:; connect-src *;">
    
    <link rel="icon" href="data:,">

    <title>Floy Chat - Ultra</title>
    
    <style>
        :root { --bg: #000; --card: #111; --primary: linear-gradient(135deg, #7F00FF, #00FFFF); --text: #fff; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        header { padding: 15px; background: var(--card); border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; }
        .call-btns button { background: none; border: 1px solid #7F00FF; color: #7F00FF; border-radius: 50%; width: 35px; height: 35px; cursor: pointer; margin-left: 5px; }
        
        #messages-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .msg { max-width: 75%; padding: 12px; border-radius: 18px; line-height: 1.4; }
        .sent { align-self: flex-end; background: var(--primary); color: #000; font-weight: 500; border-bottom-right-radius: 2px; }
        .received { align-self: flex-start; background: #222; border: 1px solid #333; border-bottom-left-radius: 2px; }
        
        .input-area { padding: 15px; background: var(--card); display: flex; align-items: center; gap: 10px; border-top: 1px solid #333; }
        input[type="text"] { flex: 1; background: #222; border: 1px solid #444; color: white; padding: 12px; border-radius: 25px; outline: none; }
        
        .btn-action { background: var(--primary); border: none; width: 42px; height: 42px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 18px; }
        .recording { background: #ff0000 !important; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        
        .media { max-width: 100%; border-radius: 12px; margin-top: 5px; }
        audio { height: 35px; margin-top: 5px; }
    </style>
</head>
<body>

<header>
    <div style="font-weight: bold; color: #7F00FF; letter-spacing: 1px;">FLOY MESSENGER</div>
    <div class="call-btns">
        <button title="Appel Audio">📞</button>
        <button title="Appel Vidéo">📹</button>
    </div>
</header>

<div id="messages-container"></div>

<div class="input-area">
    <input type="file" id="file-input" style="display:none" accept="image/*,video/*">
    <button class="btn-action" onclick="document.getElementById('file-input').click()">📷</button>
    <button class="btn-action" id="vocal-btn">🎤</button>
    <input type="text" id="msg-input" placeholder="Écrivez votre message...">
    <button class="btn-action" id="send-btn">🚀</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

    // --- CONFIGURATION FIREBASE (REMPLACE PAR TES INFOS) ---
    const firebaseConfig = {
        apiKey: "TON_API_KEY",
        authDomain: "floy-9f9a1.firebaseapp.com",
        projectId: "floy-9f9a1",
        storageBucket: "floy-9f9a1.firebasestorage.app",
        messagingSenderId: "TON_ID",
        appId: "TON_APP_ID"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const storage = getStorage(app);

    const chatId = new URLSearchParams(window.location.search).get('id') || "chat_demo";
    let mediaRecorder;
    let audioChunks = [];

    // --- CHARGEMENT DES MESSAGES ---
    onAuthStateChanged(auth, (user) => {
        if (user) {
            const q = query(collection(db, "chats", chatId, "messages"), orderBy("timestamp", "asc"));
            onSnapshot(q, (snap) => {
                const container = document.getElementById('messages-container');
                container.innerHTML = "";
                snap.forEach(doc => {
                    const d = doc.data();
                    const div = document.createElement('div');
                    div.className = `msg ${d.senderId === user.uid ? 'sent' : 'received'}`;
                    
                    if(d.type === "image") div.innerHTML += `<img src="${d.url}" class="media">`;
                    if(d.type === "video") div.innerHTML += `<video src="${d.url}" controls class="media"></video>`;
                    if(d.type === "vocal") div.innerHTML += `<audio src="${d.url}" controls></audio>`;
                    if(d.text) div.innerHTML += `<div>${d.text}</div>`;
                    
                    container.appendChild(div);
                });
                container.scrollTop = container.scrollHeight;
            });
        }
    });

    // --- ENVOI TEXTE ---
    async function sendText() {
        const text = document.getElementById('msg-input').value.trim();
        if (text && auth.currentUser) {
            document.getElementById('msg-input').value = "";
            await addDoc(collection(db, "chats", chatId, "messages"), {
                text, type: "text", senderId: auth.currentUser.uid, timestamp: serverTimestamp()
            });
        }
    }
    document.getElementById('send-btn').onclick = sendText;

    // --- GESTION DES FICHIERS (IMAGE/VIDEO) ---
    document.getElementById('file-input').onchange = async (e) => {
        const file = e.target.files[0];
        if (file && auth.currentUser) {
            const fRef = ref(storage, `chats/${chatId}/${Date.now()}_${file.name}`);
            await uploadBytes(fRef, file);
            const url = await getDownloadURL(fRef);
            await addDoc(collection(db, "chats", chatId, "messages"), {
                url, type: file.type.includes("image") ? "image" : "video",
                senderId: auth.currentUser.uid, timestamp: serverTimestamp()
            });
        }
    };

    // --- GESTION DU VOCAL ---
    const vocalBtn = document.getElementById('vocal-btn');
    vocalBtn.onclick = async () => {
        if (!mediaRecorder || mediaRecorder.state === "inactive") {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            audioChunks = [];
            mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
            mediaRecorder.onstop = async () => {
                const audioBlob = new Blob(audioChunks, { type: 'audio/mp3' });
                const fRef = ref(storage, `chats/${chatId}/vocal_${Date.now()}.mp3`);
                await uploadBytes(fRef, audioBlob);
                const url = await getDownloadURL(fRef);
                await addDoc(collection(db, "chats", chatId, "messages"), {
                    url, type: "vocal", senderId: auth.currentUser.uid, timestamp: serverTimestamp()
                });
            };
            mediaRecorder.start();
            vocalBtn.classList.add('recording');
        } else {
            mediaRecorder.stop();
            vocalBtn.classList.remove('recording');
        }
    };
</script>
</body>
</html>
