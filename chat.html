<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Threndly - Chat Live</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --blue: #2D9CDB; --grad: linear-gradient(135deg, #2D9CDB 0%, #BB6BD9 100%); }
        body { margin: 0; background: #000; color: white; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; }
        
        header { padding: 20px; border-bottom: 1px solid #1a1a1a; display: flex; justify-content: space-between; align-items: center; }
        #msg-list { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        
        /* Bulles */
        .msg-container { display: flex; flex-direction: column; max-width: 80%; }
        .sender-name { font-size: 0.7rem; color: #555; margin-bottom: 4px; margin-left: 10px; }
        .bubble { padding: 12px 18px; border-radius: 20px; font-size: 0.95rem; }
        
        .me { align-self: flex-end; }
        .me .bubble { background: var(--grad); border-bottom-right-radius: 4px; }
        
        .other { align-self: flex-start; }
        .other .bubble { background: #1a1a1a; border: 1px solid #222; border-bottom-left-radius: 4px; }

        footer { padding: 20px; display: flex; gap: 10px; background: #050505; border-top: 1px solid #1a1a1a; }
        input { flex: 1; padding: 14px; border-radius: 25px; border: 1px solid #222; background: #111; color: white; outline: none; }
        .send-btn { width: 50px; height: 50px; border-radius: 50%; border: none; background: var(--grad); color: white; cursor: pointer; }
    </style>
</head>
<body onload="loadMessages()">

    <header>
        <div style="font-weight: bold;">THRENDLY <span style="color:var(--blue); font-size:0.8rem; margin-left:10px;">● LIVE</span></div>
        <i class="fas fa-sign-out-alt" onclick="logout()" style="cursor:pointer; color:#444;"></i>
    </header>

    <div id="msg-list"></div>

    <footer>
        <input type="text" id="msg-in" placeholder="Votre message..." onkeypress="handleEnter(event)">
        <button class="send-btn" onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
    </footer>

    <script src="config.js"></script>
    <script src="script.js"></script>
</body>
</html>
