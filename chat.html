<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Floy - Chat avec Vocal</title>
    <script src="db.js"></script>
    <script src="upload.js"></script>
    <style>
        :root { --orange: #FF7A1A; --bleu: #0095f6; --noir: #000; }
        body { background: var(--noir); color: white; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* HEADER */
        .chat-header { display: flex; align-items: center; padding: 15px; border-bottom: 1px solid #1a1a1a; background: var(--noir); gap: 10px; }
        .user-info { display: flex; align-items: center; gap: 5px; font-weight: bold; font-size: 17px; }
        .verify-badge { color: var(--bleu); display: flex; }

        /* ZONE MESSAGES */
        #chatBox { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; }
        .bubble { max-width: 75%; padding: 12px; border-radius: 18px; font-size: 15px; line-height: 1.4; word-wrap: break-word; flex-shrink: 0; }
        .sent { align-self: flex-end; background: var(--orange); color: black; border-bottom-right-radius: 2px; }
        .received { align-self: flex-start; background: #1a1a1a; color: white; border-bottom-left-radius: 2px; }

        /* MÉDIAS FIXES */
        .chat-img, .chat-video { width: 180px; height: auto; border-radius: 12px; display: block; border: none !important; }
        .bubble:has(.chat-img) { padding: 3px; background: transparent; }

        /* BARRE SAISIE */
        .input-area { background: #080808; padding: 10px 15px; display: flex; align-items: center; gap: 10px; border-top: 1px solid #1a1a1a; padding-bottom: env(safe-area-inset-bottom); }
        .message-input { flex: 1; background: #151515; border: 1px solid #222; padding: 12px; border-radius: 22px; color: white; outline: none; }
        
        .btn-plus { color: var(--orange); font-size: 30px; background: none; border: none; cursor: pointer; }
        .btn-icon { background: none; border: none; cursor: pointer; color: white; display: flex; align-items: center; padding: 5px; }
        
        .btn-send { 
            background: var(--orange); border-radius: 50%; width: 42px; height: 42px; 
            display: none; align-items: center; justify-content: center; border: none; 
        }
    </style>
</head>
<body>

    <div class="chat-header">
        <div onclick="history.back()" style="cursor:pointer; font-size:20px;">←</div>
        <div class="user-info">
            <span id="partnerName">Chargement...</span>
            <div class="verify-badge"><svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10 10-4.5 10-10S17.5 2 12 2zm-1.9 14.7l-3.3-3.3 1.4-1.4 1.9 1.9 5.3-5.3 1.4 1.4-6.7 6.7z"/></svg></div>
        </div>
    </div>

    <div id="chatBox"></div>

    <div class="input-area">
        <button class="btn-plus" onclick="document.getElementById('fileIn').click()">+</button>
        <input type="file" id="fileIn" accept="image/*,video/*" hidden onchange="handleFileUpload(this)">
        
        <input type="text" id="msgInput" class="message-input" placeholder="Message..." oninput="toggleBtn()">

        <button id="micBtn" class="btn-icon">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="23"></line></svg>
        </button>

        <button id="sendBtn" class="btn-send" onclick="sendText()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="black"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
    </div>

    <script>
       // Remplace ton ancienne ligne CONVO_ID par celle-ci :
        const params = new URLSearchParams(window.location.search);
        const CONVO_ID = params.get('id') || "default_chat";
        const partner = (CURRENT_USER === "U1") ? "Utilisateur 2" : "Utilisateur 1";
        document.getElementById('partnerName').innerText = partner;

        const chatBox = document.getElementById('chatBox');
        const msgInput = document.getElementById('msgInput');
        const sendBtn = document.getElementById('sendBtn');
        const micBtn = document.getElementById('micBtn');

        const FX = {
            play: () => { 
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const o = ctx.createOscillator(); const g = ctx.createGain();
                o.type='sine'; o.frequency.setValueAtTime(500, ctx.currentTime);
                g.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.1);
                o.connect(g); g.connect(ctx.destination); o.start(); o.stop(ctx.currentTime + 0.1);
            },
            vibe: () => { if(navigator.vibrate) navigator.vibrate(40); }
        };

        window.onload = load;

        function toggleBtn() { 
            const hasText = msgInput.value.trim() !== "";
            sendBtn.style.display = hasText ? "flex" : "none";
            micBtn.style.display = hasText ? "none" : "flex";
        }

        async function handleFileUpload(input) {
            if (input.files[0]) {
                const res = await UploadModule.processFile(input.files[0]);
                await save({ content: res.content, sender: CURRENT_USER, type: res.type });
                input.value = "";
            }
        }

        async function sendText() {
            const val = msgInput.value.trim();
            if (val) { await save({ content: val, sender: CURRENT_USER, type: 'text' }); msgInput.value = ""; toggleBtn(); }
        }

        async function save(obj) {
            await DBModule.saveMessage(CONVO_ID, obj);
            FX.play(); FX.vibe(); load();
        }

        async function load() {
            chatBox.innerHTML = "";
            const logs = await DBModule.getMessages(CONVO_ID);
            logs.forEach(m => {
                const b = document.createElement('div');
                b.className = `bubble ${m.sender === CURRENT_USER ? 'sent' : 'received'}`;
                if (m.type === 'image') b.innerHTML = `<img src="${m.content}" class="chat-img">`;
                else if (m.type === 'video') b.innerHTML = `<video src="${m.content}" controls class="chat-video"></video>`;
                else b.innerText = m.content;
                chatBox.appendChild(b);
            });
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>
