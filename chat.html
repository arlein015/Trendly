<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Floy - Chat</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-violet: #1a0033;
            --floy-cyan: #00e5ff;
            --floy-orange: #ff8c00;
        }
        body {
            margin: 0; background: linear-gradient(180deg, var(--bg-violet) 0%, #000 100%);
            font-family: 'Poppins', sans-serif; color: white; height: 100vh; display: flex; flex-direction: column;
        }
        /* Header Chat */
        .chat-header {
            padding: 45px 20px 15px; background: rgba(0,0,0,0.8); backdrop-filter: blur(20px);
            display: flex; align-items: center; gap: 15px; border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .user-avatar { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; }
        
        /* Zone de Messages */
        .chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        
        .msg { max-width: 75%; padding: 12px 16px; border-radius: 20px; font-size: 14px; line-height: 1.4; }
        .msg-received { align-self: flex-start; background: rgba(255,255,255,0.1); border-radius: 20px 20px 20px 5px; }
        .msg-sent { 
            align-self: flex-end; 
            background: linear-gradient(135deg, #a456f0 0%, #3a55d1 100%); 
            border-radius: 20px 20px 5px 20px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        /* Barre d'envoi */
        .input-area {
            padding: 15px 20px 30px; background: #000; display: flex; align-items: center; gap: 12px;
        }
        .message-input {
            flex: 1; background: rgba(255,255,255,0.1); border: none; padding: 12px 20px;
            border-radius: 25px; color: white; outline: none;
        }
        .send-btn { color: var(--floy-cyan); font-size: 22px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="chat-header">
        <i class="fas fa-arrow-left" onclick="window.location.href='messages.html'"></i>
        <img src="logo.png" class="user-avatar">
        <div style="flex:1">
            <div style="font-weight:700; font-size:15px;">@bouta <i class="fas fa-check-circle" style="color:var(--floy-cyan); font-size:12px;"></i></div>
            <div style="font-size:10px; opacity:0.5;">En ligne</div>
        </div>
        <i class="fas fa-phone-alt" style="opacity:0.6"></i>
    </div>

    <div class="chat-container">
        <div class="msg msg-received">Salut ! Tu as vu la nouvelle barre de recherche sur Floy ?</div>
        <div class="msg msg-sent">Oui ! C'est super fluide, ça change tout pour trouver les contacts. 🚀</div>
        <div class="msg msg-received">Parfait. On continue le développement !</div>
    </div>

    <div class="input-area">
        <i class="fas fa-camera" style="opacity:0.5; font-size:20px;"></i>
        <input type="text" class="message-input" placeholder="Message privé...">
        <i class="fas fa-paper-plane send-btn"></i>
    </div>

</body>
</html>
