<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Floy - Chat</title>
    <script src="db.js"></script>
    <script src="upload.js"></script>
    <style>
        :root { --orange: #FF7A1A; --noir: #000; }
        body { background: var(--noir); color: white; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        body { background: #000; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .chat-header { padding: 15px; border-bottom: 1px solid #1a1a1a; display: flex; align-items: center; gap: 10px; }
        #chatBox { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        
        .bubble { max-width: 75%; padding: 12px; border-radius: 18px; line-height: 1.4; flex-shrink: 0; word-wrap: break-word; }
        .sent { align-self: flex-end; background: var(--orange); color: black; border-bottom-right-radius: 2px; }
        .received { align-self: flex-start; background: #1a1a1a; color: white; border-bottom-left-radius: 2px; }
        .chat-img { width: 180px; height: auto; border-radius: 12px; display: block; }

        .input-area { background: #080808; padding: 10px; display: flex; align-items: center; gap: 10px; border-top: 1px solid #1a1a1a; }
        .message-input { flex: 1; background: #151515; border: 1px solid #222; padding: 12px; border-radius: 22px; color: white; outline: none; }
        .btn-plus { color: var(--orange); font-size: 30px; background: none; border: none; }
        .btn-send { background: var(--orange); border-radius: 50%; width: 40px; height: 40px; border: none; display: none; align-items: center; justify-content: center; }
        .btn-mic { background: none; border: none; color: white; display: flex; }
    </style>
</head>
<body>

    <div class="chat-header">
        <div onclick="history.back()" style="cursor:pointer; font-size:20px;">←</div>
        <div id="partnerName" style="font-weight:bold;">Chat</div>
    </div>

    <div id="chatBox"></div>

    <div class="input-area">
        <button class="btn-plus" onclick="document.getElementById('fileIn').click()">+</button>
        <input type="file" id="fileIn" hidden accept="image/*,video/*" onchange="handleFileUpload(this)">
        <input type="text" id="msgInput" class="message-input" placeholder="Message..." oninput="toggleBtn()">
        
        <button id="micBtn" class="btn-mic"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="23"></line></svg></button>
        
        <button id="sendBtn" class="btn-send" onclick="sendText()"><svg width="20" height="20" viewBox="0 0 24 24" fill="black"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg></button>
    <div>
        <h2>Discussion</h2>
        <p>Chat en cours de chargement...</p>
        <button onclick="window.location.href='messages.html'" style="background:#FF7A1A; border:none; padding:10px; border-radius:5px;">Retour</button>
    </div>

    <script>
        // RÉPARATION DU BUG DE MÉLANGE : On lit l'ID de l'URL
        const params = new URLSearchParams(window.location.search);
        const CONVO_ID = params.get('id') || "default"; 
        const CURRENT_USER = "Moi";

        const chatBox = document.getElementById('chatBox');
        const msgInput = document.getElementById('msgInput');

        window.onload = load;

        function toggleBtn() {
            const hasText = msgInput.value.trim() !== "";
            document.getElementById('sendBtn').style.display = hasText ? "flex" : "none";
            document.getElementById('micBtn').style.display = hasText ? "none" : "flex";
        }

        async function handleFileUpload(input) {
            if (input.files[0]) {
                const res = await UploadModule.processFile(input.files[0]);
                await save({ content: res.content, sender: CURRENT_USER, type: res.type });
                input.value = "";
            }
        }

        async function sendText() {
            const val = msgInput.value.trim();
            if (val) { 
                await save({ content: val, sender: CURRENT_USER, type: 'text' }); 
                msgInput.value = ""; 
                toggleBtn(); 
            }
        }

        async function save(obj) {
            obj.timestamp = Date.now(); // Indispensable pour le tri !
            await DBModule.saveMessage(CONVO_ID, obj);
            load();
        }

        async function load() {
            chatBox.innerHTML = "";
            const logs = await DBModule.getMessages(CONVO_ID); // On ne charge que les messages de CET ID
            logs.forEach(m => {
                const b = document.createElement('div');
                b.className = `bubble ${m.sender === CURRENT_USER ? 'sent' : 'received'}`;
                if (m.type === 'image') b.innerHTML = `<img src="${m.content}" class="chat-img">`;
                else b.innerText = m.content;
                chatBox.appendChild(b);
            });
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>
