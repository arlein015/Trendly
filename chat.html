<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discussion - Threndly</title>
    <style>
        :root {
            --bg-color: #000000;
            --card-bg: #111111;
            --primary-gradient: linear-gradient(135deg, #7F00FF, #007BFF);
            --accent-blue: #00FFFF;
            --text-color: #ffffff;
            --received-msg: #222222;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Header */
        header {
            padding: 15px;
            background: var(--card-bg);
            border-bottom: 1px solid #333;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .back-btn {
            background: none;
            border: 1px solid var(--accent-blue);
            color: var(--accent-blue);
            padding: 5px 10px;
            border-radius: 8px;
            cursor: pointer;
        }

        /* Zone des messages */
        #messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .message {
            max-width: 75%;
            padding: 10px 15px;
            border-radius: 18px;
            font-size: 15px;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .sent {
            align-self: flex-end;
            background: var(--primary-gradient);
            color: white;
            border-bottom-right-radius: 2px;
            box-shadow: 0 4px 10px rgba(127, 0, 255, 0.3);
        }

        .received {
            align-self: flex-start;
            background-color: var(--received-msg);
            color: #ddd;
            border-bottom-left-radius: 2px;
            border: 1px solid #333;
        }

        /* Barre d'envoi */
        .input-area {
            padding: 20px;
            background: var(--card-bg);
            display: flex;
            gap: 10px;
            border-top: 1px solid #333;
        }

        input {
            flex: 1;
            background: #222;
            border: 1px solid #444;
            padding: 12px;
            border-radius: 25px;
            color: white;
            outline: none;
        }

        input:focus {
            border-color: var(--accent-blue);
        }

        button#send-btn {
            background: var(--primary-gradient);
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
        }

        button#send-btn:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>

<header>
    <button class="back-btn" onclick="history.back()">←</button>
    <div id="chat-title">Chargement...</div>
</header>

<div id="messages-container"></div>

<div class="input-area">
    <input type="text" id="message-input" placeholder="Écrivez votre message...">
    <button id="send-btn">Envoyer</button>
</div>

<script type="module">
    // --- CONFIGURATION FIREBASE ---
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { 
        getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp 
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        // COLLE TES INFOS ICI
        apiKey: "TON_API_KEY",
        authDomain: "floy-9f9a1.firebaseapp.com",
        projectId: "floy-9f9a1",
        storageBucket: "floy-9f9a1.firebasestorage.app",
        messagingSenderId: "TON_ID",
        appId: "TON_APP_ID"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // Récupérer l'ID de la discussion dans l'URL (ex: chat.html?id=ID_DU_CHAT)
    const urlParams = new URLSearchParams(window.location.search);
    const chatId = urlParams.get('id');

    if (!chatId) {
        alert("Discussion introuvable");
        window.location.href = "users_list.html";
    }

    const messagesContainer = document.getElementById('messages-container');
    const messageInput = document.getElementById('message-input');
    const sendBtn = document.getElementById('send-btn');

    // --- CHARGEMENT DES MESSAGES EN TEMPS RÉEL ---
    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById('chat-title').innerText = "Discussion sécurisée";
            
            const q = query(
                collection(db, "chats", chatId, "messages"),
                orderBy("timestamp", "asc")
            );

            onSnapshot(q, (snapshot) => {
                messagesContainer.innerHTML = "";
                snapshot.forEach((doc) => {
                    const data = doc.data();
                    const msgDiv = document.createElement('div');
                    msgDiv.className = `message ${data.senderId === user.uid ? 'sent' : 'received'}`;
                    msgDiv.innerText = data.text;
                    messagesContainer.appendChild(msgDiv);
                });
                // Scroll automatique vers le bas
                messagesContainer.scrollTop = messagesContainer.scrollHeight;
            });
        } else {
            window.location.href = "login.html";
        }
    });

    // --- ENVOYER UN MESSAGE ---
    async function sendMessage() {
        const text = messageInput.value.trim();
        const user = auth.currentUser;

        if (text !== "" && user) {
            messageInput.value = ""; // Vide l'input
            try {
                await addDoc(collection(db, "chats", chatId, "messages"), {
                    text: text,
                    senderId: user.uid,
                    timestamp: serverTimestamp()
                });
            } catch (e) {
                console.error("Erreur d'envoi:", e);
            }
        }
    }

    sendBtn.addEventListener('click', sendMessage);
    messageInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendMessage();
    });

</script>
</body>
</html>
