<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Floy - Chat Privé</title>
    <style>
        :root { --orange: #FF7A1A; --noir: #000; --gris: #1a1a1a; }
        body { background: var(--noir); color: white; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }

        /* Header */
        .header { display: flex; align-items: center; padding: 15px; border-bottom: 1px solid #111; background: var(--noir); }
        .back { cursor: pointer; margin-right: 15px; font-size: 20px; }
        .user-info { display: flex; align-items: center; gap: 10px; }
        .avatar { width: 35px; height: 35px; border-radius: 50%; background: #222; }

        /* Zone messages */
        .chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 75%; padding: 10px 15px; border-radius: 18px; font-size: 14px; }
        .received { align-self: flex-start; background: var(--gris); }
        .sent { align-self: flex-end; background: var(--orange); color: black; font-weight: 500; }

        /* BARRE DE CLAVIER (MODIFIÉE) */
        .input-container {
            padding: 10px 15px;
            background: var(--noir);
            border-top: 1px solid #111;
            display: flex;
            align-items: center;
            gap: 10px;
            padding-bottom: 25px; /* Espace pour le confort */
        }

        /* Bouton + pour fichiers */
        .attachment-btn {
            background: #222;
            border: none;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: white;
            transition: 0.3s;
        }
        .attachment-btn:active { transform: rotate(45deg); background: var(--orange); }

        /* Champ de texte */
        .message-input {
            flex: 1;
            background: #111;
            border: 1px solid #222;
            padding: 12px 18px;
            border-radius: 25px;
            color: white;
            outline: none;
            font-size: 14px;
        }

        /* Bouton Envoyer */
        .send-btn {
            background: var(--orange);
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        /* Menu caché pour les fichiers */
        input[type="file"] { display: none; }
    </style>
</head>
<body>

    <div class="header">
        <div class="back" onclick="window.location.href='messages.html'">←</div>
        <div class="user-info">
            <img src="https://picsum.photos/100?random=1" class="avatar">
            <span style="font-weight:bold;">Alexandre Dupont</span>
        </div>
    </div>

    <div class="chat-box" id="chatBox">
        <div class="msg received">Salut ! Tu as terminé le module ?</div>
        <div class="msg sent">Oui, je viens d'ajouter la barre de fichiers ! 📁</div>
    </div>

    <div class="input-container">
        <label for="file-upload" class="attachment-btn">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
        </label>
        <input type="file" id="file-upload" multiple onchange="handleFiles(this.files)">

        <input type="text" id="msgInput" class="message-input" placeholder="Message...">

        <button class="send-btn" onclick="sendMessage()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="black"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
    </div>

    <script>
        function sendMessage() {
            const input = document.getElementById('msgInput');
            const box = document.getElementById('chatBox');
            if(input.value.trim() !== "") {
                const newMsg = document.createElement('div');
                newMsg.className = "msg sent";
                newMsg.innerText = input.value;
                box.appendChild(newMsg);
                input.value = "";
                box.scrollTop = box.scrollHeight;
            }
        }

        function handleFiles(files) {
            if(files.length > 0) {
                alert(files.length + " fichier(s) sélectionné(s) : " + files[0].name);
                // Ici tu pourras ajouter la logique pour afficher l'image ou la vidéo dans le chat
            }
        }

        // Envoyer avec Entrée
        document.getElementById('msgInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') sendMessage();
        });
    </script>

    <script src="navbar.js"></script>

</body>
</html>
