<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Floy - Chat Premium Certifié</title>
    
    <script src="db.js"></script>
    <script src="upload.js"></script>

    <style>
        :root { --orange: #FF7A1A; --bleu-certif: #0095f6; --noir: #000; }
        
        body { 
            background: var(--noir); color: white; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; 
        }

        /* HEADER AVEC BADGE CERTIFIÉ */
        .chat-header { 
            display: flex; align-items: center; padding: 15px; 
            border-bottom: 1px solid #1a1a1a; background: var(--noir); 
            gap: 10px; position: sticky; top: 0; z-index: 10; 
        }
        .back-btn { cursor: pointer; font-size: 24px; color: white; text-decoration: none; }
        .user-info { display: flex; align-items: center; gap: 5px; }
        .user-name { font-weight: bold; font-size: 17px; }
        .verify-badge { color: var(--bleu-certif); display: flex; align-items: center; }

        /* ZONE DE DISCUSSION */
        #chatBox { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; scroll-behavior: smooth; }
        
        /* BULLES DE MESSAGE */
        .bubble { max-width: 75%; padding: 12px; border-radius: 18px; font-size: 15px; position: relative; word-wrap: break-word; line-height: 1.4; }
        .sent { align-self: flex-end; background: var(--orange); color: black; border-bottom-right-radius: 2px; }
        .received { align-self: flex-start; background: #1a1a1a; border-bottom-left-radius: 2px; color: white; }
        
        /* MÉDIAS (PHOTOS PLUS PETITES & SANS BORDURES) */
        .chat-img, .chat-video { 
            max-width: 180px; /* Taille réduite comme demandé */
            border-radius: 12px; display: block; 
            border: none !important; outline: none !important; 
            margin: 0; padding: 0;
        }
        .bubble:has(.chat-img), .bubble:has(.chat-video) { padding: 3px; overflow: hidden; }
        .media-info { font-size: 10px; opacity: 0.6; margin-top: 4px; padding: 0 5px; display: flex; justify-content: space-between; }

        /* BARRE DE SAISIE */
        .input-area { 
            background: #080808; padding: 10px 15px; display: flex; align-items: center; gap: 12px; 
            border-top: 1px solid #1a1a1a; padding-bottom: env(safe-area-inset-bottom);
        }
        .message-input { 
            flex: 1; background: #151515; border: 1px solid #222; padding: 12px 16px; 
            border-radius: 22px; color: white; font-size: 16px; outline: none; 
        }
        
        .btn-plus { color: var(--orange); font-size: 32px; background: none; border: none; font-weight: bold; cursor: pointer; padding: 0; }
        .btn-icon { background: none; border: none; cursor: pointer; color: white; display: flex; align-items: center; }
        
        /* BOUTON ENVOYER ORANGE */
        .btn-send { 
            background: var(--orange); border-radius: 50%; width: 42px; height: 42px; 
            justify-content: center; align-items: center; display: none; 
        }

        audio { height: 35px; width: 170px; filter: invert(1); }
    </style>
</head>
<body>

    <div class="chat-header">
        <div class="back-btn" onclick="history.back()">←</div>
        <div class="user-info">
            <span class="user-name" id="partnerName">Chargement...</span>
            <div class="verify-badge">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10 10-4.5 10-10S17.5 2 12 2zm-1.9 14.7l-3.3-3.3 1.4-1.4 1.9 1.9 5.3-5.3 1.4 1.4-6.7 6.7z"/></svg>
            </div>
        </div>
    </div>

    <div id="chatBox"></div>

    <div class="input-area">
        <button class="btn-plus" onclick="document.getElementById('fileIn').click()">+</button>
        <input type="file" id="fileIn" accept="image/*,video/*" hidden onchange="handleFileUpload(this)">
        
        <input type="text" id="msgInput" class="message-input" placeholder="Message privé..." oninput="toggleButtons()">

        <button id="micBtn" class="btn-icon">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="23"></line></svg>
        </button>

        <button id="sendBtn" class="btn-icon btn-send" onclick="sendText()">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="black"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
    </div>

    <script>
        // CONFIGURATION UTILISATEURS
        const CURRENT_USER = "U1"; 
        const CONVO_ID = "prive_u1_u2";
        const partner = (CURRENT_USER === "U1") ? "Utilisateur 2" : "Utilisateur 1";
        document.getElementById('partnerName').innerText = partner;

        const chatBox = document.getElementById('chatBox');
        const msgInput = document.getElementById('msgInput');
        const micBtn = document.getElementById('micBtn');
        const sendBtn = document.getElementById('sendBtn');

        // EFFETS SONORES ET VIBRATIONS
        const FX = {
            playPop: function() {
                const context = new (window.AudioContext || window.webkitAudioContext)();
                const osc = context.createOscillator();
                const g = context.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(600, context.currentTime);
                osc.frequency.exponentialRampToValueAtTime(100, context.currentTime + 0.1);
                g.gain.setValueAtTime(0.1, context.currentTime);
                g.gain.exponentialRampToValueAtTime(0.01, context.currentTime + 0.1);
                osc.connect(g); g.connect(context.destination);
                osc.start(); osc.stop(context.currentTime + 0.1);
            },
            vibrate: function() { if ("vibrate" in navigator) navigator.vibrate(40); }
        };

        window.onload = load;

        function toggleButtons() {
            const hasText = msgInput.value.trim() !== "";
            micBtn.style.display = hasText ? "none" : "flex";
            sendBtn.style.display = hasText ? "flex" : "none";
        }

        // GESTION DES FICHIERS (VIA UPLOAD.JS)
        async function handleFileUpload(input) {
            if (input.files && input.files[0]) {
                try {
                    const res = await UploadModule.processFile(input.files[0]);
                    await save({
                        content: res.content,
                        sender: CURRENT_USER,
                        type: res.type,
                        size: (res.size / 1024).toFixed(1) + " KB"
                    });
                    input.value = "";
                } catch (err) { alert(err); }
            }
        }

        async function sendText() {
            const val = msgInput.value.trim();
            if (val) {
                await save({ content: val, sender: CURRENT_USER, type: 'text' });
                msgInput.value = "";
                toggleButtons();
            }
        }

        async function save(obj) {
            await DBModule.saveMessage(CONVO_ID, obj);
            FX.playPop();
            FX.vibrate();
            load();
        }

        async function load() {
            chatBox.innerHTML = "";
            const logs = await DBModule.getMessages(CONVO_ID);
            logs.forEach(m => {
                const b = document.createElement('div');
                b.className = `bubble ${m.sender === CURRENT_USER ? 'sent' : 'received'}`;
                
                if (m.type === 'image') {
                    b.innerHTML = `<img src="${m.content}" class="chat-img"><div class="media-info"><span>${m.size}</span></div>`;
                } else if (m.type === 'video') {
                    b.innerHTML = `<video src="${m.content}" controls class="chat-video"></video><div class="media-info"><span>${m.size}</span></div>`;
                } else {
                    b.innerText = m.content;
                }
                chatBox.appendChild(b);
            });
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        msgInput.onkeypress = (e) => { if(e.key === "Enter") sendText(); };
    </script>
</body>
</html>
