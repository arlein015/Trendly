<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta http-equiv="Content-Security-Policy" content="default-src * 'unsafe-inline' 'unsafe-eval' data: blob:; img-src * data: blob:; media-src * data: blob:; connect-src *;">
    
    <link rel="icon" href="data:,">

    <title>Chat - Floy</title>
    
    <style>
        :root {
            --bg: #000000;
            --card: #111111;
            --primary: linear-gradient(135deg, #7F00FF, #00FFFF);
            --text: #ffffff;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        header {
            padding: 15px;
            background: var(--card);
            border-bottom: 1px solid #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .msg {
            max-width: 70%;
            padding: 12px;
            border-radius: 15px;
            position: relative;
        }

        .sent {
            align-self: flex-end;
            background: var(--primary);
            color: #000;
            font-weight: 500;
        }

        .received {
            align-self: flex-start;
            background: #222;
            border: 1px solid #333;
        }

        .input-area {
            padding: 15px;
            background: var(--card);
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            background: #222;
            border: 1px solid #444;
            color: white;
            padding: 12px;
            border-radius: 25px;
            outline: none;
        }

        button {
            background: var(--primary);
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
        }

        .media { max-width: 100%; border-radius: 10px; margin-top: 5px; }
    </style>
</head>
<body>

<header>
    <div style="font-weight: bold; color: #7F00FF;">FLOY CHAT</div>
    <button onclick="window.location.href='index.html'" style="padding: 5px 10px; font-size: 12px;">Retour</button>
</header>

<div id="messages-container"></div>

<div class="input-area">
    <input type="file" id="file-input" style="display:none" accept="image/*,video/*">
    <button onclick="document.getElementById('file-input').click()">📷</button>
    <input type="text" id="msg-input" placeholder="Message...">
    <button id="send-btn">Envoyer</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

    // --- REMPLACE PAR TES INFOS FIREBASE ---
    const firebaseConfig = {
        apiKey: "TON_API_KEY",
        authDomain: "floy-9f9a1.firebaseapp.com",
        projectId: "floy-9f9a1",
        storageBucket: "floy-9f9a1.firebasestorage.app",
        messagingSenderId: "TON_ID",
        appId: "TON_APP_ID"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const storage = getStorage(app);

    const urlParams = new URLSearchParams(window.location.search);
    const chatId = urlParams.get('id') || "test_chat"; // ID de secours

    // Chargement des messages
    onAuthStateChanged(auth, (user) => {
        if (!user) {
            console.log("Utilisateur non connecté");
            // Pas de redirection automatique ici pour éviter l'erreur 404 pendant tes tests
        } else {
            const q = query(collection(db, "chats", chatId, "messages"), orderBy("timestamp", "asc"));
            onSnapshot(q, (snapshot) => {
                const container = document.getElementById('messages-container');
                container.innerHTML = "";
                snapshot.forEach(doc => {
                    const d = doc.data();
                    const div = document.createElement('div');
                    div.className = `msg ${d.senderId === user.uid ? 'sent' : 'received'}`;
                    
                    if(d.type === "image") div.innerHTML += `<img src="${d.url}" class="media">`;
                    if(d.type === "video") div.innerHTML += `<video src="${d.url}" controls class="media"></video>`;
                    if(d.text) div.innerHTML += `<div>${d.text}</div>`;
                    
                    container.appendChild(div);
                });
                container.scrollTop = container.scrollHeight;
            });
        }
    });

    // Envoi
    document.getElementById('send-btn').onclick = async () => {
        const text = document.getElementById('msg-input').value;
        const file = document.getElementById('file-input').files[0];
        const user = auth.currentUser;

        if (!user) return alert("Connecte-toi d'abord !");
        if (!text && !file) return;

        document.getElementById('msg-input').value = "";
        let url = null;
        let type = "text";

        if (file) {
            const fRef = ref(storage, `chats/${chatId}/${Date.now()}_${file.name}`);
            await uploadBytes(fRef, file);
            url = await getDownloadURL(fRef);
            type = file.type.includes("image") ? "image" : "video";
        }

        await addDoc(collection(db, "chats", chatId, "messages"), {
            text, url, type, senderId: user.uid, timestamp: serverTimestamp()
        });
    };
</script>
</body>
</html>
