<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Discussion - Floy</title>
    <style>
        :root { --orange: #FF7A1A; --noir: #000; --gris: #1a1a1a; }
        body { background: var(--noir); color: white; font-family: -apple-system, sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

        /* HEADER DU CHAT */
        .chat-header { display: flex; align-items: center; padding: 15px 20px; background: rgba(10,10,10,0.95); backdrop-filter: blur(10px); border-bottom: 1px solid #222; z-index: 10; }
        .back-btn { background: none; border: none; color: var(--orange); font-size: 28px; cursor: pointer; padding-right: 15px; text-decoration: none; }
        .user-profile { display: flex; align-items: center; gap: 12px; flex: 1; }
        .chat-avatar { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; border: 1px solid var(--orange); }
        .chat-user-info { display: flex; flex-direction: column; }
        .chat-user-name { font-weight: bold; font-size: 16px; }
        .status { font-size: 11px; color: #2ecc71; }

        /* ZONE DES MESSAGES */
        .messages-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; background: linear-gradient(to bottom, #000, #050505); }
        .msg { max-width: 75%; padding: 12px 16px; border-radius: 18px; font-size: 15px; line-height: 1.4; position: relative; }
        .msg.received { align-self: flex-start; background: var(--gris); color: white; border-bottom-left-radius: 4px; }
        .msg.sent { align-self: flex-end; background: var(--orange); color: black; border-bottom-right-radius: 4px; font-weight: 500; }
        .msg-time { font-size: 10px; opacity: 0.6; margin-top: 5px; display: block; text-align: right; }

        /* BARRE D'ENVOI */
        .input-bar { padding: 15px 20px; background: #0a0a0a; border-top: 1px solid #222; display: flex; align-items: center; gap: 12px; padding-bottom: calc(15px + env(safe-area-inset-bottom)); }
        .input-wrapper { flex: 1; background: #1c1c1c; border-radius: 25px; padding: 10px 15px; display: flex; align-items: center; }
        .input-wrapper input { background: none; border: none; color: white; flex: 1; outline: none; font-size: 15px; }
        .send-btn { background: var(--orange); border: none; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; }
        .send-btn:active { transform: scale(0.9); }
    </style>
</head>
<body>

    <div class="chat-header">
        <a href="messages.html" class="back-btn">‹</a>
        <div class="user-profile">
            <img id="headerAvatar" src="" class="chat-avatar" onerror="this.src='https://ui-avatars.com/api/?name=User'">
            <div class="chat-user-info">
                <span class="chat-user-name" id="headerName">Utilisateur</span>
                <span class="status">En ligne</span>
            </div>
        </div>
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>
    </div>

    <div class="messages-container" id="msgBox">
        <div class="msg received">
            Salut ! Comment vas-tu ?
            <span class="msg-time">12:00</span>
        </div>
    </div>

    <div class="input-bar">
        <div class="input-wrapper">
            <input type="text" id="msgInput" placeholder="Écrire un message..." onkeypress="if(event.key==='Enter') sendMsg()">
        </div>
        <button class="send-btn" onclick="sendMsg()">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="black"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg>
        </button>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const userId = params.get('id');

        // Charger les infos de l'utilisateur
        function loadChatInfo() {
            const contacts = JSON.parse(localStorage.getItem('floy_contacts') || "[]");
            // On cherche aussi dans les groupes par défaut si besoin
            const defaultGroups = [
                { id: 'group_dev', name: 'Dev Floy Team', img: 'https://i.pravatar.cc/150?u=dev' },
                { id: 'contact_sarah', name: 'Sarah Wilson', img: 'https://i.pravatar.cc/150?u=sarah' }
            ];
            
            const user = [...contacts, ...defaultGroups].find(c => c.id === userId);

            if (user) {
                document.getElementById('headerName').textContent = user.name;
                document.getElementById('headerAvatar').src = user.img;
            }
        }

        function sendMsg() {
            const input = document.getElementById('msgInput');
            const box = document.getElementById('msgBox');
            if (!input.value.trim()) return;

            const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            
            const msgHtml = `
                <div class="msg sent">
                    ${input.value}
                    <span class="msg-time">${time}</span>
                </div>
            `;
            
            box.insertAdjacentHTML('beforeend', msgHtml);
            input.value = "";
            box.scrollTop = box.scrollHeight; // Auto-scroll vers le bas
        }

        window.onload = loadChatInfo;
    </script>
</body>
</html>
