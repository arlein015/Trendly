<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Floy - Chat Privé Sécurisé</title>
    <script src="upload.js"></script>
    <style>
        :root { --orange: #FF7A1A; --noir: #000; }
        body { background: var(--noir); color: white; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

        /* HEADER */
        .chat-header { display: flex; align-items: center; padding: 15px; border-bottom: 1px solid #1a1a1a; background: var(--noir); }
        .back-btn { cursor: pointer; margin-right: 15px; font-size: 24px; color: white; }

        /* ZONE MESSAGES */
        #chatBox { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; }
        .bubble { max-width: 75%; padding: 12px; border-radius: 18px; font-size: 15px; position: relative; }
        .sent { align-self: flex-end; background: var(--orange); color: black; border-bottom-right-radius: 2px; }
        .received { align-self: flex-start; background: #1a1a1a; border-bottom-left-radius: 2px; }
        
        /* MÉDIAS (SANS BORDURES) */
        .chat-media { 
            max-width: 100%; 
            border-radius: 12px; 
            display: block; 
            border: none !important; 
            outline: none !important;
        }
        .media-info { 
            font-size: 10px; 
            margin-top: 5px; 
            opacity: 0.7; 
            display: flex; 
            justify-content: space-between; 
        }

        /* BARRE DE SAISIE */
        .input-area { 
            background: #080808; padding: 10px 15px; display: flex; align-items: center; gap: 10px; border-top: 1px solid #1a1a1a;
            padding-bottom: env(safe-area-inset-bottom);
        }
        .message-input { flex: 1; background: #151515; border: 1px solid #222; padding: 12px 18px; border-radius: 25px; color: white; font-size: 16px; outline: none; }
        
        .btn-plus { color: var(--orange); font-size: 30px; background: none; border: none; cursor: pointer; font-weight: bold; }
        .btn-icon { background: none; border: none; cursor: pointer; color: white; display: flex; }
        .btn-send { width: 42px; height: 42px; background: var(--orange); border-radius: 50%; display: none; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div class="chat-header">
        <div class="back-btn" onclick="history.back()">←</div>
        <b id="partnerName">Chargement...</b>
    </div>

    <div id="chatBox"></div>

    <div class="input-area">
        <button class="btn-plus" onclick="document.getElementById('fileIn').click()">+</button>
        <input type="file" id="fileIn" accept="image/*,video/*" hidden onchange="handleFileUpload(this)">
        
        <input type="text" id="msgInput" class="message-input" placeholder="Message..." oninput="toggleButtons()">

        <button id="sendBtn" class="btn-icon btn-send" onclick="sendText()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="black"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
    </div>

    <script>
        // CONFIGURATION MP (Inversion des noms)
        const CURRENT_USER = "U1"; // Change en "U2" pour simuler l'autre téléphone
        const CONVO_ID = "prive_u1_u2";
        const partner = (CURRENT_USER === "U1") ? "Utilisateur 2" : "Utilisateur 1";
        document.getElementById('partnerName').innerText = partner;

        const chatBox = document.getElementById('chatBox');
        const msgInput = document.getElementById('msgInput');
        const sendBtn = document.getElementById('sendBtn');

        window.onload = load;

        function toggleButtons() {
            sendBtn.style.display = msgInput.value.trim() !== "" ? "flex" : "none";
        }

        // GESTION UPLOAD (Liaison avec upload.js)
        async function handleFileUpload(input) {
            if (input.files && input.files[0]) {
                try {
                    const result = await UploadModule.processFile(input.files[0]);
                    
                    let duration = "";
                    if (result.type === 'video') {
                        duration = await getVideoDuration(input.files[0]);
                    }

                    save({
                        content: result.content,
                        sender: CURRENT_USER,
                        type: result.type,
                        size: (result.size / 1024).toFixed(1) + " KB",
                        duration: duration
                    });
                    input.value = "";
                } catch (err) { alert(err); }
            }
        }

        // Fonction pour obtenir la durée d'une vidéo
        function getVideoDuration(file) {
            return new Promise((resolve) => {
                const video = document.createElement('video');
                video.preload = 'metadata';
                video.onloadedmetadata = () => {
                    const sec = Math.round(video.duration);
                    resolve(Math.floor(sec / 60) + ":" + (sec % 60).toString().padStart(2, '0'));
                };
                video.src = URL.createObjectURL(file);
            });
        }

        function sendText() {
            if (msgInput.value.trim()) {
                save({ content: msgInput.value, sender: CURRENT_USER, type: 'text' });
                msgInput.value = "";
                toggleButtons();
            }
        }

        function save(obj) {
            const logs = JSON.parse(localStorage.getItem(CONVO_ID)) || [];
            logs.push(obj);
            localStorage.setItem(CONVO_ID, JSON.stringify(logs));
            load();
        }

        function load() {
            chatBox.innerHTML = "";
            const logs = JSON.parse(localStorage.getItem(CONVO_ID)) || [];
            logs.forEach(m => {
                const b = document.createElement('div');
                b.className = `bubble ${m.sender === CURRENT_USER ? 'sent' : 'received'}`;
                
                if (m.type === 'image') {
                    b.innerHTML = `<img src="${m.content}" class="chat-media">
                                   <div class="media-info"><span>${m.size}</span></div>`;
                } else if (m.type === 'video') {
                    b.innerHTML = `<video src="${m.content}" controls class="chat-media"></video>
                                   <div class="media-info"><span>${m.size}</span> <span>${m.duration}</span></div>`;
                } else {
                    b.innerText = m.content;
                }
                chatBox.appendChild(b);
            });
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        msgInput.onkeypress = (e) => { if(e.key === "Enter") sendText(); };
    </script>
</body>
</html>
