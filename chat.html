<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta http-equiv="Content-Security-Policy" content="default-src * 'unsafe-inline' 'unsafe-eval' data: blob:; img-src * data: blob:; media-src * data: blob:; connect-src *;">
    
    <link rel="icon" href="data:,">

    <title>Floy Chat - Ultra</title>
    
  <style>
    :root {
        --bg-color: #000000;
        --card-bg: #111111; /* Un noir légèrement plus gris pour le contraste */
        /* Le dégradé signature de Threndly */
        --primary-gradient: linear-gradient(135deg, #7F00FF, #007BFF); 
        --accent-blue: #00FFFF; /* Cyan pour les accents */
        --text-color: #ffffff;
        --received-msg: #222222; /* Gris foncé pour les messages reçus */
    }

    body {
        background-color: var(--bg-color);
        color: var(--text-color);
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        margin: 0;
        display: flex;
        flex-direction: column;
        height: 100vh;
    }

    /* --- Header (En-tête) Stylé --- */
    header {
        padding: 20px;
        background: var(--card-bg);
        border-bottom: 1px solid #333; /* Séparation fine */
        display: flex;
        justify-content: space-between;
        align-items: center;
        /* Ajoute de la profondeur */
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5); 
    }

    header div[style] { /* Titre 'FLOY CHAT' */
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 1px;
    }

    /* --- Boutons d'Appel (Rond avec Halo) --- */
    .call-btns button {
        background: #1a1a1a;
        border: 1px solid var(--accent-blue);
        color: var(--accent-blue);
        border-radius: 50%;
        width: 45px;
        height: 45px;
        transition: 0.3s;
        margin-left: 10px;
        box-shadow: 0 0 10px rgba(0, 255, 255, 0.2); /* Halo subtil */
    }

    .call-btns button:hover {
        background: var(--accent-blue);
        color: #000;
        box-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
    }

    /* --- Bulles de Message Relookées --- */
    .msg {
        max-width: 70%;
        padding: 14px 18px;
        border-radius: 20px;
        font-size: 15px;
        position: relative;
    }

    /* Bulles envoyées : Ton dégradé de signature */
    .sent {
        align-self: flex-end;
        background: var(--primary-gradient);
        color: white;
        font-weight: 500;
        border-bottom-right-radius: 5px; /* Angle vif pour le style */
        box-shadow: 0 4px 15px rgba(127, 0, 255, 0.3); /* Ombre colorée */
    }

    /* Bulles reçues : Style minimaliste */
    .received {
        align-self: flex-start;
        background: var(--received-msg);
        color: #ddd;
        border-bottom-left-radius: 5px;
        border: 1px solid #333;
    }

    /* --- Barre d'Envoi Design --- */
    .input-area {
        padding: 20px;
        background: var(--card-bg);
        display: flex;
        align-items: center;
        gap: 15px;
        border-top: 1px solid #333;
    }

    /* Champ texte stylé */
    input[type="text"] {
        flex: 1;
        background: #1a1a1a;
        border: 1px solid #444;
        color: white;
        padding: 15px;
        border-radius: 30px; /* Plus arrondi */
        outline: none;
        transition: 0.3s;
    }

    input[type="text"]:focus {
        border-color: var(--accent-blue);
        box-shadow: 0 0 10px rgba(0, 255, 255, 0.2);
    }

    /* Boutons d'action (Ronds, Effet "Verre") */
    .btn-action {
        background: #1a1a1a;
        border: 1px solid #444;
        width: 50px;
        height: 50px;
        border-radius: 50%;
        cursor: pointer;
        font-size: 20px;
        color: #ddd;
        transition: 0.3s;
        box-shadow: 0 4px 6px rgba(0,0,0,0.3);
    }

    .btn-action:hover {
        border-color: #7F00FF;
        color: white;
        background: #222;
    }

    /* Bouton d'envoi principal (Dégradé + Halo) */
    #send-btn {
        background: var(--primary-gradient);
        border: none;
        color: white;
        box-shadow: 0 4px 15px rgba(0, 123, 255, 0.4);
    }

    #send-btn:hover {
        box-shadow: 0 6px 20px rgba(0, 123, 255, 0.6);
        transform: scale(1.05); /* Effet d'agrandissement */
    }
</style>
</head>
<body>

<header>
    <div style="font-weight: bold; color: #7F00FF; letter-spacing: 1px;">FLOY MESSENGER</div>
    <div class="call-btns">
        <button title="Appel Audio">📞</button>
        <button title="Appel Vidéo">📹</button>
    </div>
</header>

<div id="messages-container"></div>

<div class="input-area">
    <input type="file" id="file-input" style="display:none" accept="image/*,video/*">
    <button class="btn-action" onclick="document.getElementById('file-input').click()">📷</button>
    <button class="btn-action" id="vocal-btn">🎤</button>
    <input type="text" id="msg-input" placeholder="Écrivez votre message...">
    <button class="btn-action" id="send-btn">🚀</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

    // --- CONFIGURATION FIREBASE (REMPLACE PAR TES INFOS) ---
    const firebaseConfig = {
        apiKey: "TON_API_KEY",
        authDomain: "floy-9f9a1.firebaseapp.com",
        projectId: "floy-9f9a1",
        storageBucket: "floy-9f9a1.firebasestorage.app",
        messagingSenderId: "TON_ID",
        appId: "TON_APP_ID"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const storage = getStorage(app);

    const chatId = new URLSearchParams(window.location.search).get('id') || "chat_demo";
    let mediaRecorder;
    let audioChunks = [];

    // --- CHARGEMENT DES MESSAGES ---
    onAuthStateChanged(auth, (user) => {
        if (user) {
            const q = query(collection(db, "chats", chatId, "messages"), orderBy("timestamp", "asc"));
            onSnapshot(q, (snap) => {
                const container = document.getElementById('messages-container');
                container.innerHTML = "";
                snap.forEach(doc => {
                    const d = doc.data();
                    const div = document.createElement('div');
                    div.className = `msg ${d.senderId === user.uid ? 'sent' : 'received'}`;
                    
                    if(d.type === "image") div.innerHTML += `<img src="${d.url}" class="media">`;
                    if(d.type === "video") div.innerHTML += `<video src="${d.url}" controls class="media"></video>`;
                    if(d.type === "vocal") div.innerHTML += `<audio src="${d.url}" controls></audio>`;
                    if(d.text) div.innerHTML += `<div>${d.text}</div>`;
                    
                    container.appendChild(div);
                });
                container.scrollTop = container.scrollHeight;
            });
        }
    });

    // --- ENVOI TEXTE ---
    async function sendText() {
        const text = document.getElementById('msg-input').value.trim();
        if (text && auth.currentUser) {
            document.getElementById('msg-input').value = "";
            await addDoc(collection(db, "chats", chatId, "messages"), {
                text, type: "text", senderId: auth.currentUser.uid, timestamp: serverTimestamp()
            });
        }
    }
    document.getElementById('send-btn').onclick = sendText;

    // --- GESTION DES FICHIERS (IMAGE/VIDEO) ---
    document.getElementById('file-input').onchange = async (e) => {
        const file = e.target.files[0];
        if (file && auth.currentUser) {
            const fRef = ref(storage, `chats/${chatId}/${Date.now()}_${file.name}`);
            await uploadBytes(fRef, file);
            const url = await getDownloadURL(fRef);
            await addDoc(collection(db, "chats", chatId, "messages"), {
                url, type: file.type.includes("image") ? "image" : "video",
                senderId: auth.currentUser.uid, timestamp: serverTimestamp()
            });
        }
    };

    // --- GESTION DU VOCAL ---
    const vocalBtn = document.getElementById('vocal-btn');
    vocalBtn.onclick = async () => {
        if (!mediaRecorder || mediaRecorder.state === "inactive") {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            audioChunks = [];
            mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
            mediaRecorder.onstop = async () => {
                const audioBlob = new Blob(audioChunks, { type: 'audio/mp3' });
                const fRef = ref(storage, `chats/${chatId}/vocal_${Date.now()}.mp3`);
                await uploadBytes(fRef, audioBlob);
                const url = await getDownloadURL(fRef);
                await addDoc(collection(db, "chats", chatId, "messages"), {
                    url, type: "vocal", senderId: auth.currentUser.uid, timestamp: serverTimestamp()
                });
            };
            mediaRecorder.start();
            vocalBtn.classList.add('recording');
        } else {
            mediaRecorder.stop();
            vocalBtn.classList.remove('recording');
        }
    };
</script>
</body>
</html>
