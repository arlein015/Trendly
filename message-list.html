<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messages - Floy</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --orange: #FF7A1A; --bg: #000; --card: #121212; --text-gray: #a8a8a8; }
        body { background: var(--bg); color: white; font-family: -apple-system, sans-serif; margin: 0; padding-bottom: 80px; }

        /* Header */
        .header { padding: 15px 20px; display: flex; align-items: center; border-bottom: 1px solid #1a1a1a; position: sticky; top: 0; background: #000; z-index: 100; }
        .header h2 { margin: 0; font-size: 18px; flex: 1; text-align: center; margin-right: 30px; }

        /* Liste des discussions */
        .chat-list { padding: 5px 0; }
        .chat-item { 
            display: flex; align-items: center; padding: 12px 18px; 
            text-decoration: none; color: white; border-bottom: 0.5px solid #111;
        }
        .chat-item:active { background: #161616; }
        
        .user-avatar { width: 56px; height: 56px; border-radius: 50%; object-fit: cover; background: #222; margin-right: 15px; }
        
        .chat-content { flex: 1; min-width: 0; }
        .chat-header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
        .chat-name { font-weight: 700; font-size: 15px; }
        .chat-time { font-size: 11px; color: var(--text-gray); }
        
        .chat-msg-preview { font-size: 13px; color: var(--text-gray); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* Nav Bar SVG Moderne */
        .nav-bar { position: fixed; bottom: 0; width: 100%; height: 65px; background: #000; border-top: 1px solid #1a1a1a; display: flex; justify-content: space-around; align-items: center; z-index: 1000; }
        .nav-icon { width: 24px; height: 24px; fill: white; cursor: pointer; }
        .nav-icon.active { fill: var(--orange); }
    </style>
</head>
<body>

    <div class="header">
        <i class="fas fa-arrow-left" onclick="history.back()" style="cursor:pointer"></i>
        <h2>Discussions</h2>
    </div>

    <div id="chats-container" class="chat-list">
        <p style="text-align: center; color: #444; margin-top: 50px;">Recherche de vos messages...</p>
    </div>

    <div class="nav-bar">
        <svg class="nav-icon" viewBox="0 0 24 24" onclick="location.href='index.html'"><path d="M12 2.099l-9 8.165v11.736h6v-6h6v6h6v-11.736l-9-8.165z"/></svg>
        <svg class="nav-icon" viewBox="0 0 24 24"><path d="M10 18h4v-2h-4v2zM3 6v2h18V6H3zm3 7h12v-2H6v2z"/></svg>
        <svg class="nav-icon" viewBox="0 0 24 24" onclick="location.href='create.html'"><path d="M19 11h-6V5h-2v6H5v2h6v6h2v-6h6z"/></svg>
        <svg class="nav-icon active" viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
        <svg class="nav-icon" viewBox="0 0 24 24" onclick="location.href='profil.html'"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
    </div>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { collection, query, where, orderBy, onSnapshot, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        onAuthStateChanged(auth, (user) => {
            if (user) {
                // LA REQUÊTE : On cherche les chats où TU es dans le tableau 'users'
                const q = query(
                    collection(db, "chats"),
                    where("users", "array-contains", user.uid),
                    orderBy("lastUpdate", "desc")
                );

                onSnapshot(q, (snapshot) => {
                    const container = document.getElementById('chats-container');
                    container.innerHTML = "";

                    if (snapshot.empty) {
                        container.innerHTML = "<p style='text-align:center; color:#555; margin-top:50px;'>Aucune discussion trouvée.</p>";
                        return;
                    }

                    snapshot.forEach(async (docSnap) => {
                        const chat = docSnap.data();
                        const chatId = docSnap.id;
                        
                        // Trouver l'ID de l'autre personne
                        const otherUserId = chat.users.find(id => id !== user.uid);
                        
                        // Créer le squelette de la ligne
                        const chatItem = document.createElement('div');
                        chatItem.className = 'chat-item';
                        chatItem.style.cursor = "pointer";
                        chatItem.onclick = () => location.href = `chat.html?id=${chatId}`;
                        
                        chatItem.innerHTML = `
                            <img src="https://via.placeholder.com/100" class="user-avatar" id="img-${chatId}">
                            <div class="chat-content">
                                <div class="chat-header-row">
                                    <span class="chat-name" id="name-${chatId}">Chargement...</span>
                                    <span class="chat-time">${formatTime(chat.lastUpdate)}</span>
                                </div>
                                <div class="chat-msg-preview">${chat.lastMessage || "Nouveau message"}</div>
                            </div>
                        `;
                        container.appendChild(chatItem);

                        // Récupérer les infos de l'autre personne en direct
                        const uRef = doc(db, "users", otherUserId);
                        const uSnap = await getDoc(uRef);
                        if(uSnap.exists()) {
                            const userData = uSnap.data();
                            document.getElementById(`name-${chatId}`).innerText = userData.username || "Utilisateur";
                            if(userData.avatarUrl) {
                                document.getElementById(`img-${chatId}`).src = userData.avatarUrl;
                            }
                        }
                    });
                }, (error) => {
                    console.error("Erreur Firestore:", error);
                    if(error.message.includes("index")) {
                        document.getElementById('chats-container').innerHTML = `
                            <p style="padding:20px; color:orange; text-align:center; font-size:12px;">
                                L'index Firestore est en cours de création. Revenez dans 2 minutes.
                            </p>`;
                    }
                });
            } else {
                window.location.href = "connexion.html";
            }
        });

        function formatTime(timestamp) {
            if(!timestamp) return "";
            const date = timestamp.toDate();
            return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }
    </script>
</body>
</html>
