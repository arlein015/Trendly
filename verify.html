<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Threndly - Vérification</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .code-container { display: flex; gap: 10px; justify-content: center; margin: 20px 0; }
        .code-input { 
            width: 40px; height: 50px; text-align: center; font-size: 20px; 
            background: #111; border: 1px solid #333; color: white; border-radius: 8px;
        }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="login-card">
            <h1 class="main-title">Vérification</h1>
            <p style="color: #888;">Entrez le code à 6 chiffres envoyé à votre adresse mail.</p>
            
            <div class="code-container">
                <input type="text" class="code-input" maxlength="1">
                <input type="text" class="code-input" maxlength="1">
                <input type="text" class="code-input" maxlength="1">
                <input type="text" class="code-input" maxlength="1">
                <input type="text" class="code-input" maxlength="1">
                <input type="text" class="code-input" maxlength="1">
            </div>

            <button id="confirmBtn" class="btn-login">Confirmer</button>
        </div>
    </div>
    <script>
        // Logique simple pour passer d'une case à l'autre
        const inputs = document.querySelectorAll('.code-input');
        inputs.forEach((input, index) => {
            input.addEventListener('input', () => {
                if (input.value && index < inputs.length - 1) inputs[index + 1].focus();
            });
        });

        document.getElementById('confirmBtn').onclick = () => {
            localStorage.setItem('isLoggedIn', 'true'); // Pour rester connecté
            window.location.href = 'chat.html'; // Vers la discussion
        };
    </script>
</body>
</html>
