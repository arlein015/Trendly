<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vérification - FLOY</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-container">
        <div class="login-card">
            
            <div class="logo-container">
                <h1 class="text-logo">F<span class="gradient-text">LOY</span></h1>
            </div>

            <h2>Vérifiez votre e-mail</h2>
            <p class="subtitle">Nous avons envoyé un code à 6 chiffres à votre adresse e-mail.</p>
            
            <form id="verifyForm">
                <div class="otp-container">
                    <input type="text" class="otp-input" maxlength="1" pattern="\d*" inputmode="numeric">
                    <input type="text" class="otp-input" maxlength="1" pattern="\d*" inputmode="numeric">
                    <input type="text" class="otp-input" maxlength="1" pattern="\d*" inputmode="numeric">
                    <input type="text" class="otp-input" maxlength="1" pattern="\d*" inputmode="numeric">
                    <input type="text" class="otp-input" maxlength="1" pattern="\d*" inputmode="numeric">
                    <input type="text" class="otp-input" maxlength="1" pattern="\d*" inputmode="numeric">
                </div>
                
                <button type="submit" class="btn-primary">Vérifier le compte</button>
            </form>
            
            <div class="footer-links">
                <p>Vous n'avez pas reçu le code ? <a href="#" class="link-secondary">Renvoyer</a></p>
                <a href="signup.html" class="link-muted">Modifier l'e-mail</a>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
