<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Floy - Vérification</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <link rel="icon" type="image/png" href="logo.png">

    <style>
        :root {
            --floy-orange: #ff8c00;
            --bg-black: #000000;
        }

        body {
            margin: 0; background: var(--bg-black); color: white;
            font-family: 'Poppins', sans-serif; display: flex; align-items: center;
            justify-content: center; min-height: 100vh;
        }

        .verify-card {
            width: 90%; max-width: 380px; text-align: center; padding: 20px;
        }

        .logo-small { width: 70px; margin-bottom: 20px; border-radius: 15px; }

        h2 { margin-bottom: 10px; font-weight: 700; }
        p { color: #888; font-size: 14px; margin-bottom: 30px; }

        /* Conteneur des 6 chiffres */
        .code-container {
            display: flex; justify-content: space-between; gap: 8px; margin-bottom: 30px;
        }

        .code-input {
            width: 45px; height: 55px; background: #111; border: 1px solid #222;
            border-radius: 10px; color: white; text-align: center; font-size: 24px;
            font-weight: 700; outline: none; transition: 0.3s;
        }

        .code-input:focus { border-color: var(--floy-orange); box-shadow: 0 0 10px rgba(255, 140, 0, 0.2); }

        .btn-verify {
            width: 100%; background: var(--floy-orange); color: white; border: none;
            padding: 16px; border-radius: 12px; font-weight: 700; font-size: 16px;
            cursor: pointer; transition: 0.3s;
        }

        .resend-link {
            margin-top: 25px; font-size: 13px; color: #555;
        }

        .resend-link span { color: var(--floy-orange); cursor: pointer; font-weight: 600; }
    </style>
</head>
<body>

    <div class="verify-card">
        <img src="logo.png" alt="Floy" class="logo-small">
        <h2>Vérifiez votre email</h2>
        <p>Entrez le code à 6 chiffres envoyé à votre adresse email pour finaliser l'inscription.</p>

        <div class="code-container" id="otp-inputs">
            <input type="text" class="code-input" maxlength="1" oninput="moveNext(this, 0)">
            <input type="text" class="code-input" maxlength="1" oninput="moveNext(this, 1)">
            <input type="text" class="code-input" maxlength="1" oninput="moveNext(this, 2)">
            <input type="text" class="code-input" maxlength="1" oninput="moveNext(this, 3)">
            <input type="text" class="code-input" maxlength="1" oninput="moveNext(this, 4)">
            <input type="text" class="code-input" maxlength="1" oninput="moveNext(this, 5)">
        </div>

        <button class="btn-verify" onclick="checkCode()">Confirmer</button>
        
        <div class="resend-link">
            Vous n'avez rien reçu ? <span onclick="alert('Un nouveau code a été envoyé !')">Renvoyer le code</span>
        </div>
    </div>

    <script>
        const inputs = document.querySelectorAll('.code-input');

        // Déplacement automatique vers la case suivante
        function moveNext(current, index) {
            if (current.value.length === 1 && index < 5) {
                inputs[index + 1].focus();
            }
        }

        // Gestion du bouton de retour (Backspacer)
        inputs.forEach((input, index) => {
            input.addEventListener('keydown', (e) => {
                if (e.key === "Backspace" && input.value === "" && index > 0) {
                    inputs[index - 1].focus();
                }
            });
        });

        function checkCode() {
            let fullCode = "";
            inputs.forEach(i => fullCode += i.value);

            if (fullCode.length === 6) {
                alert("Vérification réussie ! Bienvenue sur Floy.");
                window.location.href = 'feed.html';
            } else {
                alert("Veuillez entrer les 6 chiffres du code.");
            }
        }
    </script>
</body>
</html>
