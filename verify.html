<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Vérification - FLOY</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 20px; text-align: center; width: 350px; }
        .otp-box { display: flex; gap: 10px; justify-content: center; margin: 20px 0; }
        .otp-box input { width: 40px; height: 50px; text-align: center; font-size: 20px; border: 2px solid #ddd; border-radius: 8px; }
        button { width: 100%; padding: 12px; background: #007bff; color: white; border: none; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <h3>Vérifier votre code</h3>
        <p id="timer">Expire dans 60s</p>
        <div class="otp-box" id="inputs">
            <input type="text" maxlength="1"> <input type="text" maxlength="1">
            <input type="text" maxlength="1"> <input type="text" maxlength="1">
            <input type="text" maxlength="1"> <input type="text" maxlength="1">
        </div>
        <button onclick="verify()">Valider</button>
    </div>

    <script>
        // Auto-focus des cases
        const inps = document.querySelectorAll('.otp-box input');
        inps.forEach((p, i) => {
            p.oninput = () => { if(p.value && i < 5) inps[i+1].focus(); };
        });

        function verify() {
            let code = "";
            inps.forEach(p => code += p.value);
            
            const real = localStorage.getItem('validOTP');
            const exp = localStorage.getItem('otpExpiration');

            if (Date.now() > exp) return alert("Code expiré !");
            
            if (code === real) {
                alert("Compte activé !");
                window.location.href = 'feed.html';
            } else {
                alert("Code incorrect !");
            }
        }
    </script>
</body>
</html>
