<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Floy - Recherche</title>
    <style>
        :root { --orange: #FF7A1A; --noir: #000; }
        body { background: var(--noir); color: white; font-family: sans-serif; margin: 0; }
        
        .search-container { padding: 15px; border-bottom: 1px solid #1a1a1a; display: flex; align-items: center; gap: 10px; }
        .back-btn { font-size: 24px; cursor: pointer; }
        .search-input { flex: 1; background: #111; border: 1px solid #222; padding: 12px 15px; border-radius: 10px; color: white; outline: none; font-size: 14px; }
        .search-input:focus { border-color: var(--orange); }

        .results { padding: 10px; }
        .result-item { display: flex; align-items: center; padding: 12px; cursor: pointer; border-radius: 10px; transition: 0.2s; }
        .result-item:hover { background: #0a0a0a; }
        
        .avatar-sm { width: 40px; height: 40px; border-radius: 50%; background: #222; margin-right: 12px; }
        .username { font-weight: bold; font-size: 14px; }
        .full-name { font-size: 12px; color: #555; display: block; }
    </style>
</head>
<body>

    <div class="search-container">
        <div class="back-btn" onclick="window.location.href='message-list.html'">←</div>
        <input type="text" class="search-input" placeholder="Rechercher un utilisateur..." autofocus>
    </div>

    <div class="results">
        <p style="color: #444; padding-left: 12px; font-size: 12px;">SUGGESTIONS</p>
        
        <div class="result-item" onclick="window.location.href='chat.html'">
            <img src="https://picsum.photos/100?random=50" class="avatar-sm">
            <div>
                <span class="username">sami_dev</span>
                <span class="full-name">Sami Python</span>
            </div>
        </div>

        <div class="result-item" onclick="window.location.href='chat.html'">
            <img src="https://picsum.photos/100?random=51" class="avatar-sm">
            <div>
                <span class="username">lina_floy</span>
                <span class="full-name">Lina Designer</span>
            </div>
        </div>
    </div>

    <script src="navbar.js"></script>
</body>
</html>
