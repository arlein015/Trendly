<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Floy - Messenger</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            margin: 0;
            background: #1a0033; /* Violet sombre Floy */
            font-family: sans-serif;
            color: white;
        }
        .header {
            padding: 50px 20px 15px;
            background: #000; /* Noir pur de tes images */
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .nav-bottom {
            position: fixed; bottom: 0; width: 100%; height: 70px;
            background: #000; display: flex; justify-content: space-around; align-items: center;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
    </style>
</head>
<body>
    <div class="header">
        <i class="fas fa-arrow-left" onclick="window.history.back()"></i>
        <span style="font-weight: bold;">Floy Messenger</span>
    </div>

    <div style="padding: 20px;">
        <p style="opacity: 0.5;">Tes discussions privées s'afficheront ici.</p>
    </div>

    <nav class="nav-bottom">
        <i class="fas fa-home" onclick="window.location.href='feed.html'"></i>
        <i class="fas fa-compass"></i>
        <div style="background: linear-gradient(to right, #00e5ff, #a456f0); padding: 5px 15px; border-radius: 10px; color: black;">
            <i class="fas fa-plus"></i>
        </div>
        <i class="fas fa-comment-alt" style="opacity: 1;"></i>
        <i class="fas fa-user" onclick="window.location.href='profile.html'"></i>
    </nav>
</body>
</html>
