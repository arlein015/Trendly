<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Floy - Messages</title>
    <style>
        :root { --orange: #FF7A1A; --noir: #000; --gris: #121212; --bordure: #262626; }
        body { background: var(--noir); color: white; font-family: -apple-system, sans-serif; margin: 0; }
        header { padding: 20px; border-bottom: 1px solid var(--bordure); text-align: center; font-weight: bold; font-size: 18px; }
        
        #chats-list { max-width: 600px; margin: 0 auto; }
        
        /* Style d'une discussion dans la liste */
        .chat-item { 
            display: flex; 
            align-items: center; 
            padding: 15px; 
            border-bottom: 1px solid #111;
            text-decoration: none;
            color: white;
        }
        .chat-item:active { background: #111; }
        .avatar { width: 50px; height: 50px; background: var(--gris); border-radius: 50%; margin-right: 15px; }
        .chat-info { flex: 1; }
        .chat-name { font-weight: bold; margin-bottom: 4px; }
        .chat-last { color: #888; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 200px; }

        /* Message si vide */
        .empty-state { text-align: center; margin-top: 100px; color: #555; }
        .empty-state svg { margin-bottom: 10px; opacity: 0.3; }
        
        /* Barre de navigation bas */
        .nav-bar { position: fixed; bottom: 0; width: 100%; height: 70px; background: black; border-top: 1px solid var(--bordure); display: flex; justify-content: space-around; align-items: center; }
    </style>
</head>
<body>

    <header>Messages</header>

    <div id="chats-list">
        <div class="empty-state" id="loader">Chargement...</div>
    </div>

    <nav class="nav-bar">
        <a href="index.html" style="color:#555;"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path></svg></a>
        <a href="post.html" style="color:white;"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg></a>
        <a href="messages.html" style="color:var(--orange);"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path></svg></a>
    </nav>

    <script type="module">
        import { db } from './firebase-config.js';
        import { collection, query, where, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Pour ce test, on simule l'ID de l'utilisateur connecté
        const monID = "User_Floy"; 

        const chatsList = document.getElementById('chats-list');

        // On cherche les discussions où monID est présent dans le tableau 'users'
        const q = query(
            collection(db, "chats"), 
            where("users", "array-contains", monID),
            orderBy("timestamp", "desc")
        );

        onSnapshot(q, (snapshot) => {
            chatsList.innerHTML = "";

            if (snapshot.empty) {
                chatsList.innerHTML = `
                    <div class="empty-state">
                        <svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path></svg>
                        <p>Aucun message pour l'instant.<br>Lancez une discussion !</p>
                    </div>`;
                return;
            }

            snapshot.forEach((doc) => {
                const chat = doc.data();
                // On trouve le nom de l'autre personne (celle qui n'est pas moi)
                const autreUser = chat.users.find(u => u !== monID);

                chatsList.innerHTML += `
                    <a href="chat_detail.html?id=${doc.id}" class="chat-item">
                        <div class="avatar"></div>
                        <div class="chat-info">
                            <div class="chat-name">${autreUser}</div>
                            <div class="chat-last">${chat.lastMessage}</div>
                        </div>
                    </a>`;
            });
        });
    </script>
</body>
</html>
