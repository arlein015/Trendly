<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messages - Floy</title>
    <style>
        :root { --orange: #FF7A1A; --noir: #000; }
        body { background: var(--noir); color: white; font-family: sans-serif; margin: 0; }
        .header { padding: 20px; border-bottom: 1px solid #1a1a1a; }
        .chat-list { padding-bottom: 80px; }
        .chat-item { display: flex; align-items: center; padding: 15px 20px; text-decoration: none; color: white; border-bottom: 1px solid #0a0a0a; }
        .avatar { width: 55px; height: 55px; border-radius: 50%; margin-right: 15px; border: 1px solid #222; }
        .user-name { font-weight: bold; }
        .last-msg { color: #666; font-size: 13px; }
    </style>
</head>
<body>
    <div class="header"><h1>Messages</h1></div>
    <div class="chat-list" id="chatList"></div>
    <script>
        function render() {
            const list = document.getElementById('chatList');
            const contacts = JSON.parse(localStorage.getItem('floy_contacts') || "[]");
            list.innerHTML = contacts.map(c => `
                <a href="chat.html?id=${c.id}" class="chat-item">
                    <img src="${c.img}" class="avatar" onerror="this.src='https://ui-avatars.com/api/?name=${c.name}'">
                    <div>
                        <div class="user-name">${c.name}</div>
                        <div class="last-msg">Cliquez pour discuter</div>
                    </div>
                </a>
            `).join('');
        }
        window.onload = render;
    </script>
</body>
</html>
