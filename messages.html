<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discussions - Floy</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --orange: #FF7A1A; }
        body { background: #000; color: white; font-family: -apple-system, sans-serif; margin: 0; }
        
        .header { padding: 15px; display: flex; align-items: center; border-bottom: 1px solid #222; position: sticky; top: 0; background: #000; z-index: 10; }
        .header i { font-size: 20px; margin-right: 20px; cursor: pointer; }

        .chat-list { padding: 10px 0; }
        .chat-item { 
            display: flex; align-items: center; padding: 12px 15px; 
            text-decoration: none; color: white; cursor: pointer;
        }
        .chat-item:active { background: #1a1a1a; }
        
        .user-img { width: 55px; height: 55px; border-radius: 50%; background: #222; margin-right: 15px; object-fit: cover; }
        
        .chat-info { flex: 1; border-bottom: 0.5px solid #121212; padding-bottom: 10px; }
        .chat-name { font-weight: bold; font-size: 15px; display: block; margin-bottom: 3px; }
        .chat-last-msg { font-size: 13px; color: #888; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 200px; }
        
        .unread-dot { width: 8px; height: 8px; background: var(--orange); border-radius: 50%; margin-left: 10px; }
    </style>
</head>
<body>

    <div class="header">
        <i class="fas fa-arrow-left" onclick="history.back()"></i>
        <b>Messages</b>
    </div>

    <div id="list-container" class="chat-list">
        <p style="text-align: center; color: #444; margin-top: 50px;">Chargement de vos messages...</p>
    </div>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { collection, query, where, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        onAuthStateChanged(auth, (user) => {
            if (user) {
                // Requête : Trouver les chats où l'utilisateur actuel est présent dans le tableau 'users'
                const q = query(
                    collection(db, "chats"),
                    where("users", "array-contains", user.uid),
                    orderBy("lastUpdate", "desc")
                );

                onSnapshot(q, (snapshot) => {
                    const container = document.getElementById('list-container');
                    container.innerHTML = "";

                    if (snapshot.empty) {
                        container.innerHTML = "<p style='text-align:center; color:#555; margin-top:50px;'>Aucune discussion pour le moment.</p>";
                        return;
                    }

                    snapshot.forEach((docSnap) => {
                        const chat = docSnap.data();
                        const chatId = docSnap.id;
                        
                        // Trouver le nom de l'autre personne (pas le nôtre)
                        const otherUserId = chat.users.find(id => id !== user.uid);
                        const otherUserName = chat.names ? chat.names[otherUserId] : "Utilisateur";

                        // Création de l'élément HTML pour la liste
                        const chatEl = document.createElement('div');
                        chatEl.className = 'chat-item';
                        chatEl.onclick = () => location.href = `chat.html?id=${chatId}`;
                        
                        chatEl.innerHTML = `
                            <img src="https://via.placeholder.com/150" class="user-img">
                            <div class="chat-info">
                                <span class="chat-name">${otherUserName}</span>
                                <p class="chat-last-msg">${chat.lastMessage || "Envoyer un message..."}</p>
                            </div>
                            ${chat.unseen ? '<div class="unread-dot"></div>' : ''}
                        `;
                        container.appendChild(chatEl);
                    });
                });
            } else {
                location.href = 'connexion.html';
            }
        });
    </script>
</body>
</html>
