<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Floy - Messenger</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --bg-violet: #1a0033;
            --floy-cyan: #00e5ff;
            --floy-orange: #ff8c00;
            --nav-black: #000000;
        }

        body {
            margin: 0;
            background: linear-gradient(180deg, var(--bg-violet) 0%, #000000 100%);
            background-attachment: fixed;
            font-family: 'Poppins', sans-serif;
            color: white;
            min-height: 100vh;
            padding-bottom: 90px;
        }

        .header {
            padding: 50px 20px 15px;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(20px);
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky; top: 0; z-index: 100;
        }

        /* Barre de Recherche */
        .search-container {
            padding: 10px 15px 20px;
        }
        .search-bar {
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 12px 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .search-bar input {
            background: transparent; border: none; color: white;
            outline: none; width: 100%; font-family: 'Poppins';
        }

        /* Stories */
        .stories-section { padding: 10px 15px; display: flex; gap: 15px; overflow-x: auto; scrollbar-width: none; }
        .story-ring { width: 65px; height: 65px; border-radius: 50%; border: 2px solid #a456f0; padding: 3px; }
        .story-ring img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }

        /* Liste Discussions */
        .chat-list { padding: 0 15px; }
        .chat-item {
            display: flex; align-items: center; gap: 15px; padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px; margin-bottom: 12px;
            border: 1px solid rgba(255, 255, 255, 0.03);
            cursor: pointer;
        }
        .user-avatar { width: 55px; height: 55px; border-radius: 50%; object-fit: cover; }
        .chat-info { flex: 1; }
        .user-name { font-weight: 700; display: flex; align-items: center; gap: 5px; }

        /* Nav Basse */
        .footer-nav {
            position: fixed; bottom: 0; width: 100%; height: 75px;
            background: var(--nav-black); display: flex;
            justify-content: space-around; align-items: center;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }
        .plus-btn { background: linear-gradient(to right, #00e5ff, #a456f0); padding: 5px 15px; border-radius: 12px; color: black; }
    .btn-video {
  background: linear-gradient(135deg, #7F00FF, #00FFFF);
  color: white;
  border-radius: 50px;
  padding: 10px 20px;
  border: none;
  font-weight: bold;
}
    </style>
</head>
<body>

    <header class="header">
        <i class="fas fa-chevron-left" onclick="window.location.href='feed.html'"></i>
        <span style="font-weight: 700;">Floy Messenger</span>
        <i class="fas fa-edit" style="color: var(--floy-orange);"></i>
    </header>

    <div class="stories-section">
        <div class="story-ring"><img src="logo.png"></div>
        <div class="story-ring"><img src="user1.jpg"></div>
        <div class="story-ring"><img src="user2.jpg"></div>
    </div>

    <div class="search-container">
        <div class="search-bar">
            <i class="fas fa-search" style="opacity: 0.4;"></i>
            <input type="text" id="searchInput" placeholder="Rechercher un ami..." onkeyup="filterUsers()">
        </div>
    </div>

    <div class="chat-list" id="userList">
        <div class="chat-item" onclick="window.location.href='chat.html'">
            <img src="logo.png" class="user-avatar">
            <div class="chat-info">
                <div class="user-name">@bouta <i class="fas fa-check-circle" style="color: var(--floy-cyan);"></i></div>
                <div style="font-size: 13px; opacity: 0.6;">Firebase est prêt ! 🚀</div>
            </div>
        </div>
        <div class="chat-item" onclick="window.location.href='chat.html'">
            <div class="user-avatar" style="background:#333; display:flex; align-items:center; justify-content:center;"><i class="fas fa-user"></i></div>
            <div class="chat-info">
                <div class="user-name">Luther</div>
                <div style="font-size: 13px; opacity: 0.6;">Salut, ça va ?</div>
            </div>
        </div>
    </div>

    <nav class="footer-nav">
        <i class="fas fa-home" style="opacity:0.5" onclick="window.location.href='feed.html'"></i>
        <i class="fas fa-compass" style="opacity:0.5"></i>
        <div class="plus-btn"><i class="fas fa-plus"></i></div>
        <i class="fas fa-comment-alt"></i>
        <i class="fas fa-user" style="opacity:0.5" onclick="window.location.href='profile.html'"></i>
    </nav>

    <script>
        // Fonction de recherche en temps réel
        function filterUsers() {
            let input = document.getElementById('searchInput').value.toLowerCase();
            let users = document.getElementsByClassName('chat-item');
            
            for (let i = 0; i < users.length; i++) {
                let name = users[i].getElementsByClassName('user-name')[0].innerText.toLowerCase();
                if (name.includes(input)) {
                    users[i].style.display = "flex";
                } else {
                    users[i].style.display = "none";
                }
            }
        }
    </script>
</body>
</html>
