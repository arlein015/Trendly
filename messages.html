<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💬</text></svg>">
    <title>Messages - Floy</title>
    <style>
        :root { --orange: #FF7A1A; --noir: #000; --gris: #121212; }
        body { background: var(--noir); color: white; font-family: -apple-system, sans-serif; margin: 0; padding-bottom: 90px; }
        
        .header { padding: 15px 20px; border-bottom: 1px solid #1a1a1a; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; background: black; z-index: 100; }
        .header h1 { font-size: 20px; margin: 0; }

        .chat-list { padding: 10px 0; }
        .chat-item { display: flex; align-items: center; padding: 15px 20px; gap: 15px; text-decoration: none; color: white; transition: background 0.2s; }
        .chat-item:active { background: #111; }
        .chat-avatar { width: 55px; height: 55px; border-radius: 50%; background: #333; overflow: hidden; }
        .chat-info { flex: 1; border-bottom: 0.5px solid #1a1a1a; padding-bottom: 10px; }
        .chat-info h3 { margin: 0 0 5px; font-size: 16px; }
        .chat-info p { margin: 0; font-size: 14px; color: #888; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* NAV BAR SVG MODERNE */
        .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; height: 75px; background: rgba(5,5,5,0.98); border-top: 1px solid #1a1a1a; display: flex; justify-content: space-evenly; align-items: center; padding-bottom: env(safe-area-inset-bottom); z-index: 1000; }
        .nav-link { color: #666; text-decoration: none; display: flex; flex-direction: column; align-items: center; }
        .nav-link.active { color: white; }
        .nav-svg { width: 26px; height: 26px; fill: currentColor; }
        .nav-plus { background: white; border-radius: 10px; padding: 5px 12px; color: black !important; }
    </style>
</head>
<body>

    <header class="header">
        <h1>Messages</h1>
        <svg class="nav-svg" viewBox="0 0 24 24" style="color:var(--orange)"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
    </header>

    <div class="chat-list">
        <a href="chat.html" class="chat-item">
            <div class="chat-avatar"><img src="https://ui-avatars.com/api/?name=Sam" width="100%"></div>
            <div class="chat-info">
                <h3>Sam_Floy</h3>
                <p>Le live de demain est prêt ? 🔥</p>
            </div>
        </a>
        <a href="#" class="chat-item">
            <div class="chat-avatar"><img src="https://ui-avatars.com/api/?name=Lina" width="100%"></div>
            <div class="chat-info">
                <h3>Lina_Dev</h3>
                <p>J'adore le nouveau module + !</p>
            </div>
        </a>
    </div>

    <nav class="nav-bar">
        <a href="index.html" class="nav-link"><svg class="nav-svg" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg></a>
        <a href="explorer.html" class="nav-link"><svg class="nav-svg" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg></a>
        <a href="create.html" class="nav-link nav-plus"><svg class="nav-svg" viewBox="0 0 24 24" style="width:20px; height:20px;"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg></a>
        <a href="messages.html" class="nav-link active"><svg class="nav-svg" viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-1.99.9-1.99 2L2 22l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zM6 9h12v2H6V9zm8 5H6v-2h8v2zm4-7H6V5h12v2z"/></svg></a>
        <a href="profil.html" class="nav-link"><svg class="nav-svg" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg></a>
    </nav>

</body>
</html>
