<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Floy - Discussions</title>
    <script src="db.js"></script>
    <style>
        :root { --orange: #FF7A1A; --bleu: #0095f6; --noir: #000; --gris: #121212; }
        body { background: var(--noir); color: white; font-family: -apple-system, sans-serif; margin: 0; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }

        /* HEADER */
        .header { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #1a1a1a; }
        .header h1 { margin: 0; font-size: 22px; font-weight: 800; }

        /* STORYS */
        .story-bar { display: flex; gap: 15px; padding: 15px; overflow-x: auto; border-bottom: 8px solid #080808; flex-shrink: 0; }
        .story-bar::-webkit-scrollbar { display: none; }
        .story-item { display: flex; flex-direction: column; align-items: center; gap: 5px; flex-shrink: 0; }
        .story-ring { width: 60px; height: 60px; border-radius: 50%; padding: 2px; border: 2px solid var(--orange); }
        .add-story .story-ring { border: 2px dashed #444; position: relative; }
        .add-story .plus { position: absolute; bottom: 0; right: 0; background: var(--orange); width: 18px; height: 18px; border-radius: 50%; border: 2px solid black; display: flex; align-items: center; justify-content: center; color: black; font-size: 14px; font-weight: bold; }
        .story-img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; background: #222; }
        .story-name { font-size: 11px; color: #888; }

        /* LISTE DES DISCUSSIONS */
        .chat-list { flex: 1; overflow-y: auto; }
        .chat-item { display: flex; align-items: center; padding: 15px; text-decoration: none; color: white; transition: 0.2s; }
        .chat-item:active { background: #111; }
        
        .avatar-box { position: relative; margin-right: 15px; }
        .avatar { width: 55px; height: 55px; border-radius: 50%; object-fit: cover; background: #222; }
        
        .chat-info { flex: 1; border-bottom: 1px solid #111; padding-bottom: 12px; min-width: 0; }
        .chat-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
        .user-name { font-weight: bold; font-size: 16px; display: flex; align-items: center; gap: 4px; }
        .cert-icon { color: var(--bleu); width: 14px; height: 14px; }
        .time { font-size: 12px; color: #555; }
        
        .last-msg { font-size: 14px; color: #888; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* BOUTON GROUPE */
        .fab { position: fixed; bottom: 30px; right: 20px; background: var(--orange); width: 55px; height: 55px; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 15px rgba(0,0,0,0.5); border: none; cursor: pointer; }
    </style>
</head>
<body>

    <div class="header">
        <h1>Messages</h1>
        <svg width="24" height="24" viewBox="0 0 24 24" fill="white"><path d="M15 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm-9-2V7H4v3H1v2h3v3h2v-3h3v-2H6zm9 4c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
    </div>

    <div class="story-bar">
        <div class="story-item add-story">
            <div class="story-ring"><img src="ma_photo.jpg" class="story-img" onerror="this.src='https://via.placeholder.com/60'"><div class="plus">+</div></div>
            <span class="story-name">Ta story</span>
        </div>
        <div id="storyList" style="display:flex; gap:15px;"></div>
    </div>

    <div class="chat-list" id="chatList">
        </div>

    <button class="fab">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="black"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5s-3 1.34-3 3 1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
    </button>

    <script>
        // Tes contacts de base
        const contacts = [
            { id: "convo_1", name: "Alexandre Dupont", cert: true, img: "https://i.pravatar.cc/150?u=a" },
            { id: "convo_2", name: "Julie Martin", cert: false, img: "https://i.pravatar.cc/150?u=j" },
            { id: "convo_3", name: "Marc Evans", cert: true, img: "https://i.pravatar.cc/150?u=m" }
        ];

        async function renderChats() {
            const listContainer = document.getElementById('chatList');
            let chatData = [];

            // 1. Récupérer le dernier message et le temps pour chaque contact
            for (let c of contacts) {
                const msgs = await DBModule.getMessages(c.id);
                const lastMsg = msgs.length > 0 ? msgs[msgs.length - 1] : null;
                
                chatData.push({
                    ...c,
                    lastMessage: lastMsg,
                    // Si pas de message, on met 0 pour qu'il soit en bas
                    timestamp: lastMsg ? lastMsg.timestamp : 0 
                });
            }

            // 2. TRIER : Le plus récent (timestamp élevé) en haut
            chatData.sort((a, b) => b.timestamp - a.timestamp);

            // 3. AFFICHER
            listContainer.innerHTML = chatData.map(chat => {
                let preview = "Commencer la discussion";
                if (chat.lastMessage) {
                    if (chat.lastMessage.type === 'image') preview = "📷 Photo";
                    else if (chat.lastMessage.type === 'video') preview = "🎥 Vidéo";
                    else preview = chat.lastMessage.content;
                }

                return `
                    <a href="chat.html?id=${chat.id}" class="chat-item">
                        <div class="avatar-box">
                            <img src="${chat.img}" class="avatar">
                        </div>
                        <div class="chat-info">
                            <div class="chat-top">
                                <span class="user-name">
                                    ${chat.name} 
                                    ${chat.cert ? '<svg class="cert-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10 10-4.5 10-10S17.5 2 12 2zm-1.9 14.7l-3.3-3.3 1.4-1.4 1.9 1.9 5.3-5.3 1.4 1.4-6.7 6.7z"/></svg>' : ''}
                                </span>
                                <span class="time">${chat.lastMessage ? new Date(chat.lastMessage.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : ''}</span>
                            </div>
                            <div class="last-msg">${preview}</div>
                        </div>
                    </a>
                `;
            }).join('');
        }

        window.onload = renderChats;
    </script>
</body>
</html>
