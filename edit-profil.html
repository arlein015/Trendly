<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modifier le profil - Floy</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --orange: #FF7A1A; }
        body { background: #000; color: white; font-family: -apple-system, sans-serif; margin: 0; display: block !important; }
        
        .header { padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; position: sticky; top: 0; background: #000; z-index: 10; }
        .header span { color: var(--orange); font-weight: bold; cursor: pointer; }

        .edit-container { padding: 20px; text-align: center; }
        
        .profile-pic-section { margin-bottom: 30px; }
        .current-pic { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; background: #222; border: 1px solid #333; }
        .change-text { color: var(--orange); display: block; margin-top: 10px; font-weight: bold; cursor: pointer; font-size: 14px; }

        .input-group { text-align: left; margin-bottom: 25px; border-bottom: 1px solid #333; }
        .input-group label { font-size: 12px; color: #888; display: block; margin-bottom: 5px; }
        .input-group input, .input-group textarea { 
            width: 100%; background: transparent; border: none; color: white; 
            padding: 8px 0; font-size: 16px; outline: none; resize: none;
        }
    </style>
</head>
<body>

    <div class="header">
        <i class="fas fa-times" onclick="history.back()" style="cursor:pointer;"></i>
        <b>Modifier le profil</b>
        <span id="save-btn">Terminé</span>
    </div>

    <div class="edit-container">
        <div class="profile-pic-section">
            <img id="preview-pic" class="current-pic" src="https://via.placeholder.com/100">
            <label for="file-upload" class="change-text">Changer la photo de profil</label>
            <input type="file" id="file-upload" style="display:none" accept="image/*">
        </div>

        <div class="input-group">
            <label>Nom d'affichage</label>
            <input type="text" id="edit-username" placeholder="Ton pseudo">
        </div>

        <div class="input-group">
            <label>Bio</label>
            <textarea id="edit-bio" rows="2" placeholder="Ajoute une petite description..."></textarea>
        </div>
    </div>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { onAuthStateChanged, updateProfile } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const CLOUD_NAME = "ds79k3f9g";
        const UPLOAD_PRESET = "floy_preset";
        let selectedFile = null;

        console.log("Page Edit-Profil chargée. Attente de l'utilisateur...");

        // 1. Charger les données au démarrage
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                console.log("Utilisateur détecté :", user.uid);
                document.getElementById('edit-username').value = user.displayName || "";
                if (user.photoURL) document.getElementById('preview-pic').src = user.photoURL;

                try {
                    const userRef = doc(db, "users", user.uid);
                    const userSnap = await getDoc(userRef);
                    if (userSnap.exists()) {
                        document.getElementById('edit-bio').value = userSnap.data().bio || "";
                    }
                } catch (e) {
                    console.error("Erreur lors de la lecture Firestore :", e);
                }
            } else {
                console.warn("Aucun utilisateur connecté. Redirection...");
                location.href = 'connexion.html'; 
            }
        });

        // 2. Aperçu de la photo
        document.getElementById('file-upload').addEventListener('change', (e) => {
            selectedFile = e.target.files[0];
            if (selectedFile) {
                const reader = new FileReader();
                reader.onload = (event) => document.getElementById('preview-pic').src = event.target.result;
                reader.readAsDataURL(selectedFile);
            }
        });

        // 3. Sauvegarde
        document.getElementById('save-btn').addEventListener('click', async () => {
            const user = auth.currentUser;
            if(!user) return;

            const newName = document.getElementById('edit-username').value;
            const newBio = document.getElementById('edit-bio').value;
            let photoUrl = user.photoURL;

            const btn = document.getElementById('save-btn');
            btn.innerText = "Enregistrement...";
            btn.style.opacity = "0.5";

            try {
                // Upload Cloudinary si nouvelle photo
                if (selectedFile) {
                    const formData = new FormData();
                    formData.append('file', selectedFile);
                    formData.append('upload_preset', UPLOAD_PRESET);

                    const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, {
                        method: 'POST',
                        body: formData
                    });
                    const data = await res.json();
                    photoUrl = data.secure_url;
                }

                // Mise à jour Auth
                await updateProfile(user, { displayName: newName, photoURL: photoUrl });

                // Mise à jour Firestore
                await updateDoc(doc(db, "users", user.uid), {
                    username: newName,
                    bio: newBio,
                    avatarUrl: photoUrl
                });

                console.log("Mise à jour réussie !");
                location.href = 'profil.html';
            } catch (error) {
                console.error("Erreur de sauvegarde :", error);
                alert("Erreur lors de la sauvegarde.");
                btn.innerText = "Terminé";
                btn.style.opacity = "1";
            }
        });
    </script>
</body>
</html>
