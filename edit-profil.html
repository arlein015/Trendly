<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modifier le profil - Floy</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --orange: #FF7A1A; }
        body { background: #000; color: white; font-family: -apple-system, sans-serif; margin: 0; }
        
        .header { padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; }
        .header span { color: var(--orange); font-weight: bold; cursor: pointer; }

        .edit-container { padding: 20px; text-align: center; }
        
        /* Photo de profil */
        .profile-pic-section { margin-bottom: 30px; }
        .current-pic { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; background: #222; }
        .change-text { color: var(--orange); display: block; margin-top: 10px; font-weight: bold; cursor: pointer; font-size: 14px; }

        /* Formulaire */
        .input-group { text-align: left; margin-bottom: 20px; border-bottom: 1px solid #333; }
        .input-group label { font-size: 12px; color: #888; display: block; }
        .input-group input, .input-group textarea { 
            width: 100%; background: transparent; border: none; color: white; 
            padding: 8px 0; font-size: 16px; outline: none; resize: none;
        }
    </style>
</head>
<body>

    <div class="header">
        <i class="fas fa-times" onclick="history.back()"></i>
        <b>Modifier le profil</b>
        <span id="save-btn">Terminé</span>
    </div>

    <div class="edit-container">
        <div class="profile-pic-section">
            <img id="preview-pic" class="current-pic" src="https://via.placeholder.com/100">
            <label for="file-upload" class="change-text">Changer la photo de profil</label>
            <input type="file" id="file-upload" style="display:none" accept="image/*">
        </div>

        <div class="input-group">
            <label>Nom d'affichage</label>
            <input type="text" id="edit-username" placeholder="Pseudo">
        </div>

        <div class="input-group">
            <label>Bio</label>
            <textarea id="edit-bio" rows="2" placeholder="Décrivez-vous..."></textarea>
        </div>
    </div>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { updateProfile } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const CLOUD_NAME = "ds79k3f9g";
        const UPLOAD_PRESET = "floy_preset";

        let selectedFile = null;

        // 1. Charger les données actuelles
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                document.getElementById('edit-username').value = user.displayName || "";
                if (user.photoURL) document.getElementById('preview-pic').src = user.photoURL;

                // On récupère la bio depuis Firestore
                const userRef = doc(db, "users", user.uid);
                const userSnap = await getDoc(userRef);
                if (userSnap.exists()) {
                    document.getElementById('edit-bio').value = userSnap.data().bio || "";
                }
            }
        });

        // 2. Prévisualiser l'image choisie
        document.getElementById('file-upload').addEventListener('change', (e) => {
            selectedFile = e.target.files[0];
            if (selectedFile) {
                const reader = new FileReader();
                reader.onload = (event) => document.getElementById('preview-pic').src = event.target.result;
                reader.readAsDataURL(selectedFile);
            }
        });

        // 3. Sauvegarder les modifications
        document.getElementById('save-btn').addEventListener('click', async () => {
            const user = auth.currentUser;
            const newName = document.getElementById('edit-username').value;
            const newBio = document.getElementById('edit-bio').value;
            let photoUrl = user.photoURL;

            document.getElementById('save-btn').innerText = "En cours...";

            try {
                // A. Si une nouvelle image est sélectionnée, l'envoyer sur Cloudinary
                if (selectedFile) {
                    const formData = new FormData();
                    formData.append('file', selectedFile);
                    formData.append('upload_preset', UPLOAD_PRESET);

                    const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, {
                        method: 'POST',
                        body: formData
                    });
                    const data = await res.json();
                    photoUrl = data.secure_url;
                }

                // B. Mettre à jour le profil Firebase Auth
                await updateProfile(user, { displayName: newName, photoURL: photoUrl });

                // C. Mettre à jour Firestore
                await updateDoc(doc(db, "users", user.uid), {
                    username: newName,
                    bio: newBio,
                    avatarUrl: photoUrl
                });

                alert("Profil mis à jour !");
                location.href = 'profil.html';
            } catch (error) {
                console.error(error);
                alert("Erreur lors de la mise à jour.");
                document.getElementById('save-btn').innerText = "Terminé";
            }
        });
    </script>
</body>
</html>
