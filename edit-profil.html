<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modifier le Profil - Floy</title>
    <style>
        body { background: #000; color: white; font-family: sans-serif; padding: 20px; }
        .input-group { margin-bottom: 20px; }
        input, textarea { width: 100%; padding: 12px; background: #111; border: 1px solid #333; color: white; border-radius: 8px; box-sizing: border-box; }
        .btn-save { width: 100%; padding: 15px; background: #FF7A1A; border: none; color: white; font-weight: bold; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>

    <h2>Modifier le profil</h2>
    <div class="input-group">
        <label>Nom d'utilisateur</label>
        <input type="text" id="edit-username">
    </div>
    <div class="input-group">
        <label>Bio</label>
        <textarea id="edit-bio" rows="4"></textarea>
    </div>
    <button class="btn-save" id="save-profile">Enregistrer les modifications</button>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        // CORRECTION : Ajout de setDoc et updateDoc dans les imports
        import { doc, getDoc, setDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        onAuthStateChanged(auth, async (user) => {
            if (!user) return;
            
            // Charger les données actuelles
            const userRef = doc(db, "users", user.uid);
            const snap = await getDoc(userRef);
            if (snap.exists()) {
                document.getElementById('edit-username').value = snap.data().username || "";
                document.getElementById('edit-bio').value = snap.data().bio || "";
            }

            // Bouton Enregistrer
            document.getElementById('save-profile').onclick = async () => {
                const newName = document.getElementById('edit-username').value;
                const newBio = document.getElementById('edit-bio').value;

                try {
                    await setDoc(userRef, {
                        username: newName,
                        bio: newBio
                    }, { merge: true });
                    
                    alert("Profil mis à jour !");
                    window.location.href = "profil.html";
                } catch (e) {
                    console.error("Erreur de sauvegarde:", e);
                    alert("Erreur lors de la sauvegarde.");
                }
            };
        });
    </script>
</body>
</html>
