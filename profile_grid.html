<style>
    .photo-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 2px;
        background-color: #000;
        margin-top: 2px;
    }

    .grid-item {
        position: relative;
        width: 100%;
        padding-top: 100%; /* Ratio 1:1 pour des carrés parfaits */
        background: #121212;
        cursor: pointer;
        overflow: hidden;
    }

    .grid-item img {
        position: absolute;
        top: 0; left: 0;
        width: 100%; height: 100%;
        object-fit: cover;
    }

    /* Icône pour les publications avec plusieurs photos ou vidéo */
    .grid-item-type {
        position: absolute;
        top: 8px; right: 8px;
        color: white;
        text-shadow: 0 0 4px rgba(0,0,0,0.5);
    }

    .empty-grid-msg {
        grid-column: 1 / -1;
        text-align: center;
        padding: 50px 20px;
        color: #8e8e8e;
        font-size: 14px;
    }
</style>

<div id="p-grid" class="photo-grid">
    </div>

<script type="module">
    import { db } from './firebase-config.js';
    import { collection, query, where, getDocs, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    window.loadGrid = async (type, profileId) => {
        const gridContainer = document.getElementById('p-grid');
        gridContainer.innerHTML = ""; // On vide les anciens codes {{...}}

        try {
            const q = query(
                collection(db, "posts"), 
                where("userId", "==", profileId),
                orderBy("createdAt", "desc")
            );
            
            const querySnapshot = await getDocs(q);
            
            if (querySnapshot.empty) {
                gridContainer.innerHTML = '<div class="empty-grid-msg">Aucune publication pour le moment</div>';
                return;
            }

            querySnapshot.forEach((doc) => {
                const post = doc.data();
                const item = document.createElement('div');
                item.className = 'grid-item';
                item.onclick = () => window.location.href = `post.html?id=${doc.id}`;
                
                item.innerHTML = `
                    <img src="${post.imageUrl}" alt="Publication">
                    ${post.type === 'video' ? '<div class="grid-item-type"><i class="fas fa-play"></i></div>' : ''}
                `;
                gridContainer.appendChild(item);
            });
        } catch (error) {
            console.error("Erreur de chargement de la grille:", error);
        }
    };
</script>
