<div id="media-grid" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px;"></div>

<script type="module">
    import { db } from './firebase-config.js';
    import { collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    window.loadGrid = async (type, uid) => {
        const grid = document.getElementById('media-grid');
        grid.innerHTML = "";
        const q = query(collection(db, "posts"), where("userId", "==", uid), where("type", "==", type));
        const snap = await getDocs(q);
        snap.forEach(doc => {
            const data = doc.data();
            const div = document.createElement('div');
            div.style.aspectRatio = "1/1";
            div.style.background = "#111";
            div.innerHTML = `<img src="${data.imageUrl || data.thumbnailUrl}" style="width:100%; height:100%; object-fit:cover;">`;
            grid.appendChild(div);
        });
    };
</script>
