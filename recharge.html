<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paiement - Floy</title>
    <style>
        :root { --orange: #FF7A1A; --noir: #000; --gris: #121212; }
        body { background: var(--noir); color: white; font-family: sans-serif; margin: 0; padding: 20px; text-align: center; }
        .payment-box { background: var(--gris); padding: 30px; border-radius: 25px; border: 1px solid #262626; margin-top: 50px; }
        .price { font-size: 32px; font-weight: bold; color: var(--orange); margin: 20px 0; }
        .pay-method { background: white; color: black; padding: 15px; border-radius: 12px; margin-bottom: 10px; font-weight: bold; cursor: pointer; display: block; width: 100%; border: none; }
        .back { color: #666; text-decoration: none; font-size: 14px; margin-top: 20px; display: inline-block; }
    </style>
</head>
<body>

    <div class="payment-box">
        <h2>Confirmer l'achat</h2>
        <div id="displayAmount" class="price">0.00$</div>
        
        <button class="pay-method" onclick="finish()">💳 Carte Bancaire</button>
        <button class="pay-method" style="background:#F7931A; color:white;" onclick="finish()">🟠 Orange Money</button>
        
        <a href="./shop.html" class="back">Annuler</a>
    </div>

    <script>
        // Récupère le prix dans l'URL (ex: recharge.html?amt=4.49)
        const params = new URLSearchParams(window.location.search);
        const amount = params.get('amt') || "0.00";
        document.getElementById('displayAmount').innerText = amount + "$";

        function finish() {
            alert("Paiement réussi ! Vos jetons ont été ajoutés.");
            window.location.href = './shop.html';
        }
    </script>
</body>
</html>
