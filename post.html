<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Floy - Nouveau Post</title>
    <style>
        :root { --orange: #FF7A1A; --noir: #000; --gris: #121212; --bordure: #262626; }
        body { background: var(--noir); color: white; font-family: -apple-system, sans-serif; margin: 0; overflow: hidden; }
        
        /* HEADER */
        header { 
            padding: 15px 20px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 1px solid var(--bordure); 
            background: black;
        }
        .btn-annuler { color: white; text-decoration: none; font-size: 24px; }
        .titre { font-weight: 800; letter-spacing: 1px; font-size: 14px; }
        .btn-publier { color: var(--orange); background: none; border: none; font-weight: 800; font-size: 16px; cursor: pointer; }
        .btn-publier:disabled { color: #555; }

        /* ZONE D'UPLOAD */
        .upload-container { width: 100%; aspect-ratio: 1/1; background: var(--gris); display: flex; align-items: center; justify-content: center; position: relative; cursor: pointer; }
        #img-preview { width: 100%; height: 100%; object-fit: cover; display: none; }
        .placeholder-text { text-align: center; color: #555; }
        .placeholder-text svg { margin-bottom: 10px; }

        /* ZONE TEXTE */
        .caption-area { padding: 15px; }
        textarea { 
            width: 100%; 
            background: none; 
            border: none; 
            color: white; 
            font-size: 16px; 
            outline: none; 
            resize: none; 
            height: 100px; 
            font-family: inherit;
        }
        
        #file-input { display: none; }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="btn-annuler">×</a>
        <div class="titre">NOUVEAU POST</div>
        <button id="btn-send" class="btn-publier" onclick="publierTout()">Publier</button>
    </header>

    <div class="upload-container" onclick="document.getElementById('file-input').click()">
        <div id="prompt-box" class="placeholder-text">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></svg>
            <div>Appuyez pour ajouter une photo</div>
        </div>
        <img id="img-preview">
    </div>

    <input type="file" id="file-input" accept="image/*">

    <div class="caption-area">
        <textarea id="caption-box" placeholder="Écrire une légende..."></textarea>
    </div>

    <script type="module">
        import { db } from './firebase-config.js';
        import { collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // CONFIGURATION CLOUDINARY
        const CLOUD_NAME = "ds79k3f9g";
        const UPLOAD_PRESET = "floy_preset"; 

        const fileInput = document.getElementById('file-input');
        const imgPreview = document.getElementById('img-preview');
        const promptBox = document.getElementById('prompt-box');
        const btnSend = document.getElementById('btn-send');

        // Prévisualisation de l'image
        fileInput.onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    imgPreview.src = event.target.result;
                    imgPreview.style.display = 'block';
                    promptBox.style.display = 'none';
                };
                reader.readAsDataURL(file);
            }
        };

        // Fonction de publication
        window.publierTout = async () => {
            const file = fileInput.files[0];
            if (!file) {
                alert("Veuillez choisir une image d'abord !");
                return;
            }

            btnSend.disabled = true;
            btnSend.innerText = "Envoi...";

            try {
                // 1. Envoyer à Cloudinary
                const formData = new FormData();
                formData.append('file', file);
                formData.append('upload_preset', UPLOAD_PRESET);

                const cloudRes = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, {
                    method: 'POST',
                    body: formData
                });

                const cloudData = await cloudRes.json();
                
                if (!cloudRes.ok) throw new Error("Erreur Cloudinary : " + cloudData.error.message);

                const finalImageUrl = cloudData.secure_url;

                // 2. Enregistrer dans Firebase
                await addDoc(collection(db, "posts"), {
                    imageUrl: finalImageUrl,
                    caption: document.getElementById('caption-box').value,
                    username: "User_Floy",
                    createdAt: serverTimestamp(),
                    likes: 0
                });

                // Succès !
                window.location.href = "index.html";

            } catch (err) {
                console.error(err);
                alert("Erreur : " + err.message);
                btnSend.disabled = false;
                btnSend.innerText = "Publier";
            }
        };
    </script>
</body>
</html>
