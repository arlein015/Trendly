<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Floy - Créer un Post</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --orange: #FF7A1A; --noir: #000; --gris: #121212; --bordure: #222; }
        body { background: var(--noir); color: white; font-family: -apple-system, sans-serif; margin: 0; padding-bottom: 80px; }

        /* HEADER */
        .nav-header { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; border-bottom: 1px solid var(--bordure); position: sticky; top: 0; background: var(--noir); z-index: 100; }
        .btn-publier { color: var(--orange); font-weight: bold; cursor: pointer; border: none; background: none; font-size: 16px; }
        .btn-publier:disabled { color: #555; }

        /* FORMULAIRE */
        .container { padding: 20px; max-width: 500px; margin: 0 auto; }
        
        /* ZONE UPLOAD */
        .upload-area { 
            width: 100%; aspect-ratio: 1/1; border: 2px dashed var(--bordure); 
            border-radius: 15px; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; overflow: hidden;
            position: relative; cursor: pointer; transition: 0.3s;
        }
        .upload-area:hover { border-color: var(--orange); }
        #preview-img { width: 100%; height: 100%; object-fit: cover; display: none; }
        .upload-placeholder { text-align: center; color: #888; }
        .upload-placeholder i { font-size: 40px; margin-bottom: 10px; }

        /* CAPTION */
        .caption-box { margin-top: 20px; }
        textarea { 
            width: 100%; background: none; border: none; color: white; 
            font-size: 16px; resize: none; outline: none; padding: 10px 0;
            border-bottom: 1px solid var(--bordure);
        }

        /* LOADER */
        .loader { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.8); z-index: 2000; flex-direction: column;
            align-items: center; justify-content: center; 
        }
        .spinner { width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid var(--orange); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* BOTTOM NAV (SVG) */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 65px; background: var(--noir); display: flex; justify-content: space-around; align-items: center; border-top: 1px solid var(--bordure); }
        .bottom-nav svg { width: 26px; height: 26px; fill: #666; }
        .active svg { fill: var(--orange) !important; }
    </style>
</head>
<body>

    <div class="loader" id="loader">
        <div class="spinner"></div>
        <p style="margin-top: 15px;">Publication sur Floy...</p>
    </div>

    <div class="nav-header">
        <i class="fas fa-times" onclick="history.back()" style="font-size: 20px; cursor: pointer;"></i>
        <b>Nouveau Post</b>
        <button class="btn-publier" id="btn-submit" onclick="window.uploadPost()" disabled>Partager</button>
    </div>

    <div class="container">
        <div class="upload-area" onclick="document.getElementById('file-input').click()">
            <div class="upload-placeholder" id="placeholder">
                <i class="fas fa-images"></i>
                <p>Sélectionner une photo</p>
            </div>
            <img id="preview-img">
        </div>
        <input type="file" id="file-input" accept="image/*" style="display: none;" onchange="window.previewFile()">

        <div class="caption-box">
            <textarea id="caption" rows="4" placeholder="Écris une légende..."></textarea>
        </div>
    </div>

    <nav class="bottom-nav">
        <div onclick="location.href='index.html'"><svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg></div>
        <div onclick="location.href='explore.html'"><svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg></div>
        <div class="active"><svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg></div>
        <div onclick="location.href='messages.html'"><svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12c0 1.54.36 2.98 1 4.28L2.01 22l5.72-1c1.3.64 2.74 1 4.27 1 5.52 0 10-4.48 10-10S17.52 2 12 2z"/></svg></div>
        <div onclick="location.href='profil.html'"><svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg></div>
    </nav>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { collection, addDoc, serverTimestamp, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        let currentUser = null;
        let selectedFile = null;

        // VERIFICATION AUTH
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const userDoc = await getDoc(doc(db, "users", user.uid));
                currentUser = { uid: user.uid, ...userDoc.data() };
            } else {
                window.location.href = "login.html";
            }
        });

        // PREVISUALISATION
        window.previewFile = () => {
            const file = document.getElementById('file-input').files[0];
            if (file) {
                selectedFile = file;
                const reader = new FileReader();
                reader.onload = (e) => {
                    document.getElementById('preview-img').src = e.target.result;
                    document.getElementById('preview-img').style.display = 'block';
                    document.getElementById('placeholder').style.display = 'none';
                    document.getElementById('btn-submit').disabled = false;
                };
                reader.readAsDataURL(file);
            }
        };

        // PUBLICATION
        window.uploadPost = async () => {
            if (!selectedFile || !currentUser) return;

            document.getElementById('loader').style.display = 'flex';
            
            try {
                // 1. Upload vers Cloudinary
                const formData = new FormData();
                formData.append('file', selectedFile);
                formData.append('upload_preset', 'ton_preset_ici'); // REMPLACER PAR TON PRESET

                const cloudRes = await fetch('https://api.cloudinary.com/v1_1/ton_cloud_name/image/upload', {
                    method: 'POST',
                    body: formData
                });
                const cloudData = await cloudRes.json();

                // 2. Enregistrement dans Firestore
                await addDoc(collection(db, "posts"), {
                    userId: currentUser.uid,
                    username: currentUser.username,
                    userAvatar: currentUser.avatarUrl || "",
                    isVerified: currentUser.isVerified || false,
                    imageUrl: cloudData.secure_url,
                    caption: document.getElementById('caption').value,
                    likes: [],
                    createdAt: serverTimestamp()
                });

                window.location.href = "index.html";
            } catch (error) {
                alert("Erreur lors de la publication : " + error.message);
                document.getElementById('loader').style.display = 'none';
            }
        };
    </script>
</body>
</html>
