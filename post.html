<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Floy - Publier</title>
    <style>
        :root { --orange: #FF7A1A; --noir: #000; --gris: #121212; --bordure: #262626; }
        body { background: var(--noir); color: white; font-family: sans-serif; margin: 0; }
        header { padding: 15px; display: flex; justify-content: space-between; border-bottom: 1px solid var(--bordure); }
        .publish-btn { color: var(--orange); background: none; border: none; font-weight: bold; font-size: 16px; cursor: pointer; }
        .upload-zone { width: 100%; aspect-ratio: 1/1; background: var(--gris); display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; cursor: pointer; }
        #preview-img { width: 100%; height: 100%; object-fit: cover; display: none; }
        textarea { width: 100%; background: none; border: none; color: white; padding: 20px; font-size: 16px; outline: none; box-sizing: border-box; }
        #file-input { display: none; }
    </style>
</head>
<body>
    <header>
        <a href="index.html" style="color:white; text-decoration:none;">Annuler</a>
        <b>Nouveau Post</b>
        <button id="btn-publier" class="publish-btn" onclick="publierPost()">Publier</button>
    </header>

    <div class="upload-zone" onclick="document.getElementById('file-input').click()">
        <span id="label-photo">📷 Appuie ici pour choisir une photo</span>
        <img id="preview-img">
    </div>
    
    <input type="file" id="file-input" accept="image/*">
    <textarea id="caption" placeholder="Écris une légende..."></textarea>

    <script type="module">
        import { db, storage } from './firebase-config.js';
        import { collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";

        const fileInput = document.getElementById('file-input');
        const previewImg = document.getElementById('preview-img');
        const labelPhoto = document.getElementById('label-photo');
        const btn = document.getElementById('btn-publier');

        // Gérer l'affichage de l'image choisie
        fileInput.onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                previewImg.src = URL.createObjectURL(file);
                previewImg.style.display = 'block';
                labelPhoto.style.display = 'none';
            }
        };

        window.publierPost = async () => {
            const file = fileInput.files[0];
            if (!file) return alert("Choisis une photo !");

            btn.innerText = "Envoi...";
            btn.disabled = true;

            try {
                // 1. Upload vers Firebase Storage
                const storageRef = ref(storage, 'posts/' + Date.now() + "_" + file.name);
                await uploadBytes(storageRef, file);
                const url = await getDownloadURL(storageRef);

                // 2. Enregistrement dans Firestore
                await addDoc(collection(db, "posts"), {
                    imageUrl: url,
                    caption: document.getElementById('caption').value,
                    username: "User_Floy",
                    createdAt: serverTimestamp(),
                    likes: 0
                });

                window.location.href = "index.html";
            } catch (err) {
                console.error(err);
                alert("Erreur ! Vérifie que tes RULES Firebase sont bien sur 'true'.");
                btn.innerText = "Publier";
                btn.disabled = false;
            }
        };
    </script>
</body>
</html>
