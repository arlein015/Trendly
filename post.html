<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Floy - Créer un Post</title>
    <style>
        :root { --orange: #FF7A1A; --noir: #000; --bordure: #262626; }
        body { background: var(--noir); color: white; font-family: -apple-system, sans-serif; margin: 0; padding: 20px; padding-bottom: 80px; }
        
        /* HEADER */
        .header-post { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .btn-cancel { color: white; text-decoration: none; font-size: 16px; }
        .btn-share { color: var(--orange); background: none; border: none; font-weight: bold; font-size: 16px; cursor: pointer; }
        .btn-share:disabled { opacity: 0.3; cursor: not-allowed; }

        /* ZONE D'UPLOAD MULTIPLE */
        .upload-area { 
            width: 100%; min-height: 200px; border: 2px dashed var(--bordure); 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            border-radius: 15px; overflow: hidden; position: relative; margin-bottom: 15px;
        }
        #preview-container { 
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; padding: 10px; width: 100%; 
        }
        .preview-img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 8px; border: 1px solid var(--bordure); }
        
        /* BARRE DE PROGRESSION */
        .progress-container { width: 100%; background: #1a1a1a; height: 6px; border-radius: 10px; margin: 15px 0; display: none; overflow: hidden; }
        #progress-bar { width: 0%; height: 100%; background: var(--orange); transition: width 0.3s; }

        .caption-area { 
            width: 100%; background: none; border: none; color: white; padding: 15px 0; 
            font-size: 16px; outline: none; resize: none; border-bottom: 1px solid var(--bordure); 
        }

        /* NAV BAR */
        .nav-bar { position: fixed; bottom: 0; left: 0; width: 100%; height: 65px; background: black; border-top: 1px solid var(--bordure); display: flex; justify-content: space-around; align-items: center; }
        .nav-link { color: white; opacity: 0.6; }
        .nav-avatar { width: 26px; height: 26px; border-radius: 50%; object-fit: cover; }
    </style>
</head>
<body>

    <div class="header-post">
        <a href="index.html" class="btn-cancel">Annuler</a>
        <button class="btn-share" id="publish-btn">Partager</button>
    </div>

    <div class="upload-area" id="drop-zone" onclick="document.getElementById('file-input').click()">
        <div id="placeholder-ui">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
            <p style="color: grey; font-size: 14px; margin-top: 10px;">Sélectionner une ou plusieurs photos</p>
        </div>
        <div id="preview-container"></div>
        <input type="file" id="file-input" style="display:none" accept="image/*" multiple>
    </div>

    <div class="progress-container" id="prog-cont">
        <div id="progress-bar"></div>
    </div>

    <textarea class="caption-area" id="caption" placeholder="Écrire une légende pour tous les posts..."></textarea>

    <nav class="nav-bar">
        <a href="index.html" class="nav-link"><svg width="26" height="26" viewBox="0 0 24 24" fill="white"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg></a>
        <a href="explore.html" class="nav-link"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg></a>
        <a href="profil.html" class="nav-link"><img id="my-nav-pic" class="nav-avatar" src="https://via.placeholder.com/30"></a>
    </nav>

    <script type="module">
        import { db } from './firebase-config.js';
        import { collection, addDoc, serverTimestamp, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const MY_ID = "User_Floy_Account";
        const CLOUDINARY_URL = "https://api.cloudinary.com/v1_1/TON_CLOUD_NAME/image/upload";
        const CLOUDINARY_PRESET = "TON_PRESET_NAME"; // Ton unsigned preset Cloudinary

        const fileInput = document.getElementById('file-input');
        const previewContainer = document.getElementById('preview-container');
        const placeholder = document.getElementById('placeholder-ui');
        const publishBtn = document.getElementById('publish-btn');
        const progressBar = document.getElementById('progress-bar');
        const progCont = document.getElementById('prog-cont');

        let selectedFiles = [];

        // 1. Prévisualisation multiple
        fileInput.onchange = (e) => {
            selectedFiles = Array.from(e.target.files);
            previewContainer.innerHTML = "";
            
            if (selectedFiles.length > 0) {
                placeholder.style.display = "none";
                selectedFiles.forEach(file => {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        const img = document.createElement('img');
                        img.src = event.target.result;
                        img.className = "preview-img";
                        previewContainer.appendChild(img);
                    };
                    reader.readAsDataURL(file);
                });
            }
        };

        // 2. Publication en boucle avec Cloudinary
        publishBtn.onclick = async () => {
            const captionText = document.getElementById('caption').value;
            if (selectedFiles.length === 0) return alert("Choisissez au moins une photo !");

            publishBtn.disabled = true;
            progCont.style.display = "block";

            // Récupérer tes infos pour le post (Nom, Photo, Badge)
            const userSnap = await onSnapshot(doc(db, "users", MY_ID), async (s) => {
                const userData = s.data();
                
                for (let i = 0; i < selectedFiles.length; i++) {
                    const file = selectedFiles[i];

                    // A. Envoi à Cloudinary
                    const formData = new FormData();
                    formData.append('file', file);
                    formData.append('upload_preset', CLOUDINARY_PRESET);

                    try {
                        const response = await fetch(CLOUDINARY_URL, { method: 'POST', body: formData });
                        const cloudData = await response.json();
                        const imageUrl = cloudData.secure_url;

                        // B. Envoi à Firebase
                        await addDoc(collection(db, "posts"), {
                            userId: MY_ID,
                            username: userData.username || "Arlein",
                            name: userData.name || "Arlein",
                            userPhoto: userData.avatarUrl || "",
                            isVerified: userData.isVerified || false,
                            imageUrl: imageUrl,
                            caption: captionText,
                            likesCount: 0,
                            timestamp: serverTimestamp()
                        });

                        // Mise à jour barre de progression
                        const percent = ((i + 1) / selectedFiles.length) * 100;
                        progressBar.style.width = percent + "%";

                    } catch (err) {
                        console.error("Erreur d'upload :", err);
                    }
                }

                alert("Tous vos posts sont en ligne sur Floy !");
                window.location.href = "index.html";
            });
        };

        // 3. Photo Nav Bar
        onSnapshot(doc(db, "users", MY_ID), s => { 
            if(s.exists() && s.data().avatarUrl) document.getElementById('my-nav-pic').src = s.data().avatarUrl; 
        });
    </script>
</body>
</html>
