<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Floy - Nouveau Post</title>
    <style>
        :root { --orange: #FF7A1A; --noir: #000; --bordure: #262626; }
        body { background: var(--noir); color: white; font-family: -apple-system, sans-serif; margin: 0; padding-bottom: 80px; }

        /* HEADER */
        .post-header { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 15px; border-bottom: 1px solid var(--bordure); sticky; top: 0; background: black; z-index: 100;
        }
        .btn-back { color: white; text-decoration: none; font-size: 20px; }
        .btn-share { color: var(--orange); background: none; border: none; font-weight: bold; font-size: 16px; cursor: pointer; }

        /* PREVIEW AREA */
        .upload-container { width: 100%; aspect-ratio: 1/1; background: #111; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
        .preview-img { width: 100%; height: 100%; object-fit: cover; display: none; }
        .upload-placeholder { text-align: center; color: var(--orange); cursor: pointer; }

        /* CONTENT AREA */
        .post-content { padding: 15px; }
        .caption-input { 
            width: 100%; background: none; border: none; color: white; 
            font-size: 16px; outline: none; resize: none; height: 100px; font-family: inherit;
        }

        /* STATUS */
        #status-msg { padding: 10px 15px; font-size: 12px; color: var(--orange); display: none; }
        
        /* NAV BAR BAS */
        .nav-bar { position: fixed; bottom: 0; width: 100%; height: 65px; background: black; border-top: 1px solid var(--bordure); display: flex; justify-content: space-around; align-items: center; }
        .nav-link { color: white; opacity: 0.6; }
        .nav-link.active { opacity: 1; color: var(--orange); }
    </style>
</head>
<body>

    <div class="post-header">
        <a href="index.html" class="btn-back">✕</a>
        <div style="font-weight: bold;">Nouveau Post</div>
        <button class="btn-share" id="share-btn">Partager</button>
    </div>

    <div class="upload-container" onclick="document.getElementById('file-input').click()">
        <div class="upload-placeholder" id="placeholder">
            <svg width="50" height="50" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
            <p>Appuyer pour choisir une photo</p>
        </div>
        <img id="preview-pic" class="preview-img">
        <input type="file" id="file-input" style="display:none" accept="image/*">
    </div>

    <div id="status-msg">Envoi en cours...</div>

    <div class="post-content">
        <textarea id="caption" class="caption-input" placeholder="Écris une légende..."></textarea>
    </div>

    <nav class="nav-bar">
        <a href="index.html" class="nav-link"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg></a>
        <a href="explore.html" class="nav-link"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg></a>
        <a href="post.html" class="nav-link active"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="12" y1="8" x2="12" y2="16"></line><line x1="8" y1="12" x2="16" y2="12"></line></svg></a>
        <a href="messages.html" class="nav-link"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path></svg></a>
        <a href="profil.html" class="nav-link"><img src="https://via.placeholder.com/30" style="width:26px; height:26px; border-radius:50%;"></a>
    </nav>

    <script type="module">
        import { db } from './firebase-config.js';
        import { collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // CONFIG CLOUDINARY
        const CLOUD_URL = "https://api.cloudinary.com/v1_1/ds79k3f9g/image/upload";
        const PRESET = "floy_preset";
        const MY_ID = "User_Floy_Account"; // Remplace par ton ID dynamique plus tard

        const fileInput = document.getElementById('file-input');
        const previewPic = document.getElementById('preview-pic');
        const placeholder = document.getElementById('placeholder');
        const shareBtn = document.getElementById('share-btn');
        const status = document.getElementById('status-msg');

        let selectedFile = null;

        // 1. Gérer la sélection et l'aperçu
        fileInput.onchange = (e) => {
            selectedFile = e.target.files[0];
            if (selectedFile) {
                previewPic.src = URL.createObjectURL(selectedFile);
                previewPic.style.display = "block";
                placeholder.style.display = "none";
            }
        };

        // 2. Partager le post
        shareBtn.onclick = async () => {
            if (!selectedFile) return alert("Choisis d'abord une photo !");
            
            shareBtn.disabled = true;
            status.style.display = "block";
            status.innerText = "Téléchargement de l'image...";

            // A. Upload vers Cloudinary
            const fd = new FormData();
            fd.append('file', selectedFile);
            fd.append('upload_preset', PRESET);

            try {
                const res = await fetch(CLOUD_URL, { method: 'POST', body: fd });
                const cloudData = await res.json();
                const imageUrl = cloudData.secure_url;

                status.innerText = "Création du post sur Floy...";

                // B. Enregistrement dans Firestore
                await addDoc(collection(db, "posts"), {
                    userId: MY_ID,
                    images: [imageUrl], // Tableau pour supporter plusieurs images plus tard
                    caption: document.getElementById('caption').value,
                    timestamp: serverTimestamp(),
                    likesCount: 0,
                    commentsCount: 0
                });

                // C. Redirection vers le profil pour voir le nouveau post
                window.location.href = "profil.html";

            } catch (err) {
                console.error(err);
                alert("Erreur lors du partage");
                shareBtn.disabled = false;
                status.style.display = "none";
            }
        };
    </script>
</body>
</html>
