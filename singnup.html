<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Threndly - Créer un compte</title>
    <link rel="stylesheet" href="signup.css">
</head>
<body>
    <div class="main-container">
        <div class="signup-card">
            <div class="brand-logo-container">
                <div class="brand-logo-icon">T</div>
                <span class="brand-name">THRENDLY</span>
            </div>

            <h1>S'inscrire</h1>
            <p class="subtitle">Rejoignez la communauté Threndly</p>
            
            <form id="signupForm">
                <div class="input-row">
                    <input type="text" placeholder="Nom" required>
                    <input type="text" placeholder="Username" required>
                </div>

                <div class="input-group">
                    <input type="text" placeholder="E-mail ou numéro" required>
                </div>
                
                <div class="input-group">
                    <input type="password" placeholder="Mot de passe" required>
                </div>

                <div class="input-group">
                    <input type="password" placeholder="Confirmation du mot de passe" required>
                </div>
                
                <button type="submit" class="btn-submit">S'inscrire</button>
            </form>

            <div class="separator">OU</div>

            <div class="social-buttons">
                <button class="btn-google">Continuer avec Google</button>
                <button class="btn-fb">Continuer avec Facebook</button>
            </div>
            
            <div class="footer-links">
                <a href="#">Mot de passe oublié ?</a>
                <p>Déjà un compte ? <a href="index.html" class="link-bold">Se connecter</a></p>
            </div>
        </div>
    </div>
</body>
</html>
