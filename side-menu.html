<style>
    /* Fond sombre transparent derrière le menu */
    .menu-overlay {
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.7);
        display: none;
        z-index: 2999;
        backdrop-filter: blur(3px);
    }

    /* Le panneau du menu */
    .side-menu {
        position: fixed;
        top: 0; right: -100%; /* Caché à droite */
        width: 280px;
        height: 100%;
        background: #0A0A0A;
        border-left: 1px solid #222;
        z-index: 3000;
        transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        display: flex;
        flex-direction: column;
    }

    .side-menu.active {
        right: 0; /* Affiche le menu */
    }

    /* En-tête du menu */
    .menu-header {
        padding: 25px 20px;
        font-weight: bold;
        font-size: 18px;
        border-bottom: 1px solid #1a1a1a;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    /* Liste des options */
    .menu-options {
        padding: 10px 0;
        flex: 1;
        overflow-y: auto;
    }

    .menu-item {
        display: flex;
        align-items: center;
        gap: 15px;
        padding: 15px 20px;
        cursor: pointer;
        transition: 0.2s;
        color: #ddd;
        text-decoration: none;
    }

    .menu-item:active {
        background: #161616;
        color: var(--orange-floy, #FF7A1A);
    }

    .menu-item-icon {
        font-size: 20px;
        width: 25px;
        text-align: center;
    }

    /* Pied de page du menu */
    .menu-footer {
        padding: 20px;
        border-top: 1px solid #1a1a1a;
    }

    .logout-btn {
        color: #ff4444;
        font-weight: bold;
        display: flex;
        align-items: center;
        gap: 10px;
        cursor: pointer;
    }
</style>

<div id="menuOverlay" class="menu-overlay" onclick="toggleFloyMenu()"></div>

<div id="sideMenu" class="side-menu">
    <div class="menu-header">
        <span>Paramètres</span>
        <span onclick="toggleFloyMenu()" style="cursor:pointer; font-size: 24px;">&times;</span>
    </div>

    <div class="menu-options">
        <a href="edit-profile.html" class="menu-item">
            <span class="menu-item-icon">⚙️</span>
            <span>Gérer le profil</span>
        </a>
        <a href="wallet.html" class="menu-item">
            <span class="menu-item-icon">💳</span>
            <span>Portefeuille (Wallet)</span>
        </a>
        <a href="privacy.html" class="menu-item">
            <span class="menu-item-icon">🔒</span>
            <span>Confidentialité</span>
        </a>
        <a href="security.html" class="menu-item">
            <span class="menu-item-icon">🛡️</span>
            <span>Sécurité</span>
        </a>
        <a href="analytics.html" class="menu-item">
            <span class="menu-item-icon">📊</span>
            <span>Statistiques</span>
        </a>
    </div>

    <div class="menu-footer">
        <div class="logout-btn" onclick="confirmLogout()">
            <span>🚪</span> Déconnexion
        </div>
    </div>
</div>

<script>
    function toggleFloyMenu() {
        const menu = document.getElementById('sideMenu');
        const overlay = document.getElementById('menuOverlay');
        
        menu.classList.toggle('active');
        if (menu.classList.contains('active')) {
            overlay.style.display = 'block';
        } else {
            overlay.style.display = 'none';
        }
    }

    function confirmLogout() {
        if(confirm("Voulez-vous vraiment vous déconnecter ?")) {
            window.location.href = 'login.html';
        }
    }
</script>
