<style>
    .f-modal-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.9);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 3000;
    }

    .f-modal-content {
        background: #121212;
        width: 100%;
        max-width: 400px;
        height: 70vh;
        border-radius: 15px 15px 0 0;
        display: flex;
        flex-direction: column;
        border: 1px solid #262626;
    }

    .f-modal-header {
        padding: 15px;
        text-align: center;
        border-bottom: 1px solid #262626;
        position: relative;
    }

    .f-modal-header h3 { margin: 0; font-size: 16px; color: white; }

    .f-list {
        flex: 1;
        overflow-y: auto;
        padding: 10px;
    }

    .user-item {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 10px;
        cursor: pointer;
        transition: background 0.2s;
    }

    .user-item:hover { background: #1a1a1a; }

    .user-item img {
        width: 45px;
        height: 45px;
        border-radius: 50%;
        object-fit: cover;
        border: 1px solid #FF7A1A;
    }

    .user-item-info b { display: block; font-size: 14px; color: white; }
    .user-item-info span { font-size: 12px; color: #8e8e8e; }

    .close-f-modal {
        position: absolute;
        right: 15px;
        top: 15px;
        color: #8e8e8e;
        font-size: 20px;
        cursor: pointer;
    }
</style>

<div id="followers-modal" class="f-modal-overlay">
    <div class="f-modal-content">
        <div class="f-modal-header">
            <h3 id="f-modal-title">Abonnés</h3>
            <i class="fas fa-times close-f-modal" onclick="closeFollowersModal()"></i>
        </div>
        <div id="followers-list" class="f-list">
            </div>
    </div>
</div>

<script type="module">
    import { db } from './firebase-config.js';
    import { collection, query, where, getDocs, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    window.openFollowersModal = async (type, profileId) => {
        const modal = document.getElementById('followers-modal');
        const listContainer = document.getElementById('followers-list');
        const title = document.getElementById('f-modal-title');
        
        modal.style.display = 'flex';
        listContainer.innerHTML = '<p style="text-align:center; color:#8e8e8e; padding:20px;">Chargement...</p>';
        title.innerText = type === 'followers' ? 'Abonnés' : 'Abonnements';

        try {
            // 1. Chercher dans la collection "followers"
            const fieldToQuery = type === 'followers' ? 'followingId' : 'followerId';
            const q = query(collection(db, "followers"), where(fieldToQuery, "==", profileId));
            const snap = await getDocs(q);
            
            listContainer.innerHTML = "";

            if (snap.empty) {
                listContainer.innerHTML = `<p style="text-align:center; color:#8e8e8e; padding:20px;">Aucun ${type === 'followers' ? 'abonné' : 'abonnement'}</p>`;
                return;
            }

            // 2. Pour chaque relation, récupérer les infos de l'utilisateur
            for (const followDoc of snap.docs) {
                const data = followDoc.data();
                const targetId = type === 'followers' ? data.followerId : data.followingId;
                
                const userSnap = await getDoc(doc(db, "users", targetId));
                if (userSnap.exists()) {
                    const userData = userSnap.data();
                    const item = document.createElement('div');
                    item.className = 'user-item';
                    item.onclick = () => window.location.href = `profil.html?id=${targetId}`;
                    item.innerHTML = `
                        <img src="${userData.avatarUrl || 'https://via.placeholder.com/150'}">
                        <div class="user-item-info">
                            <b>${userData.username || 'Utilisateur Floy'}</b>
                            <span>${userData.email || ''}</span>
                        </div>
                    `;
                    listContainer.appendChild(item);
                }
            }
        } catch (e) {
            console.error("Erreur modal :", e);
        }
    };

    window.closeFollowersModal = () => {
        document.getElementById('followers-modal').style.display = 'none';
    };
</script>
