<style>
    /* Design Noir & Orange pour la modale */
    .f-modal-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.9); /* Fond très sombre */
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 3000;
        backdrop-filter: blur(5px);
    }

    .f-modal-content {
        background: #121212;
        width: 100%;
        max-width: 420px;
        height: 75vh;
        border-radius: 15px 15px 0 0;
        display: flex;
        flex-direction: column;
        border: 1px solid #262626;
        color: white;
    }

    .f-modal-header {
        padding: 15px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 1px solid #262626;
    }

    .f-modal-header h3 { margin: 0; font-size: 17px; font-weight: bold; }
    .close-f-modal { color: #8e8e8e; font-size: 20px; cursor: pointer; }

    /* Liste des utilisateurs */
    .f-list {
        flex: 1;
        overflow-y: auto;
        padding: 10px;
    }

    .user-item {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 12px 10px;
        border-radius: 8px;
        cursor: pointer;
        transition: background 0.2s;
    }

    .user-item:hover { background: #1a1a1a; }

    .user-item img {
        width: 48px;
        height: 48px;
        border-radius: 50%;
        object-fit: cover;
        border: 1.5px solid #FF7A1A; /* Cercle orange */
    }

    .user-item-info { flex: 1; }
    .user-item-info b { display: block; font-size: 14px; color: white; }
    .user-item-info span { font-size: 12px; color: #8e8e8e; }

    /* Bouton Suivre/Abonné dans la liste */
    .btn-list-follow {
        background: #FF7A1A; color: white; border: none;
        padding: 8px 15px; border-radius: 8px;
        font-weight: bold; font-size: 13px; cursor: pointer;
    }
    .btn-list-following {
        background: #262626; color: white; border: none;
        padding: 8px 15px; border-radius: 8px;
        font-weight: bold; font-size: 13px; cursor: pointer;
    }
</style>

<div id="followers-modal" class="f-modal-overlay">
    <div class="f-modal-content">
        <div class="f-modal-header">
            <h3 id="f-modal-title">Abonnés</h3>
            <i class="fas fa-times close-f-modal" onclick="closeFollowersModal()"></i>
        </div>
        
        <div id="followers-list" class="f-list">
            <p style="text-align:center; color:#8e8e8e; padding: 20px;">Chargement...</p>
        </div>
    </div>
</div>

<script type="module">
    import { db, auth } from './firebase-config.js';
    import { collection, query, where, getDocs, doc, getDoc, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // 1. Ouvrir la modale (Abonnés ou Abonnements)
    window.openFollowersModal = async (type, profileId) => {
        const modal = document.getElementById('followers-modal');
        const listContainer = document.getElementById('followers-list');
        const title = document.getElementById('f-modal-title');
        
        modal.style.display = 'flex';
        listContainer.innerHTML = '<p style="text-align:center; color:#8e8e8e; padding: 20px;">Chargement...</p>';
        title.innerText = type === 'followers' ? 'Abonnés' : 'Abonnements';

        try {
            // Requête Firebase pour trouver les relations
            const fieldToQuery = type === 'followers' ? 'followingId' : 'followerId';
            const q = query(collection(db, "followers"), where(fieldToQuery, "==", profileId));
            const snap = await getDocs(q);
            
            listContainer.innerHTML = "";

            if (snap.empty) {
                listContainer.innerHTML = `<p style="text-align:center; color:#8e8e8e; padding: 20px;">Aucun ${type === 'followers' ? 'abonné' : 'abonnement'}</p>`;
                return;
            }

            // Récupérer les infos détaillées de chaque utilisateur
            for (const followDoc of snap.docs) {
                const data = followDoc.data();
                const targetId = type === 'followers' ? data.followerId : data.followingId;
                
                const userSnap = await getDoc(doc(db, "users", targetId));
                if (userSnap.exists()) {
                    const userData = userSnap.data();
                    renderUserItem(userData, targetId, listContainer);
                }
            }
        } catch (e) {
            console.error("Erreur de chargement :", e);
            listContainer.innerHTML = '<p style="text-align:center; color:#e74c3c; padding: 20px;">Erreur de chargement.</p>';
        }
    };

    // 2. Créer l'affichage d'un utilisateur dans la liste
    async function renderUserItem(userData, targetId, container) {
        const myId = auth.currentUser?.uid;
        
        const item = document.createElement('div');
        item.className = 'user-item';
        
        // Clic sur l'utilisateur -> aller sur son profil
        item.onclick = (e) => {
            if(e.target.tagName !== 'BUTTON') {
                window.location.href = `profil.html?id=${targetId}`;
            }
        };

        const avatar = userData.avatarUrl || 'https://via.placeholder.com/150';
        const name = userData.username || 'Utilisateur';
        const handle = userData.handle || `@${name.toLowerCase()}`;

        // Bouton de suivi (dynamique)
        let followBtn = "";
        if (myId && myId !== targetId) {
            followBtn = `<button class="btn-list-follow" id="list-follow-${targetId}">Suivre</button>`;
            checkListFollowStatus(targetId, myId, followBtn); // Vérifie si je suis déjà abonné
        }

        item.innerHTML = `
            <img src="${avatar}">
            <div class="user-item-info">
                <b>${name}</b>
                <span>${handle}</span>
            </div>
            ${followBtn}
        `;
        
        container.appendChild(item);
    }

    // 3. Fermer la modale
    window.closeFollowersModal = () => {
        document.getElementById('followers-modal').style.display = 'none';
    };

    // --- Logique de suivi dans la liste ---

</script>
