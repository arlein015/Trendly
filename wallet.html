<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Floy - Wallet</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        body {
            margin: 0; padding: 20px;
            background: linear-gradient(135deg, #ff8c00 0%, #3a01cc 100%) !important;
            background-attachment: fixed;
            font-family: 'Poppins', sans-serif;
            color: white;
        }

        .header { display: flex; align-items: center; gap: 15px; margin-bottom: 30px; }

        .wallet-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 30px;
            padding: 35px 20px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        }

        .balance { font-size: 48px; font-weight: 700; margin: 10px 0; }
        
        .btn-cashout {
            width: 100%; background: white; color: #3a01cc;
            border: none; padding: 18px; border-radius: 20px;
            font-weight: 700; font-size: 16px; margin-top: 25px; cursor: pointer;
        }

        .transaction-item {
            background: rgba(0, 0, 0, 0.2);
            padding: 15px; border-radius: 15px; margin-top: 10px;
            display: flex; justify-content: space-between; align-items: center;
        }
    </style>
</head>
<body>
    <div class="header">
        <i class="fas fa-chevron-left" onclick="window.history.back()"></i>
        <h2 style="margin:0;">Portefeuille</h2>
    </div>

    <div class="wallet-card">
        <p style="opacity: 0.9; margin: 0;">Solde actuel</p>
        <div class="balance">842,50 €</div>
        <button class="btn-cashout">Retirer l'argent</button>
    </div>

    <h3 style="margin-top: 30px; font-size: 16px;">Historique</h3>
    <div class="transaction-item">
        <span>Récompense Vidéo</span>
        <span style="font-weight: 700;">+ 12.00 €</span>
    </div>
</body>
</html>
