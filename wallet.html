<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Floy - Portefeuille</title>
    <style>
        :root { 
            --orange-floy: #FF7A1A; 
            --noir: #000; 
            --gris: #121212; 
            --blanc: #fff; 
        }
        
        body { 
            background: var(--noir); color: var(--blanc); 
            font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 50px;
        }

        /* Header */
        .header { 
            display: flex; align-items: center; padding: 20px; 
            border-bottom: 1px solid #222; position: sticky; top: 0; background: var(--noir);
        }
        .back-btn { font-size: 24px; cursor: pointer; text-decoration: none; color: white; margin-right: 20px; }

        /* Carte de solde */
        .balance-card {
            background: linear-gradient(135deg, #1a1a1a 0%, #000 100%);
            margin: 20px; padding: 30px; border-radius: 25px;
            border: 1px solid #333; text-align: center;
            box-shadow: 0 10px 30px rgba(255, 122, 26, 0.1);
        }
        .balance-label { color: #888; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; }
        .balance-amount { font-size: 42px; font-weight: bold; margin: 10px 0; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .currency-icon { color: var(--orange-floy); }

        /* Actions rapides */
        .action-row { display: flex; justify-content: space-around; margin: 20px; gap: 15px; }
        .action-btn { 
            flex: 1; background: var(--gris); border: 1px solid #333; 
            padding: 15px; border-radius: 15px; text-align: center; cursor: pointer;
            transition: 0.3s;
        }
        .action-btn:active { transform: scale(0.95); background: #1a1a1a; }
        .action-icon { font-size: 20px; display: block; margin-bottom: 5px; }

        /* Section Transactions */
        .section-title { padding: 0 20px; font-size: 18px; font-weight: bold; margin-top: 30px; }
        .transaction-list { padding: 10px 20px; }
        .transaction-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 0; border-bottom: 1px solid #111;
        }
        .trans-info { display: flex; align-items: center; gap: 12px; }
        .trans-icon { width: 40px; height: 40px; background: #1a1a1a; border-radius: 10px; display: flex; align-items: center; justify-content: center; }
        .trans-name { font-weight: 500; font-size: 14px; }
        .trans-date { color: #555; font-size: 12px; }
        .trans-amount { font-weight: bold; color: #44ff44; }
        .trans-amount.minus { color: #ff4444; }

        /* Badge Floy (Le même que ton image) */
        .floy-badge-small { width: 14px; height: 14px; vertical-align: middle; margin-left: 4px; }
    </style>
</head>
<body>

    <div class="header">
        <a href="profile.html" class="back-btn">‹</a>
        <span style="font-weight:bold">MON PORTEFEUILLE</span>
    </div>

    <div class="balance-card">
        <div class="balance-label">Solde actuel</div>
        <div class="balance-amount">
            <span class="currency-icon">◈</span>

        </div>
        <div style="color: #888; font-size: 12px;">Environ 12.50 €</div>
    </div>

    <div class="action-row">
        <div class="action-btn">
            <span class="action-icon">📥</span>
            <span style="font-size: 12px; font-weight: bold;">Recharger</span>
        </div>
        <div class="action-btn" style="border-color: var(--orange-floy);">
            <span class="action-icon">📤</span>
            <span style="font-size: 12px; font-weight: bold; color: var(--orange-floy);">Retirer</span>

    </div>

</html>
