<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Floy - Wallet & Binance</title>
    <style>
        :root { --orange-floy: #FF7A1A; --binance-yellow: #F3BA2F; --noir: #000; --gris: #121212; }
        body { background: var(--noir); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 40px; }
        
        .header { display: flex; align-items: center; padding: 20px; border-bottom: 1px solid #222; }
        .back-btn { font-size: 24px; cursor: pointer; text-decoration: none; color: white; margin-right: 20px; }

        /* Carte de Solde */
        .balance-card {
            background: linear-gradient(145deg, #1a1a1a, #000);
            margin: 20px; padding: 30px; border-radius: 25px; border: 1px solid #333; text-align: center;
        }
        .balance-amount { font-size: 38px; font-weight: bold; margin: 10px 0; color: var(--orange-floy); }

        /* Actions SVGs */
        .action-row { display: flex; justify-content: space-around; margin: 20px; gap: 10px; }
        .action-btn { 
            flex: 1; background: var(--gris); border: 1px solid #333; 
            padding: 15px; border-radius: 18px; cursor: pointer; text-align: center;
        }
        .action-btn svg { width: 24px; height: 24px; fill: white; margin-bottom: 8px; }
        .action-btn span { display: block; font-size: 11px; font-weight: 600; text-transform: uppercase; }

        /* Section Binance */
        .binance-box {
            margin: 20px; padding: 20px; border-radius: 20px;
            background: rgba(243, 186, 47, 0.05); border: 1px solid rgba(243, 186, 47, 0.2);
            display: flex; align-items: center; justify-content: space-between;
        }
        .binance-logo { display: flex; align-items: center; gap: 10px; font-weight: bold; color: var(--binance-yellow); }
        .btn-connect { 
            background: var(--binance-yellow); color: black; border: none; 
            padding: 8px 15px; border-radius: 8px; font-weight: bold; cursor: pointer; 
        }

        /* Liste Transactions */
        .transaction-item {
            display: flex; justify-content: space-between; padding: 15px 20px; border-bottom: 1px solid #111;
        }
        .trans-icon-bg { width: 40px; height: 40px; background: #1a1a1a; border-radius: 12px; display: flex; align-items: center; justify-content: center; margin-right: 12px; }
        .trans-icon-bg svg { width: 20px; height: 20px; fill: var(--orange-floy); }
    </style>
</head>
<body>

    <div class="header">
        <a href="profile.html" class="back-btn">‹</a>
        <span style="font-weight:bold">PORTEFEUILLE</span>
    </div>

    <div class="balance-card">
        <div style="color:#888; font-size:12px;">SOLDE TOTAL ESTIMÉ</div>
        <div class="balance-amount">1,250.00 ◈</div>
        <div style="color: #44ff44; font-size: 13px;">+ 5.2% ce mois</div>
    </div>

    <div class="binance-box">
        <div class="binance-logo">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M16.624 13.92l2.817-2.817 2.817 2.817-2.817 2.817-2.817-2.817zm-4.124 4.125l2.817-2.817 2.817 2.817-2.817 2.817-2.817-2.817zm-4.125-4.125l2.817-2.817 2.817 2.817-2.817 2.817-2.817-2.817zm4.125-4.125l2.817-2.817 2.817 2.817-2.817 2.817-2.817-2.817zm0-8.25l2.817 2.817-2.817 2.817-2.817-2.817 2.817-2.817zm8.25 8.25l2.817 2.817-2.817 2.817-2.817-2.817 2.817-2.817zm-16.5 0l2.817 2.817-2.817 2.817-2.817-2.817 2.817-2.817zm8.25 8.25l2.817 2.817-2.817 2.817-2.817-2.817 2.817-2.817z"/></svg>
            BINANCE
        </div>
        <button class="btn-connect" id="binanceBtn" onclick="connectBinance()">Connecter</button>
    </div>

    <div class="action-row">
        <div class="action-btn">
            <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
            <span>Dépôt</span>
        </div>
        <div class="action-btn">
            <svg viewBox="0 0 24 24"><path d="M5 13h14v-2H5v2zM19 13l-4 4 1.41 1.41L21.82 13l-5.41-5.41L15 9l4 4z"/></svg>
            <span>Retrait</span>
        </div>
        <div class="action-btn">
            <svg viewBox="0 0 24 24"><path d="M16 17.01V10h-2v7.01h-3L15 21l4-3.99h-3zM9 3L5 6.99h3V14h2V6.99h3L9 3z"/></svg>
            <span>Échange</span>
        </div>
    </div>

    <div style="padding: 20px; font-weight: bold;">HISTORIQUE</div>

    <div class="transaction-item">
        <div style="display:flex; align-items:center;">
            <div class="trans-icon-bg">
                <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg>
            </div>
            <div>
                <div style="font-size:14px; font-weight:bold;">Récompense Vidéo</div>
                <div style="font-size:11px; color:#555;">14 Mars 2026</div>
            </div>
        </div>
        <div style="color:var(--orange-floy); font-weight:bold;">+ 15.00 ◈</div>
    </div>

    <script>
        function connectBinance() {
            const btn = document.getElementById('binanceBtn');
            btn.innerText = "Liaison...";
            btn.style.opacity = "0.5";
            
            setTimeout(() => {
                btn.innerText = "Connecté ✅";
                btn.style.background = "#222";
                btn.style.color = "#F3BA2F";
                btn.style.opacity = "1";
                alert("Votre compte Binance est maintenant lié à Floy !");
            }, 2000);
        }
    </script>

</body>
</html>
