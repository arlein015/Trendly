<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Floy - Profil</title>
    <style>
        :root { --orange: #FF7A1A; --noir: #000; --bordure: #262626; --gris: #8e8e8e; }
        body { background: var(--noir); color: white; font-family: -apple-system, sans-serif; margin: 0; padding-bottom: 80px; }

        /* TOP NAV */
        .top-nav { display: flex; justify-content: space-between; align-items: center; padding: 15px; position: sticky; top: 0; background: black; z-index: 100; border-bottom: 1px solid var(--bordure); }
        .username-title { font-weight: bold; font-size: 18px; color: var(--orange); }

        /* PROFIL INFO */
        .profile-container { padding: 10px 15px; }
        .main-info { display: flex; align-items: center; gap: 25px; margin-bottom: 20px; }
        .profile-pic { width: 85px; height: 85px; border-radius: 50%; object-fit: cover; border: 2px solid var(--orange); padding: 2px; }
        
        /* STYLE DU NOM ET DU BADGE */
        .display-name { font-weight: bold; font-size: 18px; display: flex; align-items: center; gap: 6px; margin-top: 5px; }
        .verify-badge { width: 18px; height: 18px; fill: var(--orange); flex-shrink: 0; }
        
        .bio-text { font-size: 14px; margin-top: 4px; color: #efefef; line-height: 1.4; }

        /* BOUTONS D'ACTION */
        .action-buttons { display: flex; flex-direction: column; gap: 8px; margin-top: 15px; }
        .btn-premium { background: var(--orange); color: white; border: none; padding: 10px; border-radius: 8px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-edit { background: #1a1a1a; color: white; border: 1px solid var(--bordure); padding: 8px; border-radius: 8px; font-weight: bold; cursor: pointer; }

        /* GRILLE DE POSTS */
        .profile-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; border-top: 1px solid var(--bordure); padding-top: 2px; margin-top: 20px; }
        .grid-item { aspect-ratio: 1/1; background: #111; overflow: hidden; }
        .grid-item img { width: 100%; height: 100%; object-fit: cover; }

        /* NAV BAR BAS */
        .nav-bar { position: fixed; bottom: 0; width: 100%; height: 65px; background: black; border-top: 1px solid var(--bordure); display: flex; justify-content: space-around; align-items: center; z-index: 1000; }
        .nav-link { color: white; opacity: 0.6; text-decoration: none; }
        .nav-link.active { opacity: 1; color: var(--orange); }
        .nav-avatar { width: 26px; height: 26px; border-radius: 50%; object-fit: cover; }
    </style>
</head>
<body>

    <div class="top-nav">
        <div class="username-title" id="top-username">@chargement</div>
        <div onclick="window.location.href='premium.html'" style="cursor:pointer;">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--orange)" stroke-width="2"><path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z"></path></svg>
        </div>
    </div>

    <div class="profile-container">
        <div class="main-info">
            <img id="u-pic" class="profile-pic" src="https://via.placeholder.com/100">
            <div style="flex-grow: 1; text-align: center; display: flex; justify-content: space-around;">
                <div><b id="count-posts">0</b><br><small style="color:var(--gris)">Posts</small></div>
                <div><b id="count-followers">0</b><br><small style="color:var(--gris)">Followers</small></div>
            </div>
        </div>

        <div class="bio-section">
            <div class="display-name" id="name-container">
                <span id="u-name">...</span>
                </div>
            <div class="bio-text" id="u-bio">Chargement de la bio...</div>
        </div>

        <div class="action-buttons">
            <button class="btn-premium" onclick="window.location.href='premium.html'">
                Obtenir Floy Gold 🟠
            </button>
            <button class="btn-edit" onclick="window.location.href='edit-profil.html'">
                Modifier le profil
            </button>
        </div>
    </div>

    <div class="profile-grid" id="profile-grid">
        </div>

    <nav class="nav-bar">
        <a href="index.html" class="nav-link"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg></a>
        <a href="explore.html" class="nav-link"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg></a>
        <a href="post.html" class="nav-link"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="12" y1="8" x2="12" y2="16"></line><line x1="8" y1="12" x2="16" y2="12"></line></svg></a>
        <a href="profil.html" class="nav-link active"><img id="nav-avatar" class="nav-avatar" src="https://via.placeholder.com/30"></a>
    </nav>

    <script type="module">
        import { auth } from './firebase-config.js';
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        onAuthStateChanged(auth, (user) => {
        if (!user) {
        // Si l'utilisateur n'est pas connecté, on l'envoie au login
        window.location.href = "login.html";
    }
});
        // L'utilisateur est connecté, on utilise son UID réel !
        const MY_ID = user.uid;
        chargerProfil(MY_ID); // Appelle tes fonctions de chargement avec cet ID
        } else {
        // Personne n'est connecté, on renvoie vers la page de login
        window.location.href = "login.html";
    }
});
        // 1. Charger les données du profil (Nom, Bio, Badge)
        onSnapshot(doc(db, "users", MY_ID), (docSnap) => {
            if(docSnap.exists()){
                const data = docSnap.data();
                
                document.getElementById('u-name').innerText = data.username || "Arlein";
                document.getElementById('top-username').innerText = `@${data.username || 'profil'}`;
                document.getElementById('u-pic').src = data.avatarUrl || "https://via.placeholder.com/100";
                document.getElementById('nav-avatar').src = data.avatarUrl || "https://via.placeholder.com/30";
                document.getElementById('u-bio').innerText = data.bio || "Zah zalaah ty aiii";
                document.getElementById('count-followers').innerText = data.followersCount || 0;

                // GESTION DU BADGE DYNAMIQUE
                const container = document.getElementById('name-container');
                const oldBadge = container.querySelector('.verify-badge');
                if(oldBadge) oldBadge.remove();

                // On vérifie si isVerified est true dans la console Firebase
                if(data.isVerified === true) {
                    const badgeSVG = `
                        <svg class="verify-badge" viewBox="0 0 24 24">
                            <path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10 10-4.5 10-10S17.5 2 12 2zM10 17l-5-5 1.4-1.4 3.6 3.6 7.6-7.6L19 8l-9 9z"/>
                        </svg>`;
                    container.insertAdjacentHTML('beforeend', badgeSVG);
                }
            }
        });

        // 2. Charger la grille de photos
        const q = query(collection(db, "posts"), where("userId", "==", MY_ID), orderBy("timestamp", "desc"));
        onSnapshot(q, (snaps) => {
            const grid = document.getElementById('profile-grid');
            grid.innerHTML = "";
            document.getElementById('count-posts').innerText = snaps.size;
            
            snaps.forEach(d => {
                const p = d.data();
                const div = document.createElement('div');
                div.className = 'grid-item';
                div.innerHTML = `<img src="${p.images[0]}" loading="lazy">`;
                grid.appendChild(div);
            });
        });
    </script>
</body>
</html>
