<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil | Floy</title>
    <link rel="stylesheet" href="profil.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div id="main-loader" class="loader-overlay">
        <div class="spinner"></div>
    </div>

    <div class="profile-main-wrapper">
        
        <div id="header-module"></div>

        <div id="tabs-module"></div>

        <main id="grid-module" class="photo-grid">
            </main>

    </div>

    <div id="modal-edit-container"></div>
    <div id="modal-followers-container"></div>

    <nav class="bottom-nav">
        <i class="fas fa-home" onclick="location.href='index.html'"></i>
        <i class="fas fa-search" onclick="location.href='explore.html'"></i>
        <div class="nav-add-btn" onclick="location.href='create.html'">
            <i class="fas fa-plus"></i>
        </div>
        <i class="fas fa-comment" onclick="location.href='messages.html'"></i>
        <i class="fas fa-user nav-active"></i>
    </nav>

    <script type="module">
        import { auth } from './firebase-config.js';
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        // Fonction pour injecter les composants HTML
        async function loadComponent(id, file) {
            try {
                const response = await fetch(file);
                if (!response.ok) throw new Error("Erreur 404 sur " + file);
                const html = await response.text();
                const target = document.getElementById(id);
                if (target) {
                    target.innerHTML = html;
                    // Exécuter les scripts <script> contenus dans les fichiers injectés
                    const scripts = target.querySelectorAll("script");
                    scripts.forEach(oldScript => {
                        const newScript = document.createElement("script");
                        newScript.type = "module";
                        newScript.textContent = oldScript.textContent;
                        document.body.appendChild(newScript);
                    });
                }
            } catch (err) {
                console.warn(err.message);
            }
        }

        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                window.location.href = 'connexion.html';
                return;
            }

            const params = new URLSearchParams(window.location.search);
            const profileId = params.get('id') || user.uid;

            // 1. Charger tous les modules HTML
            await Promise.all([
                loadComponent('header-module', 'profile_header.html'),
                loadComponent('tabs-module', 'profile_tabs.html'),
                loadComponent('grid-module', 'profile_grid.html'),
                loadComponent('modal-edit-container', 'profile_edit_modal.html'),
                loadComponent('modal-followers-container', 'modal_followers.html')
            ]);

            // 2. Activer les fonctions une fois que le HTML est chargé
            setTimeout(() => {
                if (window.loadHeader) window.loadHeader(profileId, user.uid);
                if (window.loadGrid) window.loadGrid('posts', profileId);
                
                // On retire enfin le loader orange
                const loader = document.getElementById('main-loader');
                if(loader) loader.style.display = 'none';
            }, 300);
        });
    </script>

</body>
</html>
