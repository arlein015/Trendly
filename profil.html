<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Profil | Floy</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --floy-orange: #FF7A1A; --floy-black: #000; --floy-gray: #1a1a1a; }
        body { background: var(--floy-black); margin: 0; padding-bottom: 70px; font-family: -apple-system, sans-serif; color: white; }
        
        /* Conteneur principal */
        .profile-container { width: 100%; max-width: 500px; margin: 0 auto; }

        /* Loader plein écran */
        #loader-overlay { 
            position: fixed; inset: 0; background: #000; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; 
        }

        /* Navigation Basse */
        .bottom-nav { 
            position: fixed; bottom: 0; width: 100%; max-width: 500px; height: 60px; 
            background: rgba(0,0,0,0.9); border-top: 1px solid var(--floy-gray); 
            display: flex; justify-content: space-around; align-items: center; z-index: 1000; 
        }
        .bottom-nav i { font-size: 22px; color: #555; cursor: pointer; }
        .nav-active { color: var(--floy-orange) !important; }
    </style>
</head>
<body>

    <div id="loader-overlay">
        <i class="fas fa-circle-notch fa-spin" style="color: var(--floy-orange); font-size: 40px; margin-bottom: 15px;"></i>
        <p style="font-size: 12px; letter-spacing: 2px; color: #888;">FLOY</p>
    </div>

    <div class="profile-container">
        <div id="module-header"></div>
        <div id="module-stats"></div>
        <div id="module-tabs"></div>
        <div id="module-edit"></div>
        <div id="module-partage"></div>
        <div id="module-handler"></div>
        <div id="module-grid"></div>
    </div>

    <div id="module-modal"></div>

    <div class="bottom-nav">
        <i class="fas fa-home" onclick="location.href='index.html'"></i>
        <i class="fas fa-search"></i>
        <i class="fas fa-plus-square"></i>
        <i class="fas fa-message"></i>
        <i class="fas fa-user nav-active"></i>
    </div>

    <script type="module">
        import { auth } from './firebase-config.js';
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        // Moteur de chargement des modules avec gestion d'erreur
        async function injectModule(fileName, targetId) {
            try {
                const response = await fetch(fileName);
                if (!response.ok) throw new Error(`Fichier ${fileName} manquant`);
                const html = await response.text();
                const container = document.getElementById(targetId);
                
                if (container) {
                    container.innerHTML = html;
                    // On force l'exécution des scripts à l'intérieur du module
                    const scripts = container.querySelectorAll("script");
                    for (let oldScript of scripts) {
                        const newScript = document.createElement("script");
                        newScript.type = "module"; // Important pour Firebase
                        newScript.textContent = oldScript.textContent;
                        document.body.appendChild(newScript);
                    }
                }
            } catch (err) {
                console.error("⚠️ Erreur Floy:", err.message);
                // On affiche une petite erreur discrète si un module manque
                document.getElementById(targetId).innerHTML = `<p style="color:red; font-size:10px; text-align:center;">Erreur: ${fileName} introuvable</p>`;
            }
        }

        // Vérification de l'utilisateur et lancement
        onAuthStateChanged(auth, async (user) => {
            if (!user) { 
                window.location.href = 'connexion.html'; 
                return; 
            }

            // Récupération de l'ID à afficher (le mien ou celui d'un autre)
            const urlParams = new URLSearchParams(window.location.search);
            const targetUID = urlParams.get('id') || user.uid;

            // Chargement de la structure (Ordre important)
            await injectModule('profile_header.html', 'module-header');
            await injectModule('profile_stats.html', 'module-stats');
            await injectModule('profile_tabs.html', 'module-tabs');
            await injectModule('profile_grid.html', 'module-grid');
            await injectModule('profile_edit_modal.html', 'module-modal');
            await injectModule('badge_verification.html', 'module-header');

            // Une fois que tout est injecté, on initialise les données
            setTimeout(() => {
                if (window.loadHeader) window.loadHeader(targetUID, user.uid);
                if (window.loadStats) window.loadStats(targetUID);
                if (window.loadGrid) window.loadGrid('posts', targetUID);
                if (window.loadBadge) window.loadBadge(targetUID);
                
                // On cache le loader
                document.getElementById('loader-overlay').style.display = 'none';
            }, 300);
        });
    </script>
</body>
</html>
