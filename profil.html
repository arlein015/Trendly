<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Profil Officiel | FLOY</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" href="data:;base64,iVBORw0KGgo=">

    <style>
        :root {
            --bg: #000000;
            --card: #121212;
            --border: #262626;
            --accent: #FF7A1A; /* Ton orange signature */
            --insta-blue: #0095f6;
            --text-main: #ffffff;
            --text-dim: #a8a8a8;
            --story-gradient: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        /* --- LOADER FLOY (COUCHES DE CHARGEMENT) --- */
        #floy-loader {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg);
            display: none; /* Activé par JS */
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100000;
        }

        .floy-logo {
            font-size: 42px;
            font-weight: 900;
            letter-spacing: 12px;
            background: linear-gradient(to right, var(--accent), #fff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: floyPulse 1.5s infinite ease-in-out;
        }

        @keyframes floyPulse {
            0% { transform: scale(0.95); opacity: 0.6; }
            50% { transform: scale(1); opacity: 1; }
            100% { transform: scale(0.95); opacity: 0.6; }
        }

        .progress-container {
            width: 200px;
            height: 2px;
            background: var(--border);
            margin-top: 25px;
            border-radius: 10px;
            overflow: hidden;
        }

        #progress-bar {
            width: 0%;
            height: 100%;
            background: var(--accent);
            transition: width 0.3s;
        }

        /* --- HEADER & AVATAR (STORY RING) --- */
        .profile-container { max-width: 935px; margin: 0 auto; padding: 20px 15px; }

        .header-top { display: flex; align-items: center; gap: 25px; margin-bottom: 30px; }

        .avatar-section { position: relative; width: 96px; height: 96px; flex-shrink: 0; }

        .story-ring {
            position: absolute;
            top: -4px; left: -4px; right: -4px; bottom: -4px;
            background: var(--story-gradient);
            border-radius: 50%;
            display: none; /* Apparaît si hasStory = true */
            padding: 2px;
        }

        .avatar-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--bg);
            position: relative;
            z-index: 2;
            cursor: pointer;
            background: var(--card);
        }

        .btn-plus-story {
            position: absolute;
            bottom: 2px;
            right: 2px;
            background: var(--insta-blue);
            color: white;
            width: 26px;
            height: 26px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 3px solid var(--bg);
            z-index: 10;
            font-size: 12px;
            cursor: pointer;
        }

        /* --- STATS ET INFOS --- */
        .user-info { flex-grow: 1; }
        .name-row { display: flex; align-items: center; gap: 12px; margin-bottom: 15px; }
        .username { font-size: 24px; font-weight: 300; }
        .verified-badge { color: var(--accent); font-size: 18px; }

        .stats-list { display: flex; list-style: none; padding: 0; gap: 20px; margin-bottom: 15px; }
        .stats-list li { font-size: 15px; }
        .stats-list b { color: white; }

        .bio-area { font-size: 14px; line-height: 1.6; }
        .web-link { color: #e0f1ff; text-decoration: none; font-weight: 600; display: block; margin-top: 4px; }

        /* --- BOUTONS D'ACTION --- */
        .action-row { display: flex; gap: 8px; margin-top: 18px; }
        .btn-action {
            flex: 1;
            background: var(--border);
            color: white;
            border: none;
            height: 34px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: filter 0.2s;
        }
        .btn-action:active { filter: brightness(0.7); }

        /* --- HIGHLIGHTS (COLLECTIONS) --- */
        .highlights-wrapper {
            display: flex;
            gap: 15px;
            padding: 20px 0;
            overflow-x: auto;
            scrollbar-width: none;
        }
        .highlight-item { display: flex; flex-direction: column; align-items: center; min-width: 75px; cursor: pointer; }
        .hl-circle {
            width: 62px; height: 62px; border-radius: 50%;
            border: 1px solid var(--border);
            display: flex; align-items: center; justify-content: center;
            font-size: 28px; color: var(--text-dim); margin-bottom: 6px;
        }

        /* --- TABS & GRID --- */
        .tabs {
            display: flex;
            justify-content: space-around;
            border-top: 1px solid var(--border);
            margin-top: 15px;
        }
        .tab-btn {
            padding: 15px;
            color: var(--text-dim);
            font-size: 20px;
            flex: 1;
            text-align: center;
            cursor: pointer;
        }
        .tab-btn.active { color: white; border-top: 1px solid white; margin-top: -1px; }

        .posts-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2px;
            padding-bottom: 60px;
        }
        .grid-item { aspect-ratio: 1/1; background: var(--card); position: relative; overflow: hidden; }
        .grid-item img, .grid-item video { width: 100%; height: 100%; object-fit: cover; }
        .icon-overlay { position: absolute; top: 10px; right: 10px; font-size: 14px; color: white; }

        /* --- MODALE D'ÉDITION --- */
        .edit-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            display: none;
            z-index: 5000;
            align-items: center;
            justify-content: center;
        }
        .edit-box {
            background: var(--border);
            width: 100%;
            max-width: 400px;
            border-radius: 15px;
            overflow: hidden;
            animation: slideUp 0.3s ease-out;
        }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        .modal-head { display: flex; justify-content: space-between; padding: 15px; border-bottom: 1px solid #363636; }
        .modal-body { padding: 20px; }
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-size: 12px; color: var(--text-dim); margin-bottom: 5px; }
        .modal-input {
            width: 100%;
            background: #000;
            border: 1px solid #363636;
            color: white;
            padding: 12px;
            border-radius: 8px;
            box-sizing: border-box;
        }
    </style>
</head>
<body>

    <div id="floy-loader">
        <div class="floy-logo">FLOY</div>
        <div class="progress-container"><div id="progress-bar"></div></div>
        <p id="loader-status" style="font-size: 12px; margin-top: 15px; color: var(--text-dim);">Synchronisation...</p>
    </div>

    <div class="profile-container">
        <header class="header-top">
            <div class="avatar-section">
                <div id="ring-ui" class="story-ring"></div>
                <img id="ui-avatar" src="" class="avatar-img" onclick="triggerProfileUpload()">
                <div class="btn-plus-story" onclick="triggerStoryUpload()">
                    <i class="fas fa-plus"></i>
                </div>
            </div>

            <div class="user-info">
                <div class="name-row">
                    <span id="ui-username" class="username">...</span>
                    <i id="ui-badge" class="fas fa-check-circle verified-badge" style="display:none;"></i>
                </div>
                <ul class="stats-list">
                    <li><b id="ui-posts-count">0</b> publications</li>
                    <li><b id="ui-followers-count">0</b> abonnés</li>
                </ul>
                <div class="bio-area">
                    <p id="ui-bio" style="margin:0;"></p>
                    <a id="ui-link" href="#" class="web-link" target="_blank"></a>
                </div>
            </div>
        </header>

        <div class="action-row">
            <button class="btn-action" onclick="showEditModal()">Modifier le profil</button>
            <button class="btn-action" onclick="copyLink()">Partager le profil</button>
        </div>

        <div class="highlights-wrapper" id="ui-highlights">
            <div class="highlight-item" onclick="addCollection()">
                <div class="hl-circle"><i class="fas fa-plus"></i></div>
                <span style="font-size:12px;">Nouveau</span>
            </div>
        </div>

        <div class="tabs">
            <div class="tab-btn active"><i class="fas fa-grid-3x3"></i></div>
            <div class="tab-btn"><i class="far fa-bookmark"></i></div>
            <div class="tab-btn"><i class="far fa-id-badge"></i></div>
        </div>

        <div class="posts-grid" id="ui-post-grid"></div>
        <div id="bottom-loader" style="text-align:center; padding:20px; display:none;">
            <i class="fas fa-circle-notch fa-spin" style="color:var(--accent)"></i>
        </div>
    </div>

    <div id="edit-modal-ui" class="edit-modal">
        <div class="edit-box">
            <div class="modal-head">
                <span onclick="hideEditModal()" style="cursor:pointer; color:var(--text-dim);">Annuler</span>
                <b>Modifier le profil</b>
                <span onclick="saveProfileChanges()" style="cursor:pointer; color:var(--insta-blue); font-weight:700;">Terminé</span>
            </div>
            <div class="modal-body">
                <div class="input-group" style="text-align:center;">
                    <img id="edit-preview" src="" style="width:70px; height:70px; border-radius:50%; margin-bottom:10px;">
                    <p onclick="triggerProfileUpload()" style="color:var(--insta-blue); font-size:14px; cursor:pointer;">Changer la photo de profil</p>
                </div>
                <div class="input-group">
                    <label>Nom d'utilisateur</label>
                    <input type="text" id="edit-username" class="modal-input">
                </div>
                <div class="input-group">
                    <label>Bio</label>
                    <textarea id="edit-bio" class="modal-input" rows="3"></textarea>
                </div>
                <div class="input-group">
                    <label>Lien Web</label>
                    <input type="text" id="edit-link" class="modal-input" placeholder="https://...">
                </div>
            </div>
        </div>
    </div>

    <input type="file" id="file-profile" accept="image/*" style="display:none;">
    <input type="file" id="file-story" accept="image/*" style="display:none;">

    <script type="module">
        import { db, auth, storage } from './firebase-config.js';
        import { doc, onSnapshot, updateDoc, collection, query, where, orderBy, limit, getDocs, startAfter } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { ref, uploadBytesResumable, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";

        let lastDoc = null;
        let isPaging = false;

        // --- GESTION LOADER FLOY ---
        const showFloyLoader = (msg) => {
            document.getElementById('loader-status').innerText = msg;
            document.getElementById('floy-loader').style.display = 'flex';
        };
        const hideFloyLoader = () => {
            document.getElementById('floy-loader').style.display = 'none';
            document.getElementById('progress-bar').style.width = '0%';
        };

        // --- OUVERTURE GALERIE ---
        window.triggerProfileUpload = () => document.getElementById('file-profile').click();
        window.triggerStoryUpload = () => document.getElementById('file-story').click();

        // --- UPLOAD PHOTO DE PROFIL ---
        document.getElementById('file-profile').onchange = async (e) => {
            const file = e.target.files[0];
            if(!file) return;

            showFloyLoader("Téléchargement de la photo...");
            const user = auth.currentUser;
            const storageRef = ref(storage, `profiles/${user.uid}`);
            const uploadTask = uploadBytesResumable(storageRef, file);

            uploadTask.on('state_changed', 
                (snap) => {
                    let progress = (snap.bytesTransferred / snap.totalBytes) * 100;
                    document.getElementById('progress-bar').style.width = progress + '%';
                }, 
                (err) => { alert("Erreur d'upload"); hideFloyLoader(); }, 
                async () => {
                    const url = await getDownloadURL(uploadTask.snapshot.ref);
                    await updateDoc(doc(db, "users", user.uid), { avatarUrl: url });
                    hideFloyLoader();
                }
            );
        };

        // --- UPLOAD STORY (ACTIVE LE CERCLE) ---
        document.getElementById('file-story').onchange = async (e) => {
            const file = e.target.files[0];
            if(!file) return;
            showFloyLoader("Création de votre story...");
            // Simuler upload story
            setTimeout(async () => {
                await updateDoc(doc(db, "users", auth.currentUser.uid), { hasActiveStory: true });
                hideFloyLoader();
            }, 2000);
        };

        // --- SYNCHRO TEMPS RÉEL (Permanence) ---
        auth.onAuthStateChanged(user => {
            if(user) {
                onSnapshot(doc(db, "users", user.uid), (snap) => {
                    if(!snap.exists()) return;
                    const d = snap.data();
                    
                    // UI Header
                    document.getElementById('ui-username').innerText = d.username || "User";
                    document.getElementById('ui-bio').innerText = d.bio || "";
                    document.getElementById('ui-link').innerText = d.webLink || "";
                    document.getElementById('ui-link').href = d.webLink || "#";
                    document.getElementById('ui-avatar').src = d.avatarUrl || "https://via.placeholder.com/150";
                    document.getElementById('ui-badge').style.display = d.isVerified ? 'inline' : 'none';
                    document.getElementById('ring-ui').style.display = d.hasActiveStory ? 'block' : 'none';
                    document.getElementById('ui-posts-count').innerText = d.postsCount || 0;
                    document.getElementById('ui-followers-count').innerText = d.followersCount || 0;

                    // UI Modale
                    document.getElementById('edit-preview').src = d.avatarUrl || "https://via.placeholder.com/150";
                    document.getElementById('edit-username').value = d.username || "";
                    document.getElementById('edit-bio').value = d.bio || "";
                    document.getElementById('edit-link').value = d.webLink || "";
                });
                loadGrid(user.uid);
            }
        });

        // --- GRILLE INFINIE ---
        async function loadGrid(uid) {
            if(isPaging) return;
            isPaging = true;
            const grid = document.getElementById('ui-post-grid');
            
            let q = query(collection(db, "posts"), where("userId", "==", uid), orderBy("createdAt", "desc"), limit(12));
            if(lastDoc) q = query(collection(db, "posts"), where("userId", "==", uid), orderBy("createdAt", "desc"), startAfter(lastDoc), limit(12));

            const snap = await getDocs(q);
            if(!snap.empty) {
                lastDoc = snap.docs[snap.docs.length - 1];
                snap.forEach(doc => {
                    const post = doc.data();
                    const item = document.createElement('div');
                    item.className = 'grid-item';
                    if(post.type === 'video') {
                        item.innerHTML = `<video src="${post.url}"></video><i class="fas fa-play icon-overlay"></i>`;
                    } else {
                        item.innerHTML = `<img src="${post.url}" loading="lazy">`;
                    }
                    grid.appendChild(item);
                });
            }
            isPaging = false;
        }

        // --- FONCTIONS UI MODALE ---
        window.showEditModal = () => document.getElementById('edit-modal-ui').style.display = 'flex';
        window.hideEditModal = () => document.getElementById('edit-modal-ui').style.display = 'none';
        
        window.saveProfileChanges = async () => {
            const user = auth.currentUser;
            showFloyLoader("Enregistrement...");
            await updateDoc(doc(db, "users", user.uid), {
                username: document.getElementById('edit-username').value,
                bio: document.getElementById('edit-bio').value,
                webLink: document.getElementById('edit-link').value
            });
            hideEditModal();
            hideFloyLoader();
        };

        window.copyLink = () => {
            navigator.clipboard.writeText(window.location.href);
            alert("Lien copié !");
        };

        window.addCollection = () => {
            const name = prompt("Nom de la collection :");
            if(name) {
                const item = document.createElement('div');
                item.className = 'highlight-item';
                item.innerHTML = `<div class="hl-circle" style="border-color:white; overflow:hidden;"><img src="https://via.placeholder.com/150" style="width:100%; height:100%;"></div><span style="font-size:12px;">${name}</span>`;
                document.getElementById('ui-highlights').appendChild(item);
            }
        };

        window.onscroll = () => {
            if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 500) {
                if(auth.currentUser) loadGrid(auth.currentUser.uid);
            }
        };
    </script>
</body>
</html>
