<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil - Floy</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --orange: #FF7A1A; --bg: #000; --card: #121212; --text-gray: #a8a8a8; }
        body { background: var(--bg); color: white; font-family: -apple-system, sans-serif; margin: 0; padding-bottom: 80px; }

        /* Header */
        .top-bar { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; background: rgba(0,0,0,0.9); z-index: 1000; backdrop-filter: blur(10px); }
        .username-header { font-weight: 800; font-size: 19px; }

        /* Profile Section */
        .profile-container { padding: 10px 20px; }
        .stats-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 15px; }
        
        .profile-pic-container { width: 86px; height: 86px; border-radius: 50%; padding: 2px; background: linear-gradient(45deg, var(--orange), #ffcd3c); }
        .profile-pic { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; background: #111; border: 2px solid black; }
        
        .stats-box { flex: 1; display: flex; justify-content: space-around; margin-left: 15px; }
        .stat-item { text-align: center; }
        .stat-num { font-weight: 800; font-size: 17px; display: block; }
        .stat-label { font-size: 12px; color: var(--text-gray); }

        /* Bio */
        .name-badge { display: flex; align-items: center; gap: 5px; margin-bottom: 4px; }
        .bio-text { font-size: 14px; color: #efefef; margin-bottom: 15px; }

        /* Boutons */
        .action-btns { display: flex; gap: 8px; }
        .btn { flex: 1; padding: 10px; border-radius: 8px; font-weight: 700; font-size: 13px; border: none; cursor: pointer; transition: 0.2s; text-align: center; color: white; text-decoration: none; }
        .btn-follow { background: var(--orange); }
        .btn-following { background: #262626; color: white; } /* État quand on suit déjà */
        .btn-gray { background: #262626; }

        /* Grille */
        .tabs { display: flex; border-top: 1px solid #262626; margin-top: 15px; }
        .tab { flex: 1; text-align: center; padding: 12px; color: var(--text-gray); font-size: 20px; cursor: pointer; }
        .tab.active { color: white; border-top: 2px solid white; }
        .media-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; }
        .grid-item { aspect-ratio: 1/1; background: #111; }
        .grid-item img { width: 100%; height: 100%; object-fit: cover; }

        /* Nav Bar SVG */
        .nav-bar { position: fixed; bottom: 0; width: 100%; height: 65px; background: #000; border-top: 1px solid #1a1a1a; display: flex; justify-content: space-around; align-items: center; z-index: 1000; }
        .nav-icon { width: 24px; height: 24px; fill: white; }
        .nav-icon.active { fill: var(--orange); }

        /* Modal Message */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: #1c1c1c; width: 100%; max-width: 400px; padding: 20px; border-radius: 20px; }
        textarea { width: 100%; background: #000; border: 1px solid #333; color: white; padding: 12px; border-radius: 10px; margin: 15px 0; outline: none; box-sizing: border-box; resize: none; }
    </style>
</head>
<body>

    <div class="top-bar">
        <span class="username-header" id="header-user">Profil</span>
        <i class="fas fa-bars" onclick="location.href='side-menu.html'"></i>
    </div>

    <div class="profile-container">
        <div class="stats-row">
            <div class="profile-pic-container"><img id="profile-img" class="profile-pic" src=""></div>
            <div class="stats-box">
                <div class="stat-item"><span class="stat-num" id="post-count">0</span><span class="stat-label">Posts</span></div>
                <div class="stat-item"><span class="stat-num" id="follower-count">0</span><span class="stat-label">Abonnés</span></div>
                <div class="stat-item"><span class="stat-num" id="following-count">0</span><span class="stat-label">Suivis</span></div>
            </div>
        </div>

        <div class="user-info">
            <div class="name-badge">
                <b id="display-name">Chargement...</b>
                <i id="v-badge" class="fas fa-check-circle" style="color:#0095f6; display:none;"></i>
            </div>
            <p id="bio" class="bio-text">...</p>
            
            <div class="action-btns">
                <button class="btn btn-follow" id="btn-follow">Suivre</button>
                <button class="btn btn-gray" id="btn-open-msg">Message</button>
                <a href="edit-profil.html" class="btn btn-gray"><i class="fas fa-cog"></i></a>
            </div>
        </div>
    </div>

    <div class="tabs">
        <div class="tab active"><i class="fas fa-th"></i></div>
        <div class="tab"><i class="fas fa-play-circle"></i></div>
    </div>
    <div class="media-grid" id="grid"></div>

    <div class="nav-bar">
        <svg class="nav-icon" viewBox="0 0 24 24" onclick="location.href='index.html'"><path d="M12 2.099l-9 8.165v11.736h6v-6h6v6h6v-11.736l-9-8.165z"/></svg>
        <svg class="nav-icon" viewBox="0 0 24 24"><path d="M10 18h4v-2h-4v2zM3 6v2h18V6H3zm3 7h12v-2H6v2z"/></svg>
        <svg class="nav-icon" viewBox="0 0 24 24" onclick="location.href='create.html'"><path d="M19 11h-6V5h-2v6H5v2h6v6h2v-6h6z"/></svg>
        <svg class="nav-icon" viewBox="0 0 24 24" onclick="location.href='messages.html'"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
        <svg class="nav-icon active" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
    </div>

    <div id="msgModal" class="modal">
        <div class="modal-content">
            <h3 style="margin:0; text-align:center;">Message</h3>
            <textarea id="msg-input" placeholder="Écris ton message..."></textarea>
            <button class="btn btn-follow" style="width:100%" id="send-btn">Envoyer le message</button>
            <p style="color:gray; text-align:center; margin-top:15px; cursor:pointer" onclick="closeModal()">Annuler</p>
        </div>
    </div>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { doc, onSnapshot, collection, query, where, getDocs, addDoc, serverTimestamp, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        // RÉCUPÉRER L'ID DU PROFIL (soit le mien, soit un autre via l'URL)
        const urlParams = new URLSearchParams(window.location.search);
        let profileId = urlParams.get('id');

        onAuthStateChanged(auth, (user) => {
            if (!user) { window.location.href = "connexion.html"; return; }
            if (!profileId) profileId = user.uid; // Si pas d'ID dans l'URL, c'est mon profil

            // 1. INFOS PROFIL & BADGE
            onSnapshot(doc(db, "users", profileId), (snap) => {
                if (snap.exists()) {
                    const d = snap.data();
                    document.getElementById('header-user').innerText = d.username || "Profil";
                    document.getElementById('display-name').innerText = d.username || "Sans nom";
                    document.getElementById('bio').innerText = d.bio || "";
                    document.getElementById('v-badge').style.display = d.isVerified ? "inline-block" : "none";
                    if (d.avatarUrl) document.getElementById('profile-img').src = d.avatarUrl;
                }
            });

            // 2. COMPTEURS RÉELS (Followers / Following)
            onSnapshot(query(collection(db, "followers"), where("followingId", "==", profileId)), (s) => {
                document.getElementById('follower-count').innerText = s.size;
            });
            onSnapshot(query(collection(db, "followers"), where("followerId", "==", profileId)), (s) => {
                document.getElementById('following-count').innerText = s.size;
            });

            // 3. BOUTON SUIVRE (Logique cliquable)
            const followBtn = document.getElementById('btn-follow');
            if (profileId === user.uid) {
                followBtn.style.display = "none"; // On ne se suit pas soi-même
            } else {
                // Vérifier si on suit déjà
                const followDocId = `${user.uid}_${profileId}`;
                onSnapshot(doc(db, "followers", followDocId), (docSnap) => {
                    if (docSnap.exists()) {
                        followBtn.innerText = "Abonné(e)";
                        followBtn.className = "btn btn-following";
                        followBtn.onclick = async () => await deleteDoc(doc(db, "followers", followDocId));
                    } else {
                        followBtn.innerText = "Suivre";
                        followBtn.className = "btn btn-follow";
                        followBtn.onclick = async () => {
                            await setDoc(doc(db, "followers", followDocId), {
                                followerId: user.uid,
                                followingId: profileId,
                                timestamp: serverTimestamp()
                            });
                        };
                    }
                });
            }

            // 4. LOGIQUE MESSAGE (Ouverture fenêtre + Envoi)
            document.getElementById('btn-open-msg').onclick = () => document.getElementById('msgModal').style.display = 'flex';
            
            document.getElementById('send-btn').onclick = async () => {
                const text = document.getElementById('msg-input').value;
                if(!text.trim()) return;

                const chatId = user.uid < profileId ? `${user.uid}_${profileId}` : `${profileId}_${user.uid}`;
                
                // Créer la discussion pour messages.html
                await setDoc(doc(db, "chats", chatId), {
                    users: [user.uid, profileId],
                    lastMessage: text,
                    lastUpdate: serverTimestamp()
                }, { merge: true });

                // Ajouter le message pour chat.html
                await addDoc(collection(db, "chats", chatId, "messages"), {
                    text: text,
                    senderId: user.uid,
                    createdAt: serverTimestamp()
                });

                alert("Message envoyé !");
                closeModal();
            };

            // 5. GRILLE DE PHOTOS
            loadUserPosts(profileId);
        });

        async function loadUserPosts(uid) {
            const q = query(collection(db, "posts"), where("userId", "==", uid));
            const snap = await getDocs(q);
            const grid = document.getElementById('grid');
            grid.innerHTML = "";
            document.getElementById('post-count').innerText = snap.size;
            snap.forEach(d => {
                grid.innerHTML += `<div class="grid-item"><img src="${d.data().imageUrl}"></div>`;
            });
        }

        window.closeModal = () => document.getElementById('msgModal').style.display = 'none';
    </script>
</body>
</html>
