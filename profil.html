<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Profil | Floy</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --floy-orange: #FF7A1A; --floy-black: #000; }
        body { background: var(--floy-black); margin: 0; font-family: -apple-system, sans-serif; color: white; overflow-x: hidden; }
        
        /* LOADER FLOY */
        #floy-loader {
            position: fixed; inset: 0; background: #000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 9999; transition: opacity 0.5s ease;
        }
        .spinner {
            width: 40px; height: 40px;
            border: 3px solid rgba(255, 122, 26, 0.1);
            border-top: 3px solid var(--floy-orange);
            border-radius: 50%; animation: spin 0.8s linear infinite;
        }
        .floy-logo-text { margin-top: 20px; color: white; font-size: 14px; letter-spacing: 5px; text-transform: uppercase; font-weight: 300; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .app-container { width: 100%; max-width: 500px; margin: 0 auto; padding-bottom: 80px; }
        
        /* Nav Basse */
        .nav-bar {
            position: fixed; bottom: 0; width: 100%; max-width: 500px; height: 65px;
            background: rgba(0,0,0,0.95); border-top: 1px solid #1a1a1a;
            display: flex; justify-content: space-around; align-items: center; z-index: 1000;
        }
        .nav-bar i { font-size: 22px; color: #555; cursor: pointer; }
        .nav-active { color: var(--floy-orange) !important; }
    </style>
</head>
<body>

    <div id="floy-loader">
        <div class="spinner"></div>
        <div class="floy-logo-text">Floy</div>
    </div>

    <div class="app-container">
        <div id="header-zone"></div>
        <div id="stats-zone"></div>
        <div id="tabs-zone"></div>
        <div id="grid-zone"></div>
    </div>

    <div id="modal-zone"></div> <nav class="nav-bar">
        <i class="fas fa-home" onclick="location.href='index.html'"></i>
        <i class="fas fa-search"></i>
        <i class="fas fa-plus-square"></i>
        <i class="fas fa-comment"></i>
        <i class="fas fa-user nav-active"></i>
    </nav>

    <script type="module">
        import { auth } from './firebase-config.js';
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        async function loadModule(file, targetId) {
            try {
                const res = await fetch(file);
                if (!res.ok) throw new Error(file + " introuvable");
                const html = await res.text();
                const container = document.getElementById(targetId);
                const tempDiv = document.createElement('div');
                tempDiv.innerHTML = html;
                container.appendChild(tempDiv);
                
                const scripts = tempDiv.querySelectorAll("script");
                scripts.forEach(s => {
                    const newScript = document.createElement("script");
                    newScript.type = "module";
                    newScript.textContent = s.textContent;
                    document.body.appendChild(newScript);
                });
            } catch (e) { console.error(e); }
        }

        onAuthStateChanged(auth, async (user) => {
            if (!user) { window.location.href = 'connexion.html'; return; }

            const urlParams = new URLSearchParams(window.location.search);
            const viewId = urlParams.get('id') || user.uid;

            // Chargement séquentiel pour éviter les conflits
            await loadModule('profile_header.html', 'header-zone');
            await loadModule('profile_stats.html', 'stats-zone');
            await loadModule('profile_tabs.html', 'tabs-zone');
            await loadModule('profile_grid.html', 'grid-zone');
            await loadModule('profile_edit_modal.html', 'modal-zone');
            await loadModule('quick_chat.html', 'modal-zone');

            setTimeout(() => {
                if(window.loadHeader) window.loadHeader(viewId, user.uid);
                const loader = document.getElementById('floy-loader');
                if(loader) {
                    loader.style.opacity = '0';
                    setTimeout(() => loader.remove(), 500);
                }
            }, 600);
        });
    </script>
</body>
</html>
