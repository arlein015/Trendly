<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Floy | Premium Profile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000; color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .orange-text { color: #FF6B00; }
        .bg-orange { background-color: #FF6B00; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); }
        
        /* Badge Premium Étoilé (Gold/Blue Hybrid) */
        .premium-badge {
            color: #0095f6;
            filter: drop-shadow(0 0 5px rgba(0, 149, 246, 0.8));
            position: relative;
        }

        /* Animation Galerie / Modale */
        .modal { display: none; position: fixed; inset: 0; z-index: 100; background: rgba(0,0,0,0.9); align-items: center; justify-content: center; opacity: 0; transition: opacity 0.3s ease; }
        .modal.active { display: flex; opacity: 1; }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="antialiased">

    <nav class="sticky top-0 z-40 bg-black/90 backdrop-blur-md px-6 py-4 flex justify-between items-center border-b border-white/5">
        <div class="flex items-center space-x-4">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2.5" d="M15 19l-7-7 7-7"/></svg>
            <h1 class="font-black text-xl tracking-tighter">floy_official</h1>
        </div>
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M12 5v.01M12 12v.01M12 19v.01M12 6a1 1 0 110-2 1 1 0 010 2zm0 7a1 1 0 110-2 1 1 0 010 2zm0 7a1 1 0 110-2 1 1 0 010 2z"/></svg>
    </nav>

    <main class="max-w-2xl mx-auto pt-6 px-4">
        
        <header class="flex flex-col items-center md:items-start md:flex-row md:space-x-10 mb-8">
            <div class="w-24 h-24 md:w-32 md:h-32 rounded-full p-[3px] bg-gradient-to-tr from-[#FF6B00] to-[#FF3D00] mb-4">
                <img src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?auto=format&fit=crop&w=400" class="w-full h-full rounded-full object-cover border-4 border-black">
            </div>

            <div class="flex-1 text-center md:text-left">
                <div class="flex items-center justify-center md:justify-start space-x-2 mb-4">
                    <h2 class="text-2xl font-black">Floy</h2>
                    <span class="premium-badge">
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M22.5 12.5c0-1.58-.8-3.04-2.12-3.88.24-1.58-.16-3.2-.12-4.52s-2.94-1.36-4.52-1.12c-.84-1.32-2.3-2.12-3.88-2.12s-3.04.8-3.88 2.12c-1.58-.24-3.2.16-4.52.12s-1.36 2.94-1.12 4.52c-1.32.84-2.12 2.3-2.12 3.88s.8 3.04 2.12 3.88c-.24 1.58.16 3.2.12 4.52s2.94 1.36 4.52 1.12c.84 1.32 2.3 2.12 3.88 2.12s3.04-.8 3.88-2.12c1.58.24 3.2-.16 4.52-.12s1.36-2.94 1.12-4.52c1.32-.84 2.12-2.3 2.12-3.88zm-11.8 4.6l-3.8-3.8 1.4-1.4 2.4 2.4 5.6-5.6 1.4 1.4-7 7z"></path>
                        </svg>
                    </span>
                </div>

                <div class="flex justify-center md:justify-start space-x-8 mb-6 text-sm font-bold">
                    <div class="text-center"><span class="block text-lg">12.5k</span><span class="text-gray-500 text-[10px] uppercase">Abonnés</span></div>
                    <div class="text-center"><span class="block text-lg">480</span><span class="text-gray-500 text-[10px] uppercase">Suivis</span></div>
                    <div class="text-center"><span class="block text-lg">85k</span><span class="text-gray-500 text-[10px] uppercase">Likes</span></div>
                </div>

                <div class="flex flex-wrap justify-center md:justify-start gap-3 items-center">
                    <button id="btn-suivre" onclick="toggleSuivre()" class="bg-orange text-black font-black px-10 py-2.5 rounded-xl text-xs uppercase tracking-widest transition-all active:scale-90">
                        Suivre
                    </button>
                    <button onclick="openMessage()" class="glass px-6 py-2.5 rounded-xl font-bold text-xs uppercase hover:bg-white/10">
                        Message
                    </button>
                </div>
            </div>
        </header>

        <section class="mb-8 border-t border-white/5 pt-6">
            <div class="flex space-x-6 overflow-x-auto no-scrollbar pb-2">
                <div class="flex flex-col items-center space-y-2 flex-shrink-0">
                    <div class="w-16 h-16 rounded-full p-[2px] border-2 border-[#FF6B00] bg-black">
                        <img src="https://picsum.photos/200/200?random=1" class="w-full h-full rounded-full object-cover">
                    </div>
                    <span class="text-[10px] font-bold text-gray-500 uppercase">Projet</span>
                </div>

                <div onclick="triggerGallery()" class="flex flex-col items-center space-y-2 flex-shrink-0 cursor-pointer">
                    <div class="w-16 h-16 rounded-full border-2 border-dashed border-gray-600 flex items-center justify-center hover:border-[#FF6B00] hover:text-[#FF6B00] transition">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                    </div>
                    <span class="text-[10px] font-bold text-gray-400 uppercase">New</span>
                    <input type="file" id="gallery-input" accept="image/*" class="hidden" onchange="previewStory(event)">
                </div>
            </div>
        </section>

        <div id="grid-content" class="grid grid-cols-3 gap-1 md:gap-2 pb-24 mt-2 border-t border-white/10 pt-4">
            <div class="aspect-square bg-gray-900"><img src="https://picsum.photos/500/500?random=10" class="w-full h-full object-cover"></div>
            <div class="aspect-square bg-gray-900"><img src="https://picsum.photos/500/500?random=11" class="w-full h-full object-cover"></div>
            <div class="aspect-square bg-gray-900"><img src="https://picsum.photos/500/500?random=12" class="w-full h-full object-cover"></div>
        </div>

    </main>

    <div id="modal-msg" class="modal px-6" onclick="closeMessage(event)">
        <div class="glass w-full max-w-sm p-8 rounded-3xl" onclick="event.stopPropagation()">
            <h3 class="font-black text-xl mb-6 orange-text uppercase tracking-tighter text-center">Contacter Floy</h3>
            <textarea placeholder="Ecris ton message..." class="w-full bg-white/5 border border-white/10 rounded-2xl p-4 h-32 outline-none focus:border-[#FF6B00] mb-4"></textarea>
            <button class="w-full bg-white text-black font-black py-4 rounded-xl uppercase text-sm" onclick="closeMessage()">Envoyer</button>
        </div>
    </div>

    <script>
        // 1. Bouton Suivre Actif
        function toggleSuivre() {
            const btn = document.getElementById('btn-suivre');
            if (btn.classList.contains('bg-orange')) {
                btn.classList.remove('bg-orange', 'text-black');
                btn.classList.add('glass', 'text-white');
                btn.innerText = 'Suivi';
            } else {
                btn.classList.remove('glass', 'text-white');
                btn.classList.add('bg-orange', 'text-black');
                btn.innerText = 'Suivre';
            }
        }

        // 2. Modale Message
        function openMessage() { document.getElementById('modal-msg').classList.add('active'); }
        function closeMessage() { document.getElementById('modal-msg').classList.remove('active'); }

        // 3. New Story : Ouvrir la Galerie
        function triggerGallery() {
            document.getElementById('gallery-input').click();
        }

        function previewStory(event) {
            const file = event.target.files[0];
            if (file) {
                alert("Image sélectionnée : " + file.name + "\nModule d'upload de story prêt !");
                // Ici tu pourras ajouter ta logique AJAX pour envoyer l'image à ton module story.js
            }
        }
    </script>

</body>
</html>
