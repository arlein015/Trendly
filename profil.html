<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Profil - Floy</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --orange: #FF7A1A; }
        body { background: #000; color: white; font-family: -apple-system, sans-serif; margin: 0; padding-bottom: 70px; }
        
        /* Header */
        .profile-header { padding: 20px 15px; border-bottom: 1px solid #121212; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; font-weight: bold; font-size: 18px; }
        
        /* Stats Section */
        .user-stats-row { display: flex; align-items: center; justify-content: space-between; gap: 20px; }
        .profile-pic { width: 77px; height: 77px; border-radius: 50%; background: #222; object-fit: cover; border: 1px solid #333; }
        .stats-container { display: flex; flex: 1; justify-content: space-around; text-align: center; }
        .stat-val { font-weight: bold; font-size: 17px; display: block; }
        .stat-label { font-size: 12px; color: #888; }

        /* Bio & Action */
        .profile-bio { padding: 15px; font-size: 14px; line-height: 1.5; }
        .btn-edit { width: 100%; background: #1a1a1a; border: 1px solid #333; color: white; padding: 8px; border-radius: 8px; font-weight: bold; margin-top: 15px; cursor: pointer; }

        /* Grille des photos */
        .posts-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; margin-top: 20px; }
        .grid-item { width: 100%; aspect-ratio: 1/1; object-fit: cover; background: #050505; }

        /* Barre de navigation */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 60px; background: #000; border-top: 1px solid #121212; display: flex; justify-content: space-around; align-items: center; font-size: 22px; z-index: 100; }
        .nav-active { color: var(--orange); }
    </style>
</head>
<body>

    <div class="profile-header">
        <div class="top-bar">
    <span id="header-username">Mon Profil</span>
    <i class="fas fa-bars" onclick="location.href='side-menu.html'"></i>
</div>
        <div class="user-stats-row">
            <img id="profile-img" class="profile-pic" src="https://via.placeholder.com/150">
            <div class="stats-container">
                <div><span class="stat-val" id="posts-count">0</span><span class="stat-label">Posts</span></div>
                <div><span class="stat-val">0</span><span class="stat-label">Abonnés</span></div>
                <div><span class="stat-val">0</span><span class="stat-label">Suivis</span></div>
            </div>
        </div>
        
        <div class="profile-bio">
            <b id="full-name">Utilisateur Floy</b><br>
            <span>Bienvenue sur mon profil !</span>
            <button class="btn-edit" onclick="alert('Modification bientôt disponible')">Modifier le profil</button>
        </div>
    </div>

    <div class="posts-grid" id="grid-container">
        </div>

    <i class="fas fa-bars" onclick="location.href='side-menu.html'"></i>
    <nav class="bottom-nav">
        <i class="fas fa-home" onclick="location.href='index.html'"></i>
        <i class="fas fa-search"></i>
        <i class="far fa-plus-square" onclick="location.href='create.html'"></i>
        <i class="fas fa-video"></i>
        <i class="fas fa-user-circle nav-active"></i>
    </nav>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { collection, query, where, getDocs, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                // Afficher le nom de l'utilisateur
                const name = user.displayName || "Utilisateur";
                document.getElementById('header-username').innerText = name;
                document.getElementById('full-name').innerText = name;

                // Requête pour récupérer uniquement les posts de l'utilisateur connecté
                try {
                    const q = query(
                        collection(db, "posts"), 
                        where("username", "==", name), // On filtre par le nom utilisé lors de la création
                        orderBy("createdAt", "desc")
                    );

                    const snapshot = await getDocs(q);
                    const grid = document.getElementById('grid-container');
                    grid.innerHTML = ""; // Nettoyer la grille
                    
                    document.getElementById('posts-count').innerText = snapshot.size;

                    if (snapshot.empty) {
                        grid.innerHTML = `<p style="grid-column: span 3; text-align:center; color:#555; margin-top:20px;">Aucune photo publiée.</p>`;
                    }

                    snapshot.forEach((doc) => {
                        const post = doc.data();
                        grid.innerHTML += `<img src="${post.imageUrl}" class="grid-item">`;
                    });
                } catch (error) {
                    console.error("Erreur de chargement des posts :", error);
                }
            } else {
                // Rediriger vers la connexion si l'utilisateur n'est pas loggué
                location.href = 'connexion.html'; 
            }
        });
    </script>
</body>
</html>
