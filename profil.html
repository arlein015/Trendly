<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Floy - Profil</title>
    <style>
        :root { --orange: #FF7A1A; --noir: #000; --bordure: #262626; --gris: #8e8e8e; }
        body { background: var(--noir); color: white; font-family: -apple-system, sans-serif; margin: 0; padding-bottom: 80px; }

        /* TOP NAV */
        .top-nav { display: flex; justify-content: space-between; align-items: center; padding: 15px; position: sticky; top: 0; background: black; z-index: 100; border-bottom: 1px solid var(--bordure); }
        .username-title { font-weight: bold; font-size: 18px; color: var(--orange); }

        /* PROFIL INFO */
        .profile-container { padding: 10px 15px; }
        .main-info { display: flex; align-items: center; gap: 25px; margin-bottom: 20px; }
        .profile-pic { width: 85px; height: 85px; border-radius: 50%; object-fit: cover; border: 2px solid var(--orange); }
        
        /* STYLE DU NOM ET DU BADGE */
        .display-name { font-weight: bold; font-size: 18px; display: flex; align-items: center; gap: 6px; margin-top: 5px; }
        .verify-badge { width: 18px; height: 18px; fill: var(--orange); flex-shrink: 0; }
        
        .bio-text { font-size: 14px; margin-top: 4px; color: #efefef; }

        /* GRILLE */
        .profile-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; border-top: 1px solid var(--bordure); padding: 2px; }
        .grid-item { aspect-ratio: 1/1; background: #111; overflow: hidden; }
        .grid-item img { width: 100%; height: 100%; object-fit: cover; }

        /* NAV BAR BAS */
        .nav-bar { position: fixed; bottom: 0; width: 100%; height: 65px; background: black; border-top: 1px solid var(--bordure); display: flex; justify-content: space-around; align-items: center; z-index: 1000; }
        .nav-link { color: white; opacity: 0.6; }
        .nav-link.active { opacity: 1; color: var(--orange); }
        .nav-avatar { width: 26px; height: 26px; border-radius: 50%; object-fit: cover; }
    </style>
</head>
<body>

    <div class="top-nav">
        <div class="username-title" id="top-username">@chargement</div>
        <div class="menu-right">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
        </div>
    </div>

    <div class="profile-container">
        <div class="main-info">
            <img id="u-pic" class="profile-pic" src="https://via.placeholder.com/100">
            <div style="flex-grow: 1; text-align: center;">
                <b id="count-posts">0</b><br><small style="color:var(--gris)">Posts</small>
            </div>
        </div>

        <div class="bio-section">
            <div class="display-name" id="name-container">
                <span id="u-name">...</span>
                </div>
            <div class="bio-text" id="u-bio">Chargement de la bio...</div>
        </div>

        <button onclick="window.location.href='edit-profil.html'" style="width:100%; margin-top:15px; background:#1a1a1a; color:white; border:1px solid var(--bordure); padding:8px; border-radius:8px; font-weight:bold;">Modifier le profil</button>
    </div>

    <div class="profile-grid" id="profile-grid"></div>

    <nav class="nav-bar">
        <a href="index.html" class="nav-link"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg></a>
        <a href="messages.html" class="nav-link"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path></svg></a>
        <a href="profil.html" class="nav-link active"><img id="nav-avatar" class="nav-avatar" src="https://via.placeholder.com/30"></a>
    </nav>

    <script type="module">
        import { db } from './firebase-config.js';
        import { doc, onSnapshot, collection, query, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const MY_ID = "User_Floy_Account"; // ID de ton utilisateur

        // 1. Écouter les données utilisateur (Nom + Badge)
        onSnapshot(doc(db, "users", MY_ID), (docSnap) => {
            if(docSnap.exists()){
                const data = docSnap.data();
                
                // Mise à jour du nom
                document.getElementById('u-name').innerText = data.username || "Utilisateur";
                document.getElementById('top-username').innerText = `@${data.username || 'profil'}`;
                document.getElementById('u-pic').src = data.avatarUrl || "https://via.placeholder.com/100";
                document.getElementById('nav-avatar').src = data.avatarUrl || "https://via.placeholder.com/30";
                document.getElementById('u-bio').innerText = data.bio || "";

                // LOGIQUE DU BADGE FIREBASE
                const container = document.getElementById('name-container');
                // On supprime l'ancien badge s'il existe pour éviter les doublons
                const oldBadge = container.querySelector('.verify-badge');
                if(oldBadge) oldBadge.remove();

                // On vérifie le champ "isVerified" dans Firestore
                if(data.isVerified === true) {
                    const badgeSVG = `
                        <svg class="verify-badge" viewBox="0 0 24 24">
                            <path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10 10-4.5 10-10S17.5 2 12 2zM10 17l-5-5 1.4-1.4 3.6 3.6 7.6-7.6L19 8l-9 9z"/>
                        </svg>`;
                    container.insertAdjacentHTML('beforeend', badgeSVG);
                }
            }
        });

        // 2. Charger les posts
        const q = query(collection(db, "posts"), where("userId", "==", MY_ID));
        onSnapshot(q, (snaps) => {
            const grid = document.getElementById('profile-grid');
            grid.innerHTML = "";
            document.getElementById('count-posts').innerText = snaps.size;
            snaps.forEach(d => {
                const p = d.data();
                const div = document.createElement('div');
                div.className = 'grid-item';
                div.innerHTML = `<img src="${p.images[0]}">`;
                grid.appendChild(div);
            });
        });
    </script>
</body>
</html>
