<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ user.username }} | Social Network</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Design Noir Profond */
        body { background-color: #000000; color: #ffffff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        .grid-item:hover .overlay { opacity: 1; }
        .aspect-square { aspect-ratio: 1 / 1; }
        /* Masquer la scrollbar */
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <nav class="sticky top-0 z-50 bg-black/80 backdrop-blur-md border-b border-white/10 px-4 py-3 flex justify-between items-center md:hidden">
        <span class="font-bold text-lg">{{ user.username }}</span>
        <div class="flex space-x-5">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto pb-20">
        
        <header class="p-4 md:py-10 border-b border-white/10">
            <div class="flex items-center">
                <div class="w-20 h-20 md:w-40 md:h-40 flex-shrink-0 relative group cursor-pointer">
                    <div class="absolute inset-0 bg-gradient-to-tr from-blue-500 to-purple-600 rounded-full p-[2px]">
                        <img src="{{ user.profile_pic or '/static/default.png' }}" 
                             class="w-full h-full rounded-full object-cover border-2 border-black">
                    </div>
                </div>

                <div class="ml-8 flex-1">
                    <div class="flex flex-col md:flex-row md:items-center space-y-3 md:space-y-0 md:space-x-5">
                        <div class="flex items-center">
                            <h2 class="text-2xl font-light tracking-wide">Floy</h2>
        
                            <svg class="w-5 h-5 ml-2 text-blue-400" fill="currentColor" viewBox="0 0 20 20">
                                <path d="M6.267 3.455a3.066 3.066 0 001.745-.723 3.066 3.066 0 013.976 0 3.066 3.066 0 001.745.723 3.066 3.066 0 012.812 2.812c.051.643.304 1.254.723 1.745a3.066 3.066 0 010 3.976 3.066 3.066 0 00-.723 1.745 3.066 3.066 0 01-2.812 2.812 3.066 3.066 0 00-1.745.723 3.066 3.066 0 01-3.976 0 3.066 3.066 0 00-1.745-.723 3.066 3.066 0 01-2.812-2.812 3.066 3.066 0 00-.723-1.745 3.066 3.066 0 010-3.976 3.066 3.066 0 00.723-1.745 3.066 3.066 0 012.812-2.812zm7.44 5.252a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z"></path>
                            </svg>
                        
                        </div>
                        
                        <div class="flex space-x-2">
                            <button id="btn-follow" onclick="toggleFollow()" 
                                    class="bg-blue-600 hover:bg-blue-700 text-white px-8 py-1.5 rounded-lg text-sm font-bold transition-all active:scale-95">
                                Suivre
                            </button>
                            <button class="bg-white/10 hover:bg-white/20 px-5 py-1.5 rounded-lg text-sm font-bold transition">
                                Message
                            </button>
                        </div>
                    </div>

                    <div class="hidden md:flex space-x-10 mt-8 text-sm">
                        <span><strong class="text-white">0</strong> publications</span>
                        <span><strong id="followers-desktop" class="text-white">0</strong> abonnés</span>
                        <span><strong class="text-white">0</strong> abonnements</span>
                    </div>

                    <div class="hidden md:block mt-5">
                        <p class="font-bold text-gray-200">Floy</p>
                        <p class="text-sm text-gray-400 leading-relaxed">floy02</p>
                    </div>
                </div>
            </div>

            <div class="mt-6 md:hidden px-2">
                <p class="font-bold text-sm">Floy</p>
                <p class="text-sm text-gray-400 mt-1 whitespace-pre-line">floy02</p>
            </div>
        </header>

        <div class="flex justify-around border-b border-white/10 py-4 md:hidden text-center bg-white/5">
            <div><p class="font-bold text-white">{{ posts|length }}</p><p class="text-gray-500 text-[10px] uppercase tracking-widest">posts</p></div>
            <div><p id="followers-mobile" class="font-bold text-white">{{ stats.followers }}</p><p class="text-gray-500 text-[10px] uppercase tracking-widest">abonnés</p></div>
            <div><p class="font-bold text-white">{{ stats.following }}</p><p class="text-gray-500 text-[10px] uppercase tracking-widest">suivis</p></div>
        </div>

        <div class="grid grid-cols-3 gap-1 mt-1 md:gap-6 md:p-4">
            {% for post in posts %}
            <div class="grid-item aspect-square relative cursor-pointer overflow-hidden bg-white/5">
                <img src="{{ post.image_url }}" class="w-full h-full object-cover">
                <div class="overlay absolute inset-0 bg-black/40 opacity-0 flex items-center justify-center transition-opacity">
                    <div class="flex space-x-4">
                        <span class="flex items-center text-white font-bold">
                            <svg class="w-5 h-5 mr-1" fill="currentColor" viewBox="0 0 20 20"><path d="M3.172 5.172a4 4 0 015.656 0L10 6.343l1.172-1.171a4 4 0 115.656 5.656L10 17.657l-6.828-6.829a4 4 0 010-5.656z"></path></svg> 
                            {{ post.likes }}
                        </span>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-black border-t border-white/10 px-8 py-4 flex justify-between items-center md:hidden z-50">
        <svg class="w-7 h-7 text-white" fill="currentColor" viewBox="0 0 20 20"><path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z"></path></svg>
        <svg class="w-7 h-7 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
        <div class="w-8 h-8 rounded-full border-2 border-white/20 overflow-hidden">
            <img src="{{ user.profile_pic }}" class="w-full h-full object-cover">
        </div>
    </nav>

    <script>
        let isFollowing = false;
        let followerCount = {{ stats.followers }};

        function toggleFollow() {
            const btn = document.getElementById('btn-follow');
            const mobileCount = document.getElementById('followers-mobile');
            const desktopCount = document.getElementById('followers-desktop');

            if (!isFollowing) {
                // Passage à l'état "Suivi"
                isFollowing = true;
                btn.innerText = "Suivi";
                btn.classList.replace('bg-blue-600', 'bg-white/10');
                btn.classList.add('border', 'border-white/20');
                followerCount++;
            } else {
                // Retour à l'état "Suivre"
                isFollowing = false;
                btn.innerText = "Suivre";
                btn.classList.replace('bg-white/10', 'bg-blue-600');
                btn.classList.remove('border', 'border-white/20');
                followerCount--;
            }

            // Mise à jour visuelle immédiate
            mobileCount.innerText = followerCount;
            desktopCount.innerText = followerCount;

            // Ici tu pourrais appeler ton API Python en background (fetch)
            // fetch('/api/follow/{{ user.id }}', { method: 'POST' });
        }
    </script>
</body>
</html>
