<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Floy | Network Elite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000; color: #fff; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .orange-text { color: #FF6B00; }
        .bg-orange { background-color: #FF6B00; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); }
        
        /* Badge Officiel Bleu (Image Request) */
        .verified-badge { color: #0095f6; display: inline-block; vertical-align: middle; }

        /* Scrollbar invisible */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* Animation d'apparition des photos */
        .fade-in { animation: fadeIn 0.5s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="antialiased">

    <nav class="sticky top-0 z-40 bg-black/90 backdrop-blur-md px-6 py-4 flex justify-between items-center border-b border-white/5">
        <div class="flex items-center space-x-4">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2.5" d="M15 19l-7-7 7-7"/></svg>
            <h1 class="font-black text-xl tracking-tighter italic">floy_network</h1>
        </div>
        <div class="flex items-center space-x-6">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/></svg>
            <svg class="w-1 h-6" fill="currentColor" viewBox="0 0 4 24"><circle cx="2" cy="4" r="2"/><circle cx="2" cy="12" r="2"/><circle cx="2" cy="20" r="2"/></svg>
        </div>
    </nav>

    <main class="max-w-2xl mx-auto pt-6 px-4">
        
        <header class="flex flex-col items-center md:items-start md:flex-row md:space-x-10 mb-8">
            <div class="w-24 h-24 md:w-32 md:h-32 rounded-full p-[3px] bg-gradient-to-tr from-[#FF6B00] to-[#FF3D00] mb-4 shadow-[0_0_15px_rgba(255,107,0,0.3)]">
                <img src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?auto=format&fit=crop&w=400" class="w-full h-full rounded-full object-cover border-4 border-black">
            </div>

            <div class="flex-1 text-center md:text-left">
                <div class="flex items-center justify-center md:justify-start space-x-2 mb-4">
                    <h2 class="text-2xl font-black tracking-tight">Floy</h2>
                    <span class="verified-badge">
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M22.5 12.5c0-1.58-.8-3.04-2.12-3.88.24-1.58-.16-3.2-.12-4.52s-2.94-1.36-4.52-1.12c-.84-1.32-2.3-2.12-3.88-2.12s-3.04.8-3.88 2.12c-1.58-.24-3.2.16-4.52.12s-1.36 2.94-1.12 4.52c-1.32.84-2.12 2.3-2.12 3.88s.8 3.04 2.12 3.88c-.24 1.58.16 3.2.12 4.52s2.94 1.36 4.52 1.12c.84 1.32 2.3 2.12 3.88 2.12s3.04-.8 3.88-2.12c1.58.24 3.2-.16 4.52-.12s1.36-2.94 1.12-4.52c1.32-.84 2.12-2.3 2.12-3.88zm-11.8 4.6l-3.8-3.8 1.4-1.4 2.4 2.4 5.6-5.6 1.4 1.4-7 7z"></path>
                        </svg>
                    </span>
                </div>

                <div class="flex justify-center md:justify-start space-x-10 mb-6">
                    <div class="text-center"><span class="block font-black text-xl">12k</span><span class="text-[10px] text-gray-500 font-bold uppercase tracking-tighter">Followers</span></div>
                    <div class="text-center"><span class="block font-black text-xl">540</span><span class="text-[10px] text-gray-500 font-bold uppercase tracking-tighter">Suivis</span></div>
                    <div class="text-center"><span class="block font-black text-xl">95k</span><span class="text-[10px] text-gray-500 font-bold uppercase tracking-tighter">Likes</span></div>
                </div>

                <div class="mb-6 space-y-1">
                    <p class="text-sm font-semibold text-gray-200">Software Developer & Entrepreneur. Building the future of social networks. 🚀</p>
                    <a href="#" class="text-sm text-blue-400 font-bold hover:underline block italic">floy-network.com/official</a>
                </div>

                <div class="flex flex-wrap justify-center md:justify-start gap-3">
                    <button class="bg-orange text-black font-black px-12 py-2.5 rounded-xl text-xs uppercase tracking-widest active:scale-95 transition">Suivre</button>
                    <button class="glass px-6 py-2.5 rounded-xl font-bold text-xs uppercase">Message</button>
                </div>
            </div>
        </header>

        <section class="mb-10 border-t border-white/5 pt-8">
            <div id="stories-container" class="flex space-x-6 overflow-x-auto no-scrollbar pb-2">
                <div class="flex flex-col items-center space-y-2 flex-shrink-0 cursor-pointer group">
                    <div class="w-16 h-16 rounded-full p-[2px] border-2 border-[#FF6B00] bg-black transition-transform group-hover:scale-105">
                        <img src="https://picsum.photos/200/200?random=101" class="w-full h-full rounded-full object-cover">
                    </div>
                    <span class="text-[10px] font-black uppercase text-gray-500 tracking-tighter">Network</span>
                </div>
                <div class="flex flex-col items-center space-y-2 flex-shrink-0 cursor-pointer group">
                    <div class="w-16 h-16 rounded-full p-[2px] border-2 border-[#FF6B00] bg-black transition-transform group-hover:scale-105">
                        <img src="https://picsum.photos/200/200?random=102" class="w-full h-full rounded-full object-cover">
                    </div>
                    <span class="text-[10px] font-black uppercase text-gray-500 tracking-tighter">Setup</span>
                </div>
                <div class="flex flex-col items-center space-y-2 flex-shrink-0 cursor-pointer">
                    <div class="w-16 h-16 rounded-full border-2 border-dashed border-gray-700 flex items-center justify-center text-gray-600 hover:border-[#FF6B00] hover:text-[#FF6B00] transition">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                    </div>
                    <span class="text-[10px] font-bold text-gray-600 uppercase">New</span>
                </div>
            </div>
        </section>

        <div class="flex border-t border-white/10">
            <button class="flex-1 flex justify-center py-4 border-b-2 border-[#FF6B00] text-[#FF6B00]">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
            </button>
            <button class="flex-1 flex justify-center py-4 opacity-30 hover:opacity-100 transition">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>
            </button>
        </div>

        <div id="grid-content" class="grid grid-cols-3 gap-1 md:gap-2 pb-24 mt-1">
            <div class="aspect-square bg-gray-900 overflow-hidden fade-in">
                <img src="https://picsum.photos/600/600?random=1" class="w-full h-full object-cover hover:scale-110 transition duration-500">
            </div>
            <div class="aspect-square bg-gray-900 overflow-hidden fade-in">
                <img src="https://picsum.photos/600/600?random=2" class="w-full h-full object-cover hover:scale-110 transition duration-500">
            </div>
            <div class="aspect-square bg-gray-900 overflow-hidden fade-in">
                <img src="https://picsum.photos/600/600?random=3" class="w-full h-full object-cover hover:scale-110 transition duration-500">
            </div>
            <div class="aspect-square bg-gray-900 overflow-hidden fade-in">
                <img src="https://picsum.photos/600/600?random=4" class="w-full h-full object-cover hover:scale-110 transition duration-500">
            </div>
            <div class="aspect-square bg-gray-900 overflow-hidden fade-in">
                <img src="https://picsum.photos/600/600?random=5" class="w-full h-full object-cover hover:scale-110 transition duration-500">
            </div>
            <div class="aspect-square bg-gray-900 overflow-hidden fade-in">
                <img src="https://picsum.photos/600/600?random=6" class="w-full h-full object-cover hover:scale-110 transition duration-500">
            </div>
        </div>

    </main>

    <nav class="fixed bottom-0 inset-x-0 bg-black/90 backdrop-blur-xl border-t border-white/5 px-8 py-4 flex justify-between items-center z-50">
        <svg class="w-6 h-6 orange-text" fill="currentColor" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
        <svg class="w-6 h-6 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
        <div class="w-10 h-10 rounded-full border-2 border-white/20 p-0.5"><img src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?auto=format&fit=crop&w=100" class="w-full h-full rounded-full"></div>
    </nav>

</body>
</html>
