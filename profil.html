<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Profil - Floy</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --orange: #FF7A1A; --gray: #1a1a1a; }
        body { background: #000; color: white; font-family: -apple-system, sans-serif; margin: 0; padding-bottom: 70px; }
        
        /* Header */
        .profile-header { padding: 20px 15px; border-bottom: 1px solid #121212; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; font-weight: bold; font-size: 18px; }
        
        .user-stats-row { display: flex; align-items: center; justify-content: space-between; gap: 20px; }
        .profile-pic { width: 80px; height: 80px; border-radius: 50%; background: #222; object-fit: cover; border: 1px solid #333; }
        .stats-container { display: flex; flex: 1; justify-content: space-around; text-align: center; }
        .stat-val { font-weight: bold; font-size: 17px; display: block; }
        .stat-label { font-size: 12px; color: #888; }

        /* Bio avec Badge à côté du nom */
        .profile-bio { padding: 15px; font-size: 14px; }
        .name-badge-container { display: flex; align-items: center; gap: 5px; margin-bottom: 5px; }
        .bio-text { color: #efefef; line-height: 1.4; margin-bottom: 15px; }
        
        .action-buttons { display: flex; gap: 8px; }
        .btn { flex: 1; padding: 9px; border-radius: 8px; font-weight: bold; font-size: 14px; border: none; cursor: pointer; }
        .btn-edit { background: var(--gray); color: white; border: 1px solid #333; }
        .btn-msg { background: var(--gray); color: white; border: 1px solid #333; }

        /* Fenêtre de Message (Modal) */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); align-items: center; justify-content: center; }
        .modal-content { background: #1a1a1a; padding: 20px; border-radius: 15px; width: 85%; max-width: 400px; text-align: center; }
        .modal-content textarea { width: 100%; background: #000; border: 1px solid #333; color: white; padding: 10px; border-radius: 10px; resize: none; margin: 15px 0; outline: none; box-sizing: border-box; }
        .btn-send { background: var(--orange); color: white; border: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; width: 100%; cursor: pointer; }

        /* Grid */
        .posts-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; margin-top: 20px; }
        .grid-item { width: 100%; aspect-ratio: 1/1; object-fit: cover; background: #050505; }
    </style>
</head>
<body>

    <div class="profile-header">
        <div class="top-bar">
            <span id="header-username">Profil</span>
            <i class="fas fa-bars" onclick="location.href='side-menu.html'"></i>
        </div>

        <div class="user-stats-row">
            <img id="profile-img" class="profile-pic" src="https://via.placeholder.com/150">
            <div class="stats-container">
                <div><span class="stat-val" id="posts-count">0</span><span class="stat-label">Posts</span></div>
                <div><span class="stat-val">0</span><span class="stat-label">Abonnés</span></div>
                <div><span class="stat-val">0</span><span class="stat-label">Suivis</span></div>
            </div>
        </div>
        
        <div class="profile-bio">
            <div class="name-badge-container" style="display: flex; align-items: center; gap: 5px;">
    <b id="full-name" style="font-size: 16px;">Chargement...</b>
    <i id="verified-badge" class="fas fa-check-circle" style="color: #0095f6; display: none; font-size: 14px;"></i>
</div>
            <p id="user-bio-text" class="bio-text">Chargement de la bio...</p>
            
            <div class="action-buttons">
                <button class="btn btn-edit" onclick="location.href='edit-profil.html'">Modifier</button>
                <button class="btn btn-msg" id="open-msg">Message</button>
            </div>
        </div>
    </div>

    <div class="posts-grid" id="grid-container"></div>

    <div id="msgModal" class="modal">
        <div class="modal-content">
            <h3>Envoyer un message</h3>
            <textarea id="quick-msg-text" rows="4" placeholder="Écris ton message ici..."></textarea>
            <button id="send-msg-btn" class="btn-send">Envoyer</button>
            <p style="color: #555; font-size: 12px; margin-top: 10px; cursor: pointer;" onclick="closeModal()">Annuler</p>
        </div>
    </div>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { doc, collection, addDoc, serverTimestamp, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const modal = document.getElementById("msgModal");

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                // Écoute des données utilisateur
                onSnapshot(doc(db, "users", user.uid), (snap) => {
                    if (snap.exists()) {
                        const data = snap.data();
                        document.getElementById('header-username').innerText = data.username || user.displayName;
                        document.getElementById('full-name').innerText = data.username || user.displayName;
                        document.getElementById('user-bio-text').innerText = data.bio || "Pas de bio.";
                        if (data.avatarUrl) document.getElementById('profile-img').src = data.avatarUrl;
                        // Badge à côté du nom
                        document.getElementById('verified-badge').style.display = data.isVerified ? "inline-block" : "none";
                    }
                });

                // Gestion de la fenêtre de message
               document.getElementById('send-msg-btn').onclick = async () => {
    const text = document.getElementById('quick-msg-text').value;
    const currentUser = auth.currentUser;
    const profileUserId = user.uid; // L'ID du profil que tu visites

    if (!text.trim()) return;

    // Création d'un ID unique pour la discussion (ex: "userA_userB")
    const chatId = currentUser.uid < profileUserId 
        ? `${currentUser.uid}_${profileUserId}` 
        : `${profileUserId}_${currentUser.uid}`;

    try {
        // A. Crée la discussion dans la liste (pour messages.html)
        await setDoc(doc(db, "chats", chatId), {
            users: [currentUser.uid, profileUserId],
            lastMessage: text,
            lastUpdate: serverTimestamp(),
            names: {
                [currentUser.uid]: currentUser.displayName,
                [profileUserId]: document.getElementById('full-name').innerText
            }
        }, { merge: true });

        // B. Ajoute la bulle de texte (pour chat.html)
        await addDoc(collection(db, "chats", chatId, "messages"), {
            senderId: currentUser.uid,
            text: text,
            createdAt: serverTimestamp()
        });

        alert("Message envoyé !");
        closeModal();
        // Optionnel : Rediriger directement vers la discussion
        // location.href = `chat.html?id=${chatId}`;
    } catch (e) {
        console.error(e);
        alert("Erreur d'envoi");
    }
};

        window.closeModal = () => {
            document.getElementById('open-msg').onclick = () => {
    document.getElementById("msgModal").style.display = "flex";
};
    </script>
</body>
</html>
