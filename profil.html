<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Floy - Mon Profil</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --orange: #FF7A1A; --noir: #000; --gris: #121212; --bordure: #222; }
        body { background: var(--noir); color: white; font-family: -apple-system, sans-serif; margin: 0; padding-bottom: 80px; }

        /* UI ELEMENTS */
        .nav-header { display: flex; justify-content: space-between; padding: 15px 20px; border-bottom: 1px solid var(--bordure); }
        .profile-card { padding: 20px; }
        .avatar-box { display: flex; align-items: center; gap: 20px; }
        #p-avatar { width: 80px; height: 80px; border-radius: 50%; border: 2px solid var(--orange); object-fit: cover; }
        
        .action-grid { display: grid; grid-template-columns: 1fr 1fr 45px; gap: 10px; margin-top: 20px; }
        .btn { background: var(--gris); border: 1px solid var(--bordure); color: white; padding: 10px; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .btn-orange { background: var(--orange); border: none; }

        /* SIDE MENU */
        #side-menu { position: fixed; top: 0; right: -280px; width: 280px; height: 100%; background: #0a0a0a; z-index: 3000; transition: 0.3s; padding: 20px; box-sizing: border-box; }
        #side-menu.open { right: 0; }
        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2500; }

        /* MODAL EDIT */
        #modal-edit { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--noir); z-index: 4000; padding: 20px; box-sizing: border-box; }
        input, textarea { width: 100%; background: #111; border: 1px solid #333; color: white; padding: 15px; border-radius: 12px; margin-bottom: 15px; box-sizing: border-box; }

        /* RE-USE BOTTOM NAV FROM INDEX */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 65px; background: var(--noir); display: flex; justify-content: space-around; align-items: center; border-top: 1px solid var(--bordure); }
        .bottom-nav svg { width: 26px; height: 26px; fill: #888; }
        .active svg { fill: white !important; }
    </style>
</head>
<body>

    <div id="overlay" onclick="window.toggleMenu()"></div>

    <div id="side-menu">
        <h2 style="color:var(--orange)">Menu</h2>
        <div style="padding: 15px 0; border-bottom: 1px solid #222;" onclick="window.logout()">Déconnexion 🚪</div>
    </div>

    <div class="nav-header">
        <b id="top-username">@Username</b>
        <div style="display:flex; gap:20px; font-size:20px">
            <i class="fas fa-share-nodes" onclick="window.copyLink()"></i>
            <i class="fas fa-bars" onclick="window.toggleMenu()"></i>
        </div>
    </div>

    <div class="profile-card">
        <div class="avatar-box">
            <img id="p-avatar" src="https://via.placeholder.com/150">
            <div style="display:flex; flex-grow:1; justify-content:space-around; text-align:center">
                <div><b>12</b><br><small>Posts</small></div>
                <div><b>450</b><br><small>Abonnés</small></div>
            </div>
        </div>
        <p><b id="p-name">Chargement...</b><br><span id="p-bio" style="color:#888">Bio...</span></p>

        <div class="action-grid">
            <button class="btn btn-orange" id="btn-follow" onclick="window.handleFollow()">Suivre</button>
            <button class="btn" onclick="location.href='messages.html'">Message</button>
            <button class="btn" onclick="window.openEdit()"><i class="fas fa-pen"></i></button>
        </div>
    </div>

    <div id="modal-edit">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px">
            <span onclick="window.closeEdit()">Annuler</span>
            <b>Modifier Profil</b>
            <b onclick="window.saveChanges()" style="color:var(--orange)">OK</b>
        </div>
        <input type="text" id="in-name" placeholder="Nom">
        <textarea id="in-bio" placeholder="Bio"></textarea>
    </div>

    <nav class="bottom-nav">
    <div class="nav-item active" onclick="location.href='index.html'">
        <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
    </div>

    <div class="nav-item" onclick="location.href='explore.html'">
        <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
    </div>

    <div class="nav-item plus-btn" onclick="location.href='add-post.html'">
        <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
    </div>

    <div class="nav-item" onclick="location.href='messages.html'">
        <svg viewBox="0 0 24 24">
            <path d="M12 2C6.48 2 2 6.48 2 12c0 1.54.36 2.98 1 4.28L2.01 22l5.72-1c1.3.64 2.74 1 4.27 1 5.52 0 10-4.48 10-10S17.52 2 12 2zm0 18c-1.38 0-2.68-.35-3.82-1l-.27-.15-3.41.6 1.01-3.21-.17-.28C4.69 14.83 4 13.48 4 12c0-4.41 3.59-8 8-8s8 3.59 8 8-3.59 8-8 8z"/>
        </svg>
    </div>

    <div class="nav-item" onclick="location.href='profil.html'">
        <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
    </div>
</nav>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        let uid = null;

        onAuthStateChanged(auth, async (user) => {
            if (user) { uid = user.uid; load(); } else { location.href='login.html'; }
        });

        async function load() {
            const snap = await getDoc(doc(db, "users", uid));
            if(snap.exists()) {
                const d = snap.data();
                document.getElementById('top-username').innerText = "@" + d.username;
                document.getElementById('p-name').innerText = d.username;
                document.getElementById('p-bio').innerText = d.bio || "";
                document.getElementById('p-avatar').src = d.avatarUrl || "https://via.placeholder.com/150";
                document.getElementById('in-name').value = d.username;
                document.getElementById('in-bio').value = d.bio || "";
            }
        }

        // ATTACH TO WINDOW FOR HTML ONCLICK
        window.toggleMenu = () => {
            document.getElementById('side-menu').classList.toggle('open');
            document.getElementById('overlay').style.display = document.getElementById('side-menu').classList.contains('open') ? 'block' : 'none';
        };
        window.openEdit = () => document.getElementById('modal-edit').style.display = "block";
        window.closeEdit = () => document.getElementById('modal-edit').style.display = "none";
        window.copyLink = () => { navigator.clipboard.writeText(window.location.href); alert("Lien copié !"); };
        window.handleFollow = () => { 
            const b = document.getElementById('btn-follow'); 
            b.innerText = b.innerText === "Suivre" ? "Suivi" : "Suivre";
            b.classList.toggle('btn-orange');
        };
        window.logout = () => signOut(auth);
        window.saveChanges = async () => {
            await updateDoc(doc(db, "users", uid), {
                username: document.getElementById('in-name').value,
                bio: document.getElementById('in-bio').value
            });
            location.reload();
        };
    </script>
</body>
</html>
