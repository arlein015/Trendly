<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Floy - Profil</title>
    <style>
        :root { --orange: #FF7A1A; --noir: #000; --bordure: #262626; --gris: #8e8e8e; }
        body { background: var(--noir); color: white; font-family: -apple-system, sans-serif; margin: 0; padding-bottom: 80px; }

        /* HEADER & MENU */
        .top-nav { display: flex; justify-content: space-between; align-items: center; padding: 15px; position: sticky; top: 0; background: black; z-index: 100; }
        .username-title { font-weight: bold; font-size: 18px; }
        .menu-right { display: flex; gap: 15px; }

        /* PROFIL INFO */
        .profile-container { padding: 10px 15px; }
        .main-info { display: flex; align-items: center; gap: 25px; margin-bottom: 20px; }
        .profile-pic { width: 85px; height: 85px; border-radius: 50%; object-fit: cover; border: 2px solid var(--orange); }
        
        .stats { display: flex; gap: 20px; flex-grow: 1; justify-content: center; text-align: center; }
        .stat-item { display: flex; flex-direction: column; }
        .stat-num { font-weight: bold; font-size: 18px; }
        .stat-label { font-size: 12px; color: var(--gris); }

        .bio-section { margin-bottom: 15px; }
        .display-name { font-weight: bold; font-size: 16px; display: flex; align-items: center; gap: 5px; }
        .verify-badge { width: 16px; height: 16px; fill: var(--orange); }
        .bio-text { font-size: 14px; margin-top: 4px; color: #efefef; white-space: pre-wrap; }
        
        /* LIEN WEB ORANGE */
        .web-link { 
            display: flex; align-items: center; gap: 5px; 
            margin-top: 8px; text-decoration: none; 
            color: var(--orange); font-size: 14px; font-weight: 500;
        }
        .web-link svg { width: 14px; height: 14px; fill: var(--orange); }

        /* BOUTONS ACTIONS */
        .profile-actions { display: flex; gap: 10px; margin-top: 15px; margin-bottom: 20px; }
        .btn { flex: 1; border: none; border-radius: 8px; padding: 10px; font-weight: bold; font-size: 14px; cursor: pointer; transition: 0.2s; }
        .btn-edit { background: #1a1a1a; color: white; border: 1px solid var(--bordure); }
        .btn-follow { background: var(--orange); color: white; }
        .btn-follow.following { background: #1a1a1a; color: white; border: 1px solid var(--bordure); }

        /* GRILLE DE POSTS */
        .profile-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; border-top: 1px solid var(--bordure); }
        .grid-item { aspect-ratio: 1/1; background: #111; cursor: pointer; position: relative; }
        .grid-item img { width: 100%; height: 100%; object-fit: cover; }

        /* NAV BAR BAS */
        .nav-bar { position: fixed; bottom: 0; width: 100%; height: 65px; background: black; border-top: 1px solid var(--bordure); display: flex; justify-content: space-around; align-items: center; }
        .nav-avatar { width: 26px; height: 26px; border-radius: 50%; object-fit: cover; }
    </style>
</head>
<body>

    <div class="top-nav">
        <div class="username-title" id="top-username">Floy_User</div>
        <div class="menu-right">
            <button onclick="copyProfileLink()" style="background:none; border:none; color:white; cursor:pointer;">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
            </button>
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
        </div>
    </div>

    <div class="profile-container">
        <div class="main-info">
            <img id="u-pic" class="profile-pic" src="https://via.placeholder.com/100">
            <div class="stats">
                <div class="stat-item"><span class="stat-num" id="count-posts">0</span><span class="stat-label">Posts</span></div>
                <div class="stat-item"><span class="stat-num" id="count-followers">0</span><span class="stat-label">Abonnés</span></div>
                <div class="stat-item"><span class="stat-num" id="count-following">0</span><span class="stat-label">Suivis</span></div>
            </div>
        </div>

        <div class="bio-section">
            <div class="display-name">
                <span id="u-name">Chargement...</span>
                <span id="u-badge"></span>
            </div>
            <div class="bio-text" id="u-bio">Bio de l'utilisateur...</div>
            
            <a href="#" id="u-web-link" class="web-link" target="_blank" style="display:none;">
                <svg viewBox="0 0 24 24"><path d="M3.9 12c0-1.71 1.39-3.1 3.1-3.1h4V7H7c-2.76 0-5 2.24-5 5s2.24 5 5 5h4v-1.9H7c-1.71 0-3.1-1.39-3.1-3.1zM8 13h8v-2H8v2zm9-6h-4v1.9h4c1.71 0 3.1 1.39 3.1 3.1s-1.39 3.1-3.1 3.1h-4V17h4c2.76 0 5-2.24 5-5s-2.24-5-5-5z"/></svg>
                <span id="u-web-text">site.com</span>
            </a>
        </div>

        <div class="profile-actions">
            <button class="btn btn-edit" onclick="window.location.href='edit-profil.html'">Modifier</button>
            <button class="btn btn-follow" id="btn-follow" onclick="toggleFollow()">Suivre</button>
        </div>
    </div>

    <div class="profile-grid" id="profile-grid"></div>

    <nav class="nav-bar">
        <a href="index.html"><svg width="26" height="26" viewBox="0 0 24 24" fill="white" opacity="0.6"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg></a>
        <a href="explore.html"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" opacity="0.6"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg></a>
        <a href="post.html"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" opacity="0.6"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"></svg></a>
        <a href="profil.html"><img id="nav-avatar" class="nav-avatar" src="https://via.placeholder.com/30"></a>
    </nav>

    <script type="module">
        import { db } from './firebase-config.js';
        import { doc, onSnapshot, collection, query, where, orderBy, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const MY_ID = "User_Floy_Account"; 

        onSnapshot(doc(db, "users", MY_ID), (s) => {
            if(s.exists()){
                const u = s.data();
                document.getElementById('top-username').innerText = u.username || "Profil";
                document.getElementById('u-name').innerText = u.username;
                document.getElementById('u-pic').src = u.avatarUrl || "https://via.placeholder.com/100";
                document.getElementById('nav-avatar').src = u.avatarUrl || "https://via.placeholder.com/30";
                document.getElementById('u-bio').innerText = u.bio || "";
                
                // Gestion du lien Web
                const webLink = document.getElementById('u-web-link');
                const webText = document.getElementById('u-web-text');
                if(u.webLink && u.webLink.trim() !== "") {
                    webLink.style.display = "flex";
                    webLink.href = u.webLink.startsWith('http') ? u.webLink : 'https://' + u.webLink;
                    webText.innerText = u.webLink.replace(/^https?:\/\//, '');
                } else {
                    webLink.style.display = "none";
                }

                document.getElementById('count-followers').innerText = u.followersCount || 0;
                document.getElementById('count-following').innerText = u.followingCount || 0;
                
                if(u.isVerified) {
                    document.getElementById('u-badge').innerHTML = `<svg class="verify-badge" viewBox="0 0 24 24"><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10 10-4.5 10-10S17.5 2 12 2zM10 17l-5-5 1.4-1.4 3.6 3.6 7.6-7.6L19 8l-9 9z"/></svg>`;
                }
            }
        });

        // Grille de Posts
        const q = query(collection(db, "posts"), where("userId", "==", MY_ID), orderBy("timestamp", "desc"));
        onSnapshot(q, (snaps) => {
            const grid = document.getElementById('profile-grid');
            grid.innerHTML = "";
            document.getElementById('count-posts').innerText = snaps.size;
            snaps.forEach(d => {
                const p = d.data();
                const div = document.createElement('div');
                div.className = 'grid-item';
                div.innerHTML = `<img src="${p.images[0]}">`;
                div.onclick = () => window.location.href = `album.html?id=${d.id}`;
                grid.appendChild(div);
            });
        });

        window.toggleFollow = async () => {
            const btn = document.getElementById('btn-follow');
            const isFollowing = btn.classList.contains('following');
            const userRef = doc(db, "users", MY_ID);
            if(!isFollowing) {
                await updateDoc(userRef, { followersCount: increment(1) });
                btn.innerText = "Suivi(e)";
                btn.classList.add('following');
            } else {
                await updateDoc(userRef, { followersCount: increment(-1) });
                btn.innerText = "Suivre";
                btn.classList.remove('following');
            }
        };

        window.copyProfileLink = () => {
            navigator.clipboard.writeText(window.location.href).then(() => {
                alert("Lien du profil copié !");
            });
        };
    </script>
</body>
</html>
