<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Floy - Profil Manuel</title>
    <style>
        :root { --orange: #FF7A1A; --noir: #000; --gris: #121212; --bordure: #262626; }
        body { background: var(--noir); color: white; font-family: -apple-system, sans-serif; margin: 0; padding-bottom: 80px; }

        /* HEADER & MENU */
        header { padding: 15px; border-bottom: 1px solid var(--bordure); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; background: black; z-index: 100; }
        .menu-btn { cursor: pointer; color: white; }

        /* INFOS PROFIL */
        .profile-header { padding: 20px 15px; }
        .main-info { display: flex; align-items: center; gap: 20px; margin-bottom: 20px; }
        
        /* PHOTO DE PROFIL MANUELLE */
        .avatar-container { position: relative; width: 90px; height: 90px; cursor: pointer; }
        .avatar-img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 2px solid var(--orange); }
        .change-hint { position: absolute; bottom: 0; right: 0; background: var(--orange); border-radius: 50%; padding: 5px; display: flex; }

        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); flex-grow: 1; text-align: center; gap: 5px; }
        .stat-item span { display: block; font-weight: bold; font-size: 16px; }
        .stat-label { font-size: 11px; color: #a8a8a8; }

        .bio-area { margin-bottom: 20px; }
        .bio-name { font-weight: bold; font-size: 16px; }
        .bio-link { color: var(--orange); text-decoration: none; font-size: 14px; display: block; margin-top: 5px; }

        /* BOUTONS ACTIONS */
        .btns-row { display: flex; gap: 10px; align-items: center; }
        .btn { flex: 1; border: none; border-radius: 8px; padding: 10px; font-weight: bold; cursor: pointer; color: white; font-size: 14px; }
        .btn-edit { background: #363636; }
        .btn-follow { background: var(--orange); }
        .btn-share { background: #363636; width: 45px; flex: none; display: flex; justify-content: center; align-items: center; }

        /* GRILLE PHOTOS */
        .photo-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; margin-top: 20px; }
        .grid-item { aspect-ratio: 1/1; background: #111; cursor: pointer; }
        .grid-item img { width: 100%; height: 100%; object-fit: cover; }

        /* NAV BAR SVG */
        .nav-bar { position: fixed; bottom: 0; width: 100%; height: 65px; background: black; border-top: 1px solid var(--bordure); display: flex; justify-content: space-around; align-items: center; }
        .nav-svg { width: 28px; height: 28px; fill: none; stroke: white; stroke-width: 2; opacity: 0.6; }
        .active-svg { stroke: var(--orange); opacity: 1; }

        /* MODALE */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; align-items: center; justify-content: center; }
        .modal-content { background: #1c1c1c; width: 85%; padding: 20px; border-radius: 20px; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid var(--bordure); color: white; border-radius: 10px; box-sizing: border-box; }
    </style>
</head>
<body>

    <header>
        <div style="width:24px"></div>
        <div style="font-weight:bold" id="header-user">User_Floy</div>
        <div class="menu-btn">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
        </div>
    </header>

    <div class="profile-header">
        <div class="main-info">
            <div class="avatar-container" onclick="document.getElementById('file-input').click()">
                <img id="profile-img" class="avatar-img" src="https://via.placeholder.com/150">
                <div class="change-hint">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="white"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
                </div>
                <input type="file" id="file-input" style="display:none" accept="image/*">
            </div>

            <div class="stats-grid">
                <div class="stat-item"><span id="p-count">0</span><div class="stat-label">Posts</div></div>
                <div class="stat-item"><span>1.2k</span><div class="stat-label">Followers</div></div>
                <div class="stat-item"><span>450</span><div class="stat-label">Following</div></div>
                <div class="stat-item"><span>8.9k</span><div class="stat-label">Likes</div></div>
            </div>
        </div>

        <div class="bio-area">
            <div class="bio-name" id="b-name">Floy Dev</div>
            <div id="b-text">Ma stratégie digitale commence ici.</div>
            <a href="#" class="bio-link" id="b-link">floy.me/contact</a>
        </div>

        <div class="btns-row">
            <button class="btn btn-edit" onclick="document.getElementById('edit-modal').style.display='flex'">Modifier</button>
            <button class="btn btn-follow">Suivre</button>
            <button class="btn btn-share">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"></path><polyline points="16 6 12 2 8 6"></polyline><line x1="12" y1="2" x2="12" y2="15"></line></svg>
            </button>
        </div>
    </div>

    <div class="photo-grid" id="gallery"></div>

    <div class="modal" id="edit-modal">
        <div class="modal-content">
            <h3 style="text-align:center">Modifier Profil</h3>
            <input type="text" id="in-name" placeholder="Nom complet">
            <input type="text" id="in-bio" placeholder="Bio">
            <input type="text" id="in-web" placeholder="Lien Web">
            <button class="btn btn-follow" style="width:100%" id="save-btn">Enregistrer</button>
            <button style="background:none; border:none; color:grey; width:100%; margin-top:10px" onclick="document.getElementById('edit-modal').style.display='none'">Annuler</button>
        </div>
    </div>

    <nav class="nav-bar">
        <a href="index.html">
            <svg class="nav-svg" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        </a>
        <a href="post.html">
            <svg class="nav-svg" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
        </a>
        <a href="profil.html">
            <svg class="nav-svg active-svg" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        </a>
    </nav>

    <script type="module">
        import { db } from './firebase-config.js';
        import { doc, setDoc, onSnapshot, collection, query, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const USER_KEY = "User_Floy_Account";

        // 1. Gérer l'ouverture de la galerie pour la photo
        document.getElementById('file-input').onchange = (e) => {
            const file = e.target.files[0];
            if(file) {
                const reader = new FileReader();
                reader.onload = async (event) => {
                    const base64 = event.target.result;
                    document.getElementById('profile-img').src = base64;
                    // Sauvegarde manuelle dans Firestore
                    await setDoc(doc(db, "users", USER_KEY), { avatarUrl: base64 }, { merge: true });
                };
                reader.readAsDataURL(file);
            }
        };

        // 2. Charger les données
        onSnapshot(doc(db, "users", USER_KEY), (s) => {
            if(s.exists()){
                const d = s.data();
                document.getElementById('header-user').innerText = d.username || "User_Floy";
                document.getElementById('b-name').innerText = d.name || "Nom";
                document.getElementById('b-text').innerText = d.bio || "Bio";
                document.getElementById('b-link').innerText = d.web || "Lien";
                if(d.avatarUrl) document.getElementById('profile-img').src = d.avatarUrl;
            }
        });

        // 3. Enregistrer les modifications
        document.getElementById('save-btn').onclick = async () => {
            await setDoc(doc(db, "users", USER_KEY), {
                name: document.getElementById('in-name').value,
                bio: document.getElementById('in-bio').value,
                web: document.getElementById('in-web').value
            }, { merge: true });
            document.getElementById('edit-modal').style.display = 'none';
        };

        // 4. Galerie photos
        const q = query(collection(db, "posts"), where("username", "==", "User_Floy"));
        onSnapshot(q, (snaps) => {
            const g = document.getElementById('gallery');
            g.innerHTML = "";
            document.getElementById('p-count').innerText = snaps.size;
            snaps.forEach(d => {
                const item = document.createElement('div');
                item.className = 'grid-item';
                item.innerHTML = `<img src="${d.data().imageUrl}">`;
                g.appendChild(item);
            });
        });
    </script>
</body>
</html>
