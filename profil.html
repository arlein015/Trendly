<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil - Floy</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --orange: #FF7A1A; --bg: #000; --card: #121212; }
        body { background: var(--bg); color: white; font-family: -apple-system, sans-serif; margin: 0; padding-bottom: 80px; }

        /* Header & Top Bar */
        .top-bar { padding: 15px; display: flex; justify-content: space-between; align-items: center; font-weight: bold; font-size: 18px; position: sticky; top: 0; background: var(--bg); z-index: 100; }
        
        /* Stats Section */
        .profile-main { padding: 0 15px; }
        .stats-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
        .profile-pic { width: 85px; height: 85px; border-radius: 50%; object-fit: cover; border: 2px solid #222; background: #111; }
        .stats-box { flex: 1; display: flex; justify-content: space-around; text-align: center; }
        .stat-num { font-weight: bold; font-size: 17px; display: block; }
        .stat-txt { font-size: 12px; color: #888; }

        /* Bio & Badge */
        .profile-info { margin-bottom: 20px; }
        .name-container { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
        .name-container b { font-size: 16px; }
        .bio-text { font-size: 14px; margin: 0; color: #efefef; white-space: pre-wrap; }

        /* Boutons d'action */
        .action-btns { display: flex; gap: 8px; margin-top: 15px; }
        .btn { flex: 1; padding: 10px; border-radius: 8px; font-weight: bold; font-size: 14px; border: none; cursor: pointer; transition: 0.2s; text-align: center; text-decoration: none; }
        .btn-edit { background: #262626; color: white; }
        .btn-msg { background: #262626; color: white; }
        .btn:active { opacity: 0.6; }

        /* Onglets (Photos / Vidéos) */
        .tabs { display: flex; border-top: 1px solid #222; margin-top: 20px; }
        .tab-item { flex: 1; text-align: center; padding: 12px; color: #888; font-size: 20px; cursor: pointer; }
        .tab-item.active { color: white; border-top: 2px solid white; }

        /* Grille de médias */
        .media-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; }
        .media-item { width: 100%; aspect-ratio: 1/1; position: relative; background: #111; overflow: hidden; }
        .media-item img, .media-item video { width: 100%; height: 100%; object-fit: cover; }
        .video-icon { position: absolute; top: 8px; right: 8px; color: white; font-size: 14px; text-shadow: 0 0 3px rgba(0,0,0,0.5); }

        /* Modal Message */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 1000; align-items: center; justify-content: center; }
        .modal-content { background: var(--card); width: 85%; padding: 20px; border-radius: 15px; text-align: center; }
        .modal-content textarea { width: 100%; background: #000; border: 1px solid #333; color: white; padding: 12px; border-radius: 10px; margin: 15px 0; outline: none; box-sizing: border-box; }
        .btn-send { background: var(--orange); color: white; padding: 12px; width: 100%; border-radius: 10px; font-weight: bold; border: none; }
    </style>
</head>
<body>

    <div class="top-bar">
        <span id="header-username">Profil</span>
        <i class="fas fa-bars" onclick="location.href='side-menu.html'"></i>
    </div>

    <div class="profile-main">
        <div class="stats-row">
            <img id="profile-img" class="profile-pic" src="https://via.placeholder.com/150">
            <div class="stats-box">
                <div><span class="stat-num" id="count-posts">0</span><span class="stat-txt">Posts</span></div>
                <div><span class="stat-num">0</span><span class="stat-txt">Abonnés</span></div>
                <div><span class="stat-num">0</span><span class="stat-txt">Suivis</span></div>
            </div>
        </div>

        <div class="profile-info">
            <div class="name-container">
                <b id="full-name">Chargement...</b>
                <i id="verified-badge" class="fas fa-check-circle" style="color: #0095f6; display: none;"></i>
            </div>
            <p id="user-bio-text" class="bio-text">...</p>

            <div class="action-btns">
                <a href="edit-profil.html" class="btn btn-edit">Modifier le profil</a>
                <button class="btn btn-msg" id="open-msg-btn">Message</button>
            </div>
        </div>
    </div>

    <div class="tabs">
        <div class="tab-item active" id="tab-pics"><i class="fas fa-th"></i></div>
        <div class="tab-item" id="tab-vids"><i class="fas fa-play-circle"></i></div>
    </div>

    <div class="media-grid" id="grid-container">
        </div>

    <div id="msgModal" class="modal">
        <div class="modal-content">
            <h3 style="margin:0;">Nouveau message</h3>
            <textarea id="msg-text" rows="4" placeholder="Écris quelque chose..."></textarea>
            <button id="send-btn" class="btn-send">Envoyer</button>
            <p style="color: #888; margin-top: 15px; cursor: pointer;" onclick="closeModal()">Annuler</p>
        </div>
    </div>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { doc, onSnapshot, collection, query, where, orderBy, getDocs, addDoc, serverTimestamp, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                // 1. Infos utilisateur en temps réel
                onSnapshot(doc(db, "users", user.uid), (snap) => {
                    if (snap.exists()) {
                        const data = snap.data();
                        document.getElementById('header-username').innerText = data.username || "Profil";
                        document.getElementById('full-name').innerText = data.username || "Sans nom";
                        document.getElementById('user-bio-text').innerText = data.bio || "Aucune bio ajoutée.";
                        if (data.avatarUrl) document.getElementById('profile-img').src = data.avatarUrl;
                        document.getElementById('verified-badge').style.display = data.isVerified ? "inline-block" : "none";
                    }
                });

                // 2. Charger la grille (Photos par défaut)
                loadMedia(user.uid, "image");

                // 3. Gestion de la fenêtre message
                const modal = document.getElementById('msgModal');
                document.getElementById('open-msg-btn').onclick = () => modal.style.display = "flex";

                document.getElementById('send-btn').onclick = async () => {
                    const txt = document.getElementById('msg-text').value;
                    if(!txt.trim()) return;
                    
                    const chatId = "admin_" + user.uid; // Exemple simple de chat ID
                    await setDoc(doc(db, "chats", chatId), { lastMessage: txt, lastUpdate: serverTimestamp(), users: [user.uid, "admin"] }, {merge:true});
                    await addDoc(collection(db, "chats", chatId, "messages"), { senderId: user.uid, text: txt, createdAt: serverTimestamp() });
                    
                    alert("Envoyé !");
                    closeModal();
                };
            } else {
                window.location.href = "connexion.html";
            }
        });

        async function loadMedia(uid, type) {
            const q = query(collection(db, "posts"), where("userId", "==", uid), orderBy("createdAt", "desc"));
            const snap = await getDocs(q);
            const container = document.getElementById('grid-container');
            container.innerHTML = "";
            document.getElementById('count-posts').innerText = snap.size;

            snap.forEach(doc => {
                const data = doc.data();
                // Vérifier si c'est une vidéo ou une image
                const isVideo = data.imageUrl.includes(".mp4") || data.type === "video";
                
                if (type === "image" && !isVideo) {
                    container.innerHTML += `<div class="media-item"><img src="${data.imageUrl}"></div>`;
                } else if (type === "video" && isVideo) {
                    container.innerHTML += `<div class="media-item">
                        <video src="${data.imageUrl}"></video>
                        <i class="fas fa-play video-icon"></i>
                    </div>`;
                }
            });
        }

        // Changement d'onglets
        document.getElementById('tab-pics').onclick = function() {
            this.classList.add('active'); document.getElementById('tab-vids').classList.remove('active');
            loadMedia(auth.currentUser.uid, "image");
        };
        document.getElementById('tab-vids').onclick = function() {
            this.classList.add('active'); document.getElementById('tab-pics').classList.remove('active');
            loadMedia(auth.currentUser.uid, "video");
        };

        window.closeModal = () => document.getElementById('msgModal').style.display = "none";
    </script>
</body>
</html>
