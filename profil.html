<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil - Floy</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --orange: #FF7A1A; --bg: #000; }
        body { background: var(--bg); color: white; font-family: -apple-system, sans-serif; margin: 0; padding-bottom: 80px; }
        
        /* Header & Profile */
        .top-bar { padding: 15px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #111; }
        .profile-header { padding: 20px; display: flex; align-items: center; gap: 20px; }
        .avatar { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; background: #222; border: 2px solid var(--orange); }
        
        .stats { flex: 1; display: flex; justify-content: space-around; text-align: center; }
        .stat-num { display: block; font-weight: bold; font-size: 18px; }
        .stat-label { font-size: 12px; color: #888; }

        .user-details { padding: 0 20px; }
        .username { font-weight: bold; font-size: 16px; margin-bottom: 5px; }
        .bio { font-size: 14px; color: #ddd; margin-bottom: 15px; }

        /* Boutons */
        .btn-row { display: flex; gap: 10px; padding: 0 20px; }
        .btn { flex: 1; padding: 10px; border-radius: 6px; border: none; font-weight: bold; cursor: pointer; text-align: center; color: white; }
        .btn-msg { background: #262626; }
        .btn-follow { background: var(--orange); }

        /* Modal Message */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center; }
        .modal-content { background: #1c1c1c; width: 90%; max-width: 400px; padding: 20px; border-radius: 15px; }
        textarea { width: 100%; background: #000; border: 1px solid #333; color: white; padding: 10px; border-radius: 8px; margin: 15px 0; box-sizing: border-box; resize: none; }
    </style>
</head>
<body>

    <div class="top-bar">
        <i class="fas fa-chevron-left" onclick="history.back()"></i>
        <span id="nav-username">Profil</span>
        <i class="fas fa-ellipsis-v"></i>
    </div>

    <div class="profile-header">
        <img id="profile-img" class="avatar" src="https://via.placeholder.com/150">
        <div class="stats">
            <div class="stat-item"><span class="stat-num" id="count-posts">0</span><span class="stat-label">Posts</span></div>
            <div class="stat-item"><span class="stat-num" id="count-followers">0</span><span class="stat-label">Abonnés</span></div>
        </div>
    </div>

    <div class="user-details">
        <div class="username" id="display-name">Chargement...</div>
        <div class="bio" id="display-bio">...</div>
    </div>

    <div class="btn-row">
        <button id="btn-follow-action" class="btn btn-follow">Suivre</button>
        <button id="open-msg-modal" class="btn btn-msg">Message</button>
    </div>

    <div id="msgModal" class="modal">
        <div class="modal-content">
            <h3 style="margin:0">Nouveau message</h3>
            <textarea id="msg-text" rows="3" placeholder="Écris quelque chose..."></textarea>
            <button id="send-btn" class="btn btn-follow" style="width:100%">Envoyer</button>
            <p style="text-align:center; font-size:13px; color:gray; margin-top:10px; cursor:pointer" onclick="closeModal()">Annuler</p>
        </div>
    </div>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { doc, getDoc, onSnapshot, setDoc, addDoc, collection, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const params = new URLSearchParams(window.location.search);
        let profileId = params.get('id');

        onAuthStateChanged(auth, async (user) => {
            if (!user) return;
            if (!profileId) profileId = user.uid; // Si pas d'ID, c'est mon profil

            // 1. Charger les données du profil en temps réel
            onSnapshot(doc(db, "users", profileId), (snap) => {
                if(snap.exists()){
                    const d = snap.data();
                    document.getElementById('display-name').innerText = d.username || "Utilisateur";
                    document.getElementById('nav-username').innerText = d.username || "Profil";
                    document.getElementById('display-bio').innerText = d.bio || "";
                    if(d.avatarUrl) document.getElementById('profile-img').src = d.avatarUrl;
                }
            });

            // 2. Gestion du bouton Message
            const modal = document.getElementById('msgModal');
            document.getElementById('open-msg-modal').onclick = () => {
                if(profileId === user.uid) return alert("C'est votre profil !");
                modal.style.display = 'flex';
            };

            window.closeModal = () => { modal.style.display = 'none'; };

            document.getElementById('send-btn').onclick = async () => {
                const text = document.getElementById('msg-text').value.trim();
                if(!text) return;

                // Génération de l'ID unique (ID1_ID2)
                const chatId = user.uid < profileId ? `${user.uid}_${profileId}` : `${profileId}_${user.uid}`;

                try {
                    // Créer/Mettre à jour la discussion (setDoc car on définit l'ID)
                    await setDoc(doc(db, "chats", chatId), {
                        users: [user.uid, profileId],
                        lastMessage: text,
                        lastUpdate: serverTimestamp()
                    }, { merge: true });

                    // Ajouter le message dans la sous-collection
                    await addDoc(collection(db, "chats", chatId, "messages"), {
                        text: text,
                        senderId: user.uid,
                        createdAt: serverTimestamp()
                    });

                    alert("Envoyé !");
                    modal.style.display = 'none';
                    document.getElementById('msg-text').value = "";
                } catch (e) {
                    console.error(e);
                    alert("Erreur lors de l'envoi.");
                }
            };

            // 3. Masquer le bouton Suivre si c'est notre propre profil
            if(profileId === user.uid) {
                document.getElementById('btn-follow-action').style.display = 'none';
            }
        });
    </script>
</body>
</html>
