<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Profil - Floy</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --orange: #FF7A1A; }
        body { background: #000; color: white; font-family: -apple-system, sans-serif; margin: 0; padding-bottom: 70px; }
        
        .profile-header { padding: 20px 15px; border-bottom: 1px solid #121212; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; font-weight: bold; }
        
        .user-stats { display: flex; align-items: center; gap: 20px; }
        .profile-pic { width: 80px; height: 80px; border-radius: 50%; background: #222; object-fit: cover; }
        .stats { display: flex; gap: 20px; text-align: center; flex: 1; justify-content: space-around; }
        .stat-num { font-weight: bold; font-size: 18px; display: block; }
        .stat-label { font-size: 12px; color: #888; }

        .bio { padding: 15px; font-size: 14px; }
        .edit-btn { width: 100%; background: #1a1a1a; border: none; color: white; padding: 8px; border-radius: 5px; font-weight: bold; margin-top: 10px; cursor: pointer; }

        /* Grille des photos */
        .posts-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; margin-top: 20px; }
        .grid-img { width: 100%; aspect-ratio: 1/1; object-fit: cover; background: #111; }

        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 60px; background: #000; border-top: 1px solid #121212; display: flex; justify-content: space-around; align-items: center; font-size: 22px; }
    </style>
</head>
<body>

    <div class="profile-header">
        <div class="top-bar">
            <span id="display-username">Chargement...</span>
            <i class="fas fa-bars"></i>
        </div>

        <div class="user-stats">
            <img id="user-avatar" class="profile-pic" src="https://via.placeholder.com/80">
            <div class="stats">
                <div><span class="stat-num" id="posts-count">0</span><span class="stat-label">Posts</span></div>
                <div><span class="stat-num">0</span><span class="stat-label">Abonnés</span></div>
                <div><span class="stat-num">0</span><span class="stat-label">Abonnements</span></div>
            </div>
        </div>
        
        <div class="bio">
            <b id="full-name">Nom de l'utilisateur</b>
            <button class="edit-btn">Modifier le profil</button>
        </div>
    </div>

    <div class="posts-grid" id="user-posts">
        </div>

    <nav class="bottom-nav">
        <i class="fas fa-home" onclick="location.href='index.html'"></i>
        <i class="fas fa-search"></i>
        <i class="far fa-plus-square" onclick="location.href='create.html'"></i>
        <i class="fas fa-video"></i>
        <i class="fas fa-user-circle" style="color: white;"></i> </nav>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { collection, query, where, getDocs, orderBy, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                // 1. Récupérer les infos du profil
                const userDoc = await getDoc(doc(db, "users", user.uid));
                if (userDoc.exists()) {
                    const data = userDoc.data();
                    document.getElementById('display-username').innerText = data.username || "Pseudo";
                    document.getElementById('full-name').innerText = data.fullName || data.username;
                    if(data.avatarUrl) document.getElementById('user-avatar').src = data.avatarUrl;
                }

                // 2. Récupérer uniquement LES POSTS de cet utilisateur
                const q = query(collection(db, "posts"), where("userId", "==", user.uid), orderBy("createdAt", "desc"));
                const querySnapshot = await getDocs(q);
                
                const grid = document.getElementById('user-posts');
                grid.innerHTML = "";
                document.getElementById('posts-count').innerText = querySnapshot.size;

                querySnapshot.forEach((doc) => {
                    const post = doc.data();
                    grid.innerHTML += `<img src="${post.imageUrl}" class="grid-img">`;
                });
            } else {
                location.href = 'login.html'; // Rediriger si non connecté
            }
        });
    </script>
</body>
</html>
