<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FLOY | Profil Officiel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg: #000; --card: #121212; --border: #262626; --accent: #FF7A1A;
            --text: #fff; --dim: #a8a8a8; --blue: #0095f6;
            --story-gradient: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
        }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; overflow-x: hidden; }

        /* LOADER FLOY */
        #floy-loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; display: none; flex-direction: column;
            align-items: center; justify-content: center; z-index: 10000;
        }
        .floy-logo { font-size: 40px; font-weight: 900; letter-spacing: 10px; color: var(--accent); animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .progress-bar { width: 200px; height: 2px; background: #333; margin-top: 20px; border-radius: 5px; overflow: hidden; }
        #fill { width: 0%; height: 100%; background: var(--accent); transition: width 0.3s; }

        /* HEADER */
        .p-container { max-width: 935px; margin: 0 auto; padding: 20px; }
        .h-top { display: flex; align-items: center; gap: 30px; margin-bottom: 30px; }
        .avatar-box { position: relative; width: 100px; height: 100px; flex-shrink: 0; }
        .s-ring { 
            position: absolute; top: -5px; left: -5px; right: -5px; bottom: -5px;
            background: var(--story-gradient); border-radius: 50%; display: none; 
        }
        .p-img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 3px solid #000; position: relative; z-index: 2; cursor: pointer; }
        .add-s { position: absolute; bottom: 0; right: 0; background: var(--blue); width: 25px; height: 25px; border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 5; border: 2px solid #000; font-size: 12px; cursor: pointer; }

        .u-info { flex: 1; }
        .u-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
        .u-stats { display: flex; list-style: none; padding: 0; gap: 20px; font-size: 14px; }
        .u-bio { font-size: 14px; line-height: 1.4; margin-top: 10px; }
        .u-link { color: #e0f1ff; text-decoration: none; font-weight: 600; font-size: 14px; }

        /* BUTTONS */
        .btn-row { display: flex; gap: 10px; margin-bottom: 30px; }
        .btn { flex: 1; background: var(--border); color: #fff; border: none; padding: 10px; border-radius: 8px; font-weight: 600; cursor: pointer; }
        .btn:active { opacity: 0.7; }

        /* GRID */
        .tabs { display: flex; border-top: 1px solid var(--border); }
        .tab { flex: 1; padding: 15px; text-align: center; color: var(--dim); cursor: pointer; font-size: 20px; }
        .tab.active { color: #fff; border-top: 1px solid #fff; margin-top: -1px; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; }
        .g-item { aspect-ratio: 1/1; background: var(--card); overflow: hidden; }
        .g-item img, .g-item video { width: 100%; height: 100%; object-fit: cover; }

        /* MODALE */
        .m-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; z-index: 9000; }
        .m-card { background: var(--border); width: 90%; max-width: 400px; border-radius: 15px; overflow: hidden; }
        .m-header { display: flex; justify-content: space-between; padding: 15px; border-bottom: 1px solid #333; font-weight: 700; }
        .m-body { padding: 20px; }
        .m-input { width: 100%; background: #000; border: 1px solid #444; color: #fff; padding: 12px; border-radius: 8px; margin-top: 10px; box-sizing: border-box; }
    </style>
</head>
<body>

    <div id="floy-loader">
        <div class="floy-logo">FLOY</div>
        <div class="progress-bar"><div id="fill"></div></div>
    </div>

    <div class="p-container">
        <div class="h-top">
            <div class="avatar-box">
                <div id="ui-ring" class="s-ring"></div>
                <img id="ui-avatar" src="https://via.placeholder.com/150" class="p-img" onclick="triggerGallery('p')">
                <div class="add-s" onclick="triggerGallery('s')"><i class="fas fa-plus"></i></div>
            </div>
            <div class="u-info">
                <div class="u-row">
                    <h2 id="ui-username" style="margin:0; font-weight:400;">...</h2>
                    <i id="ui-badge" class="fas fa-check-circle" style="color:var(--accent); display:none;"></i>
                </div>
                <ul class="u-stats">
                    <li><b id="c-posts">0</b> publications</li>
                    <li><b id="c-followers">0</b> abonnés</li>
                </ul>
                <div class="u-bio">
                    <p id="ui-bio" style="margin:0;"></p>
                    <a id="ui-link" href="#" class="u-link"></a>
                </div>
            </div>
        </div>

        <div class="btn-row">
            <button class="btn" onclick="openEditModal()">Modifier le profil</button>
            <button class="btn" onclick="copyProfile()">Partager</button>
        </div>

        <div class="tabs">
            <div class="tab active"><i class="fas fa-grid-3x3"></i></div>
            <div class="tab"><i class="far fa-bookmark"></i></div>
        </div>
        <div class="grid" id="ui-grid"></div>
    </div>

    <div id="m-edit" class="m-overlay">
        <div class="m-card">
            <div class="m-header">
                <span onclick="closeEditModal()" style="font-weight:400; cursor:pointer;">Annuler</span>
                <span>Modifier</span>
                <span onclick="saveProfile()" style="color:var(--blue); cursor:pointer;">Terminé</span>
            </div>
            <div class="m-body">
                <input id="in-user" class="m-input" type="text" placeholder="Nom d'utilisateur">
                <textarea id="in-bio" class="m-input" rows="3" placeholder="Bio"></textarea>
                <input id="in-link" class="m-input" type="text" placeholder="Lien">
            </div>
        </div>
    </div>

    <input type="file" id="f-p" accept="image/*" style="display:none;">
    <input type="file" id="f-s" accept="image/*" style="display:none;">

    <script type="module">
        import { db, auth, storage } from './firebase-config.js';
        import { doc, onSnapshot, updateDoc, collection, query, where, orderBy, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { ref, uploadBytesResumable, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";

        // --- ATTACHEMENT GLOBAL (FIX REFERENCE ERROR) ---
        window.openEditModal = () => document.getElementById('m-edit').style.display = 'flex';
        window.closeEditModal = () => document.getElementById('m-edit').style.display = 'none';
        window.triggerGallery = (t) => {
            if(t === 'p') document.getElementById('f-p').click();
            else document.getElementById('f-s').click();
        };

        const loader = (show) => document.getElementById('floy-loader').style.display = show ? 'flex' : 'none';

        // --- UPLOAD PHOTO PROFIL ---
        document.getElementById('f-p').onchange = async (e) => {
            const file = e.target.files[0];
            if(!file) return;
            loader(true);
            const sRef = ref(storage, `profiles/${auth.currentUser.uid}`);
            const task = uploadBytesResumable(sRef, file);
            task.on('state_changed', (s) => {
                document.getElementById('fill').style.width = (s.bytesTransferred / s.totalBytes) * 100 + '%';
            }, null, async () => {
                const url = await getDownloadURL(task.snapshot.ref);
                await updateDoc(doc(db, "users", auth.currentUser.uid), { avatarUrl: url });
                loader(false);
            });
        };

        // --- SYNCHRO FIREBASE ---
        auth.onAuthStateChanged(user => {
            if(user) {
                onSnapshot(doc(db, "users", user.uid), (snap) => {
                    const d = snap.data();
                    document.getElementById('ui-username').innerText = d.username || "User";
                    document.getElementById('ui-avatar').src = d.avatarUrl || "https://via.placeholder.com/150";
                    document.getElementById('ui-bio').innerText = d.bio || "";
                    document.getElementById('ui-link').innerText = d.webLink || "";
                    document.getElementById('ui-ring').style.display = d.hasStory ? 'block' : 'none';
                    document.getElementById('ui-badge').style.display = d.isVerified ? 'inline' : 'none';
                    
                    // Inputs
                    document.getElementById('in-user').value = d.username || "";
                    document.getElementById('in-bio').value = d.bio || "";
                    document.getElementById('in-link').value = d.webLink || "";
                });
                loadGrid(user.uid);
            }
        });

        // --- SAUVEGARDE PROFIL ---
        window.saveProfile = async () => {
            loader(true);
            await updateDoc(doc(db, "users", auth.currentUser.uid), {
                username: document.getElementById('in-user').value,
                bio: document.getElementById('in-bio').value,
                webLink: document.getElementById('in-link').value
            });
            closeEditModal();
            loader(false);
        };

        // --- CHARGEMENT GRILLE (Nécessite l'index Firebase) ---
        async function loadGrid(uid) {
            const grid = document.getElementById('ui-grid');
            grid.innerHTML = '';
            try {
                const q = query(collection(db, "posts"), where("userId", "==", uid), orderBy("createdAt", "desc"));
                const snap = await getDocs(q);
                snap.forEach(d => {
                    const p = d.data();
                    const div = document.createElement('div');
                    div.className = 'g-item';
                    div.innerHTML = `<img src="${p.url}">`;
                    grid.appendChild(div);
                });
            } catch(e) { console.error("Index manquant ? Cliquez sur le lien dans la console."); }
        }

        window.copyProfile = () => { navigator.clipboard.writeText(window.location.href); alert("Lien copié !"); };
    </script>
</body>
</html>
