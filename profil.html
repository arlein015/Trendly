<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Floy | Profil Officiel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000; color: #fff; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .orange-text { color: #FF6B00; }
        .bg-orange { background-color: #FF6B00; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); }
        
        /* Badge Bleu Étoilé */
        .badge-blue { color: #38bdf8; filter: drop-shadow(0 0 8px rgba(56, 189, 248, 0.6)); }
        .star { position: absolute; background: white; border-radius: 50%; animation: twinkle 2s infinite; pointer-events: none; }
        @keyframes twinkle { 0%, 100% { opacity: 0; transform: scale(0.3); } 50% { opacity: 1; transform: scale(1); } }

        /* Menu Latéral */
        #side-menu { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); transform: translateX(100%); }
        #side-menu.open { transform: translateX(0); }

        /* Modales */
        .modal { display: none; position: fixed; inset: 0; z-index: 100; background: rgba(0,0,0,0.9); align-items: center; justify-content: center; }
        .modal.active { display: flex; }

        /* Scrollbar invisible pour les stories */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="antialiased">

    <nav class="sticky top-0 z-40 bg-black/80 backdrop-blur-md px-6 py-4 flex justify-between items-center border-b border-white/5">
        <h1 class="font-black text-xl tracking-tighter">Floy<span class="orange-text">.</span></h1>
        <div class="flex items-center space-x-5">
            <button class="opacity-70 hover:opacity-100 transition active:scale-90">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z"/>
                </svg>
            </button>
            <button onclick="toggleMenu(true)" class="active:scale-90 transition">
                <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"/></svg>
            </button>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto pt-6 px-4">
        
        <header class="flex flex-col md:flex-row items-center md:items-start md:space-x-12 mb-8">
            <div class="relative mb-6 md:mb-0">
                <div class="w-24 h-24 md:w-36 md:h-36 rounded-full p-[3px] bg-gradient-to-tr from-[#FF6B00] to-[#FF3D00]">
                    <img src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?auto=format&fit=crop&w=400" class="w-full h-full rounded-full object-cover border-4 border-black">
                </div>
            </div>

            <div class="flex-1 text-center md:text-left">
                <div class="flex items-center justify-center md:justify-start space-x-2 mb-2">
                    <h2 id="display-name" class="text-2xl font-bold tracking-tight">Floy</h2>
                    <div class="relative inline-block">
                        <svg class="w-5 h-5 badge-blue" fill="currentColor" viewBox="0 0 20 20"><path d="M6.267 3.455a3.066 3.066 0 001.745-.723 3.066 3.066 0 013.976 0 3.066 3.066 0 001.745.723 3.066 3.066 0 012.812 2.812c.051.643.304 1.254.723 1.745a3.066 3.066 0 010 3.976 3.066 3.066 0 00-.723 1.745 3.066 3.066 0 01-2.812 2.812 3.066 3.066 0 00-1.745.723 3.066 3.066 0 01-3.976 0 3.066 3.066 0 00-1.745-.723 3.066 3.066 0 01-2.812-2.812 3.066 3.066 0 00-.723-1.745 3.066 3.066 0 010-3.976 3.066 3.066 0 00.723-1.745 3.066 3.066 0 012.812-2.812zm7.44 5.252a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z"></path></svg>
                        <div class="star w-1 h-1" style="top:-3px; right:-2px; animation-delay: 0.2s;"></div>
                        <div class="star w-[2px] h-[2px]" style="bottom:0px; left:-4px; animation-delay: 0.7s;"></div>
                    </div>
                </div>

                <div class="mb-5 space-y-1">
                    <p id="display-bio" class="text-sm text-gray-300 font-medium">Entrepreneur & Développeur. Bâtir le futur de l'indépendance. 🚀</p>
                    <a id="display-link" href="#" class="text-sm text-blue-400 font-bold hover:underline block">www.floy-network.com</a>
                </div>

                <div class="flex flex-wrap justify-center md:justify-start gap-3 items-center">
                    <button id="follow-btn" onclick="handleFollow()" class="bg-orange text-black font-black px-10 py-2 rounded-xl text-xs uppercase tracking-widest active:scale-95 transition">Suivre</button>
                    <button onclick="toggleModal('modal-msg', true)" class="glass px-6 py-2 rounded-xl font-bold text-xs">Message</button>
                    <button onclick="toggleModal('modal-edit', true)" class="p-2 glass rounded-xl hover:border-[#FF6B00] transition active:scale-90">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/></svg>
                    </button>
                </div>
            </div>
        </header>

        <section class="mb-8 border-t border-white/5 pt-6">
            <div id="stories-container" class="flex space-x-5 overflow-x-auto no-scrollbar">
                </div>
        </section>

        <div class="grid grid-cols-3 gap-1 md:gap-4 pb-24">
            <div class="aspect-square bg-white/5 rounded-lg overflow-hidden border border-white/5"><img src="https://picsum.photos/500/500?random=1" class="w-full h-full object-cover opacity-70"></div>
            <div class="aspect-square bg-white/5 rounded-lg overflow-hidden border border-white/5"><img src="https://picsum.photos/500/500?random=2" class="w-full h-full object-cover opacity-70"></div>
            <div class="aspect-square bg-white/5 rounded-lg overflow-hidden border border-white/5"><img src="https://picsum.photos/500/500?random=3" class="w-full h-full object-cover opacity-70"></div>
        </div>

    </main>

    <div id="side-menu" class="fixed inset-y-0 right-0 w-72 bg-[#0A0A0A] border-l border-white/10 z-[60] p-8 shadow-2xl">
        <button onclick="toggleMenu(false)" class="mb-10 text-gray-500 font-bold uppercase text-xs tracking-widest hover:text-white">Fermer ✕</button>
        <nav class="space-y-8 text-lg font-black tracking-tighter uppercase">
            <a href="#" class="block hover:text-[#FF6B00]">Paramètres</a>
            <a href="#" class="block hover:text-[#FF6B00]">Certification</a>
            <a href="#" class="block hover:text-[#FF6B00]">Boost Post</a>
            <a href="#" class="block text-red-600 mt-20 text-sm">Déconnexion</a>
        </nav>
    </div>

    <div id="modal-edit" class="modal">
        <div class="glass w-[90%] max-w-md p-8 rounded-3xl relative">
            <button onclick="toggleModal('modal-edit', false)" class="absolute top-4 right-6 opacity-40">✕</button>
            <h3 class="text-xl font-black mb-6 orange-text uppercase tracking-tighter">Édition Profil</h3>
            <div class="space-y-4">
                <input id="input-name" type="text" placeholder="Nom complet" class="w-full bg-white/5 border border-white/10 rounded-xl p-3 outline-none focus:border-[#FF6B00]">
                <textarea id="input-bio" placeholder="Ta Bio" class="w-full bg-white/5 border border-white/10 rounded-xl p-3 h-24 outline-none focus:border-[#FF6B00]"></textarea>
                <input id="input-link" type="text" placeholder="Lien (URL)" class="w-full bg-white/5 border border-white/10 rounded-xl p-3 outline-none focus:border-[#FF6B00]">
                <button onclick="saveProfile()" class="w-full bg-orange text-black font-black py-4 rounded-xl uppercase tracking-tighter shadow-lg shadow-orange-600/20 active:scale-95 transition">Enregistrer</button>
            </div>
        </div>
    </div>

    <div id="modal-msg" class="modal">
        <div class="glass w-[90%] max-w-sm p-6 rounded-2xl relative">
            <button onclick="toggleModal('modal-msg', false)" class="absolute top-4 right-6 opacity-40">✕</button>
            <p class="font-bold mb-4">Envoyer un message à Floy</p>
            <textarea class="w-full bg-white/5 border border-white/10 p-3 h-32 rounded-xl outline-none mb-4 text-sm focus:border-[#FF6B00]"></textarea>
            <button class="w-full bg-[#FF6B00] text-black font-bold py-2 rounded-lg text-sm">Envoyer</button>
        </div>
    </div>

    <script src="static/js/story.js"></script> <script>
        function toggleMenu(show) { document.getElementById('side-menu').classList.toggle('open', show); }
        function toggleModal(id, show) { document.getElementById(id).classList.toggle('active', show); }

        function handleFollow() {
            const btn = document.getElementById('follow-btn');
            const following = btn.classList.toggle('glass');
            btn.classList.toggle('bg-orange');
            btn.classList.toggle('text-black');
            btn.classList.toggle('text-white');
            btn.innerText = following ? "Suivi" : "Suivre";
        }

        function saveProfile() {
            const name = document.getElementById('input-name').value;
            const bio = document.getElementById('input-bio').value;
            const link = document.getElementById('input-link').value;

            if(name) document.getElementById('display-name').innerText = name;
            if(bio) document.getElementById('display-bio').innerText = bio;
            if(link) {
                const el = document.getElementById('display-link');
                el.innerText = link.replace('https://','').replace('http://','');
                el.href = link.startsWith('http') ? link : 'https://' + link;
            }
            toggleModal('modal-edit', false);
        }
    </script>
</body>
</html>
