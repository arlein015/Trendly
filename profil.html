<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Floy | Network Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; }
        .orange-text { color: #FF6B00; }
        .bg-orange { background-color: #FF6B00; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="antialiased">

    <main class="max-w-4xl mx-auto pt-10 px-4">
        
        <header class="flex flex-col md:flex-row items-center md:items-start md:space-x-12 mb-12">
            
            <div class="w-32 h-32 md:w-40 md:h-40 rounded-full p-[3px] bg-gradient-to-tr from-[#FF6B00] to-[#ffaa00] mb-6 md:mb-0">
                <img src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?auto=format&fit=crop&w=400" 
                     class="w-full h-full rounded-full object-cover border-4 border-black">
            </div>

            <div class="flex-1 text-center md:text-left">
                <div class="flex items-center justify-center md:justify-start space-x-2 mb-6">
                    <h2 class="text-3xl font-bold tracking-tight">Floy</h2>
                    <svg class="w-6 h-6 orange-text" fill="currentColor" viewBox="0 0 20 20">
                        <path d="M6.267 3.455a3.066 3.066 0 001.745-.723 3.066 3.066 0 013.976 0 3.066 3.066 0 001.745.723 3.066 3.066 0 012.812 2.812c.051.643.304 1.254.723 1.745a3.066 3.066 0 010 3.976 3.066 3.066 0 00-.723 1.745 3.066 3.066 0 01-2.812 2.812 3.066 3.066 0 00-1.745.723 3.066 3.066 0 01-3.976 0 3.066 3.066 0 00-1.745-.723 3.066 3.066 0 01-2.812-2.812 3.066 3.066 0 00-.723-1.745 3.066 3.066 0 010-3.976 3.066 3.066 0 00.723-1.745 3.066 3.066 0 012.812-2.812zm7.44 5.252a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z"></path>
                    </svg>
                </div>

                <div class="flex justify-center md:justify-start space-x-3 mb-8">
                    <button id="follow-btn" onclick="handleFollow()" 
                            class="bg-orange text-black font-black px-10 py-2 rounded-full text-sm uppercase transition active:scale-90">
                        Suivre
                    </button>
                    <button class="glass px-6 py-2 rounded-full font-bold text-sm">Message</button>
                </div>

                <div class="flex justify-center md:justify-start space-x-12 mb-8">
                    <div class="text-center">
                        <span id="follower-count" class="text-white font-bold text-xl block">15400</span>
                        <span class="text-gray-500 text-[10px] uppercase font-black">Abonnés</span>
                    </div>
                    <div class="text-center">
                        <span class="text-white font-bold text-xl block">482</span>
                        <span class="text-gray-500 text-[10px] uppercase font-black">Suivis</span>
                    </div>
                </div>

                <div class="bg-white/5 p-4 rounded-xl border-l-4 border-[#FF6B00] max-w-md">
                    <p class="font-bold">@Floy_Entrepreneur</p>
                    <p class="text-sm text-gray-400">Bâtir le réseau de demain. Focus sur l'indépendance. 🚀</p>
                </div>
            </div>
        </header>
    </main>

    <script>
        let following = false;
        let count = 15400;

        function handleFollow() {
            const btn = document.getElementById('follow-btn');
            const counter = document.getElementById('follower-count');

            if (!following) {
                // S'abonner
                following = true;
                count++;
                btn.innerText = "Suivi";
                btn.classList.replace('bg-orange', 'glass');
                btn.classList.replace('text-black', 'text-white');
            } else {
                // Se désabonner
                following = false;
                count--;
                btn.innerText = "Suivre";
                btn.classList.replace('glass', 'bg-orange');
                btn.classList.replace('text-white', 'text-black');
            }

            // Mise à jour visuelle du chiffre
            counter.innerText = count.toLocaleString(); 
        }
    </script>
</body>
</html>
