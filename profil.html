<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil - Floy</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #000; margin: 0; padding-bottom: 80px; font-family: -apple-system, sans-serif; color: white; overflow-x: hidden; }
        .module-container { width: 100%; max-width: 600px; margin: 0 auto; min-height: 100vh; }
        
        /* Loader de démarrage */
        #main-loader { 
            position: fixed; inset: 0; background: #000; 
            display: flex; align-items: center; justify-content: center; z-index: 9999; 
        }

        /* Barre de Navigation Basse */
        .nav-bottom { 
            position: fixed; bottom: 0; width: 100%; height: 65px; 
            background: #000; border-top: 1px solid #1a1a1a; 
            display: flex; justify-content: space-around; align-items: center; z-index: 1000; 
        }
        .nav-bottom i { font-size: 20px; color: white; cursor: pointer; }
        .nav-active { color: #FF7A1A !important; }
    </style>
</head>
<body>

    <div id="main-loader">
        <i class="fas fa-circle-notch fa-spin" style="color: #FF7A1A; font-size: 35px;"></i>
    </div>

    <div class="module-container">
        <div id="header-module"></div>
        <div id="stats-module"></div>
        <div id="tabs-module"></div>
        <div id="grid-module"></div>
    </div>

    <div id="modal-module"></div>

    <div class="nav-bottom">
        <i class="fas fa-home" onclick="location.href='index.html'"></i>
        <i class="fas fa-search"></i>
        <i class="fas fa-plus-square" onclick="location.href='create.html'"></i>
        <i class="fas fa-comment" onclick="location.href='message-list.html'"></i>
        <i class="fas fa-user nav-active"></i>
    </div>

    <script type="module">
        import { auth } from './firebase-config.js';
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        // Fonction pour charger dynamiquement les fichiers HTML
        async function loadModule(file, elementId) {
            try {
                const response = await fetch(file);
                if (!response.ok) throw new Error(`Erreur 404: ${file}`);
                const html = await response.text();
                const target = document.getElementById(elementId);
                
                if (target) {
                    target.innerHTML = html;
                    // Exécution des scripts contenus dans les modules
                    const scripts = target.querySelectorAll("script");
                    scripts.forEach(oldScript => {
                        const newScript = document.createElement("script");
                        newScript.type = oldScript.type || "text/javascript";
                        newScript.textContent = oldScript.textContent;
                        document.body.appendChild(newScript);
                    });
                }
            } catch (err) {
                console.error("Erreur de chargement du module:", err);
            }
        }

        onAuthStateChanged(auth, async (user) => {
            if (!user) { location.href = 'connexion.html'; return; }

            const params = new URLSearchParams(window.location.search);
            const profileId = params.get('id') || user.uid;

            // Chargement de TOUS les modules en parallèle pour la vitesse
            await Promise.all([
                loadModule('profile_header.html', 'header-module'),
                loadModule('profile_stats.html', 'stats-module'),
                loadModule('profile_tabs.html', 'tabs-module'),
                loadModule('profile_grid.html', 'grid-module'),
                loadModule('profile_edit_modal.html', 'modal-module'),
                loadModule('badge_verification.html', 'header-module')
            ]);

            // Petit délai de sécurité pour laisser le DOM respirer
            setTimeout(() => {
                try {
                    // Initialisation des fonctions contenues dans les modules
                    if(window.loadHeader) window.loadHeader(profileId, user.uid);
                    if(window.loadStats) window.loadStats(profileId);
                    if(window.loadGrid) window.loadGrid('posts', profileId);
                    if(window.loadBadge) window.loadBadge(profileId);
                    
                    // On retire le loader une fois que tout est prêt
                    document.getElementById('main-loader').style.display = "none";
                } catch (e) {
                    console.warn("Certaines fonctions de modules ne sont pas encore prêtes :", e);
                }
            }, 200);
        });
    </script>
</body>
</html>
