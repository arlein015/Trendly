<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil - Floy</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #000; color: white; font-family: -apple-system, sans-serif; margin: 0; padding-bottom: 70px; }
        .header { padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #121212; }
        
        /* Infos Profil */
        .profile-info { padding: 20px 15px; display: flex; align-items: center; gap: 30px; }
        .avatar { width: 80px; height: 80px; border-radius: 50%; background: #222; object-fit: cover; }
        .stats { display: flex; gap: 20px; flex: 1; justify-content: space-around; text-align: center; }
        .stat-val { font-weight: bold; display: block; font-size: 18px; }
        .stat-label { font-size: 12px; color: #888; }

        /* Grille de photos */
        .posts-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; margin-top: 10px; }
        .grid-item { width: 100%; aspect-ratio: 1/1; object-fit: cover; background: #111; }

        /* Nav Bar */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 60px; background: #000; border-top: 1px solid #121212; display: flex; justify-content: space-around; align-items: center; font-size: 22px; }
        .active { color: #FF7A1A; }
    </style>
</head>
<body>

    <div class="header">
        <b id="username-top">Profil</b>
        <i class="fas fa-bars"></i>
    </div>

    <div class="profile-info">
        <img id="profile-pic" class="avatar" src="https://via.placeholder.com/80">
        <div class="stats">
            <div><span class="stat-val" id="count-posts">0</span><span class="stat-label">Posts</span></div>
            <div><span class="stat-val">0</span><span class="stat-label">Abonnés</span></div>
            <div><span class="stat-val">0</span><span class="stat-label">Suivis</span></div>
        </div>
    </div>

    <div id="grid" class="posts-grid">
        </div>

    <nav class="bottom-nav">
        <i class="fas fa-home" onclick="location.href='index.html'"></i>
        <i class="fas fa-search"></i>
        <i class="far fa-plus-square" onclick="location.href='create.html'"></i>
        <i class="fas fa-video"></i>
        <i class="fas fa-user-circle active"></i>
    </nav>

    <script type="module">
        // Import unique pour éviter l'erreur de double déclaration
        import { auth, db } from './firebase-config.js';
        import { collection, query, where, getDocs, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                document.getElementById('username-top').innerText = user.displayName || "Mon Profil";
                
                // On récupère tes posts uniquement
                const q = query(
                    collection(db, "posts"), 
                    where("userId", "==", user.uid), 
                    orderBy("createdAt", "desc")
                );

                const snapshot = await getDocs(q);
                const grid = document.getElementById('grid');
                grid.innerHTML = "";
                document.getElementById('count-posts').innerText = snapshot.size;

                snapshot.forEach((doc) => {
                    const post = doc.data();
                    grid.innerHTML += `<img src="${post.imageUrl}" class="grid-item">`;
                });
            } else {
                location.href = 'login.html'; // Redirection si non connecté
            }
        });
    </script>
</body>
</html>
