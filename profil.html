<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Floy - Profil Personnel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --orange: #FF7A1A; --noir: #000; --gris: #121212; --bordure: #222; }
        body { background: var(--noir); color: white; font-family: -apple-system, sans-serif; margin: 0; }

        /* HEADER NAV */
        .nav-header { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; position: sticky; top: 0; background: var(--noir); z-index: 100; }
        .username-top { font-weight: bold; font-size: 18px; display: flex; align-items: center; gap: 5px; }
        .nav-icons { display: flex; gap: 20px; font-size: 20px; }

        /* INFOS PROFIL */
        .profile-info { padding: 20px; }
        .profile-main { display: flex; align-items: center; gap: 25px; margin-bottom: 15px; }
        .avatar-container { position: relative; width: 85px; height: 85px; }
        #p-avatar { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 2px solid var(--bordure); }
        
        .stats { display: flex; gap: 20px; text-align: center; flex-grow: 1; justify-content: space-around; }
        .stat-num { font-weight: bold; font-size: 18px; display: block; }
        .stat-label { font-size: 12px; color: #888; }

        .bio-section { margin-top: 10px; }
        #p-name { font-weight: bold; font-size: 16px; margin: 0; }
        #p-bio { font-size: 14px; margin: 5px 0; color: #eee; }

        /* BOUTONS D'ACTION */
        .action-buttons { display: grid; grid-template-columns: 1fr 1fr 40px; gap: 10px; padding: 0 20px; margin-top: 15px; }
        .btn { border: none; border-radius: 8px; padding: 10px; font-weight: bold; cursor: pointer; font-size: 14px; text-align: center; text-decoration: none; }
        .btn-follow { background: var(--orange); color: white; }
        .btn-msg { background: var(--gris); color: white; border: 1px solid var(--bordure); }
        .btn-edit { background: var(--gris); color: white; border: 1px solid var(--bordure); }

        /* GRILLE DE PHOTOS */
        .photo-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; margin-top: 25px; }
        .grid-item { aspect-ratio: 1/1; background: #222; overflow: hidden; }
        .grid-item img { width: 100%; height: 100%; object-fit: cover; }

        /* MODAL ÉDITION */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; padding: 20px; box-sizing: border-box; }
        .modal-content { background: var(--gris); padding: 20px; border-radius: 20px; border: 1px solid var(--orange); }
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #333; color: white; border-radius: 8px; box-sizing: border-box; }

        .badge-verified { color: var(--orange); font-size: 14px; }
    </style>
</head>
<body>

    <div class="nav-header">
        <div class="username-top">
            <span id="top-username">FloyUser</span>
            <i id="top-badge" class="fas fa-check-circle badge-verified" style="display:none;"></i>
        </div>
        <div class="nav-icons">
            <i class="fas fa-share-alt" onclick="shareProfile()" title="Partager"></i>
            <i class="fas fa-bars" onclick="toggleMenu()" title="Menu"></i>
        </div>
    </div>

    <div class="profile-info">
        <div class="profile-main">
            <div class="avatar-container">
                <img id="p-avatar" src="https://via.placeholder.com/150" alt="Avatar">
            </div>
            <div class="stats">
                <div><span class="stat-num" id="count-posts">0</span><span class="stat-label">Posts</span></div>
                <div><span class="stat-num" id="count-followers">0</span><span class="stat-label">Abonnés</span></div>
                <div><span class="stat-num" id="count-following">0</span><span class="stat-label">Suivis</span></div>
            </div>
        </div>
        <div class="bio-section">
            <p id="p-name">Chargement...</p>
            <p id="p-bio">...</p>
        </div>
    </div>

    <div class="action-buttons">
        <button id="btn-main-action" class="btn btn-follow">Suivre</button>
        <a href="messages.html" class="btn btn-msg">Message</a>
        <button onclick="openEdit()" class="btn btn-edit"><i class="fas fa-user-edit"></i></button>
    </div>

    <div class="photo-grid" id="photo-grid">
        </div>

    <div id="modal-edit" class="modal">
        <div class="modal-content">
            <h3>Modifier le profil</h3>
            <input type="text" id="edit-name" placeholder="Nom complet">
            <textarea id="edit-bio" placeholder="Bio"></textarea>
            <button onclick="saveProfile()" class="btn btn-follow" style="width:100%">Enregistrer</button>
            <button onclick="closeEdit()" class="btn btn-msg" style="width:100%; margin-top:10px;">Annuler</button>
            <hr style="border:0; border-top:1px solid #333; margin:20px 0;">
            <button onclick="logout()" style="background:none; border:none; color:red; cursor:pointer; width:100%;">Se déconnecter</button>
        </div>
    </div>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { doc, getDoc, updateDoc, collection, query, where, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        let currentUID = null;

        // 1. GESTION DE L'AUTHENTIFICATION
        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUID = user.uid;
                loadProfile(user.uid);
                loadUserPhotos(user.uid);
            } else {
                window.location.href = "login.html";
            }
        });

        // 2. CHARGER LES DONNÉES DEPUIS FIREBASE
        async function loadProfile(uid) {
            const userDoc = await getDoc(doc(db, "users", uid));
            if (userDoc.exists()) {
                const data = userDoc.data();
                document.getElementById('top-username').innerText = data.username;
                document.getElementById('p-name').innerText = data.username;
                document.getElementById('p-bio').innerText = data.bio || "Bienvenue sur mon Floy !";
                document.getElementById('p-avatar').src = data.avatarUrl || "https://via.placeholder.com/150";
                
                // Afficher le badge orange si vérifié
                if (data.isVerified === true) {
                    document.getElementById('top-badge').style.display = "inline";
                }

                // Pré-remplir le modal d'édition
                document.getElementById('edit-name').value = data.username;
                document.getElementById('edit-bio').value = data.bio || "";
            }
        }

        // 3. CHARGER LES PHOTOS (GRILLE)
        function loadUserPhotos(uid) {
            const q = query(collection(db, "posts"), where("userId", "==", uid));
            onSnapshot(q, (snapshot) => {
                const grid = document.getElementById('photo-grid');
                grid.innerHTML = "";
                snapshot.forEach(doc => {
                    const post = doc.data();
                    if(post.imageUrl) {
                        grid.innerHTML += `<div class="grid-item"><img src="${post.imageUrl}"></div>`;
                    }
                });
            });
        }

        // 4. ACTIONS (PARTAGE, ÉDITION, LOGOUT)
        window.shareProfile = () => {
            const url = window.location.href;
            navigator.share ? navigator.share({ title: 'Floy', url: url }) : alert("Lien copié : " + url);
        };

        window.openEdit = () => document.getElementById('modal-edit').style.display = "block";
        window.closeEdit = () => document.getElementById('modal-edit').style.display = "none";

        window.saveProfile = async () => {
            await updateDoc(doc(db, "users", currentUID), {
                username: document.getElementById('edit-name').value,
                bio: document.getElementById('edit-bio').value
            });
            location.reload();
        };

        window.logout = () => { if(confirm("Quitter Floy ?")) signOut(auth); };

        window.toggleMenu = () => {
            alert("Paramètres Floy : \n- Compte\n- Sécurité\n- Aide");
        };
    </script>
</body>
</html>
