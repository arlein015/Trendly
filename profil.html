<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil - Floy</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --orange: #FF7A1A; --bg: #000; --card: #121212; --text-gray: #a8a8a8; }
        body { background: var(--bg); color: white; font-family: -apple-system, BlinkMacSystemFont, sans-serif; margin: 0; padding-bottom: 80px; overflow-x: hidden; }

        /* Header */
        .top-bar { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; background: rgba(0,0,0,0.9); z-index: 1000; backdrop-filter: blur(10px); }
        .username-header { font-weight: 800; font-size: 20px; letter-spacing: -0.5px; }

        /* Profile Section */
        .profile-container { padding: 10px 20px; }
        .stats-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 15px; }
        
        /* Photo de profil fluide */
        .profile-pic-container { position: relative; width: 86px; height: 86px; border-radius: 50%; padding: 3px; background: linear-gradient(45deg, var(--orange), #ffcd3c); }
        .profile-pic { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; background: #111; border: 2px solid black; transition: opacity 0.3s ease; }
        
        .stats-box { flex: 1; display: flex; justify-content: space-around; margin-left: 20px; }
        .stat-item { text-align: center; }
        .stat-num { font-weight: 800; font-size: 18px; display: block; }
        .stat-label { font-size: 12px; color: var(--text-gray); }

        /* Bio & Badge */
        .user-info { margin-bottom: 20px; }
        .name-badge { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
        .name-badge b { font-size: 15px; font-weight: 700; }
        .bio-text { font-size: 14px; margin: 0; line-height: 1.4; color: #efefef; }

        /* Boutons d'action */
        .action-btns { display: flex; gap: 8px; margin-top: 15px; }
        .btn { flex: 1; padding: 10px; border-radius: 8px; font-weight: 700; font-size: 13px; border: none; cursor: pointer; text-align: center; text-decoration: none; transition: transform 0.1s; }
        .btn:active { transform: scale(0.96); }
        .btn-follow { background: var(--orange); color: white; }
        .btn-gray { background: #262626; color: white; }

        /* Grille & Onglets */
        .tabs { display: flex; border-top: 1px solid #262626; margin-top: 10px; }
        .tab { flex: 1; text-align: center; padding: 12px; color: var(--text-gray); font-size: 22px; cursor: pointer; }
        .tab.active { color: white; border-top: 2px solid white; }
        
        .media-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; }
        .grid-item { aspect-ratio: 1/1; background: #111; position: relative; }
        .grid-item img, .grid-item video { width: 100%; height: 100%; object-fit: cover; }

        /* NAV BAR SVG (Style Index) */
        .nav-bar { position: fixed; bottom: 0; width: 100%; height: 65px; background: #000; border-top: 1px solid #1a1a1a; display: flex; justify-content: space-around; align-items: center; z-index: 1000; }
        .nav-icon { width: 26px; height: 26px; fill: white; cursor: pointer; }
        .nav-icon.active { fill: var(--orange); }

        /* Modal Message */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: #1c1c1c; width: 100%; max-width: 350px; padding: 25px; border-radius: 20px; text-align: center; }
        .modal-content textarea { width: 100%; background: #000; border: 1px solid #333; color: white; padding: 15px; border-radius: 12px; margin: 15px 0; outline: none; resize: none; }
    </style>
</head>
<body>

    <div class="top-bar">
        <span class="username-header" id="header-user">Chargement...</span>
        <i class="fas fa-bars" onclick="location.href='side-menu.html'"></i>
    </div>

    <div class="profile-container">
        <div class="stats-row">
            <div class="profile-pic-container">
                <img id="profile-img" class="profile-pic" src="">
            </div>
            <div class="stats-box">
                <div class="stat-item"><span class="stat-num" id="post-count">0</span><span class="stat-label">Posts</span></div>
                <div class="stat-item"><span class="stat-num" id="follower-count">0</span><span class="stat-label">Abonnés</span></div>
                <div class="stat-item"><span class="stat-num" id="following-count">0</span><span class="stat-label">Suivis</span></div>
            </div>
        </div>

        <div class="user-info">
            <div class="name-badge">
                <b id="display-name">...</b>
                <i id="v-badge" class="fas fa-check-circle" style="color:#0095f6; display:none; font-size:13px;"></i>
            </div>
            <p id="bio" class="bio-text">Chargement de la bio...</p>
            
            <div class="action-btns">
                <button class="btn btn-follow" id="btn-follow">Suivre</button>
                <button class="btn btn-gray" id="btn-open-msg">Message</button>
                <a href="edit-profil.html" class="btn btn-gray"><i class="fas fa-cog"></i></a>
            </div>
        </div>
    </div>

    <div class="tabs">
        <div class="tab active"><i class="fas fa-th"></i></div>
        <div class="tab"><i class="fas fa-play-circle"></i></div>
    </div>

    <div class="media-grid" id="grid"></div>

    <div class="nav-bar">
        <svg class="nav-icon" viewBox="0 0 24 24" onclick="location.href='index.html'"><path d="M12 2.099l-9 8.165v11.736h6v-6h6v6h6v-11.736l-9-8.165z"/></svg>
        <svg class="nav-icon" viewBox="0 0 24 24"><path d="M10 18h4v-2h-4v2zM3 6v2h18V6H3zm3 7h12v-2H6v2z"/></svg>
        <svg class="nav-icon" viewBox="0 0 24 24" onclick="location.href='create.html'"><path d="M19 11h-6V5h-2v6H5v2h6v6h2v-6h6z"/></svg>
        <svg class="nav-icon" viewBox="0 0 24 24" onclick="location.href='messages.html'"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
        <svg class="nav-icon active" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
    </div>

    <div id="msgModal" class="modal">
        <div class="modal-content">
            <h3 style="margin:0">Envoyer un message</h3>
            <textarea id="msg-input" rows="4" placeholder="Écris ici..."></textarea>
            <button class="btn btn-follow" style="width:100%" id="send-btn">Envoyer</button>
            <p style="color:gray; font-size:12px; margin-top:15px; cursor:pointer" onclick="document.getElementById('msgModal').style.display='none'">Fermer</p>
        </div>
    </div>

                            const img = document.getElementById('profile-img');

                            img.onload = () => img.style.opacity = '1';
                        }
                    }
                });
