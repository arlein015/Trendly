<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Notifications - Floy</title>
</head>
<body class="notif-page">
    <header class="notif-header">
        <h2>Activités</h2>
        <select class="notif-filter">
            <option>Tout</option>
            <option>Likes</option>
            <option>Commentaires</option>
        </select>
    </header>

    <main class="notif-list">
        <div class="notif-item">
            <div class="notif-avatar"></div>
            <div class="notif-text">
                <strong>@user123</strong> a aimé votre vidéo. <span class="notif-time">2m</span>
            </div>
            <div class="notif-preview"></div>
        </div>

        <div class="notif-item">
            <div class="notif-avatar" style="background: var(--bleu);"></div>
            <div class="notif-text">
                <strong>@floy_dev</strong> s'est abonné à vous. <span class="notif-time">1h</span>
            </div>
            <button class="follow-back-btn">S'abonner</button>
        </div>
    </main>
</body>
</html>
