<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Threndly - Messages Privés</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            /* Couleurs exactes de tes images */
            --bg-violet: #1a0033; 
            --bg-darker: #0d001a;
            --floy-cyan: #00e5ff;
            --floy-orange: #ff8c00;
            --story-border: #a456f0;
        }

        body {
            margin: 0;
            background: linear-gradient(180deg, var(--bg-violet) 0%, #000000 100%);
            background-attachment: fixed;
            font-family: 'Poppins', sans-serif;
            color: white;
            min-height: 100vh;
            padding-bottom: 80px;
        }

        /* Header identique à ton image image_01bedc.png */
        .header {
            padding: 50px 20px 15px;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(20px);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Section Storys (comme sur ton image) */
        .stories-scroll {
            display: flex;
            gap: 15px;
            padding: 20px 15px;
            overflow-x: auto;
            scrollbar-width: none;
        }
        .stories-scroll::-webkit-scrollbar { display: none; }

        .story-container { text-align: center; min-width: 65px; }
        .story-ring {
            width: 62px; height: 62px;
            border-radius: 50%;
            border: 2px solid var(--story-border);
            padding: 3px;
            margin-bottom: 5px;
        }
        .story-ring img {
            width: 100%; height: 100%;
            border-radius: 50%;
            object-fit: cover;
            background: #222;
        }

        /* Liste des discussions en mélange Noir/Violet */
        .chats-container { padding: 0 15px; }

        .chat-card {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px;
            background: rgba(0, 0, 0, 0.3); /* Mélange noir */
            border-radius: 20px;
            margin-bottom: 10px;
            border: 1px solid rgba(255, 255, 255, 0.03);
            cursor: pointer;
        }

        .user-avatar { width: 55px; height: 55px; border-radius: 50%; }
        
        .chat-text { flex: 1; }
        .user-name { font-weight: 700; font-size: 15px; display: flex; align-items: center; gap: 5px; }
        .last-msg { font-size: 13px; opacity: 0.6; margin-top: 2px; }
        
        .badge-verified { color: var(--floy-cyan); font-size: 12px; }

        /* Navigation Basse */
        .nav-bar {
            position: fixed; bottom: 0; width: 100%; height: 70px;
            background: #000; /* Noir pur comme ton image */
            display: flex; justify-content: space-around; align-items: center;
            border-top: 1px solid rgba(255,255,255,0.05);
        }
        .nav-item { color: white; font-size: 22px; opacity: 0.5; }
        .nav-item.active { opacity: 1; }
    </style>
</head>
<body>

    <div class="header">
        <i class="fas fa-chevron-left" onclick="window.history.back()"></i>
        <span style="font-weight: 700; font-size: 18px;">Messages Privés</span>
        <i class="fas fa-ellipsis-v"></i>
    </div>

    <div class="stories-scroll">
        <div class="story-container">
            <div class="story-ring" style="border-color: #555;"><img src="logo.png"></div>
            <div style="font-size: 11px;">Moi</div>
        </div>
        <div class="story-container">
            <div class="story-ring"><img src="logo.png"></div>
            <div style="font-size: 11px;">@bouta</div>
        </div>
        <div class="story-container">
            <div class="story-ring"><img src="logo.png"></div>
            <div style="font-size: 11px;">Sophie</div>
        </div>
        <div class="story-container">
            <div class="story-ring"><img src="logo.png"></div>
            <div style="font-size: 11px;">Admin</div>
        </div>
    </div>

    <div class="chats-container">
        <div class="chat-card" onclick="window.location.href='chat.html'">
            <img src="logo.png" class="user-avatar">
            <div class="chat-text">
                <div class="user-name">Support Threndly <i class="fas fa-check-circle badge-verified"></i></div>
                <div class="last-msg">Conversation 100% privée.</div>
            </div>
            <div style="font-size: 10px; opacity: 0.4;">20:51</div>
        </div>

        <div class="chat-card" onclick="window.location.href='chat.html'">
            <img src="logo.png" class="user-avatar">
            <div class="chat-text">
                <div class="user-name">@bouta <i class="fas fa-check-circle badge-verified"></i></div>
                <div class="last-msg">Le thème est magnifique !</div>
            </div>
            <div style="width: 10px; height: 10px; background: var(--floy-orange); border-radius: 50%;"></div>
        </div>
    </div>

    <nav class="nav-bar">
        <i class="fas fa-home nav-item" onclick="window.location.href='feed.html'"></i>
        <i class="fas fa-compass nav-item"></i>
        <div style="background: linear-gradient(to right, #00e5ff, #a456f0); padding: 5px 15px; border-radius: 10px;"><i class="fas fa-plus" style="color: black;"></i></div>
        <i class="fas fa-envelope nav-item active"></i>
        <i class="fas fa-user nav-item" onclick="window.location.href='profile.html'"></i>
    </nav>

</body>
</html>
