<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Threndly - Messages</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { margin: 0; background: linear-gradient(180deg, #1a0033 0%, #000 100%); font-family: 'Poppins', sans-serif; color: white; }
        .header { padding: 50px 20px 15px; background: rgba(0,0,0,0.4); display: flex; justify-content: space-between; align-items: center; }
        .chat-card { display: flex; align-items: center; gap: 15px; padding: 15px; background: rgba(0,0,0,0.3); border-radius: 20px; margin: 10px 15px; border: 1px solid rgba(255,255,255,0.05); }
        .user-avatar { width: 55px; height: 55px; border-radius: 50%; }
        .badge-cyan { color: #00e5ff; font-size: 12px; }
    </style>
</head>
<body>
    <div class="header">
        <i class="fas fa-chevron-left" onclick="window.history.back()"></i>
        <span style="font-weight:700">Messages Privés</span>
        <i class="fas fa-ellipsis-v"></i>
    </div>
    <div class="chat-card" onclick="window.location.href='chat.html'">
        <img src="logo.png" class="user-avatar">
        <div style="flex:1">
            <div style="font-weight:700">@bouta <i class="fas fa-check-circle badge-cyan"></i></div>
            <div style="font-size:13px; opacity:0.6">Le thème est magnifique !</div>
        </div>
        <div style="width:10px; height:10px; background:#ff8c00; border-radius:50%"></div>
    </div>
</body>
</html>
