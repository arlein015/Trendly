<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Floy - Chat</title>
</head>
<body class="chat-page">
    <div class="chat-container">
        <header class="chat-header">
            <div class="header-left">
                <a href="feed.html" class="back-arrow">←</a>
                <div class="user-info">
                    <div class="avatar-small"></div>
                    <div>
                        <span class="username">Floy Support</span>
                        <span class="status">En ligne</span>
                    </div>
                </div>
            </div>
            <button class="menu-dots">⋮</button>
        </header>

        <main class="chat-messages" id="chatBox">
            <div class="msg-group received">
                <div class="msg-content">Bienvenue dans ton espace de messagerie Floy. Pose tes questions ici !</div>
                <span class="msg-time">14:02</span>
            </div>
            
            <div class="msg-group sent">
                <div class="msg-content">Merci ! J'adore le design noir et violet.</div>
                <span class="msg-time">14:05</span>
            </div>
        </main>

        <footer class="chat-footer">
            <div class="input-wrapper">
                <button class="attach-icon">📎</button>
                <input type="text" id="userInput" placeholder="Message..." onkeypress="handleKey(event)">
                <button class="send-btn-pro" onclick="sendMessage()">➤</button>
            </div>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
