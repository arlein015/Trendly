<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <link rel="icon" type="image/png" href="./favicon.png">
    <title>Boutique Floy</title>
    <style>
        :root { --orange: #FF7A1A; --noir: #000; --gris: #121212; --bordure: #262626; }
        body { background: var(--noir); color: white; font-family: -apple-system, sans-serif; margin: 0; padding-bottom: 90px; }
        
        /* HEADER SHOP */
        .shop-header { padding: 30px 20px; text-align: center; background: linear-gradient(180deg, #1a1a1a 0%, var(--noir) 100%); border-bottom: 1px solid var(--bordure); }
        .token-balance { font-size: 48px; font-weight: 900; color: var(--orange); display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 10px; }
        .history-link { font-size: 11px; color: #666; text-decoration: none; text-transform: uppercase; letter-spacing: 1px; font-weight: bold; }

        .section-title { padding: 25px 20px 15px; font-size: 12px; color: #666; text-transform: uppercase; letter-spacing: 1.2px; font-weight: bold; }

        /* PACKS */
        .pack-list { padding: 0 20px; }
        .pack-card { background: var(--gris); border: 1px solid var(--bordure); padding: 20px; border-radius: 20px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; transition: 0.2s; }
        .pack-card:active { transform: scale(0.98); background: #1a1a1a; }
        
        .pack-name { font-weight: bold; font-size: 16px; margin-bottom: 4px; display: block; }
        .pack-desc { font-size: 12px; color: #666; }
        .price-btn { background: var(--orange); color: white; border: none; padding: 10px 18px; border-radius: 12px; font-weight: 800; cursor: pointer; }

        /* ABONNEMENT */
        .sub-card { margin: 0 20px; padding: 25px; border-radius: 22px; background: linear-gradient(135deg, #1a1a1a 0%, #000 100%); border: 1px solid rgba(255, 122, 26, 0.3); display: flex; justify-content: space-between; align-items: center; position: relative; overflow: hidden; }
        .sub-card::before { content: ""; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: radial-gradient(circle, rgba(255,122,26,0.1) 0%, transparent 70%); pointer-events: none; }

        /* NAV BAS */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 65px; background: var(--noir); border-top: 1px solid var(--bordure); display: flex; justify-content: space-around; align-items: center; z-index: 100; }
        .nav-item { fill: #444; }
        .nav-item.active { fill: var(--orange); }
    </style>
</head>
<body>

    <div class="shop-header">
        <a href="./transactions.html" class="history-link">Historique des achats 📋</a>
        <div class="token-balance">
            <span id="currentTokens">550</span>
            <span style="font-size: 20px; background: var(--orange); color: white; border-radius: 50%; width: 30px; height: 30px; display: flex; align-items: center; justify-content: center;">F</span>
        </div>
        <p style="font-size: 12px; color: #666; margin-top: 8px;">Votre solde actuel Floy</p>
    </div>

    <div class="section-title">Acheter des Jetons</div>
    <div class="pack-list">
        <div class="pack-card">
            <div><span class="pack-name">100 Jetons</span><span class="pack-desc">Pour quelques Boosts</span></div>
            <button class="price-btn" onclick="goToPay(0.99)">0.99$</button>
        </div>
        <div class="pack-card">
            <div><span class="pack-name">500 Jetons</span><span class="pack-desc">Pack le plus populaire</span></div>
            <button class="price-btn" onclick="goToPay(4.49)">4.49$</button>
        </div>
        <div class="pack-card" style="border: 1px solid var(--orange);">
            <div><span class="pack-name">1200 Jetons</span><span class="pack-desc">Meilleure offre (VIP)</span></div>
            <button class="price-btn" onclick="goToPay(9.99)">9.99$</button>
        </div>
    </div>

    <div class="section-title">Abonnement Mensuel</div>
    <div class="sub-card">
        <div>
            <h3 style="margin:0; font-size:18px; color: var(--orange);">Badge Certifié</h3>
            <p style="margin:5px 0 0; font-size:12px; color:#aaa;">Badge bleu + Liens illimités</p>
            <p style="margin:10px 0 0; font-size:14px; font-weight: bold;">10$ <span style="font-weight: normal; font-size: 12px; color: #666;">/ mois</span></p>
        </div>
        <button class="price-btn" style="background: white; color: black;" onclick="goToPay(10.00)">Louer</button>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item" onclick="window.location.href='./index.html'"><svg width="26" height="26" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg></div>
        <div class="nav-item active"><svg width="26" height="26" viewBox="0 0 24 24"><path d="M20 7h-4V5c0-1.1-.9-2-2-2h-4c-1.1 0-2 .9-2 2v2H4c-1.1 0-2 .9-2 2v11c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V9c0-1.1-.9-2-2-2zM10 5h4v2h-4V5zm10 15H4V9h16v11z"/></svg></div>
        <div class="nav-item" onclick="window.location.href='./profil.html'"><svg width="26" height="26" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg></div>
    </nav>

    <script>
        function goToPay(amount) {
            window.location.href = `./recharge.html?amt=${amount.toFixed(2)}`;
        }

        // Système de sécurité : si solde < coût mensuel (exemple fictif de vérification)
        const balance = 550; 
        if(balance <= 0) {
            console.log("Abonnement suspendu : solde insuffisant.");
            // Ici tu pourrais ajouter une bannière "Abonnement expiré"
        }
    </script>
</body>
</html>
