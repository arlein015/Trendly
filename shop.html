<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <link rel="icon" type="image/png" href="./favicon.png">
    <title>Boutique Floy</title>
    <style>
        :root { --orange: #FF7A1A; --noir: #000; --gris: #121212; --bordure: #262626; --rouge: #ff4444; }
        body { background: var(--noir); color: white; font-family: -apple-system, sans-serif; margin: 0; padding-bottom: 90px; overflow-x: hidden; }
        
        /* NOTIFICATION FLASH */
        .notif-flash { 
            position: fixed; top: -100px; left: 50%; transform: translateX(-50%);
            background: var(--orange); color: white; padding: 12px 25px; border-radius: 30px;
            font-weight: 800; font-size: 13px; z-index: 2000; transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 30px rgba(255, 122, 26, 0.4); white-space: nowrap;
        }

        /* HEADER */
        .shop-header { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--bordure); background: var(--noir); position: sticky; top: 0; z-index: 100; }
        .balance-box { display: flex; align-items: center; gap: 8px; font-weight: 900; font-size: 18px; color: var(--orange); }

        /* SECTION HERO : BADGE ÉTOILÉ GÉANT */
        .vip-hero { 
            margin: 15px; padding: 40px 20px; border-radius: 35px; 
            background: radial-gradient(circle at top, rgba(255,122,26,0.15) 0%, var(--noir) 100%); 
            border: 1px solid var(--bordure); position: relative; text-align: center;
        }

        .giant-badge-container {
            margin-bottom: 25px; filter: drop-shadow(0 0 25px rgba(255, 122, 26, 0.5));
            animation: pulse 3s infinite ease-in-out;
            display: flex; justify-content: center;
        }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }

        .vip-title { font-size: 26px; font-weight: 900; margin-bottom: 5px; color: white; letter-spacing: 1px; }
        
        .countdown-box {
            display: inline-block; background: rgba(255, 68, 68, 0.1);
            border: 1px solid rgba(255, 68, 68, 0.3); padding: 6px 15px;
            border-radius: 10px; margin-bottom: 15px; color: var(--rouge);
            font-family: monospace; font-weight: bold; font-size: 13px;
        }

        .vip-price { font-size: 22px; font-weight: 900; color: white; margin-bottom: 20px; }
        .price-strike { text-decoration: line-through; color: #555; font-size: 16px; margin-right: 8px; }
        
        .btn-rent { 
            background: var(--orange); color: white; border: none; padding: 16px; 
            border-radius: 18px; font-weight: 900; font-size: 16px; cursor: pointer; width: 100%;
            box-shadow: 0 4px 15px rgba(255, 122, 26, 0.3);
        }

        /* LISTE JETONS */
        .section-title { padding: 20px 20px 10px; font-size: 12px; color: #666; text-transform: uppercase; font-weight: 800; letter-spacing: 1px; }
        .pack-list { padding: 0 15px; }
        .pack-card { background: var(--gris); border: 1px solid var(--bordure); padding: 20px; border-radius: 22px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .price-tag { background: white; color: black; border: none; padding: 10px 18px; border-radius: 12px; font-weight: 900; cursor: pointer; }

        /* NAV BAS */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 65px; background: var(--noir); border-top: 1px solid var(--bordure); display: flex; justify-content: space-around; align-items: center; z-index: 10; }
        .nav-item { fill: #444; }
        .nav-item.active { fill: var(--orange); }
        .giant-badge-container svg {
    filter: drop-shadow(0 0 20px rgba(255, 122, 26, 0.7));
    transition: 0.3s;
}
.giant-badge-container:hover svg {
    transform: scale(1.1) rotate(5deg);
}
    </style>
</head>
<body>

    <div id="flashNotif" class="notif-flash">🔥 OFFRE FLASH : -33% sur la certification !</div>

    <div class="shop-header">
        <div class="balance-box">
            <span style="background:var(--orange); color:white; border-radius:50%; width:22px; height:22px; display:flex; align-items:center; justify-content:center; font-size:12px;">F</span>
            <span id="solde">550</span>
        </div>
        <a href="./transactions.html" style="color:#666; text-decoration:none; font-size:11px; font-weight:bold;">HISTORIQUE</a>
    </div>

    <div class="vip-hero">
      <div class="giant-badge-container">
    <svg width="120" height="120" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 1L13.31 2.94L15.61 2.45L16.42 4.61L18.66 5.31L18.81 7.62L20.69 9.02L20.14 11.27L21.43 13.14L20.21 15.11L20.9 17.32L18.8 18.28L18.42 20.56L16.2 20.73L15.22 22.82L13.04 22.1L11.55 23.88L9.62 22.6L7.54 23.59L6.5 21.52L4.22 21.84L3.65 19.59L1.51 18.73L2.06 16.48L0.57 14.71L1.64 12.65L0.72 10.53L2.43 8.97L2.41 6.66L4.57 5.79L5.2 3.56L7.51 3.86L8.64 1.84L10.87 2.44L12 1Z" fill="var(--orange)"/>
        
        <path d="M7.5 12.5L10.5 15.5L16.5 8.5" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
</div>

        <div class="vip-title">FLOY CERTIFIED</div>
        
        <div class="countdown-box" id="timer">Expire dans : 01:59:59</div>

        <div class="vip-price">
            <span class="price-strike">15.00$</span> 10.00$ <span style="font-size:12px; color:#666;">/ mois</span>
        </div>
        
        <button class="btn-rent" onclick="window.location.href='./recharge.html?amt=10.00'">LOUER MAINTENANT</button>
        <p style="font-size: 11px; color: #555; margin-top: 15px;">Badge étoilé officiel, liens bio illimités et priorité algorithmique.</p>
    </div>

    <div class="section-title">Recharger des jetons</div>
    <div class="pack-list">
        <div class="pack-card">
            <div><b style="display:block; font-size:16px;">100 Jetons</b><small style="color:#666;">Pack Starter</small></div>
            <button class="price-tag" onclick="window.location.href='./recharge.html?amt=0.99'">0.99$</button>
        </div>
        <div class="pack-card" style="border: 1px solid rgba(255,122,26,0.2);">
            <div><b style="display:block; font-size:16px;">500 Jetons</b><small style="color:#666;">Pack Avancé</small></div>
            <button class="price-tag" onclick="window.location.href='./recharge.html?amt=4.49'">4.49$</button>
        </div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item" onclick="window.location.href='./index.html'"><svg width="26" height="26" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg></div>
        <div class="nav-item active"><svg width="26" height="26" viewBox="0 0 24 24"><path d="M20 7h-4V5c0-1.1-.9-2-2-2h-4c-1.1 0-2 .9-2 2v2H4c-1.1 0-2 .9-2 2v11c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V9c0-1.1-.9-2-2-2zM10 5h4v2h-4V5zm10 15H4V9h16v11z"/></svg></div>
        <div class="nav-item" onclick="window.location.href='./profil.html'"><svg width="26" height="26" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg></div>
    </nav>

    <script>
        // Notification Flash après 1 seconde
        setTimeout(() => {
            const notif = document.getElementById('flashNotif');
            notif.style.top = '25px';
            setTimeout(() => { notif.style.top = '-100px'; }, 4000);
        }, 1000);

        // Timer de 2h
        function startTimer(duration, display) {
            var timer = duration, hours, minutes, seconds;
            setInterval(() => {
                hours = parseInt(timer / 3600, 10);
                minutes = parseInt((timer % 3600) / 60, 10);
                seconds = parseInt(timer % 60, 10);
                display.textContent = "Expire dans : " + (hours < 10 ? "0"+hours : hours) + ":" + (minutes < 10 ? "0"+minutes : minutes) + ":" + (seconds < 10 ? "0"+seconds : seconds);
                if (--timer < 0) timer = duration;
            }, 1000);
        }

        window.onload = function () {
            startTimer(60 * 60 * 2, document.querySelector('#timer'));
        };
    </script>
</body>
</html>
