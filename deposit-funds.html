<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Floy - Recharger</title>
    <style>
        :root { --orange-floy: #FF7A1A; --binance-yellow: #F3BA2F; --noir: #000; --gris: #121212; }
        body { background: var(--noir); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        
        .header { display: flex; align-items: center; margin-bottom: 30px; }
        .back-btn { font-size: 28px; color: white; text-decoration: none; margin-right: 20px; cursor: pointer; }

        .amount-card {
            background: var(--gris); border: 1px solid #333; padding: 25px; border-radius: 20px; text-align: center; margin-bottom: 25px;
        }
        .amount-input {
            background: transparent; border: none; color: var(--orange-floy); font-size: 35px; font-weight: bold; text-align: center; width: 100%; outline: none;
        }

        .method-card {
            background: #0a0a0a; border: 1px solid #222; padding: 18px; border-radius: 15px;
            display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; cursor: pointer;
        }
        .method-card.active { border-color: var(--orange-floy); background: rgba(255,122,26,0.05); }
        
        .btn-confirm {
            width: 100%; background: var(--orange-floy); color: black; border: none; padding: 18px;
            border-radius: 15px; font-weight: 800; font-size: 16px; margin-top: 30px; cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="back-btn" onclick="window.location.href='withdraw-funds.html'">‹</div>
        <span style="font-weight:bold; text-transform: uppercase;">Recharger Floy</span>
    </div>

    <div class="amount-card">
        <div style="font-size: 11px; color: #666; margin-bottom: 10px;">MONTANT EN EUROS (€)</div>
        <input type="number" class="amount-input" placeholder="0.00" id="depAmt">
    </div>

    <div style="font-size: 12px; color: #555; margin-bottom: 15px; font-weight: bold;">MÉTHODE DE PAIEMENT</div>

    <div class="method-card active" onclick="selectM(this)">
        <div style="display: flex; align-items: center; gap: 15px;">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="white"><path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 14H4v-6h16v6zm0-10H4V6h16v2z"/></svg>
            <span style="font-weight: bold;">Carte Bancaire</span>
        </div>
        <div style="width:18px; height:18px; border-radius:50%; background: var(--orange-floy);"></div>
    </div>

    <div class="method-card" onclick="selectM(this)">
        <div style="display: flex; align-items: center; gap: 15px;">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="var(--binance-yellow)"><path d="M12 0L8.12 3.88L12 7.76L15.88 3.88L12 0Z"/><path d="M24 12L20.12 8.12L16.24 12L20.12 15.88L24 12Z"/><path d="M12 24L15.88 20.12L12 16.24L8.12 20.12L12 24Z"/><path d="M0 12L3.88 15.88L7.76 12L3.88 8.12L0 12Z"/><path d="M12 11.23L12.77 12L12 12.77L11.23 12L12 11.23Z"/><path d="M8.53 12L12 8.53L15.47 12L12 15.47L8.53 12Z"/></svg>
            <span style="font-weight: bold;">Binance Pay</span>
        </div>
        <div style="width:18px; height:18px; border-radius:50%; border: 2px solid #333;"></div>
    </div>

    <button class="btn-confirm" onclick="pay()">PAYER MAINTENANT</button>

    <script>
        function selectM(el) {
            document.querySelectorAll('.method-card').forEach(m => {
                m.classList.remove('active');
                m.querySelector('div:last-child').style.background = 'transparent';
                m.querySelector('div:last-child').style.border = '2px solid #333';
            });
            el.classList.add('active');
            el.querySelector('div:last-child').style.background = 'var(--orange-floy)';
            el.querySelector('div:last-child').style.border = 'none';
        }

        function pay() {
            const a = document.getElementById('depAmt').value;
            if(!a || a <= 0) return alert("Veuillez entrer un montant.");
            alert("Connexion sécurisée en cours...");
        }
    </script>
</body>
</html>
