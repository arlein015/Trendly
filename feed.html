<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Floy - Feed</title>
    <style>
        :root { --orange-floy: #FF7A1A; --bleu-floy: #00BFFF; --noir: #000; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--noir); color: white; font-family: sans-serif; overflow: hidden; }

        /* Container Vidéo */
        .video-slide { width: 100%; height: 100vh; position: relative; background: #111; display: flex; align-items: center; justify-content: center; }

        /* Logo Floy 3D */
        .top-header { position: fixed; top: 15px; width: 100%; display: flex; justify-content: center; z-index: 100; }
        .logo-3d { width: 80px; height: 40px; background: var(--orange-floy); border-radius: 12px; display: flex; align-items: center; justify-content: center; box-shadow: 0 5px 15px rgba(255, 122, 26, 0.4); }
        .logo-3d b { color: black; font-size: 16px; }

        /* Barre Latérale */
        .side-bar { position: absolute; right: 15px; bottom: 120px; display: flex; flex-direction: column; gap: 25px; align-items: center; z-index: 10; }
        
        .action-container { position: relative; display: flex; flex-direction: column; align-items: center; }

        /* BOUTON POUCE */
        .like-btn { 
            background: rgba(255,255,255,0.1); border: none; width: 55px; height: 55px; 
            border-radius: 50%; color: white; font-size: 24px; cursor: pointer; 
            transition: 0.3s; display: flex; align-items: center; justify-content: center;
            -webkit-tap-highlight-color: transparent;
        }
        .like-btn.active { color: var(--bleu-floy); background: rgba(0, 191, 255, 0.2); box-shadow: 0 0 15px var(--bleu-floy); }

        /* BARRE DE RÉACTIONS (Cachée par défaut) */
        .reaction-bar {
            position: absolute; right: 70px; top: 0; background: white; 
            padding: 8px 15px; border-radius: 30px; display: none; gap: 10px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.5); animation: popIn 0.3s forwards;
        }
        .reaction-bar span { font-size: 25px; cursor: pointer; transition: 0.2s; }
        .reaction-bar span:hover { transform: scale(1.3); }

        @keyframes popIn { from { opacity: 0; transform: scale(0.5) translateX(20px); } to { opacity: 1; transform: scale(1) translateX(0); } }

        /* Nav Bar */
        .nav-bar { position: fixed; bottom: 0; width: 100%; height: 70px; background: rgba(0,0,0,0.9); display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #222; }
    </style>
</head>
<body>

    <div class="top-header">
        <div class="logo-3d"><b>Floy</b></div>
    </div>

    <div class="video-slide">
        <div style="color: #444;">[ Vidéo Viral Floy ]</div>

        <div class="side-bar">
            <div class="action-container">
                <div class="reaction-bar" id="reactionBar">
                    <span>😂</span><span>❤️</span><span>🔥</span><span>😮</span><span>😢</span>
                </div>
                <button class="like-btn" id="likeBtn" 
                        onmousedown="startPress()" 
                        onmouseup="endPress()" 
                        ontouchstart="startPress()" 
                        ontouchend="endPress()" 
                        onclick="toggleLike()">
                    👍
                </button>
                <span style="font-size: 12px; margin-top: 5px;">1.4k</span>
            </div>

            <button class="like-btn">💬</button>
            <button class="like-btn">↪️</button>
        </div>
    </div>

    <nav class="nav-bar">
        <span style="color: var(--orange-floy); font-size: 24px;">🏠</span>
        <span style="color: #555; font-size: 24px;">🔍</span>
        <div style="background: white; color: black; padding: 5px 15px; border-radius: 8px; font-weight: bold;">+</div>
        <span style="color: #555; font-size: 24px;">💬</span>
        <span style="color: #555; font-size: 24px;">👤</span>
    </nav>

    <script>
        let timer;
        const likeBtn = document.getElementById('likeBtn');
        const reactionBar = document.getElementById('reactionBar');

        // 1. Simple Clic : Pouce Bleu
        function toggleLike() {
            const isLoggedIn = localStorage.getItem('floy_isLoggedIn');
            if (isLoggedIn !== 'true') {
                window.location.href = 'index.html'; // Demande de compte
                return;
            }
            likeBtn.classList.toggle('active');
        }

        // 2. Appui Long : Afficher les réactions
        function startPress() {
            timer = setTimeout(() => {
                reactionBar.style.display = 'flex';
            }, 600); // 600ms pour déclencher
        }

        function endPress() {
            clearTimeout(timer);
            // Fermer les réactions après 3 secondes si aucune sélection
            setTimeout(() => {
                reactionBar.style.display = 'none';
            }, 3000);
        }

        // Fermer les réactions si on clique ailleurs
        document.addEventListener('click', (e) => {
            if (!likeBtn.contains(e.target) && !reactionBar.contains(e.target)) {
                reactionBar.style.display = 'none';
            }
        });
    </script>

</body>
</html>
