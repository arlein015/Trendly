<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FLOY - Feed</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --floy-blue: #007bff;
            --floy-violet: #8a2be2;
            --floy-gradient: linear-gradient(135deg, #007bff 0%, #8a2be2 100%);
        }

        body { margin: 0; padding: 0; background-color: #000; font-family: 'Poppins', sans-serif; color: white; overflow: hidden; }

        .feed-container { height: 100vh; width: 100%; display: flex; flex-direction: column; position: relative; }

        /* Zone Vidéo */
        .video-wrapper { flex: 1; background: #111; display: flex; align-items: center; justify-content: center; position: relative; }

        /* Actions à droite */
        .action-bar { position: absolute; right: 15px; bottom: 120px; display: flex; flex-direction: column; align-items: center; gap: 20px; z-index: 5; }
        .action-item { text-align: center; cursor: pointer; transition: 0.2s; }
        .action-item i { font-size: 30px; margin-bottom: 5px; text-shadow: 0 2px 10px rgba(0,0,0,0.5); }
        .action-item span { font-size: 12px; font-weight: 600; }
        
        .liked { color: #ff2d55; transform: scale(1.2); }
        .saved { color: #ffcc00; }

        /* Disque qui tourne */
        .disc-container { margin-top: 10px; }
        .disc-icon {
            width: 45px; height: 45px; border-radius: 50%;
            background: radial-gradient(circle, #333 20%, #000 100%);
            border: 8px solid #222;
            animation: rotateDisk 5s linear infinite;
        }
        @keyframes rotateDisk { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* Infos Vidéo */
        .video-info { position: absolute; left: 15px; bottom: 100px; max-width: 75%; z-index: 5; }
        .user-name { font-weight: 700; font-size: 16px; margin-bottom: 5px; }
        .badge-verified { color: #1d75bd; margin-left: 5px; }

        /* Fenêtre de Partage (Modal) */
        .share-modal {
            position: absolute; bottom: -100%; left: 0; width: 100%; background: white;
            border-radius: 20px 20px 0 0; color: #333; transition: 0.4s ease; z-index: 20; padding: 20px; box-sizing: border-box;
        }
        .share-modal.active { bottom: 0; }
        .share-header { font-weight: 700; font-size: 18px; margin-bottom: 20px; text-align: center; }
        .share-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; text-align: center; }
        .share-option { cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .share-option i { font-size: 35px; }
        .fa-whatsapp { color: #25D366; } .fa-facebook { color: #1877F2; } .fa-facebook-messenger { color: #0084FF; } .fa-link { color: #636e72; }
        .close-share { margin-top: 20px; padding: 10px; background: #eee; border-radius: 10px; text-align: center; cursor: pointer; font-weight: 600; }

        /* Bottom Nav */
        .bottom-nav { height: 75px; background: #000; border-top: 1px solid #333; display: flex; justify-content: space-around; align-items: center; z-index: 10; }
        .nav-icon { color: var(--floy-violet); font-size: 22px; cursor: pointer; }
        .plus-icon { background: white; color: black; padding: 5px 15px; border-radius: 10px; font-size: 20px; }
    </style>
</head>
<body>

    <div class="feed-container">
        <div class="video-wrapper">
            <p style="color: #444;">[ Vidéo en lecture ]</p>

            <div class="action-bar">
                <div class="action-item" onclick="toggleLike(this)">
                    <i class="fas fa-heart"></i>
                    <span id="like-count">12.5k</span>
                </div>
                <div class="action-item">
                    <i class="fas fa-comment-dots"></i>
                    <span>850</span>
                </div>
                <div class="action-item" onclick="toggleSave(this)">
                    <i class="fas fa-bookmark"></i>
                    <span>Enregistrer</span>
                </div>
                <div class="action-item" onclick="openShare()">
                    <i class="fas fa-share"></i>
                    <span>Partager</span>
                </div>
                <div class="disc-container">
                    <div class="disc-icon"></div>
                </div>
            </div>

            <div class="video-info">
                <div class="user-name">@createur_floy <i class="fas fa-check-circle badge-verified"></i></div>
                <div class="description">Test de l'animation et du partage sur FLOY ! 🚀</div>
            </div>
        </div>

        <div id="shareModal" class="share-modal">
            <div class="share-header">Partager via</div>
            <div class="share-grid">
                <div class="share-option" onclick="shareTo('whatsapp')"><i class="fab fa-whatsapp"></i><span>WhatsApp</span></div>
                <div class="share-option" onclick="shareTo('messenger')"><i class="fab fa-facebook-messenger"></i><span>Messenger</span></div>
                <div class="share-option" onclick="shareTo('facebook')"><i class="fab fa-facebook"></i><span>Facebook</span></div>
                <div class="share-option" onclick="copyLink()"><i class="fas fa-link"></i><span>Lien</span></div>
            </div>
            <div class="close-share" onclick="closeShare()">Annuler</div>
        </div>

        <nav class="bottom-nav">
            <i class="fas fa-home nav-icon"></i>
            <i class="fas fa-search nav-icon"></i>
            <div class="plus-icon"><i class="fas fa-plus"></i></div>
            <i class="fas fa-comment nav-icon"></i>
            <i class="fas fa-user nav-icon"></i>
        </nav>
    </div>

    <script>
        // Fonction Like
        function toggleLike(element) {
            element.classList.toggle('liked');
            let count = document.getElementById('like-count');
            if(element.classList.contains('liked')) {
                count.innerText = "12.6k";
            } else {
                count.innerText = "12.5k";
            }
        }

        // Fonction Enregistrer sur le profil
        function toggleSave(element) {
            element.classList.toggle('saved');
            if(element.classList.contains('saved')) {
                alert("Vidéo enregistrée dans votre profil !");
            }
        }

        // Gestion du Partage
        function openShare() { document.getElementById('shareModal').classList.add('active'); }
        function closeShare() { document.getElementById('shareModal').classList.remove('active'); }

        function shareTo(platform) {
            const url = window.location.href;
            let shareUrl = "";
            if(platform === 'whatsapp') shareUrl = `https://wa.me/?text=Regarde cette vidéo sur FLOY : ${url}`;
            if(platform === 'facebook') shareUrl = `https://www.facebook.com/sharer/sharer.php?u=${url}`;
            if(platform === 'messenger') shareUrl = `fb-messenger://share/?link=${url}`;
            
            window.open(shareUrl, '_blank');
            closeShare();
        }

        function copyLink() {
            navigator.clipboard.writeText(window.location.href);
            alert("Lien copié dans le presse-papier !");
            closeShare();
        }
    </script>
</body>
</html>
