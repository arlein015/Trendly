<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Floy - Feed</title>
    <link rel="icon" type="image/png" href="F4.png">
    <style>
        :root { --orange-floy: #FF7A1A; --noir: #000; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--noir); color: white; font-family: sans-serif; overflow: hidden; }

        .video-container { width: 100%; height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        .video-container::-webkit-scrollbar { display: none; }

        .video-slide { width: 100%; height: 100vh; scroll-snap-align: start; position: relative; background: #111; display: flex; align-items: center; justify-content: center; }

        /* Logo Floy 3D */
        .top-header { position: fixed; top: 15px; left: 0; width: 100%; display: flex; justify-content: center; z-index: 100; pointer-events: none; }
        .logo-3d-mini { 
            width: 70px; height: 35px; background: var(--orange-floy); border-radius: 10px; 
            display: flex; align-items: center; justify-content: center; 
            box-shadow: 0 5px 15px rgba(255, 122, 26, 0.5); 
        }
        .logo-3d-mini span { color: black; font-weight: 900; font-size: 14px; }

        .side-bar { position: absolute; right: 10px; bottom: 100px; display: flex; flex-direction: column; gap: 20px; align-items: center; }
        .action-btn { background: none; border: none; color: white; display: flex; flex-direction: column; align-items: center; cursor: pointer; }
        .action-btn i { font-size: 30px; margin-bottom: 5px; }
        .action-btn span { font-size: 12px; }

        .video-info { position: absolute; bottom: 90px; left: 15px; width: 75%; }
        .video-info h3 { margin: 0; font-size: 16px; }

        /* Navigation basse */
        .nav-bar { position: fixed; bottom: 0; width: 100%; height: 70px; background: rgba(0,0,0,0.9); border-top: 1px solid #222; display: flex; justify-content: space-around; align-items: center; z-index: 100; }
        .nav-item { color: #888; text-decoration: none; font-size: 24px; }
        .upload-btn { background: white; color: black; padding: 5px 18px; border-radius: 10px; font-weight: bold; }
        
        /* Fenêtre surgissante (Modal) pour connexion forcée */
        #auth-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 1000; flex-direction: column; align-items: center; justify-content: center;
        }
    </style>
</head>
<body>

    <div id="auth-modal">
        <div style="width: 100px; height: 100px; background: var(--orange-floy); border-radius: 25px; display: flex; align-items: center; justify-content: center; margin-bottom: 20px; box-shadow: 0 0 30px var(--orange-floy);">
            <span style="color: black; font-weight: 900; font-size: 25px;">Floy</span>
        </div>
        <h2 style="margin-bottom: 10px;">Rejoignez Floy !</h2>
        <p style="color: #888; margin-bottom: 30px;">Inscrivez-vous pour liker et commenter.</p>
        <button onclick="location.href='index.html'" style="background: var(--orange-floy); border: none; padding: 15px 40px; border-radius: 30px; font-weight: bold; cursor: pointer;">CRÉER MON COMPTE</button>
        <button onclick="closeModal()" style="background: transparent; color: #555; border: none; margin-top: 15px;">Plus tard</button>
    </div>

    <div class="top-header">
        <div class="logo-3d-mini"><span>Floy</span></div>
    </div>

    <div class="video-container">
        <div class="video-slide">
            <video src="votre-video.mp4" loop muted autoplay style="width: 100%; height: 100%; object-fit: cover;"></video>
            <div class="video-info">
                <h3>@floy_trend</h3>
                <p>Nouveau challenge #FloyOrange 🚀</p>
            </div>
            <div class="side-bar">
                <button class="action-btn" onclick="checkAuth()"><i>❤️</i><span>15k</span></button>
                <button class="action-btn" onclick="checkAuth()"><i>💬</i><span>230</span></button>
                <button class="action-btn" onclick="checkAuth()"><i>↪️</i><span>Partager</span></button>
            </div>
        </div>
    </div>

    <nav class="nav-bar">
        <a href="feed.html" style="color: var(--orange-floy)">🏠</a>
        <a href="#" onclick="checkAuth()">🔍</a>
        <a href="#" class="upload-btn" onclick="checkAuth()">+</a>
        <a href="#" onclick="checkAuth()">💬</a>
        <a href="#" onclick="checkAuth()">👤</a>
    </nav>

    <script>
        function checkAuth() {
            const isLoggedIn = localStorage.getItem('floy_isLoggedIn');
            
            if (isLoggedIn === 'true') {
                // Si connecté, on peut effectuer l'action (ex: changer la couleur du coeur)
                alert("Action réussie !");
            } else {
                // Sinon, on affiche la fenêtre de blocage
                document.getElementById('auth-modal').style.display = 'flex';
            }
        }

        function closeModal() {
            document.getElementById('auth-modal').style.display = 'none';
        }
    </script>

</body>
</html>
