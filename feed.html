<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Threndly - Feed</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { margin: 0; background: #1a0033; font-family: 'Poppins', sans-serif; color: white; }
        .header-tabs { display: flex; justify-content: center; gap: 20px; padding: 45px 10px 10px; font-weight: 600; }
        .tab.active { border-bottom: 2px solid white; }
        .stories { display: flex; gap: 15px; padding: 15px; overflow-x: auto; }
        .story { width: 60px; height: 60px; border-radius: 50%; border: 2px solid #a456f0; padding: 2px; }
        .story img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
        
        .nav-bar { position: fixed; bottom: 0; width: 100%; height: 70px; background: #000; display: flex; justify-content: space-around; align-items: center; }
        .plus-btn { background: linear-gradient(to right, #00e5ff, #a456f0); padding: 5px 15px; border-radius: 10px; color: black; }
        .notif { position: relative; }
        .badge { position: absolute; top: -5px; right: -8px; background: #ff3b30; font-size: 10px; padding: 2px 6px; border-radius: 10px; border: 2px solid #000; }
    </style>
</head>
<body>
    <div class="header-tabs">
        <span class="tab">Suivi</span>
        <span class="tab active">Pour toi</span>
        <span class="tab">Live</span>
    </div>
    <div class="stories">
        <div class="story"><img src="user1.jpg"></div>
        <div class="story"><img src="user2.jpg"></div>
        <div class="story"><img src="user3.jpg"></div>
    </div>
    <nav class="nav-bar">
        <i class="fas fa-home"></i>
        <i class="fas fa-compass"></i>
        <div class="plus-btn"><i class="fas fa-plus"></i></div>
        <div class="notif" onclick="window.location.href='messages.html'"><i class="fas fa-comment-alt"></i><span class="badge">1</span></div>
        <i class="fas fa-user" onclick="window.location.href='profile.html'"></i>
    </nav>
</body>
</html>
