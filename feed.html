<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Floy - Feed</title>
    <style>
        :root { 
            --orange-floy: #FF7A1A; 
            --noir: #000; 
            --gris-fonce: #121212;
        }
        
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--noir); color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; }

        /* --- HEADER : RECHERCHE & ONGLETS --- */
        .header-top { 
            position: fixed; top: 0; width: 100%; z-index: 100; 
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
            padding: 10px 0;
        }
        .search-bar-container { display: flex; justify-content: center; margin-bottom: 10px; }
        .search-input { 
            background: rgba(255,255,255,0.1); border: 1px solid var(--orange-floy); 
            border-radius: 20px; padding: 8px 15px; width: 80%; color: white; outline: none;
        }
        .tabs { display: flex; justify-content: center; gap: 20px; font-weight: bold; font-size: 15px; }
        .tab { opacity: 0.6; cursor: pointer; }
        .tab.active { opacity: 1; border-bottom: 2px solid var(--orange-floy); padding-bottom: 2px; }

        /* --- CONTENEUR SCROLL VIDÉO --- */
        .video-container { 
            width: 100%; height: 100vh; overflow-y: scroll; 
            scroll-snap-type: y mandatory; scrollbar-width: none; 
        }
        .video-container::-webkit-scrollbar { display: none; }
        
        .video-slide { 
            width: 100%; height: 100vh; scroll-snap-align: start; 
            position: relative; display: flex; align-items: center; justify-content: center;
        }

        /* --- INTERFACE LATÉRALE --- */
        .side-bar { position: absolute; right: 12px; bottom: 100px; display: flex; flex-direction: column; gap: 20px; align-items: center; }
        
        .avatar-box { position: relative; margin-bottom: 5px; }
        .user-pic { width: 50px; height: 50px; border-radius: 50%; border: 2px solid white; }
        .btn-follow { 
            position: absolute; bottom: -8px; left: 50%; transform: translateX(-50%);
            background: var(--orange-floy); border: none; width: 20px; height: 20px; 
            border-radius: 50%; color: white; font-weight: bold; cursor: pointer; font-size: 14px;
        }

        .action-item { display: flex; flex-direction: column; align-items: center; cursor: pointer; }
        .icon-btn { font-size: 35px; transition: 0.2s; filter: drop-shadow(0 0 5px rgba(0,0,0,0.5)); }
        .count { font-size: 12px; font-weight: bold; margin-top: 2px; }

        /* BARRE DE RÉACTIONS */
        .reaction-bar {
            position: absolute; right: 70px; background: rgba(0,0,0,0.9); 
            padding: 10px; border-radius: 30px; display: none; gap: 12px; border: 1px solid var(--orange-floy);
        }
        .reaction-bar span { font-size: 28px; transition: 0.2s; }
        .reaction-bar span:hover { transform: scale(1.4); }

        /* --- INFOS VIDÉO (BAS GAUCHE) --- */
        .video-info { position: absolute; bottom: 90px; left: 15px; width: 75%; text-shadow: 1px 1px 5px rgba(0,0,0,0.8); }
        .user-name { font-weight: bold; font-size: 17px; display: flex; align-items: center; gap: 5px; margin-bottom: 5px; }
        .badge-orange { background: var(--orange-floy); color: black; font-size: 10px; padding: 2px 4px; border-radius: 4px; }
        .desc { font-size: 14px; margin-bottom: 8px; }
        .music-info { font-size: 13px; display: flex; align-items: center; gap: 5px; }

        /* DISQUE TOURNANT */
        .disc { 
            width: 45px; height: 45px; border-radius: 50%; background: radial-gradient(circle, #444 20%, #000 100%);
            border: 8px solid #222; animation: spin 3s linear infinite; display: flex; align-items: center; justify-content: center;
        }
        .disc-center { width: 12px; height: 12px; background: var(--orange-floy); border-radius: 50%; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* --- ANIMATIONS DES RÉACTIONS --- */
        @keyframes shake-haha { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.3) rotate(15deg); } }
        @keyframes shake-angry { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-4px); } 75% { transform: translateX(4px); } }
        .anim-haha { animation: shake-haha 0.4s 3; }
        .anim-angry { animation: shake-angry 0.1s infinite; }

        /* --- NAVIGATION BASSE --- */
        .nav-bar { position: fixed; bottom: 0; width: 100%; height: 70px; background: var(--noir); display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #222; }
        .nav-item { font-size: 24px; color: #777; cursor: pointer; }
        .nav-item.active { color: white; }
        .btn-add { 
            background: var(--orange-floy); width: 50px; height: 35px; border-radius: 10px; 
            display: flex; align-items: center; justify-content: center; color: black; font-weight: 900; 
            box-shadow: 0 0 10px var(--orange-floy);
        }
    </style>
</head>
<body>

    <header class="header-top">
        <div class="search-bar-container">
            <input type="text" class="search-input" placeholder="Rechercher sur Floy...">
        </div>
        <div class="tabs">
            <span class="tab">Suivi</span>
            <span class="tab active">Pour toi</span>
            <span class="tab">Live</span>
        </div>
    </header>

    <div class="video-container">
        <div class="video-slide">
            <div style="color:#333">Vidéo en cours...</div>
            
            <div class="video-info">
                <div class="user-name">@Arlein <span class="badge-orange">FLOY PRO</span></div>
                <div class="desc">Nouvelle mise à jour de l'interface ! Qu'en pensez-vous ? #Floy #Dev #2026 🚀</div>
                <div class="music-info">🎵 Son original - Floy Music Team</div>
            </div>

            <div class="side-bar">
                <div class="avatar-box">
                    <img src="https://i.pravatar.cc/100?u=1" class="user-pic">
                    <button class="btn-follow" onclick="this.innerHTML='✓'; this.style.background='#444'">+</button>
                </div>

                <div class="action-item" style="position: relative;">
                    <div class="reaction-bar" id="reactBar">
                        <span onclick="react('😂', 'anim-haha')">😂</span>
                        <span onclick="react('❤️', '')">❤️</span>
                        <span onclick="react('🔥', '')">🔥</span>
                        <span onclick="react('😠', 'anim-angry')">😠</span>
                        <span onclick="react('🤮', '')">🤮</span>
                    </div>
                    <div class="icon-btn" id="mainIcon" 
                         onclick="fastLike()" 
                         onmousedown="longPress()" onmouseup="endPress()"
                         ontouchstart="longPress()" ontouchend="endPress()">🤍</div>
                    <span class="count">1.2M</span>
                </div>

                <div class="action-item">
                    <span class="icon-btn">💬</span>
                    <span class="count">45k</span>
                </div>

                <div class="action-item">
                    <span class="icon-btn">➡️</span>
                    <span class="count">Partager</span>
                </div>

                <div class="disc"><div class="disc-center"></div></div>
            </div>
        </div>
    </div>

    <nav class="nav-bar">
        <span class="nav-item active">🏠</span>
        <span class="nav-item">🔍</span>
        <div class="btn-add">+</div>
        <span class="nav-item">✉️</span>
        <span class="nav-item">👤</span>
    </nav>

    <script>
        let timer;
        let liked = false;
        const mainIcon = document.getElementById('mainIcon');
        const reactBar = document.getElementById('reactBar');

        function fastLike() {
            if(!liked) {
                react('❤️', '');
            } else {
                mainIcon.innerText = '🤍';
                mainIcon.className = 'icon-btn';
                liked = false;
            }
        }

        function react(emoji, animation) {
            mainIcon.innerText = emoji;
            mainIcon.className = 'icon-btn ' + animation;
            reactBar.style.display = 'none';
            liked = true;
            if(animation === 'anim-haha') setTimeout(() => mainIcon.classList.remove('anim-haha'), 1500);
        }

        function longPress() { timer = setTimeout(() => { reactBar.style.display = 'flex'; }, 500); }
        function endPress() { clearTimeout(timer); }

        window.onclick = function(e) { if(!e.target.closest('.action-item')) reactBar.style.display='none'; }
    </script>
</body>
</html>
