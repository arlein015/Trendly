<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Floy - Feed</title>
    <style>
        :root { --orange-floy: #FF7A1A; --noir: #000; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--noir); color: white; font-family: 'Inter', sans-serif; overflow: hidden; }

        /* Header avec Onglets (Suivi, Pour toi, Live) */
        .feed-tabs { 
            position: fixed; top: 15px; width: 100%; display: flex; justify-content: center; 
            gap: 20px; z-index: 100; font-weight: bold; font-size: 16px;
        }
        .tab { color: rgba(255,255,255,0.6); cursor: pointer; }
        .tab.active { color: white; border-bottom: 2px solid white; padding-bottom: 5px; }

        /* Barre des Stories (en haut) */
        .stories-container {
            position: fixed; top: 60px; left: 0; width: 100%; display: flex; 
            gap: 15px; padding: 10px 15px; overflow-x: auto; z-index: 90;
            scrollbar-width: none;
        }
        .story-circle { 
            min-width: 65px; height: 65px; border-radius: 50%; 
            border: 2px solid var(--orange-floy); padding: 2px;
        }
        .story-circle img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }

        /* Container Vidéo (Snap Scrolling) */
        .video-container { width: 100%; height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        .video-slide { width: 100%; height: 100vh; scroll-snap-align: start; position: relative; background: #000; }

        /* Interface d'interaction à droite */
        .side-bar { position: absolute; right: 15px; bottom: 120px; display: flex; flex-direction: column; gap: 20px; align-items: center; }
        .user-avatar { width: 50px; height: 50px; border-radius: 50%; border: 2px solid white; margin-bottom: 10px; }
        
        .action-item { display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .heart-btn { font-size: 35px; cursor: pointer; transition: 0.3s; filter: drop-shadow(0 0 5px rgba(0,0,0,0.5)); }
        
        /* Barre de réactions (Appui long sur le cœur) */
        .reaction-bar {
            position: absolute; right: 70px; background: #1a1a1a; padding: 10px; 
            border-radius: 30px; display: none; gap: 10px; border: 1px solid #333; animation: pop 0.3s;
        }
        .reaction-bar span { font-size: 28px; cursor: pointer; }

        /* Infos vidéo (bas gauche) */
        .video-meta { position: absolute; bottom: 100px; left: 15px; width: 70%; }
        .username { font-weight: bold; margin-bottom: 8px; display: flex; align-items: center; gap: 5px; }
        .description { font-size: 14px; line-height: 1.4; color: #eee; }

        /* Navigation Basse (Style TikTok/Messenger) */
        .nav-bar { 
            position: fixed; bottom: 0; width: 100%; height: 70px; background: #000; 
            display: flex; justify-content: space-around; align-items: center; border-top: 0.5px solid #222;
        }
        .nav-icon { width: 28px; opacity: 0.6; }
        .nav-icon.active { opacity: 1; }
        .btn-plus { 
            background: linear-gradient(to right, #00f2ea, #ff0050); /* Petit clin d'oeil design */
            padding: 5px 15px; border-radius: 10px; color: black; font-weight: 900; 
        }

        @keyframes pop { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>

    <div class="feed-tabs">
        <span class="tab">Suivi</span>
        <span class="tab active">Pour toi</span>
        <span class="tab">Live</span>
    </div>

    <div class="stories-container">
        <div class="story-circle"><img src="https://i.pravatar.cc/150?u=1"></div>
        <div class="story-circle"><img src="https://i.pravatar.cc/150?u=2"></div>
        <div class="story-circle"><img src="https://i.pravatar.cc/150?u=3"></div>
        <div class="story-circle"><img src="https://i.pravatar.cc/150?u=4"></div>
    </div>

    <div class="video-container">
        <div class="video-slide">
            <div class="video-meta">
                <div class="username">@bouta <span style="color:#00BFFF; font-size:12px;">✔️</span></div>
                <div class="description">Découvrez la nouvelle collection Floy 2026 ! #Style #Orange #Floy 🚀</div>
                <div style="font-size:12px; margin-top:10px;">🎵 Original Sound - Floy Music</div>
            </div>

            <div class="side-bar">
                <img src="https://i.pravatar.cc/150?u=1" class="user-avatar">
                
                <div class="action-item">
                    <div class="reaction-bar" id="reactBar">
                        <span onclick="setHeart('😂', '#ffd700')">😂</span>
                        <span onclick="setHeart('🔥', '#ff4500')">🔥</span>
                        <span onclick="setHeart('😠', '#ff0000')">😠</span>
                        <span onclick="setHeart('🤮', '#32cd32')">🤮</span>
                    </div>
                    <div class="heart-btn" id="mainHeart" 
                         onclick="toggleHeart()" 
                         onmousedown="startPress()" onmouseup="endPress()"
                         ontouchstart="startPress()" ontouchend="endPress()">🤍</div>
                    <span style="font-size:12px;">150K</span>
                </div>

                <div class="action-item">
                    <span style="font-size:30px;">💬</span>
                    <span style="font-size:12px;">856</span>
                </div>

                <div class="action-item">
                    <span style="font-size:30px;">➡️</span>
                    <span style="font-size:12px;">Partager</span>
                </div>
            </div>
        </div>
    </div>

    <nav class="nav-bar">
        <span class="nav-icon active">🏠</span>
        <span class="nav-icon">🔍</span>
        <div class="btn-plus">+</div>
        <span class="nav-icon">✉️</span>
        <span class="nav-icon">👤</span>
    </nav>

    <script>
        let pressTimer;
        let isLiked = false;
        const mainHeart = document.getElementById('mainHeart');
        const reactBar = document.getElementById('reactBar');

        function toggleHeart() {
            if(!isLiked) {
                setHeart('❤️', '#ff0000');
                isLiked = true;
            } else {
                mainHeart.innerText = '🤍';
                mainHeart.style.color = 'white';
                isLiked = false;
            }
        }

        function setHeart(emoji, color) {
            mainHeart.innerText = emoji;
            mainHeart.style.color = color;
            reactBar.style.display = 'none';
            isLiked = true;
        }

        function startPress() { pressTimer = setTimeout(() => { reactBar.style.display = 'flex'; }, 600); }
        function endPress() { clearTimeout(pressTimer); }

        // Fermer les réactions si clic ailleurs
        window.onclick = function(e) { if(!e.target.closest('.action-item')) reactBar.style.display='none'; }
    </script>
</body>
</html>
