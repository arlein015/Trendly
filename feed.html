<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Floy - Feed Ultime</title>
    <style>
        :root { 
            --orange-floy: #FF7A1A; 
            --noir: #000; 
            --blanc: #fff;
            --gris-icon: #666;
        }
        
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--noir); color: var(--blanc); font-family: 'Segoe UI', sans-serif; overflow: hidden; }

        /* --- HEADER : TABS & RECHERCHE --- */
        .header-top { 
            position: fixed; top: 0; width: 100%; z-index: 100; 
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
            padding: 20px 0; display: flex; align-items: center; justify-content: center;
        }
        .tabs { display: flex; gap: 20px; font-weight: bold; }
        .tab { opacity: 0.6; cursor: pointer; font-size: 16px; }
        .tab.active { opacity: 1; border-bottom: 2px solid var(--orange-floy); padding-bottom: 4px; }
        .search-icon { position: absolute; right: 20px; cursor: pointer; fill: var(--blanc); }

        /* --- CONTENEUR VIDÉO --- */
        .video-container { width: 100%; height: 100vh; position: relative; background: #050505; display: flex; align-items: center; justify-content: center; }

        /* --- INTERFACE LATÉRALE --- */
        .side-bar { position: absolute; right: 12px; bottom: 100px; display: flex; flex-direction: column; gap: 20px; align-items: center; z-index: 10; }
        
        /* Bouton Suivre + */
        .avatar-box { position: relative; }
        .user-pic { width: 50px; height: 50px; border-radius: 50%; border: 2px solid var(--blanc); }
        .btn-follow { 
            position: absolute; bottom: -8px; left: 50%; transform: translateX(-50%);
            background: var(--orange-floy); border: none; width: 22px; height: 22px; 
            border-radius: 50%; color: white; font-weight: bold; cursor: pointer;
            display: flex; align-items: center; justify-content: center; transition: 0.3s;
        }
        .btn-follow.active { transform: translateX(-50%) scale(0); opacity: 0; }

        /* Actions SVG */
        .action-item { display: flex; flex-direction: column; align-items: center; cursor: pointer; position: relative; }
        .svg-action { width: 35px; height: 35px; fill: white; transition: 0.3s; filter: drop-shadow(0 0 5px rgba(0,0,0,0.5)); }
        .action-item:hover .svg-action { fill: var(--orange-floy); }
        .count { font-size: 12px; font-weight: bold; margin-top: 2px; }

        /* --- RÉACTIONS & ANIMATIONS --- */
        .reaction-bar {
            position: absolute; right: 65px; background: rgba(15,15,15,0.95); 
            padding: 10px; border-radius: 30px; display: none; gap: 15px; border: 1px solid var(--orange-floy);
        }
        .floy-badge {width: 1.1em; /* Prend la taille du texte voisin */ height: 1.1em; vertical-align: middle; /* Aligne parfaitement avec le nom */ margin-left: 5px; display: inline-block;}
        /* Pour le profil (Nom plus gros) */
        .display-name .floy-badge {width: 22px;height: 22px;}
        /* Pour les messages ou le feed (Nom plus petit) */
        .message-sender .floy-badge, .feed-user .floy-badge {width: 16px; height: 16px;}

        .reaction-bar span { font-size: 30px; transition: 0.3s; }
        .reaction-bar span:hover { transform: scale(1.4); }

        @keyframes anim-haha { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px) rotate(10deg); } }
        @keyframes anim-angry { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
        @keyframes anim-fire { 0%, 100% { transform: scale(1); filter: brightness(1); } 50% { transform: scale(1.2) brightness(1.5); } }
        
        .react-haha { animation: anim-haha 0.5s ease-in-out 3; }
        .react-angry { animation: anim-angry 0.1s infinite; }
        .react-fire { animation: anim-fire 0.6s infinite; }

        /* --- INFOS VIDÉO & BADGE --- */
        .video-info { position: absolute; bottom: 90px; left: 15px; width: 70%; }
        .user-name { font-weight: bold; font-size: 18px; display: flex; align-items: center; gap: 5px; margin-bottom: 5px; }
        .floy-badge-feed { width: 15px;height: 15px; display: inline-block;}

        /* --- BARRE NAVIGATION BASSE --- */
        .nav-bar { position: fixed; bottom: 0; width: 100%; height: 70px; background: var(--noir); display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #1a1a1a; }
        .nav-icon { width: 28px; height: 28px; fill: var(--gris-icon); cursor: pointer; }
        .nav-icon.active { fill: var(--blanc); }
        .btn-add { background: var(--orange-floy); width: 50px; height: 35px; border-radius: 12px; display: flex; align-items: center; justify-content: center; color: black; font-weight: bold; font-size: 24px; box-shadow: 0 0 10px var(--orange-floy); }
    </style>
</head>
<body>

    <header class="header-top">
        <div class="tabs">
            <span class="tab">Live</span>
            <span class="tab">Suivi</span>
            <span class="tab active">Pour toi</span>
        </div>
        <svg class="search-icon" width="24" height="24" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
    </header>

    <div class="video-container">
        <div class="video-info">
           <div class="feed-user">
    <b>Arlein</b> 
    <svg class="floy-badge" ...>[COPIER LE SVG ICI]</svg>
</div
            <div style="font-size:14px">Interface Floy : Animations et SVG activés ! 🔥 #Floy #Dev</div>
        </div>

        <div class="side-bar">
            <div class="avatar-box">
                <img src="https://i.pravatar.cc/100?u=5" class="user-pic">
                <button class="btn-follow" id="fBtn" onclick="this.classList.add('active')">+</button>
            </div>

            <div class="action-item">
                <div class="reaction-bar" id="reactBar">
                    <span onclick="setReact('😂', 'react-haha')">😂</span>
                    <span onclick="setReact('🔥', 'react-fire')">🔥</span>
                    <span onclick="setReact('😠', 'react-angry')">😠</span>
                    <span onclick="setReact('❤️', '')">❤️</span>
                </div>
                <div id="mainEmoji" style="font-size:35px" onclick="fastLike()" onmousedown="holdStart()" onmouseup="holdEnd()" ontouchstart="holdStart()" ontouchend="holdEnd()">🤍</div>
                <span class="count">150K</span>
            </div>

            <div class="action-item">
                <svg class="svg-action" viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                <span class="count">856</span>
            </div>

            <div class="action-item">
                <svg class="svg-action" viewBox="0 0 24 24"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92s2.92-1.31 2.92-2.92-1.31-2.92-2.92-2.92z"/></svg>
                <span class="count">Share</span>
            </div>
        </div>
    </div>

    <nav class="nav-bar">
    <svg class="nav-icon" onclick="window.location.href='feed.html'" viewBox="0 0 24 24" style="cursor: pointer;">
        <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
    </svg>

    <svg class="nav-icon" onclick="window.location.href='explore.html'" viewBox="0 0 24 24" style="cursor: pointer;">
        <path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
    </svg>

    <div class="btn-add" onclick="window.location.href='upload.html'" style="cursor: pointer;">+</div>

    <svg class="nav-icon" onclick="window.location.href='messages.html'" viewBox="0 0 24 24" style="cursor: pointer;">
        <path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 14H4V8l8 5 8-5v10zm-8-7L4 6h16l-8 5z"/>
    </svg>

    <svg class="nav-icon" onclick="window.location.href='profile.html'" viewBox="0 0 24 24" style="cursor: pointer;">
        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/>
    </svg>
</nav>

    <script>
        let holdTimer;
        function holdStart() { holdTimer = setTimeout(() => { document.getElementById('reactBar').style.display = 'flex'; }, 500); }
        function holdEnd() { clearTimeout(holdTimer); }
        
        function setReact(emoji, anim) {
            const main = document.getElementById('mainEmoji');
            main.innerText = emoji;
            main.className = anim;
            document.getElementById('reactBar').style.display = 'none';
        }

        function fastLike() {
            const main = document.getElementById('mainEmoji');
            if(main.innerText === '🤍') { main.innerText = '❤️'; main.style.color = 'red'; }
            else { main.innerText = '🤍'; main.style.color = 'white'; main.className = ''; }
        }
        src="navbar.js"
    </script>
</body>
</html>
